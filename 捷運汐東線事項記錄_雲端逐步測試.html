<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>捷運汐東線事項記錄｜雲端正式診斷版（優化）</title>
  <script>document.write('<script src="tasun-version-loader.js?_=' + Date.now() + '"><\/script>');</script>
  <style>
    :root{--bg:#edf2f1;--panel:#ffffff;--border:#d6d6d6;--ink:#1d1d1f;--muted:#666;--accent:#8a5b16;--ok:#0a7a37;--warn:#a35b00;--bad:#b42318;--info:#175cd3}
    *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,"Segoe UI","Noto Sans TC",sans-serif;background:var(--bg);color:var(--ink)}
    .wrap{max-width:1220px;margin:24px auto;padding:0 16px}
    h1{font-size:24px;margin:0 0 16px}
    .toolbar,.grid,.panel{background:var(--panel);border:1px solid var(--border);border-radius:16px}
    .toolbar{padding:14px;display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
    button{border:1px solid #bbb;background:#fff;border-radius:12px;padding:10px 14px;font:inherit;cursor:pointer}
    button:hover{border-color:#888}
    .grid{display:grid;grid-template-columns:1.05fr 1fr;gap:14px;padding:14px;margin-bottom:14px}
    .card{border:1px solid var(--border);border-radius:14px;padding:12px;background:#fff}
    label{display:block;font-weight:700;margin:10px 0 6px}
    input,textarea{width:100%;border:1px solid #cfcfcf;border-radius:12px;padding:10px 12px;font:inherit}
    textarea{min-height:240px;resize:vertical}
    .logs,.mono{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;line-height:1.55}
    .logs{background:#fafafa;min-height:260px}
    .muted{color:var(--muted)}
    .summaryBox{display:flex;flex-direction:column;gap:10px}
    .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:13px;font-weight:800;width:max-content}
    .badge.ok{color:var(--ok);background:#ecfdf3;border-color:#abefc6}.badge.warn{color:var(--warn);background:#fff7ed;border-color:#fed7aa}.badge.bad{color:var(--bad);background:#fef3f2;border-color:#fecdca}.badge.info{color:var(--info);background:#eff8ff;border-color:#b2ddff}
    .summaryCard{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fafafa}
    .summaryTitle{font-size:13px;color:var(--muted);font-weight:700;margin-bottom:8px}
    .summaryText{white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;line-height:1.55}
    .meta{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .meta .card{min-height:120px}
    .k{font-weight:700}
    @media (max-width:900px){.grid,.meta{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1>捷運汐東線事項記錄｜雲端正式診斷版（優化）</h1>

    <div class="toolbar">
      <button id="btnAll">全部測試</button>
      <button id="btnStep13">Step 1~3：讀取 resources / apiBase</button>
      <button id="btnHealth">Step 4：測 Health</button>
      <button id="btnAuth">Step 4.5：補 Worker 授權</button>
      <button id="btnRead">Step 5~6：測 Read</button>
      <button id="btnMerge">Step 7~8：測 Merge + 再 Read</button>
      <button id="btnLocal">Step 9：檢查本機 localStorage / IDB</button>
      <button id="btnUpload">Step 10：本機資料上傳雲端</button>
      <button id="btnExport">匯出診斷結果</button>
      <button id="btnCopy">複製診斷摘要</button>
      <button id="btnClear">清空畫面</button>
    </div>

    <div class="meta">
      <div class="card mono" id="runtimeMeta"></div>
      <div class="card mono" id="authMeta"></div>
    </div>

    <div class="grid">
      <div class="card">
        <label>頁面 key / resourceKey</label>
        <input id="resourceKey" value="sxdh-notes" />

        <label>resources 檔名</label>
        <input id="resourcesFile" value="tasun-resources.json" />

        <label>apiBase（可手動覆蓋）</label>
        <input id="apiBase" placeholder="例如：https://tasun-worker.wutasun.workers.dev" />

        <label>health endpoint</label>
        <input id="healthEp" value="/api/tasun/health" />

        <label>read endpoint</label>
        <input id="readEp" value="/api/tasun/read" />

        <label>merge endpoint</label>
        <input id="mergeEp" value="/api/tasun/merge" />

        <label>本機 localStorage key（可手動指定）</label>
        <input id="localKey" value="tasunSxdhNotes_v1" />
      </div>

      <div class="card">
        <label>測試結果摘要</label>
        <div class="summaryBox">
          <div id="summaryBadge" class="badge info">尚未執行</div>
          <div class="summaryCard">
            <div class="summaryTitle">目前步驟 / 中文判讀</div>
            <div id="summary" class="summaryText"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel" style="padding:14px;margin-bottom:14px;">
      <label>逐步測試輸出</label>
      <div id="logs" class="card logs"></div>
    </div>

    <div class="panel" style="padding:14px;">
      <label>最後一次 Read / Merge 回傳</label>
      <textarea id="payloadView" spellcheck="false"></textarea>
    </div>
  </div>

<script>
(function(){
  'use strict';
  const $ = id => document.getElementById(id);
  const logs = $('logs');
  const summary = $('summary');
  const summaryBadge = $('summaryBadge');
  const payloadView = $('payloadView');
  const runtimeMeta = $('runtimeMeta');
  const authMeta = $('authMeta');
  const state = { resolved:null, lastRead:null, lastMerge:null, localRows:[], localMeta:null, lastSummaryText:'', lastReport:null };

  function norm(v){ return v == null ? '' : String(v).trim(); }
  function safeJSON(v){ try{return JSON.parse(v);}catch(e){return null;} }
  function now(){ return new Date().toISOString(); }
  function fname(){ try{return decodeURIComponent((location.pathname||'').split('/').pop()||'');}catch(e){ return (location.pathname||'').split('/').pop()||''; } }
  function setPayload(obj){ payloadView.value = typeof obj === 'string' ? obj : JSON.stringify(obj || {}, null, 2); }
  function log(){ const line = Array.from(arguments).join(' '); logs.textContent += (logs.textContent ? '\n' : '') + line; logs.scrollTop = logs.scrollHeight; }
  function badgeKind(kind){ return kind === 'ok' ? 'ok' : kind === 'warn' ? 'warn' : kind === 'bad' ? 'bad' : 'info'; }
  function setSummaryText(text, kind){ summary.textContent = text || ''; state.lastSummaryText = summary.textContent; summaryBadge.className = 'badge ' + badgeKind(kind); summaryBadge.textContent = kind === 'ok' ? '測試成功' : kind === 'warn' ? '需要注意' : kind === 'bad' ? '測試失敗' : '診斷資訊'; }
  function explainHttp(status){
    if(status === 200) return '連線正常，Worker 端點可達。';
    if(status === 401) return '已連到 Worker，但目前沒有帶登入憑證，或 session / token 已失效。';
    if(status === 403) return '已連到 Worker，但目前帳號沒有權限。';
    if(status === 404) return '已連到主機，但 API 路徑不存在，請檢查 endpoint 路徑。';
    if(status === 0) return '瀏覽器沒有取得回應，可能是 CORS、網路或網址錯誤。';
    return 'HTTP ' + status + '，請再搭配下方逐步輸出判讀。';
  }
  function clearAll(){ logs.textContent=''; summary.textContent=''; payloadView.value=''; state.lastSummaryText=''; summaryBadge.className='badge info'; summaryBadge.textContent='尚未執行'; refreshMeta(); }
  function readCookie(name){ try{ const m = document.cookie.match(new RegExp('(?:^|; )' + String(name).replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + '=([^;]*)')); return m ? decodeURIComponent(m[1]||'') : ''; }catch(e){ return ''; } }
  function tokenCandidates(){
    const names = [
      'tasunBearerToken_v1','tasunAccessToken_v1','tasun_token','tasunToken','tasun_auth_token','authToken','access_token','token',
      'tasunAuthToken_v1','tasunSessionToken_v1','tasunCloudToken_v1'
    ];
    const out = [];
    for(const k of names){
      try{
        const sv = norm(sessionStorage.getItem(k)); if(sv) out.push({source:'sessionStorage', key:k, value:sv});
        const lv = norm(localStorage.getItem(k)); if(lv) out.push({source:'localStorage', key:k, value:lv});
      }catch(e){}
    }
    const cookies = ['tasun_bearer_token','tasun_token','token','tasun_auth_token'];
    for(const k of cookies){ const v = norm(readCookie(k)); if(v) out.push({source:'cookie', key:k, value:v}); }
    return out;
  }
  function readAnySessionToken(){ const list = tokenCandidates(); return list.length ? list[0].value : ''; }
  function authHeaders(extra){ const headers = Object.assign({}, extra||{}); const token = readAnySessionToken(); if(token){ const raw=String(token).trim(); const plain=/^Bearer\s+/i.test(raw)?raw.replace(/^Bearer\s+/i,""):raw; if(!headers.Authorization && !headers.authorization){ headers.Authorization = /^Bearer\s+/i.test(raw) ? raw : ("Bearer " + plain); } if(!headers["x-api-key"] && !headers["X-API-Key"] && plain){ headers["x-api-key"] = plain; } } return headers; }
  function parseJsonLenient(raw){ raw = String(raw||''); try{return JSON.parse(raw);}catch(e){} try{return JSON.parse(raw.replace(/\/\*[\s\S]*?\*\//g,'').replace(/,\s*([}\]])/g,'$1'));}catch(e){} return null; }
  async function fetchTextNoStore(url){ const res = await fetch(url, { cache:'no-store', credentials:'omit' }); const text = await res.text(); return { ok:res.ok, status:res.status, text, url:res.url||url }; }
  function joinUrl(base, path){ base = norm(base).replace(/\/+$/,''); path = norm(path); if(!path) return base; if(/^https?:\/\//i.test(path)) return path; if(path.charAt(0) !== '/') path = '/' + path; return base + path; }
  function resourcePick(json, resourceKey){
    if(!json || typeof json !== 'object') return null;
    const resources = json.resources && typeof json.resources === 'object' ? json.resources : {};
    const byFile = resources[fname()] || resources['./' + fname()] || resources['/' + fname()];
    const byKey = resources[resourceKey];
    const fallback = resources['*'] || null;
    return byFile || byKey || fallback;
  }
  function refreshMeta(){
    const tokens = tokenCandidates();
    runtimeMeta.textContent = [
      '目前頁面：' + location.href,
      '檔名：' + fname(),
      '目前時間：' + now(),
      '載入器：' + (typeof window.__tasunVersionLoaderLoaded !== 'undefined' ? '已載入' : '未判定')
    ].join('\n');
    authMeta.textContent = [
      '登入憑證狀態：' + (tokens.length ? '已找到' : '未找到'),
      '候選數量：' + tokens.length,
      ...tokens.slice(0,8).map((t,i)=> (i+1) + '. ' + t.source + ' / ' + t.key + ' / ' + String(t.value).slice(0,28) + (String(t.value).length>28?'...':''))
    ].join('\n');
  }


  function clearWorkerTokens(){
    const keys = [
      "tasunCloudToken_v1","tasunCloudToken_v1__sxdh-notes","tasunCloudToken_v1__auth-table",
      "tasunBearerToken_v1","tasunAccessToken_v1","tasunAuthToken_v1","tasunSessionToken_v1",
      "tasun_token","tasunToken","tasun_auth_token","authToken","access_token","token","x-api-key","tasunApiKey_v1",
      "tasunWorkerToken_v1"
    ];
    keys.forEach(k=>{
      try{ sessionStorage.removeItem(k); }catch(e){}
      try{ localStorage.removeItem(k); }catch(e){}
    });
  }
  function ensureAuthTable(){
    const raw = safeJSON(localStorage.getItem("tasunAuthTable_v1"));
    return raw && typeof raw==="object" && Array.isArray(raw.users) ? raw : { users:[] };
  }
  function currentUserName(){
    const cur = safeJSON(sessionStorage.getItem("tasunCurrentUser_v1") || localStorage.getItem("tasunCurrentUser_v1") || "") || {};
    return norm(cur.user || cur.name || cur.username || "");
  }
  function findAuthRowForUser(userName){
    const uname = norm(userName).toLowerCase();
    return (ensureAuthTable().users||[]).find(u => norm(u.user || u.name || u.username).toLowerCase()===uname) || null;
  }
  function extractTokenFromAuthRow(row){
    if(!row || typeof row!=="object") return "";
    const cands = [row.token,row.apiKey,row.xApiKey,row.cloudToken,row.workerToken,row.accessToken,row.authToken,row.bearer,row.workerApiKey,row.sessionToken,row.cloudApiKey];
    for(const v of cands){ const s = norm(v); if(s) return s; }
    return "";
  }
  function bridgeTokenEverywhere(token){
    const raw = norm(token); if(!raw) return "";
    const plain = /^Bearer\s+/i.test(raw) ? raw.replace(/^Bearer\s+/i, "") : raw;
    [
      "tasunCloudToken_v1","tasunCloudToken_v1__sxdh-notes","tasunCloudToken_v1__auth-table",
      "tasunBearerToken_v1","tasunAccessToken_v1","tasunAuthToken_v1","tasunSessionToken_v1",
      "tasun_token","tasunToken","tasun_auth_token","authToken","access_token","token","x-api-key","tasunApiKey_v1",
      "tasunWorkerToken_v1"
    ].forEach(k=>{
      try{ sessionStorage.setItem(k, plain); }catch(e){}
      try{ localStorage.setItem(k, plain); }catch(e){}
    });
    return plain;
  }
  async function ensureWorkerAuthReady(cfg, forceRefresh){
    if(forceRefresh) clearWorkerTokens();
    const existing = readAnySessionToken();
    if(existing && !forceRefresh) return { ok:true, via:"existing-token", tokenPreview:String(existing).slice(0,18) };

    const user = currentUserName();
    const row = findAuthRowForUser(user);
    if(row){
      const rowToken = extractTokenFromAuthRow(row);
      if(rowToken){
        bridgeTokenEverywhere(rowToken);
        return { ok:true, via:"auth-row-token", tokenPreview:String(rowToken).slice(0,18) };
      }
    }

    if(window.TasunAuthV4 && typeof window.TasunAuthV4.login === "function" && cfg && cfg.apiBase && row){
      const pwCandidates = [row.pass,row.password,row.pw,row.secret,row.workerPass,row.workerPassword];
      for(const p0 of pwCandidates){
        const pw = norm(p0);
        if(!pw) continue;
        try{
          const logged = await window.TasunAuthV4.login({ username: norm(user), password: pw, apiBase: cfg.apiBase });
          const tk = norm((logged && (logged.token || logged.accessToken || logged.authToken || logged.bearer || logged.apiKey)) || readAnySessionToken());
          if(tk){
            bridgeTokenEverywhere(tk);
            return { ok:true, via:"worker-login", tokenPreview:String(tk).slice(0,18) };
          }
        }catch(err){}
      }
    }
    return { ok: !!readAnySessionToken(), via: readAnySessionToken() ? "existing-after-retry" : "none", tokenPreview:String(readAnySessionToken()||"").slice(0,18) };
  }
  async function resolveConfig(){
    refreshMeta();
    const resourceKey = norm($('resourceKey').value) || 'sxdh-notes';
    const resourcesFile = norm($('resourcesFile').value) || 'tasun-resources.json';
    const manualBase = norm($('apiBase').value);
    const cfg = {
      resourceKey,
      resourcesFile,
      apiBase: manualBase,
      endpoints: {
        health: norm($('healthEp').value) || '/api/tasun/health',
        read: norm($('readEp').value) || '/api/tasun/read',
        merge: norm($('mergeEp').value) || '/api/tasun/merge'
      },
      localKey: norm($('localKey').value) || 'tasunSxdhNotes_v1',
      resourcesJson: null,
      from: manualBase ? 'manual' : 'default'
    };

    log('===== Step 1~3：讀取 resources / apiBase =====');
    log('目前頁面 URL:', location.href);
    log('頁面檔名:', fname());
    log('resources 檔案:', resourcesFile);

    try{
      const rt = await fetchTextNoStore(resourcesFile + '?_=' + Date.now());
      log('resources 讀取狀態:', String(rt.status));
      if(rt.ok){
        const json = parseJsonLenient(rt.text);
        cfg.resourcesJson = json;
        const picked = resourcePick(json, resourceKey) || {};
        const topApi = json && json.api ? json.api : {};
        const topEndpoints = json && json.endpoints ? json.endpoints : {};
        if(!cfg.apiBase){ cfg.apiBase = norm(topApi.base || json.apiBase || picked.apiBase || ''); cfg.from = cfg.apiBase ? 'resources' : cfg.from; }
        cfg.endpoints.health = norm(picked.health || (picked.endpoints && picked.endpoints.health) || topApi.health || topEndpoints.health || cfg.endpoints.health);
        cfg.endpoints.read   = norm(picked.read   || (picked.endpoints && picked.endpoints.read)   || topApi.read   || topEndpoints.read   || cfg.endpoints.read);
        cfg.endpoints.merge  = norm(picked.merge  || (picked.endpoints && picked.endpoints.merge)  || topApi.merge  || topEndpoints.merge  || cfg.endpoints.merge);
        log('resources 命中規則:', picked === (cfg.resourcesJson && cfg.resourcesJson.resources && cfg.resourcesJson.resources[fname()]) ? 'filename' : (picked === (cfg.resourcesJson && cfg.resourcesJson.resources && cfg.resourcesJson.resources[resourceKey]) ? 'resourceKey' : 'fallback/unknown'));
      } else {
        log('resources 讀取失敗：', rt.text.slice(0, 300));
      }
    }catch(err){
      log('resources 例外：', String(err && err.message || err));
    }

    if(!cfg.apiBase){
      try{
        const raw = localStorage.getItem('tasunApiBase_v1') || sessionStorage.getItem('tasunApiBase_v1') || '';
        cfg.apiBase = norm(raw);
        if(cfg.apiBase) cfg.from = 'storage';
      }catch(e){}
    }

    state.resolved = cfg;
    setSummaryText([
      'Step 1~3：' + (cfg.apiBase ? '完成' : '失敗'),
      'apiBase: ' + (cfg.apiBase || '(空)'),
      'read: ' + cfg.endpoints.read,
      'merge: ' + cfg.endpoints.merge,
      '來源: ' + cfg.from,
      '登入狀態: ' + (readAnySessionToken() ? '已找到登入憑證' : '未找到登入憑證')
    ].join('\n'), cfg.apiBase ? 'ok' : 'bad');
    refreshMeta();
    return cfg;
  }


  async function stepAuth(forceRefresh){
    const cfg = state.resolved || await resolveConfig();
    log('\n===== Step 4.5：補 Worker 授權 =====');
    const rs = await ensureWorkerAuthReady(cfg, !!forceRefresh);
    log('目前使用者:', currentUserName() || '(空)');
    log('授權結果:', JSON.stringify(rs));
    log('目前 token:', readAnySessionToken() ? '已找到' : '未找到');
    setSummaryText(['Step 4.5：' + (rs.ok ? '完成' : '失敗'),'via=' + (rs.via || 'none'),'token=' + (rs.tokenPreview || '(空)')].join('\n'), rs.ok ? 'ok' : 'warn');
    refreshMeta();
    return rs;
  }

  async function stepHealth(){
    const cfg = state.resolved || await resolveConfig();
    log('\n===== Step 4：測 Health =====');
    if(!cfg.apiBase){ log('apiBase 為空，無法測試'); setSummaryText('Step 4：失敗\napiBase 為空，無法測試', 'bad'); return null; }
    const url = joinUrl(cfg.apiBase, cfg.endpoints.health);
    log('Health URL:', url);
    try{
      const res = await fetch(url, { method:'GET', cache:'no-store', headers: authHeaders({ accept:'application/json' }) });
      const text = await res.text();
      log('HTTP:', String(res.status));
      log('Body:', text.slice(0, 400));
      const okish = res.ok || res.status === 401;
      setSummaryText(['Step 4：' + (okish ? '可到達' : '失敗'),'HTTP ' + res.status, explainHttp(res.status)].join('\n'), okish ? (res.status===401 ? 'warn' : 'ok') : 'bad');
      return { status: res.status, body: text };
    }catch(err){ log('Health 例外：', String(err && err.message || err)); setSummaryText('Step 4：例外\n' + String(err && err.message || err), 'bad'); return null; }
  }

  async function stepRead(opts){
    opts = opts || {};
    const cfg = state.resolved || await resolveConfig();
    log('
===== Step 5~6：測 Read =====');
    if(!cfg.apiBase){ log('apiBase 為空，無法測試'); if(!opts.silentSummary) setSummaryText('Step 5~6：失敗
apiBase 為空，無法測試', 'bad'); return null; }
    const baseUrl = joinUrl(cfg.apiBase, cfg.endpoints.read);
    const body = { resourceKey: cfg.resourceKey, key: cfg.resourceKey };
    log('Read base URL:', baseUrl);
    log('Read body:', JSON.stringify(body));
    log('Authorization:', readAnySessionToken() ? '有帶 token' : '未帶 token');

    async function attemptGet(){
      const url = baseUrl + (baseUrl.includes('?') ? '&' : '?') + 'key=' + encodeURIComponent(cfg.resourceKey);
      const res = await fetch(url, { method:'GET', cache:'no-store', headers: authHeaders({ accept:'application/json' }), credentials:'include' });
      const text = await res.text();
      return { mode:'GET', res, text };
    }
    async function attemptPost(){
      const res = await fetch(baseUrl, { method:'POST', cache:'no-store', headers: authHeaders({ 'content-type':'application/json', accept:'application/json' }), credentials:'include', body: JSON.stringify(body) });
      const text = await res.text();
      return { mode:'POST', res, text };
    }

    try{
      let first = await attemptGet();
      log('GET HTTP:', String(first.res.status));
      log('GET Body:', first.text.slice(0, 400));
      if(first.res.status===401){
        log('GET 401：清除舊 token，重做 Worker 授權後再試');
        clearWorkerTokens();
        await stepAuth(true);
        first = await attemptGet();
        log('GET retry HTTP:', String(first.res.status));
        log('GET retry Body:', first.text.slice(0, 400));
      }
      let final = first;
      if(!final.res.ok){
        log('改測 POST read 相容模式');
        let second = await attemptPost();
        log('POST HTTP:', String(second.res.status));
        log('POST Body:', second.text.slice(0, 400));
        if(second.res.status===401){
          log('POST 401：再次清除舊 token，重做 Worker 授權後再試');
          clearWorkerTokens();
          await stepAuth(true);
          second = await attemptPost();
          log('POST retry HTTP:', String(second.res.status));
          log('POST retry Body:', second.text.slice(0, 400));
        }
        final = second;
      }

      const json = parseJsonLenient(final.text) || { raw: final.text };
      state.lastRead = json;
      setPayload(json);
      const rows = Array.isArray(json.rows) ? json.rows.length : Array.isArray(json.db) ? json.db.length : (json.payload && Array.isArray(json.payload.db) ? json.payload.db.length : 0);
      if(!opts.silentSummary){ setSummaryText(['Step 5~6：' + (final.res.ok ? '完成' : '異常'),'模式=' + final.mode,'HTTP ' + final.res.status,'rows=' + rows, explainHttp(final.res.status)].join('
'), final.res.ok ? 'ok' : (final.res.status===401 ? 'warn' : 'bad')); }
      return { status: final.res.status, json, rows, mode: final.mode };
    }catch(err){ log('Read 例外：', String(err && err.message || err)); if(!opts.silentSummary) setSummaryText('Step 5~6：例外
' + String(err && err.message || err), 'bad'); return null; }
  }

  async function stepMergeProbe(){
    const cfg = state.resolved || await resolveConfig();
    log('
===== Step 7~8：測 Merge + 再 Read =====');
    if(!cfg.apiBase){ log('apiBase 為空，無法測試'); setSummaryText('Step 7~8：失敗
apiBase 為空，無法測試', 'bad'); return null; }
    const mergeUrl = joinUrl(cfg.apiBase, cfg.endpoints.merge);
    const probe = { uid:'probe_' + Date.now(), id:0, text:'cloud-probe', trade:'PROBE', sys:'PROBE', source:'tester', attach:'', remark:'probe', date:new Date().toISOString().slice(0,10), updatedAt:Date.now(), rev:Date.now(), deleted:true };
    const body = { resourceKey: cfg.resourceKey, key: cfg.resourceKey, payload: { db:[probe] } };
    log('Merge URL:', mergeUrl);
    log('Merge body:', JSON.stringify(body));
    log('Authorization:', readAnySessionToken() ? '有帶 token' : '未帶 token');
    try{
      async function doPost(){
        return fetch(mergeUrl, { method:'POST', cache:'no-store', headers: authHeaders({ 'content-type':'application/json', accept:'application/json' }), credentials:'include', body: JSON.stringify(body) });
      }
      let res = await doPost();
      let text = await res.text();
      log('HTTP:', String(res.status));
      log('Body:', text.slice(0, 800));
      if(res.status===401){
        log('Merge 401：清除舊 token，重做 Worker 授權後再試');
        clearWorkerTokens();
        await stepAuth(true);
        res = await doPost();
        text = await res.text();
        log('Retry HTTP:', String(res.status));
        log('Retry Body:', text.slice(0, 800));
      }
      const json = parseJsonLenient(text) || { raw:text };
      state.lastMerge = json;
      setPayload(json);
      const readBack = await stepRead({ silentSummary:true });
      const rows = readBack && typeof readBack.rows === 'number' ? readBack.rows : 0;
      const readStatus = readBack ? readBack.status : 0;
      const kind = (res.ok && readBack && readBack.status===200) ? 'ok' : ((res.status===401 || readStatus===401) ? 'warn' : 'bad');
      setSummaryText(['Step 7~8：' + (kind==='ok' ? '完成' : '異常'),'Merge HTTP ' + res.status,'再 Read HTTP ' + (readBack ? readBack.status : '(未執行)'),'rows=' + rows,'Merge 判讀：' + explainHttp(res.status),'Read 判讀：' + explainHttp(readStatus)].join('
'), kind);
      return { status: res.status, json, readBack };
    }catch(err){ log('Merge 例外：', String(err && err.message || err)); setSummaryText('Step 7~8：例外
' + String(err && err.message || err), 'bad'); return null; }
  }

  async function openIDB(){
    return await new Promise((resolve,reject)=>{
      const req = indexedDB.open('tasun_notes_idb_v1', 1);
      req.onsuccess = ()=>resolve(req.result);
      req.onerror = ()=>reject(req.error || new Error('IDB open error'));
      req.onupgradeneeded = ()=>{};
    });
  }

  async function readLocalRows(){
    const cfg = state.resolved || await resolveConfig();
    const resourceKey = cfg.resourceKey;
    const out = { localKey: cfg.localKey, localRows: [], localStorageRaw:null, idbRows: [], idbMeta:null, allKeys:[] };
    try{ out.allKeys = Object.keys(localStorage); }catch(e){}
    try{ out.localStorageRaw = localStorage.getItem(cfg.localKey); }catch(e){}
    const parsed = safeJSON(out.localStorageRaw || '');
    if(Array.isArray(parsed)) out.localRows = parsed;
    else if(parsed && Array.isArray(parsed.db)) out.localRows = parsed.db;
    try{
      const db = await openIDB();
      await new Promise((resolve,reject)=>{
        const tx = db.transaction(['rows','meta'], 'readonly');
        const rowsReq = tx.objectStore('rows').index('by_page').getAll(resourceKey);
        const metaReq = tx.objectStore('meta').get(resourceKey);
        tx.oncomplete = ()=>{ out.idbRows = (rowsReq.result || []).map(r=>{ const x=Object.assign({}, r); delete x.pageKey; return x; }); out.idbMeta = metaReq.result || null; resolve(); };
        tx.onerror = ()=>reject(tx.error || new Error('IDB tx error'));
      });
    }catch(e){ out.idbError = String(e && e.message || e); }
    state.localRows = out.idbRows.length ? out.idbRows : out.localRows;
    state.localMeta = out.idbMeta || null;
    return out;
  }

  async function stepLocal(){
    const data = await readLocalRows();
    log('\n===== Step 9：檢查本機 localStorage / IDB =====');
    log('指定 localKey:', data.localKey);
    log('localStorage 筆數:', String((data.localRows||[]).length));
    log('IndexedDB 筆數:', String((data.idbRows||[]).length));
    if(data.idbMeta) log('IndexedDB meta:', JSON.stringify(data.idbMeta));
    if(data.idbError) log('IndexedDB error:', data.idbError);
    log('疑似相關 keys 數量:', String((data.allKeys||[]).length));
    setSummaryText(['Step 9：完成','指定 localKey: ' + data.localKey,'localStorage 筆數: ' + (data.localRows||[]).length,'IndexedDB 筆數: ' + (data.idbRows||[]).length,'疑似相關 keys 數量: ' + (data.allKeys||[]).length,((data.localRows||[]).length || (data.idbRows||[]).length) ? '本機有資料，可進行 Step 10 上傳測試。' : '本機目前沒有可上傳資料。'].join('\n'), 'info');
    setPayload(data);
    return data;
  }

  async function stepUploadLocal(){
    const cfg = state.resolved || await resolveConfig();
    const local = await readLocalRows();
    log('\n===== Step 10：本機資料上傳雲端 =====');
    if(!cfg.apiBase){ log('apiBase 為空，無法上傳'); setSummaryText('Step 10：失敗\napiBase 為空，無法上傳', 'bad'); return null; }
    const rows = (local.idbRows && local.idbRows.length) ? local.idbRows : (local.localRows || []);
    log('準備上傳筆數:', String(rows.length));
    log('Authorization:', readAnySessionToken() ? '有帶 token' : '未帶 token');
    if(!rows.length){ log('本機沒有可上傳資料'); setSummaryText('Step 10：停止\n本機沒有可上傳資料', 'warn'); return null; }
    const mergeUrl = joinUrl(cfg.apiBase, cfg.endpoints.merge);
    const body = { resourceKey: cfg.resourceKey, payload: { db: rows } };
    try{
      const res = await fetch(mergeUrl, { method:'POST', cache:'no-store', headers: authHeaders({ 'content-type':'application/json', accept:'application/json' }), body: JSON.stringify(body) });
      const text = await res.text();
      log('HTTP:', String(res.status));
      log('Body:', text.slice(0, 1000));
      const json = parseJsonLenient(text) || { raw:text };
      setPayload(json);
      const readBack = await stepRead({ silentSummary:true });
      const rowsAfter = readBack && typeof readBack.rows === 'number' ? readBack.rows : 0;
      const readStatus = readBack ? readBack.status : 0;
      const kind = (res.ok && readBack && readBack.status===200) ? 'ok' : ((res.status===401 || readStatus===401) ? 'warn' : 'bad');
      setSummaryText(['Step 10：' + (kind==='ok' ? '完成' : '異常'),'上傳筆數=' + rows.length,'Merge HTTP ' + res.status,'再 Read HTTP ' + (readBack ? readBack.status : '(未執行)'),'rows=' + rowsAfter,'Merge 判讀：' + explainHttp(res.status),'Read 判讀：' + explainHttp(readStatus)].join('\n'), kind);
      return { status: res.status, json, readBack };
    }catch(err){ log('上傳例外：', String(err && err.message || err)); setSummaryText('Step 10：例外\n' + String(err && err.message || err), 'bad'); return null; }
  }

  async function runAll(){ clearAll(); await resolveConfig(); await stepHealth(); await stepAuth(false); await stepRead(); await stepMergeProbe(); await stepLocal(); }
  function buildReport(){ const cfg = state.resolved || {}; return { exportedAt: now(), page: location.href, fileName: fname(), resourceKey: cfg.resourceKey || norm($('resourceKey').value), apiBase: cfg.apiBase || norm($('apiBase').value), endpoints: cfg.endpoints || { health:norm($('healthEp').value), read:norm($('readEp').value), merge:norm($('mergeEp').value) }, tokenState: readAnySessionToken() ? '已找到登入憑證' : '未找到登入憑證', summary: state.lastSummaryText || summary.textContent || '', logs: logs.textContent || '', payload: payloadView.value || '' }; }
  function downloadText(name, text){ const blob = new Blob([text], {type:'application/json;charset=utf-8'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = name; document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); }, 0); }
  async function copyText(text){ try{ await navigator.clipboard.writeText(text); return true; }catch(e){ return false; } }

  $('btnAll').onclick = runAll;
  $('btnStep13').onclick = async ()=>{ clearAll(); await resolveConfig(); };
  $('btnHealth').onclick = async ()=>{ await stepHealth(); };
  $('btnAuth').onclick = async ()=>{ await stepAuth(true); };
  $('btnRead').onclick = async ()=>{ await stepRead(); };
  $('btnMerge').onclick = async ()=>{ await stepMergeProbe(); };
  $('btnLocal').onclick = async ()=>{ await stepLocal(); };
  $('btnUpload').onclick = async ()=>{ await stepUploadLocal(); };
  $('btnExport').onclick = ()=>{ const report = buildReport(); downloadText('捷運汐東線事項記錄_雲端正式診斷報告_' + new Date().toISOString().slice(0,19).replace(/[T:]/g,'-') + '.json', JSON.stringify(report, null, 2)); };
  $('btnCopy').onclick = async ()=>{ const report = buildReport(); const ok = await copyText(['頁面: ' + report.page,'fileName: ' + report.fileName,'resourceKey: ' + report.resourceKey,'apiBase: ' + report.apiBase,'tokenState: ' + report.tokenState,'摘要:',report.summary || '尚無摘要'].join('\n')); setSummaryText((report.summary || '尚無摘要') + '\n\n' + (ok ? '已複製診斷摘要。' : '複製失敗，請手動複製。'), ok ? 'info' : 'warn'); };
  $('btnClear').onclick = clearAll;

  refreshMeta();
})();
</script>
