  <!-- ✅版本鎖定 + appH 穩定（避免 iOS 地址列跳動）+ preload 主圖（減少首屏空白） -->
  <script>
  (function () {
    "use strict";

    const VER = String(window.TASUN_APP_VER || window.APP_VER || "").trim();
    const url = new URL(location.href);
    const curV = url.searchParams.get("v") || "";

    if (VER && curV !== VER) {
      url.searchParams.set("v", VER);
      location.replace(url.toString());
      return;
    }

    window.__CACHE_V = VER || curV || "";

    window.__withV = window.__withV || function (u) {
      const vv = String(window.__CACHE_V || "").trim();
      if (!vv) return u;
      try {
        const uu = new URL(u, document.baseURI);
        if (uu.origin === location.origin) {
          uu.searchParams.set("v", vv);
          return uu.toString();
        }
        return u;
      } catch (e) {
        const s = String(u || "");
        if (!s || /^https?:\/\//i.test(s) || /^mailto:/i.test(s)) return s;
        const sep = s.includes("?") ? "&" : "?";
        return s + sep + "v=" + encodeURIComponent(vv);
      }
    };

    /* ✅ iOS 地址列跳動抑制：取「最小可視高度」作為 appH（只會變小，不會因收合而變大造成跳動）
       ✅（手機修正）同時提供 appHLive（即時可視高度）→ 手機用它補滿畫面，避免底部留白 */
    (function initViewportStabilizer(){
      const root = document.documentElement;
      let minH = 0;
      let lastW = 0;

      function calcVV(reset){
        try{
          const vv = window.visualViewport;
          const h = Math.round(vv ? vv.height : window.innerHeight);
          const w = Math.round(vv ? vv.width  : window.innerWidth);

          const top = Math.round(vv ? vv.offsetTop : 0);
          const bottom = Math.max(0, Math.round(window.innerHeight - (vv ? (vv.height + vv.offsetTop) : window.innerHeight)));

          root.style.setProperty("--vv-top", top + "px");
          root.style.setProperty("--vv-bottom", bottom + "px");

          if(reset || !minH || Math.abs(w - lastW) > 180){
            minH = h;
            lastW = w;
          }else{
            minH = Math.min(minH, h);
          }

          // ✅原本穩定高度（最小高度）
          root.style.setProperty("--appH", minH + "px");
          // ✅新增：即時可視高度（手機用來補滿畫面避免留白）
          root.style.setProperty("--appHLive", h + "px");

          root.style.setProperty("--appW", w + "px");
        }catch(e){
          try{
            root.style.setProperty("--appH", window.innerHeight + "px");
            root.style.setProperty("--appHLive", window.innerHeight + "px");
            root.style.setProperty("--appW", window.innerWidth + "px");
          }catch(_){}
        }
      }

      calcVV(true);

      const onResize = () => calcVV(false);
      const onOrient = () => calcVV(true);

      window.addEventListener("resize", onResize, { passive:true });
      window.addEventListener("orientationchange", onOrient, { passive:true });
      if(window.visualViewport){
        window.visualViewport.addEventListener("resize", onResize, { passive:true });
        // ✅scroll 只更新 vv-top/vv-bottom/appH（不做 layout 量測，避免連續重排）
        window.visualViewport.addEventListener("scroll", onResize, { passive:true });
      }
      document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") calcVV(false); }, { passive:true });
    })();

    // ✅ preload 主圖（更快進來）
    try{
      const id = "preloadZen";
      if(!document.getElementById(id)){
        const l = document.createElement("link");
        l.id = id;
        l.rel = "preload";
        l.as = "image";
        l.href = window.__withV("佛教禪意主視覺.png");
        l.setAttribute("data-base", "佛教禪意主視覺.png");
        document.head.appendChild(l);
      }
    }catch(e){}

    function patchZenResources(){
      const withV = window.__withV || ((u)=>u);
      try{
        const l = document.getElementById("preloadZen");
        if(l){
          const base = l.getAttribute("data-base") || l.getAttribute("href") || "";
          if(base) l.href = withV(base);
        }
      }catch(e){}
      try{
        const img = document.getElementById("zenImg");
        if(img){
          const base = img.getAttribute("data-base") || img.getAttribute("src") || "";
          if(base) img.src = withV(base);
        }
      }catch(e){}
    }
    patchZenResources();
    document.addEventListener("DOMContentLoaded", patchZenResources, { once:true });

    // ✅動態載入（維持你原本架構）
    (function(){
      const withV = window.__withV || ((u)=>u);
      function loadScript(src){
        return new Promise((resolve)=>{
          try{
            const s = document.createElement("script");
            s.src = src;
            s.async = false;
            s.onload = ()=>resolve(true);
            s.onerror = ()=>resolve(false);
            document.head.appendChild(s);
          }catch(e){ resolve(false); }
        });
      }

      (async()=>{
        await loadScript(withV("tasun-boot.js"));
        await loadScript(withV("tasun-loader.js"));

        function tryStart(){
          try{
            if(window.TasunLoader && typeof window.TasunLoader.start === "function"){
              window.TasunLoader.start({
                pageKey: "index",
                verUrl: "tasun-version.json",
                corePath: "tasun-core.js",
                forceUrlV: true,
                forceVersionSync: false,
                patchResources: true,
                networkToast: true,
                appHeightVar: false,
                preloadId: "preloadZen",
                zenImgId: "zenImg",
                appVer: window.TASUN_APP_VER
              });
              return true;
            }
          }catch(e){}
          return false;
        }

        if(!tryStart()){
          let n=0;
          const t=setInterval(()=>{
            n++;
            if(tryStart() || n>120) clearInterval(t);
          }, 50);
        }
      })();
    })();
  })();
  </script>

      top: calc(var(--axis-top) + var(--vv-top));
      transform: translateX(-50%);
      opacity: var(--axis-op);
      padding: 10px 18px;
      border-radius: 22px;
      white-space: nowrap;
      isolation:isolate;
    }
    /* ✅FIX: 加背光膜，讓禪字在亮背景也清楚 */
    .zw-top-axis::before{
      content:"";
      position:absolute;
      inset:0;
      background: none;
      border: none;
      box-shadow: none;
      opacity: 0;
      pointer-events:none;
      z-index:-1;
    }
    .zw-axis-text{
      font-size: var(--axis-size);
      white-space: pre;
      letter-spacing: 0;
      line-height: 1;
      opacity: 0.99;
    }

    .zw-side-col{
      position:absolute;
      top: var(--zen-fixed-y);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: .18em;
      font-size: var(--side-size);
      opacity: var(--side-op);
      white-space: nowrap;
      padding: 10px 12px;
      border-radius: 20px;
    }
    #zwLeft{ left: calc(50% - var(--zen-fixed-x)); }
    #zwRight{ right: calc(50% - var(--zen-fixed-x)); }

    .zw-bottom-line{
      position:absolute;
      left:50%;
      transform: translateX(calc(-50% + var(--zw-bottom-x-shift)));
      bottom: var(--zw-bottom-pad);
      font-size: var(--bottom-size);
      letter-spacing: .28em;
      opacity: var(--bottom-op);
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 18px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
      isolation:isolate;
    }
    .zw-bottom-line::before{
      content:"";
      position:absolute;
      inset:-8px -14px;
      border-radius: 18px;
      background:
        radial-gradient(240px 100px at 50% 40%, rgba(255,255,255,0.16), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.08), rgba(0,0,0,0.08));
      border: 1px solid rgba(255,244,210,0.14);
      opacity: .38;
      z-index:-1;
      pointer-events:none;
    }

    /* ===== 使用者列 ===== */
    .user-bar{
      position:absolute;
      left: calc(var(--frame-inset) + var(--userbar-pad) + env(safe-area-inset-left));
      top:  calc(var(--frame-inset) + var(--userbar-pad) + env(safe-area-inset-top) + var(--vv-top));
      display:flex;
      gap: 10px;
      row-gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      max-width: calc(100% - (var(--frame-inset) * 2) - 12px);
      z-index: 13;
      isolation: isolate;
      contain: layout paint;
    }

    .user-bar::before{
      content:"";
      position:absolute;
      inset:-10px -12px;
      border-radius: 999px;
      background:
        radial-gradient(260px 120px at 18% 28%, rgba(255,255,255,0.14), rgba(0,0,0,0) 70%),
        radial-gradient(320px 140px at 78% 30%, rgba(246,211,122,0.12), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.09), rgba(0,0,0,0.26));
      border: 1px solid rgba(255,244,210,0.32);
      box-shadow:
        0 18px 44px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      z-index: -1;
      pointer-events:none;
    }

    .user-pill{
      padding: 10px 14px;
      border-radius: 999px;
      background:
        radial-gradient(240px 90px at 24% 20%, rgba(255,255,255,0.10), rgba(0,0,0,0) 70%),
        radial-gradient(300px 120px at 78% 30%, rgba(246,211,122,0.09), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.06), rgba(0,0,0,0.22));
      border: 1px solid rgba(255,244,210,0.32);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      font-size: 15px;
      letter-spacing: .06em;
      white-space:nowrap;
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
      font-weight: 900;

      color: rgba(255, 232, 175, 0.98);
      -webkit-text-stroke: 0px transparent;
      text-shadow: 0 9px 18px rgba(0,0,0,0.62), 0 0 10px rgba(255,210,140,0.16);
    }

    .btn-switch{
      border: 1px solid rgba(255,244,210,0.34);
      background:
        radial-gradient(220px 80px at 22% 22%, rgba(255,255,255,0.10), rgba(0,0,0,0) 70%),
        radial-gradient(260px 100px at 78% 28%, rgba(246,211,122,0.10), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.06), rgba(0,0,0,0.22));
      padding: 10px 14px;
      border-radius: 999px;
      cursor:pointer;
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
      letter-spacing:.08em;
      font-weight: 900;
      font-size: 15px;

      color: rgba(255, 232, 175, 0.98);
      -webkit-text-stroke: 0px transparent;
      text-shadow: 0 9px 18px rgba(0,0,0,0.62), 0 0 10px rgba(255,210,140,0.16);
    }
    .btn-export{ opacity: .98; }

    /* ===== 導覽按鍵 ===== */
    .nav-area{
      position:absolute;
      inset: var(--frame-inset);
      z-index: 11;
      pointer-events:auto;
      contain: layout paint;
      container-type: inline-size;
      padding-top: var(--navTop);
      padding-bottom: var(--navBottom);
      padding-left: 16px;
      padding-right: 16px;
    }

    .nav-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;

      border-radius: 999px;
      border: 1px solid var(--btn-border);

      background:
        radial-gradient(340px 130px at 24% 20%, rgba(255,255,255,var(--btn-glass-a)), rgba(0,0,0,0) 64%),
        radial-gradient(380px 160px at 76% 26%, rgba(246,211,122,var(--btn-glass-b)), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, var(--btn-body-a), var(--btn-body-b));

      box-shadow:
        0 16px 46px rgba(0,0,0,0.28),
        0 0 34px rgba(246,211,122,0.12),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -10px 18px rgba(0,0,0,0.05);

      backdrop-filter: blur(var(--btn-blur));
      -webkit-backdrop-filter: blur(var(--btn-blur));

      user-select:none;
      -webkit-tap-highlight-color: transparent;

      position: relative;
      overflow: hidden;
      z-index: 1;

      height: var(--btnH);
      touch-action: manipulation;
    }

    .nav-btn::after{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.00) 46%),
        radial-gradient(220px 100px at 40% 12%, rgba(255,255,255,0.06), rgba(0,0,0,0) 70%);
      opacity: .14;
      mix-blend-mode: screen;
      pointer-events:none;
    }

    .nav-btn span{
      padding: 0 18px;
      position:relative;
      z-index: 1;

      font-size: clamp(1.16rem, calc(5.2cqw * var(--btnScale)), 2.05rem);

      color: var(--btn-text) !important;
      -webkit-text-fill-color: var(--btn-text);

      /* ✅FIX: 不用 stroke，改外描邊 shadow（避免黑邊跑到字上/錯位） */
      text-shadow:
        calc(var(--btn-ol)) 0 0 var(--btn-stroke),
        calc(var(--btn-ol) * -1) 0 0 var(--btn-stroke),
        0 calc(var(--btn-ol)) 0 var(--btn-stroke),
        0 calc(var(--btn-ol) * -1) 0 var(--btn-stroke),
        calc(var(--btn-ol)) calc(var(--btn-ol)) 0 var(--btn-stroke),
        calc(var(--btn-ol) * -1) calc(var(--btn-ol) * -1) 0 var(--btn-stroke),
        calc(var(--btn-ol)) calc(var(--btn-ol) * -1) 0 var(--btn-stroke),
        calc(var(--btn-ol) * -1) calc(var(--btn-ol)) 0 var(--btn-stroke),
        0 1px 0 rgba(0,0,0,0.18),
        0 7px 14px var(--btn-shadowA),
        0 0 10px var(--btn-glowA);

      letter-spacing: .06em;
      font-weight: 900;
      font-family:"標楷體","Noto Serif TC","Microsoft JhengHei",serif;
      line-height: 1.12;

      white-space: normal;
      text-align: center;
      text-wrap: balance;

      max-width: 92%;
      overflow-wrap: anywhere;
      word-break: keep-all;
      line-break: strict;
    }

    .nav-btn span.latin{
      font-family:"Noto Sans TC","Microsoft JhengHei","Noto Serif TC",sans-serif;
      letter-spacing: .04em;
      transform: scaleX(0.985);
    }
    .nav-btn span.latin-only{
      letter-spacing: .03em;
      transform: scaleX(0.975);
    }

    .nav-btn:hover{
      border-color: var(--btn-border-hi);
      box-shadow:
        0 20px 54px rgba(0,0,0,0.32),
        0 0 44px rgba(246,211,122,0.16),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -10px 18px rgba(0,0,0,0.06);
    }
    .nav-btn:focus{
      outline:none;
      border-color: var(--btn-border-hi);
      box-shadow:
        0 0 0 2px rgba(246,211,122,0.14),
        0 20px 54px rgba(0,0,0,0.32),
        0 0 44px rgba(246,211,122,0.16);
    }

    /* ✅ 系統/權限：更醒目但不突兀 */
    .nav-btn.is-system{
      --btn-border: rgba(255, 244, 210, 0.94);
      --btn-border-hi: rgba(255, 244, 210, 0.985);

      --btn-glass-a: 0.045;
      --btn-glass-b: 0.040;
      --btn-body-a: rgba(255, 248, 232, 0.040);
      --btn-body-b: rgba(18, 12, 8, 0.048);

      --btn-text: rgba(255, 214, 128, 0.995);

      /* ✅FIX: 系統鍵外描邊稍微薄一點（更乾淨不糊） */
      --btn-ol: 1.55px;
      --btn-stroke: rgba(10, 5, 2, 0.96);

      --btn-glowA: rgba(255, 196, 120, 0.22);
      --btn-shadowA: rgba(0,0,0,0.78);

      box-shadow:
        0 18px 54px rgba(0,0,0,0.30),
        0 0 52px rgba(246,211,122,0.16),
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -10px 18px rgba(0,0,0,0.04);
    }
    .nav-btn.is-system::after{ opacity: .18; }
    .nav-btn.is-system:focus{
      box-shadow:
        0 0 0 2px rgba(255,244,210,0.16),
        0 20px 58px rgba(0,0,0,0.34),
        0 0 56px rgba(246,211,122,0.18);
    }

    /* ===== nav layout ===== */
    .nav-area.stack{
      display:flex;
      flex-direction: column;
      gap: var(--btnGap);
      justify-content:flex-start;
    }
    .nav-area.stack .nav-btn{
      position:relative;
      width: 100%;
      border-radius: 18px;
    }

    .nav-area.grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--btnGap);
      align-content: start;
    }
    .nav-area.grid2 .nav-btn{
      position:relative;
      width: 100%;
      border-radius: 18px;
    }
    .nav-area.grid2 #systemBtn{ grid-column: 1 / -1; }

    /* ✅（手機版）左右兩列，中間留空：減少壓到蓮花本體 */
    .nav-area.grid3{
      display:grid;
      grid-template-columns: 1fr var(--midGap) 1fr;
      column-gap: var(--btnColGap);
      row-gap: var(--btnGap);
      align-content: start;
    }
    .nav-area.grid3 .nav-btn{
      position:relative;
      width: 100%;
      border-radius: 18px;
    }
    .nav-area.grid3 #systemBtn{ grid-column: 1 / -1; }

    /* 桌機 sides */
    .nav-area.sides{
      position:absolute;
      inset: var(--frame-inset);
      padding-top: 0;
      padding-bottom: 0;
      padding-left: 0;
      padding-right: 0;
    }
    .nav-area.sides .nav-btn{
      position:absolute;
      width: var(--btnW);
      height: var(--btnH);
    }

    /* ===== 登入遮罩 ===== */
    .login-overlay{
      position:fixed; inset:0; z-index: 3000;
      display:none; align-items:center; justify-content:center;
      background:
        radial-gradient(900px 560px at 50% 45%, rgba(0,0,0,0.30), rgba(0,0,0,0.66)),
        radial-gradient(1200px 760px at 50% 10%, rgba(246,211,122,0.10), rgba(0,0,0,0)),
        rgba(0,0,0,0.52);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .login-box{
      width: min(520px, calc(100vw - 36px));
      border-radius: 22px;
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(34, 22, 12, 0.96), rgba(15, 10, 6, 0.97));
      border: 1px solid rgba(246,211,122,0.62);
      box-shadow: 0 26px 90px rgba(0,0,0,0.58), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .login-title{ font-size: 1.64rem; margin-bottom: 10px; text-align:center; }
    .login-sub{
      text-align:center; min-height: 18px; font-size: 14px; opacity:.86; margin-bottom: 14px;
      color: rgba(255,232,175,0.90);
      letter-spacing:.06em;
      -webkit-text-stroke: 0.55px rgba(92,56,22,0.52);
      text-shadow: 0 7px 14px rgba(0,0,0,0.46);
      font-weight: 900;
    }
    .login-field{ display:flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .login-field label{
      font-size: 14px; letter-spacing: .12em; color: rgba(255,232,175,0.90);
      -webkit-text-stroke: 0.50px rgba(92,56,22,0.52);
      text-shadow: 0 7px 14px rgba(0,0,0,0.42);
      font-weight: 900;
    }
    .login-pwd-wrapper{ display:flex; gap: 10px; align-items:center; }
    .login-pwd-input{
      flex:1; padding: .78rem .96rem; border-radius:999px;
      border:1px solid rgba(246,211,122,0.78);
      background:
        linear-gradient(180deg, rgba(255,250,235,0.08), rgba(0,0,0,0.00)),
        linear-gradient(180deg, rgba(10, 7, 4, 0.78), rgba(0,0,0,0.44));
      color: rgba(255, 244, 210, 0.99); caret-color: rgba(255, 244, 210, 0.99);
      -webkit-text-stroke: .72px rgba(92,56,22,0.52);
      text-shadow: 0 1px 0 rgba(10,6,2,0.28), 0 5px 10px rgba(10,6,2,0.44);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 12px 20px rgba(0,0,0,0.24);
      outline:none;
      font-size: 15px;
      font-weight: 900;
    }
    .login-pwd-input:focus{
      border-color: rgba(255,244,210,0.96);
      box-shadow: 0 0 0 2px rgba(246,211,122,0.18), 0 0 22px rgba(246,211,122,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-eye-login{
      width: 44px; height: 44px; border-radius: 999px;
      border:1px solid rgba(246,211,122,0.62);
      background: rgba(0,0,0,0.22);
      color: rgba(255,232,175,0.96);
      cursor:pointer;
      box-shadow: 0 12px 22px rgba(0,0,0,0.26);
      -webkit-text-stroke: 0.65px rgba(92,56,22,0.52);
      text-shadow: 0 8px 16px rgba(0,0,0,0.50);
      font-weight: 900;
    }
    .login-error{
      min-height: 18px; color: rgba(255,190,160,0.98); font-size: 14px; letter-spacing: .06em; margin-top: 6px; text-align:center;
      -webkit-text-stroke: 0.45px rgba(0,0,0,0.40);
      text-shadow: 0 8px 16px rgba(0,0,0,0.48);
      font-weight: 900;
    }
    .login-actions{ display:flex; gap: 12px; justify-content:center; margin-top: 14px; }
    .btn-login, .btn-secondary{
      border-radius: 999px; padding: 12px 18px;
      border: 1px solid rgba(255,244,210,0.40);
      background:
        radial-gradient(240px 90px at 24% 18%, rgba(255,255,255,0.16), rgba(0,0,0,0) 70%),
        radial-gradient(300px 120px at 78% 26%, rgba(246,211,122,0.14), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.10), rgba(0,0,0,0.24));
      cursor:pointer; letter-spacing: .12em;
      box-shadow:
        0 16px 34px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.10);
      font-size: 15px;
      font-weight: 900;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      color: rgba(255,232,175,0.98);
      -webkit-text-stroke: 0px transparent;
      text-shadow: 0 10px 18px rgba(0,0,0,0.62), 0 0 10px rgba(255,210,140,0.14);
    }

    /* ===== 自製下拉（保留） ===== */
    .select-wrap{ position:relative; width:100%; }
    .select-wrap select{ position:absolute; inset:0; opacity:0; pointer-events:none; }
    .select-display{
      width:100%; display:flex; align-items:center; justify-content:flex-start; text-align:left;
      padding: .78rem 2.90rem .78rem .96rem;
      border-radius:999px; border:1px solid rgba(246,211,122,0.78);
      background:
        linear-gradient(180deg, rgba(255,250,235,0.08), rgba(0,0,0,0.00)),
        linear-gradient(180deg, rgba(10, 7, 4, 0.78), rgba(0,0,0,0.44));
      color: rgba(255,232,175,0.96);
      -webkit-text-stroke: .70px rgba(92,56,22,0.52);
      text-shadow: 0 1px 0 rgba(10,6,2,0.28), 0 6px 12px rgba(0,0,0,0.46);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 12px 20px rgba(0,0,0,0.24);
      cursor:pointer; user-select:none; position:relative; appearance:none;
      backdrop-filter:none; -webkit-backdrop-filter:none;
      font-size: 15px;
      font-weight: 900;
    }
    .select-display::after{
      content:"▾";
      position:absolute; right: .88rem; top: 50%; transform: translateY(-50%);
      opacity: .98;
      font-size: 1.36rem;
      color: rgba(255,226,156,0.98);
      -webkit-text-stroke: 0.85px rgba(92,56,22,0.62);
      text-shadow: 0 7px 14px rgba(0,0,0,0.52), 0 0 10px rgba(255,210,140,0.14);
      pointer-events:none;
      font-weight: 900;
    }
    .select-menu{
      position:absolute; left:0; right:0; top: calc(100% + 10px);
      max-height: 280px; overflow:auto;
      border-radius: 16px; border: 1px solid rgba(246,211,122,0.62);
      background: rgba(8,5,3,0.98);
      box-shadow: 0 22px 60px rgba(0,0,0,0.46), 0 0 24px rgba(246,211,122,0.10);
      display:none; z-index: 4005; padding: 6px;
    }
    .select-menu.open{ display:block; }
    .select-option{
      padding: .70rem .96rem; border-radius: 12px; cursor:pointer
      ;color: rgba(255,232,175,0.98); letter-spacing:.06em;
      -webkit-text-stroke: .50px rgba(92,56,22,0.42);
      text-shadow: 0 2px 10px rgba(0,0,0,0.38);
      user-select:none; border: 1px solid transparent;
      font-weight: 900;
    }
    .select-option:hover{ background: rgba(255,244,210,0.10); }
    .select-option[aria-selected="true"]{ background: rgba(246,211,122,0.14); border-color: rgba(246,211,122,0.20); }
    .select-option.active{ background: rgba(255,244,210,0.14); border-color: rgba(255,244,210,0.22); outline: none; }

    /* ===== 手機重新排版（只改手機） ===== */
    @media (max-width: 900px){
      :root{
        --panel-blur: 12px;
        --btn-blur: 12px;

        --side-size: clamp(1.02rem, 3.0vw, 1.30rem);
        --bottom-size: clamp(1.10rem, 3.1vw, 1.40rem);
        --axis-size: clamp(1.72rem, 5.1vw, 2.55rem);

        --zen-fixed-x: clamp(56px, 12vw, 140px);

        /* ✅手機：空無明再往上、底部留更多給按鍵 */
        --axis-top: clamp(62px, 8.6vh, 132px);
        --zw-bottom-lift: clamp(2.35cm, 5.6vh, 3.20cm); /* ✅調整：手機底部禪字上移 */

        /* ✅手機：按鍵更透明（重疊仍看得到蓮花） */
        --btn-glass-a: 0.040;
        --btn-glass-b: 0.036;
        --btn-body-a: rgba(255, 248, 232, 0.040);
        --btn-body-b: rgba(30, 22, 14, 0.055);

        /* ✅手機：把蓮花焦點稍微往下，讓上方更乾淨可放按鍵 */
        --zen-posY: 60%;
      }

      /* ✅手機：舞台補滿可視高度（避免底部留白） */
      .hero{
        min-height: var(--appHLive, 100dvh);
        align-items: stretch;
      }
      .hero-inner{
        height: calc(var(--appHLive, 100dvh) - (var(--outer-side) * 2));
      }

      /* ✅FIX: user-bar 比例縮小且隨螢幕縮放 */
      .user-bar{
        left: calc(var(--frame-inset) + 10px + env(safe-area-inset-left));
        right: calc(var(--frame-inset) + 10px + env(safe-area-inset-right));
        max-width: none;

        display:grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "pill pill"
          "switch export";
        gap: 8px;
        align-items: stretch;
      }
      .user-bar::before{
        inset:-8px -10px; /* ✅縮小背景膜 */
      }

      .user-pill{ grid-area: pill; white-space: normal; text-wrap: balance; }
      #btnSwitchUser{ grid-area: switch; }

// ✅ SHA-256 hex（不存明碼用）
async function sha256Hex(str){
  str = String(str === undefined || str === null ? "" : str);
  if(!(window.crypto && crypto.subtle && window.TextEncoder)){
    // fallback：極舊瀏覽器避免 crash（非密碼學）
    let h = 0;
    for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; }
    let x = (h>>>0).toString(16);
    while(x.length < 64) x = "0" + x;
    return x.slice(0,64);
  }
  const enc = new TextEncoder();
  const buf = await crypto.subtle.digest("SHA-256", enc.encode(str));
  const bytes = new Uint8Array(buf);
  let hex = "";
  for(let i=0;i<bytes.length;i++){
    const b = bytes[i].toString(16);
    hex += (b.length===1 ? "0"+b : b);
  }
  return hex;
}

    function inferRole(name, role){

      const INDEX_SESSION_KEY = "tasunIndexSessionAuthed_v1";

      /* =========================

      const CLOUD_RES_URL = "tasun-resources.json";

      const CLOUD_KEYS = [AUTH_KEY, NAV_KEY, ROUTE_KEY];

      function loadScriptOnce(src){

            const id = "tasunScript__" + src;
            if(document.getElementById(id)) return resolve(true);
            const s = document.createElement("script");
            s.id = id;
            s.src = src;
            s.async = true;
            s.onload = ()=>resolve(true);
            s.onerror = ()=>resolve(false);
            document.head.appendChild(s);
          }catch(e){ resolve(false); }
        });
      }

      const INDEX_KEY_UID_MAP_KEY = "tasunIndexKeyUidMap_v1";
      function uuidV4(){
        try{
          if(window.crypto && typeof crypto.randomUUID === "function") return crypto.randomUUID();
        }catch(e){}
        // fallback (RFC4122-ish)
        const s = "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g, c=>{
          const r = (Math.random()*16)|0;
          const v = (c==="x") ? r : ((r&0x3)|0x8);
          return v.toString(16);
        });
        return s;
      }
      function getUidMap(){
        try{ return JSON.parse(localStorage.getItem(INDEX_KEY_UID_MAP_KEY) || "{}") || {}; }catch(e){ return {}; }
      }
      function setUidMap(map){
        try{ localStorage.setItem(INDEX_KEY_UID_MAP_KEY, JSON.stringify(map || {})); }catch(e){}
      }
      function ensureRowUidForKey(k){
        const key = String(k||"").trim();
        if(!key) return uuidV4();
        const map = getUidMap();
        if(map[key]) return map[key];
        const uid = uuidV4();
        map[key] = uid;
        setUidMap(map);
        return uid;
      }

      function buildCloudPayloadFromLocal(){
        // ✅全站雲端同步標準 v1：uid(pk)=uuid、rev/updatedAt/deleted 必備，id 只做顯示
        const now = Date.now();
        const rows = [];
        const keys = CLOUD_KEYS.slice().sort((a,b)=>a.localeCompare(b,"zh-Hant"));
        keys.forEach((k, idx)=>{
          const raw = localStorage.getItem(k);
          const uid = ensureRowUidForKey(k);
          const row = {
            uid,
            id: idx + 1,
            k,
            v: (raw == null ? "" : String(raw)),
            rev: now,          // ✅簡化：以時間戳作 rev（多人合併由 Worker 以 updatedAt/ rev 決勝）
            updatedAt: now,
            deleted: false
          };
          rows.push(row);
        });
        return { db: rows, counter: rows.length };
      }

      let cloudFailCount = 0;
      let cloudBackoffMs = 0;

      function scheduleCloudSave(readOnly){
        if(readOnly) return;
        if(!cloudCtrl || typeof cloudCtrl.saveMerged !== "function") return;
        if(cloudApplying) return;
        if(cloudCtrl.__disabled__) return;

        clearTimeout(cloudSaveTimer);
        cloudSaveTimer = setTimeout(async()=>{
          // ✅輕量退避：避免多人同時寫入造成連續碰撞
          const jitter = Math.floor(Math.random()*180);
          const wait = Math.max(0, cloudBackoffMs) + jitter;
          if(wait) await new Promise(r=>setTimeout(r, wait));

          try{
            await cloudCtrl.saveMerged({ lock:false, mode:"merge" });
            cloudFailCount = 0;
            cloudBackoffMs = 0;
          }catch(e){
            cloudFailCount++;
            // 讀出狀態碼（不同版本 CloudKit 可能放不同欄位）
            const msg = String(e && (e.message || e) || "");
            const status = Number(e && (e.status || e.code || (e.cause && e.cause.status)) || 0) || 0;

            // ✅400：多半是 Worker schema / payload 不符，避免一直狂打
            if(status === 400 || /(400)|MERGE_FAIL/i.test(msg)){
              cloudBackoffMs = Math.min(30000, (cloudBackoffMs || 1200) * 2);
            }else{
              cloudBackoffMs = Math.min(20000, (cloudBackoffMs || 800) * 2);
            }

            // ✅連續失敗太多次 → 暫停（不影響 UI/功能，仍保留本地）
            if(cloudFailCount >= 8){
              cloudCtrl.__disabled__ = true;
              try{ console.warn("[index] Cloud sync paused after repeated failures.", e); }catch(_e){}
            }
          }
        }, 650);
      }
      async function ensureCloudMounted(user){
        const role = String(user?.level || "read").toLowerCase();
        const readOnly = (role === "read") || !user;

        const ok = await loadScriptOnce(withV("tasun-cloud-kit.js"));
        if(!ok || !window.TasunCloudKit || typeof window.TasunCloudKit.mount !== "function"){
          return null;
        }

        try{
          window.TasunCloudKit.init({
            appVer: window.TASUN_APP_VER || "",
            resourcesUrl: withV(CLOUD_RES_URL),
            ui: { enabled:true, hideLockButtons:true, position:"bottom-right" },
            lock: { enabled:false, auto:false }

        if(cloudCtrl){
          cloudCtrl.__readOnly__ = readOnly;
          try{ cloudCtrl.pullNow && cloudCtrl.pullNow().catch(()=>{}); }catch(e){}

        cloudCtrl = window.TasunCloudKit.mount({
          resourceKey: CLOUD_RESOURCE_KEY,
          idField: "id",
          // pk 由 CloudKit/Worker 統一強制為 uid（全站標準 v1）
          
          counterField: "counter",

      function markLatin(span){

        let s = String(label || "").trim();

        if(s.endsWith(".html")) return s;
        s = s.replace(/[\\\/:*?"<>|]/g, "").trim();
        s = s.replace(/\s+/g, "");
        return s + ".html";
      }

      function collectBackupPayload(reason){
        const now = new Date();
        const keys = [];
        for(let i=0;i<localStorage.length;i++){
          const k = localStorage.key(i);
          if(!k) continue;
          if(k.startsWith("tasun") || k.includes("汐東") || k.includes("捷運") || k.includes("水環") || k.includes("審查") || k.includes("文件") || k.includes("資料庫")){
            keys.push(k);
          }
        }
        keys.sort((a,b)=>a.localeCompare(b, "zh-Hant"));
        const data = {};
        keys.forEach(k => {
          const raw = localStorage.getItem(k);
          const parsed = safeJsonParse(raw, null);
          data[k] = (parsed === null && raw !== "null" && raw !== null) ? raw : parsed;
        });

        const sess = safeJsonParse(sessionStorage.getItem(SESSION_KEY) || "null", null);

        return {
          meta: {
            app: "Tasun index.html",
            reason: String(reason || "manual"),
            ts: now.toISOString(),
            href: location.href,
            cacheV: (window.__CACHE_V || "")
          },
          session: sess,
          data
        };
      }

      function storeBackupRing(payload){
        try{
          const arr = safeJsonParse(localStorage.getItem(BACKUP_RING_KEY) || "[]", []);
          const next = Array.isArray(arr) ? arr : [];
          next.unshift(payload);

        const ts = new Date().toISOString().replace(/[:.]/g, "-");

        const u = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = u;
        a.download = filename;
        a.style.display = "none";
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          URL.revokeObjectURL(u);
          a.remove();
        }, 0);
      }

      let _exportTimer = 0;
      let _pendingReason = "";
      let _exportOnceExit = false;

      function exportBackupNow(reason, opts){
        const o = opts || {};
        const payload = collectBackupPayload(reason);
        storeBackupRing(payload);
        if(o.download){
          try{ downloadJson(payload); }catch(e){}

      function canonUserKey(v){

      function normalizeAuthLikeRow(row, btnCount){
        if(!row || typeof row !== "object") return null;
        const username = String(row.username ?? row.user ?? row.name ?? row.account ?? "").trim();
        if(!username) return null;
        const level = String(row.level ?? row.role ?? "read").trim().toLowerCase() || "read";
        const passHash = String(row.passHash ?? row.passwordHash ?? row.hash ?? "").trim().toLowerCase();
        const password = String(row.password ?? row.pass ?? row.pw ?? "").trim();
        let buttons = Array.isArray(row.buttons) ? row.buttons.slice() : null;
        if(!buttons){
          buttons = [];
          for(let i=0;i<btnCount;i++){
            const k = `btn${i+1}`;
            if(Object.prototype.hasOwnProperty.call(row, k)) buttons[i] = !!row[k];
          }
          if(!buttons.length) buttons = null;
        }
        return { username, level, passHash, password, buttons };
      }

      function mergeAuthRowsKeepOrder(primary, fallback, btnCount){
        const out = [];
        const seen = new Map();
        const push = (row) => {
          const n = normalizeAuthLikeRow(row, btnCount);
          if(!n) return;
          const key = canonUserKey(n.username);
          if(seen.has(key)){
            const idx = seen.get(key);
            const cur = out[idx];
            cur.level = n.level || cur.level;
            if(n.passHash) cur.passHash = n.passHash;
            if(!cur.passHash && n.password) cur.password = n.password;
            if(Array.isArray(n.buttons) && n.buttons.length) cur.buttons = n.buttons.slice();
            return;
          }
          seen.set(key, out.length);
          out.push({ ...n });
        };
        (Array.isArray(primary) ? primary : []).forEach(push);
        (Array.isArray(fallback) ? fallback : []).forEach(push);
        return out;
      }

      function authRowToStorageShape(row){
        const n = normalizeAuthLikeRow(row, LEGACY_BUTTON_KEYS.length);
        if(!n) return null;
        const out = {

          role: n.level,
          level: n.level,
          passHash: n.passHash || ""
        };
        if(n.password && !n.passHash) out.password = n.password;
        if(Array.isArray(n.buttons) && n.buttons.length) out.buttons = n.buttons.slice();
        return out;
      }

      function repairAuthTableStorage(btnCount){

        const baseline = getDefaultAuthTableLegacy(btnCount);
        const merged = mergeAuthRowsKeepOrder(arr, baseline, btnCount);
        const storageRows = merged.map(authRowToStorageShape).filter(Boolean);
        if(storageRows.length){
          try{ localStorage.setItem(AUTH_KEY, JSON.stringify(storageRows)); }catch(_e){}

        const legacy = getDefaultAuthTableLegacy(btnCount);

      // ✅防呆：若權限表資料為空/舊格式(含 pass 明碼)，自動補齊/升級為 passHash（不存明碼）
      function migrateAuthToHashedIfNeeded(){
        try{
          const raw = localStorage.getItem(AUTH_KEY);
          const parsed = safeJsonParse(raw, null);
          const arr = Array.isArray(parsed) ? parsed : (parsed && Array.isArray(parsed.users) ? parsed.users : null);

          // 空表 → 直接重建預設（避免 index 登入卡死）
          if(!Array.isArray(arr) || arr.length === 0){
            const legacy = getDefaultAuthTableLegacy(LEGACY_BUTTON_KEYS.length);
            localStorage.setItem(AUTH_KEY, JSON.stringify(legacy));
            return;
          }

          // 若已是 passHash 且無明碼，略過
          let need = false;
          for(const r of arr){
            if(!r) continue;
            const hasPass = (r.pass || r.password || r.pw);
            const hasHash = (r.passHash || r.passwordHash || r.hash);
            if(hasPass && !hasHash){ need = true; break; }
          }
          if(!need) return;

          // 非阻塞升級（async）
          (async ()=>{
            try{
              let changed = false;
              for(const r of arr){
                if(!r) continue;
                const hasHash = (r.passHash || r.passwordHash || r.hash);
                const pass = (r.password ?? r.pass ?? r.pw ?? "").toString();
                if(!hasHash && pass){
                  r.passHash = await sha256Hex(pass);
                  delete r.password; delete r.pass; delete r.pw;
                  changed = true;
                }
              }
              if(changed){
                localStorage.setItem(AUTH_KEY, JSON.stringify(arr));
              }
            }catch(e){}
          })();
        }catch(e){}
      }

// ====== ✅ v3：瀏覽器工作階段登入（Session Cookie + sessionStorage）
// 目標：
// 1) 同一個瀏覽器(同視窗/分頁)登入一次，其它子頁免重複登入
// 2) 關閉瀏覽器後自動失效（使用「Session Cookie」：不設 Expires/Max-Age）
// 3) 不使用 localStorage 儲存登入狀態（避免關閉瀏覽器後仍保持登入）

const COOKIE_NAME = "tasun_session_v3";
const COOKIE_TTL_MS = 1000 * 60 * 60 * 12; // 12 小時（同日工作足夠；關閉瀏覽器仍會失效）

function _b64e(s){ try{ return btoa(unescape(encodeURIComponent(s))); }catch(_e){ return ""; } }
function _b64d(s){ try{ return decodeURIComponent(escape(atob(s))); }catch(_e){ return ""; } }

function setCookieSession(user){
  try{
    const now = Date.now();
    const payload = {
      u: String(user?.username || user?.user || user?.name || "").trim(),
      r: String(user?.level || user?.role || "").trim().toLowerCase(),
      exp: now + COOKIE_TTL_MS,
      v: (window.__CACHE_V || window.TASUN_APP_VER || "")
    };
    if(!payload.u) return;
    const val = encodeURIComponent(_b64e(JSON.stringify(payload)));
    // ✅ Session Cookie：不設定 expires / max-age
    document.cookie = `${COOKIE_NAME}=${val}; Path=/; SameSite=Lax; Secure`;
  }catch(_e){}
}

function clearCookieSession(){
  try{
    document.cookie = `${COOKIE_NAME}=; Path=/; Max-Age=0; SameSite=Lax; Secure`;
  }catch(_e){}
}

function getCookieSession(){
  try{
    const m = document.cookie.match(new RegExp("(?:^|; )" + COOKIE_NAME.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + "=([^;]*)"));
    if(!m) return null;
    const raw = decodeURIComponent(m[1] || "");
    const json = _b64d(raw);
    const o = JSON.parse(json);
    if(!o || !o.u) return null;
    if(o.exp && Date.now() > Number(o.exp)) return null;
    return { user: String(o.u), role: String(o.r || "").toLowerCase(), exp: Number(o.exp || 0) };
  }catch(_e){ return null; }
}

function setSession(user){
  try{
    sessionStorage.setItem(SESSION_KEY, JSON.stringify({ user: user.username, role: user.level, t: Date.now() }));
    // ✅需求：同一瀏覽器工作階段回首頁免再登入；關閉瀏覽器後會清空（cookie）
    sessionStorage.setItem(INDEX_SESSION_KEY, "1");
  }catch(e){}
  // ✅跨分頁/子頁：用 Session Cookie 共享
  setCookieSession(user);
  // ✅子頁常用：CURRENT_KEY（改用 sessionStorage）
  try{ sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ user: user.username, role: String(user.level||"").toLowerCase() })); }catch(_e){}
}

function clearSession(){
  try{
    sessionStorage.removeItem(SESSION_KEY);
    sessionStorage.removeItem(INDEX_SESSION_KEY);
    sessionStorage.removeItem(CURRENT_KEY);
  }catch(e){}
  clearCookieSession();
}

function getSession(){
  const obj = safeJsonParse(sessionStorage.getItem(SESSION_KEY) || "null", null);
  if(obj && typeof obj === "object"){
    const u = String(obj.user || "").trim();
    const r = String(obj.role || "").trim().toLowerCase();
    if(u) return { user: u, role: r, t: Number(obj.t || 0) };
  }
  // ✅若本分頁沒有 sessionStorage（新分頁/剛開頁），用 Cookie 恢復
  const ck = getCookieSession();
  if(ck && ck.user){
    try{
      sessionStorage.setItem(SESSION_KEY, JSON.stringify({ user: ck.user, role: ck.role, t: Date.now() }));
      sessionStorage.setItem(INDEX_SESSION_KEY, "1");
      sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ user: ck.user, role: ck.role }));
    }catch(_e){}
    return { user: ck.user, role: ck.role, t: Date.now() };
  }
  return null;
}

      /* ✅（手機文字）依按鍵高度自動微調：保持清晰、舒服閱讀 */
      function fitButtonTextPhone(btns){
        try{
          for(const btn of btns){
            const span = btn ? btn.querySelector("span") : null;
            if(!span) continue;

            // reset
            span.style.fontSize = "";

            const br = btn.getBoundingClientRect();
            const h = Math.max(1, br.height);

            // 目標：大約 1~2 行可讀，並避免擠爆
            const maxPx = clamp(Math.round(h * 0.56), 16, 34);
            const minPx = clamp(Math.round(h * 0.34), 12, 18);

            // binary search
            let lo = minPx, hi = maxPx, best = minPx;
            const limitH = Math.max(1, h - 10);
            for(let i=0;i<9;i++){
              const mid = Math.round((lo + hi) / 2);
              span.style.fontSize = mid + "px";
              // 用 scrollHeight 判斷是否溢出
              const need = span.scrollHeight;
              if(need <= limitH){
                best = mid;
                lo = mid + 1;
              }else{
                hi = mid - 1;
              }
            }
            span.style.fontSize = best + "px";
          }
        }catch(e){}
      }

      /* ==========================================================
         ✅真正的「蓮花禁區 keep-out」(ellipse)：
         - 用 lotusStage 作為基準（更貼近底圖）
         - 檢測按鍵是否壓到禁區：rect vs ellipse 最近點判定
         ========================================================== */
      function computeLotusKeepout(heroRect, stageRect, topBound, bottomBound, isPhone){
        try{
          const W = Math.max(1, heroRect.width);
          const H = Math.max(1, heroRect.height);

          const s = stageRect || heroRect;
          const sLeft = (s.left - heroRect.left);
          const sTop  = (s.top  - heroRect.top);
          const sW = Math.max(1, s.width);
          const sH = Math.max(1, s.height);

          // center（跟隨手機時 zen-posY=60%）
          const cxRel = sLeft + sW * 0.50;
          const cyBase = sTop + sH * (isPhone ? 0.60 : 0.56);

          const avail = Math.max(1, bottomBound - topBound);
          const yMargin = clamp(Math.round(avail * 0.20), 84, 150);
          const cyRel = clamp(cyBase, topBound + yMargin, bottomBound - yMargin);

          // ellipse 半徑：手機較小（留左右空間），但仍保護蓮花本體
          const rx = clamp(sW * (isPhone ? 0.19 : 0.20), 56, 170);
          const ry = clamp(sH * (isPhone ? 0.29 : 0.32), 140, 360);

          const pad = isPhone ? 12 : 14;

          const abs = {
            cx: heroRect.left + cxRel,
            cy: heroRect.top  + cyRel,
            rx: rx + pad,
            ry: ry + pad
          };

          const rel = {
            cx: cxRel,
            cy: cyRel,
            rx: rx + pad,
            ry: ry + pad
          };

          // grid3 中間留空至少覆蓋禁區寬度（再加一點緩衝）
          const midGapMin = Math.round(rel.rx * 2 + 18);

          return {
            abs, rel,
            top: rel.cy - rel.ry,
            bottom: rel.cy + rel.ry,
            left: rel.cx - rel.rx,
            right: rel.cx + rel.rx,
            midGapMin
          };
        }catch(e){
          return null;
        }
      }

      function rectIntersectsEllipseAbs(rect, ellAbs){
        // 最近點法：若矩形到橢圓中心的最近點落在橢圓內 → 相交（視為壓到禁區）
        const nx = clamp(ellAbs.cx, rect.left, rect.right);
        const ny = clamp(ellAbs.cy, rect.top, rect.bottom);
        const dx = (nx - ellAbs.cx) / Math.max(1, ellAbs.rx);
        const dy = (ny - ellAbs.cy) / Math.max(1, ellAbs.ry);
        return (dx*dx + dy*dy) <= 1;
      }

      function anyKeepoutHit(btns, keepout){
        if(!keepout || !keepout.abs) return false;
        for(const btn of btns){
          const r = btn.getBoundingClientRect();
          if(rectIntersectsEllipseAbs(r, keepout.abs)) return true;
        }
        return false;
      }

      /* ✅FIX: 手機 6 顆（含 system）必定「縮小塞進螢幕內、不滾動」+ ✅真正 keep-out */
      function layoutButtons(){
        if(!navArea || !heroInner) return;
        const visible = getVisibleButtons();
        if(!visible.length) return;

        const rect = heroInner.getBoundingClientRect();
        const H = Math.max(1, rect.height);

        const ub = userBar ? userBar.getBoundingClientRect() : null;
        const tw = titleWrap ? titleWrap.getBoundingClientRect() : null;
        const ax = zwTopAxis ? zwTopAxis.getBoundingClientRect() : null;
        const bl = zwBottomLine ? zwBottomLine.getBoundingClientRect() : null;

        const vvBottom = getVVBottomInset();

        const topBound = Math.max(
          78,
          ub ? (ub.bottom - rect.top) + 10 : 0,
          tw ? (tw.bottom - rect.top) + 10 : 0,
          ax ? (ax.bottom - rect.top) + 10 : 0
        );

        let bottomBound = H - (10 + vvBottom);
        if(bl){
          bottomBound = Math.min(bottomBound, (bl.top - rect.top) - 10);
        }
        bottomBound = Math.max(bottomBound, topBound + 120);

        const avail = Math.max(1, bottomBound - topBound);

        const isNarrow = window.matchMedia("(max-width: 900px)").matches || W < 980;
        const portrait = (window.matchMedia && window.matchMedia("(orientation: portrait)").matches && H >= W * 0.90);

        // ✅只把「手機」視為較窄的手機寬度（桌機/平板不動）
        const isPhone = window.matchMedia("(max-width: 520px)").matches || Math.min(W, H) <= 520;

        // 先清掉桌機定位
        visible.forEach(btn=>{
          btn.style.left = "";
          btn.style.right = "";
          btn.style.top = "";
          btn.style.width = "";
          btn.style.height = "";
          btn.style.gridColumn = "";
        });

        // 清掉手機 keepout/compact 狀態
        navArea.classList.remove("phone-compact-stack","phone-compact-right","phone-compact-glass");
        navArea.style.removeProperty("--stackMaxW");

        const stageRect = lotusStage ? lotusStage.getBoundingClientRect() : null;
        const keepout = (isNarrow && isPhone) ? computeLotusKeepout(rect, stageRect, topBound, bottomBound, true) : null;

        // 小工具：套用 stack（可指定區域 top/bottom），並控制透明度
        const applyStackInZone = (zoneTop, zoneBottom, opts)=>{
          const o = opts || {};
          const zoneAvail = Math.max(1, zoneBottom - zoneTop);
          const btns = getVisibleButtons();
          const n = btns.length;
          if(!n) return false;

          // 最低可用（非常小的機型）
          const minH = 22;
          const minGap = 4;
          if(zoneAvail < (n*minH + (n-1)*minGap)) return false;

          navArea.classList.remove("grid2","grid3","sides");
          navArea.classList.add("stack");
          if(o.glass) navArea.classList.add("phone-compact-glass");

          navArea.style.setProperty("--navTop", Math.round(zoneTop) + "px");
          navArea.style.setProperty("--navBottom", Math.round(H - zoneBottom) + "px");

          // systemBtn 置底
          const sys = btns.find(b => b.id === "systemBtn") || null;
          if(sys){
            const others = btns.filter(b => b !== sys);
            others.forEach(b=>navArea.appendChild(b));
            navArea.appendChild(sys);
          }

          let gapS = clamp(Math.round(zoneAvail * 0.042), 4, 10);
          let hS = Math.floor((zoneAvail - gapS * (n - 1)) / n);
          hS = clamp(hS, 22, 62);

          let needS = n * hS + gapS * (n - 1);
          if (needS > zoneAvail) {
            const s = clamp(zoneAvail / needS, 0.72, 1.0);
            gapS = Math.max(4, Math.round(gapS * s));
            hS = Math.max(22, Math.round(hS * s));
          }

          navArea.style.setProperty("--btnGap", gapS + "px");
          navArea.style.setProperty("--btnH", hS + "px");
          navArea.style.setProperty("--btnScale", String(clamp((hS / 74) * 0.96, 0.34, 0.92)));

          fitButtonTextPhone(getVisibleButtons());
          return true;
        };

        // 小工具：套用側邊窄版 stack（左右擇優），並確保不壓 keepout
        const applySideCompactStack = ()=>{
          if(!keepout) return false;

          const padX = 10;
          const leftMax = Math.floor(keepout.left - padX);
          const rightMax = Math.floor(W - keepout.right - padX);

          // 避免太窄：太窄反而字更難看
          const MIN_SIDE_W = 150;

          let side = (rightMax > leftMax) ? "right" : "left";
          let maxW = (side === "right") ? rightMax : leftMax;

          // 如果選到的那邊太窄，嘗試另一邊
          if(maxW < MIN_SIDE_W){
            const altSide = (side === "right") ? "left" : "right";
            const altW = (altSide === "right") ? rightMax : leftMax;
            if(altW > maxW){
              side = altSide;
              maxW = altW;
            }
          }

          if(maxW < MIN_SIDE_W) return false;

          navArea.classList.add("phone-compact-stack");
          navArea.classList.toggle("phone-compact-right", side === "right");
          navArea.style.setProperty("--stackMaxW", maxW + "px");

          // 全區 stack（高度仍用原本 topBound/bottomBound）
          const ok = applyStackInZone(topBound, bottomBound, { glass:false });
          if(!ok) return false;

          // 再驗證一次：真的沒壓到 keepout
          const btns = getVisibleButtons();
          if(anyKeepoutHit(btns, keepout)){
            // 回復
            navArea.classList.remove("phone-compact-stack","phone-compact-right");
            navArea.style.removeProperty("--stackMaxW");
            return false;
          }
          return true;
        };

        // 小工具：若壓到 keepout，優先嘗試「上區 / 下區」stack，其次側邊窄版 stack
        const resolveKeepoutForStack = ()=>{
          if(!keepout) return false;

          const gapY = 10;
          const topZoneBottom = Math.min(bottomBound, keepout.top - gapY);
          const bottomZoneTop = Math.max(topBound, keepout.bottom + gapY);

          // ✅優先：把 stack 放到「禁區上方」(通常最不影響蓮花)
          if(applyStackInZone(topBound, topZoneBottom, { glass:true })) return true;

          // ✅其次：放到「禁區下方」
          if(applyStackInZone(bottomZoneTop, bottomBound, { glass:true })) return true;

          // ✅最後：側邊窄版（左右擇優）
          if(applySideCompactStack()) return true;

          return false;
        };

        if(isNarrow){
          navArea.classList.remove("sides");
          navArea.style.setProperty("--navTop", Math.round(topBound) + "px");
          navArea.style.setProperty("--navBottom", Math.round(H - bottomBound) + "px");

          const n = visible.length;

          // ✅手機：優先 grid3（左右兩列，中間留空，降低壓到蓮花）
          const preferGrid3 = isPhone && n >= 4;

          if(preferGrid3){
            navArea.classList.remove("stack","grid2");
            navArea.classList.add("grid3");

            // systemBtn 置底且吃滿一列
            const sys = visible.find(b => b.id === "systemBtn") || null;
            if(sys){
              const others = visible.filter(b => b !== sys);
              others.forEach(b=>navArea.appendChild(b));
              navArea.appendChild(sys);
            }

            const v3 = getVisibleButtons();
            const hasSys = !!(v3.find(b => b.id === "systemBtn"));
            const otherCount = hasSys ? (v3.length - 1) : v3.length;
            const rows = (hasSys ? Math.ceil(otherCount / 2) + 1 : Math.ceil(v3.length / 2));

            // 中間留空寬度（依螢幕自動 + ✅keepout 最小值）
            const baseMid = clamp(Math.round(W * 0.18), 44, 110);
            const midNeed = keepout ? Math.max(baseMid, keepout.midGapMin) : baseMid;

            const minCol = 118; // 讓左右欄不至於太窄
            const midMax = Math.max(44, Math.round(W - 32 - 2 * minCol)); // 32 = navArea padding L/R
            const midGap = clamp(midNeed, 44, midMax);

            const colGap = clamp(Math.round(W * 0.02), 8, 14);
            navArea.style.setProperty("--midGap", midGap + "px");
            navArea.style.setProperty("--btnColGap", colGap + "px");

            // 先估 gap，再算 h，最後若不足就一起縮
            let gap = clamp(Math.round(avail * 0.055), 5, 12);
            let h = Math.floor((avail - gap*(rows-1)) / rows);
            h = clamp(h, 30, 86);

            let need = rows*h + gap*(rows-1);
            if(need > avail){
              const s = clamp(avail / need, 0.70, 1.0);
              gap = Math.max(4, Math.round(gap * s));
              h = Math.max(28, Math.round(h * s));
            }

            navArea.style.setProperty("--btnGap", gap + "px");
            navArea.style.setProperty("--btnH", h + "px");
            navArea.style.setProperty("--btnScale", String(clamp((h / 78) * 0.98, 0.45, 1.06)));

            // 指派左右欄位（中間留空）
            let idx = 0;
            for(const btn of v3){
              if(btn.id === "systemBtn"){
                btn.style.gridColumn = "1 / -1";
              }else{
                btn.style.gridColumn = (idx % 2 === 0) ? "1" : "3";
                idx++;
              }
            }

            // ✅手機：文字再依按鍵高度做一次自動微調（更清晰舒服）
            fitButtonTextPhone(v3);

            // ✅(1) 高度不足 → 改 stack + 更透明（且不壓蓮花禁區）
            const MIN_H_GRID = 44;
            const tooShortForGrid =
              isPhone && (
                h < MIN_H_GRID ||
                avail < (rows * MIN_H_GRID + (rows - 1) * 6) ||
                H < 560 || W < 360
              );

            if(tooShortForGrid){
              // 先嘗試：真正不壓禁區的 stack（上區/下區/側邊）
              if(resolveKeepoutForStack()) return;

              // 真的無法 stack 時：保留 grid3，但再降透明度，確保蓮花可見
              navArea.classList.add("phone-compact-glass");
              fitButtonTextPhone(getVisibleButtons());
              return;
            }

            // ✅(2) 若仍偵測到壓到禁區（極端字換行/某些字型），先再降透明度 + 再嘗試 stack 解決
            if(keepout && anyKeepoutHit(v3, keepout)){
              // 優先增加透明度避免視覺壓到
              navArea.classList.add("phone-compact-glass");

              // 再嘗試 stack（確保「完全不壓到蓮花本體」）
              if(resolveKeepoutForStack()) return;
            }

            return;
          }

          // ✅手機/窄螢幕：原本 grid2（維持）
          const preferGrid2 = (portrait && n >= 4) || (!portrait && n >= 6);

          if(preferGrid2){
            navArea.classList.remove("stack","grid3");
            navArea.classList.add("grid2");

            const sys = visible.find(b => b.id === "systemBtn") || null;
            if(sys){
              const others = visible.filter(b => b !== sys);
              others.forEach(b=>navArea.appendChild(b));
              navArea.appendChild(sys);
            }

            const v2 = getVisibleButtons();
            const hasSys = !!(v2.find(b => b.id === "systemBtn"));
            const otherCount = hasSys ? (v2.length - 1) : v2.length;
            const rows = (hasSys ? Math.ceil(otherCount / 2) + 1 : Math.ceil(v2.length / 2));

            let gap = clamp(Math.round(avail * 0.06), 5, 12);
            let h = Math.floor((avail - gap*(rows-1)) / rows);
            h = clamp(h, 30, 86);

            let need = rows*h + gap*(rows-1);
            if(need > avail){
              const s = clamp(avail / need, 0.72, 1.0);
              gap = Math.max(4, Math.round(gap * s));
              h = Math.max(28, Math.round(h * s));
            }

            navArea.style.setProperty("--btnGap", gap + "px");
            navArea.style.setProperty("--btnH", h + "px");
            navArea.style.setProperty("--btnScale", String(clamp((h / 78) * 0.98, 0.45, 1.04)));

            if(isPhone) fitButtonTextPhone(v2);

            // ✅grid2 若壓到蓮花禁區：改 stack（不壓禁區）或至少降透明度
            if(keepout && anyKeepoutHit(v2, keepout)){
              if(resolveKeepoutForStack()) return;
              navArea.classList.add("phone-compact-glass");
            }

            return;
          }

          // 否則 stack（少量按鍵）
          navArea.classList.remove("grid2","grid3");
          navArea.classList.add("stack");

          const gap = clamp(Math.round(avail * 0.05), 6, 14);
          const h = clamp(Math.floor((avail - gap*(n-1)) / n), 34, 88);
          navArea.style.setProperty("--btnGap", gap + "px");
          navArea.style.setProperty("--btnH", h + "px");
          navArea.style.setProperty("--btnScale", String(clamp((h / 82) * 0.98, 0.52, 1.02)));

          if(isPhone) fitButtonTextPhone(visible);

          // ✅stack 仍壓到禁區 → 移到上區/下區/側邊，確保「完全不壓蓮花本體」
          if(keepout && anyKeepoutHit(visible, keepout)){
            if(resolveKeepoutForStack()) return;
            navArea.classList.add("phone-compact-glass");
          }

          return;
        }

        // ✅桌機：左右側邊（維持）
        navArea.classList.remove("stack","grid2","grid3","phone-compact-stack","phone-compact-right","phone-compact-glass");
        navArea.style.removeProperty("--stackMaxW");
        navArea.classList.add("sides");

        const left = [];
        const right = [];
        visible.forEach((btn, i) => (i % 2 === 0 ? left : right).push(btn));

        const topSafe = topBound;
        const bottomSafe = bottomBound;
        const availY = Math.max(1, bottomSafe - topSafe);

        const centerGap = clamp(W * 0.16, 180, 260);
        const sideMaxW = Math.max(280, Math.floor((W - centerGap) / 2) - 40);
        const btnW = clamp(Math.floor(W * 0.26), 340, Math.min(560, sideMaxW));
        navArea.style.setProperty("--btnW", btnW + "px");

        const maxRows = Math.max(left.length, right.length);
        const gapBase = clamp(Math.round(H * 0.045), 16, 26);
        const hBase = clamp(Math.round(H * 0.118), 74, 112);

        const need = maxRows*hBase + Math.max(0, (maxRows-1)*gapBase);
        const s = clamp(availY / need, 0.66, 1.0);

        const gapY = Math.max(14, Math.round(gapBase * s));
        const btnH = Math.max(64, Math.round(hBase * s));

        navArea.style.setProperty("--btnGap", gapY + "px");
        navArea.style.setProperty("--btnH", btnH + "px");
        navArea.style.setProperty("--btnScale", String(clamp((btnH / 92) * 0.98, 0.62, 1.00)));

        const xPad = 28;
        const leftX = xPad;
        const rightX = Math.max(leftX + btnW + 12, W - xPad - btnW);

        function placeColumn(btns, isLeft){
          const rows = btns.length;
          if(!rows) return;

          const total = rows*btnH + Math.max(0, (rows-1)*gapY);
          const slack = Math.max(0, availY - total);
          const y0 = topSafe + Math.min(52, Math.round(slack * 0.22));

          let y = y0;
          for(const btn of btns){
            btn.style.top = Math.round(y) + "px";
            if(isLeft){
              btn.style.left = Math.round(leftX) + "px";
              btn.style.right = "";
            }else{
              btn.style.right = Math.round(W - (rightX + btnW)) + "px";
              btn.style.left = "";
            }
            y += btnH + gapY;
          }
        }

        placeColumn(left, true);
        placeColumn(right, false);
      }

      /* ===== Username picker（保留） ===== */
      let _userActiveIndex = -1;
      let _typeBuf = "";
      let _typeTimer = 0;

      function menuItems(){ return Array.from(usernameMenu ? usernameMenu.querySelectorAll(".select-option") : []); }
      function isMenuOpen(){ return !!(usernameMenu && usernameMenu.classList.contains("open")); }
      function closeUsernameMenu(){
        if(!usernameMenu) return;
        usernameMenu.classList.remove("open");
        if(usernameDisplay) usernameDisplay.setAttribute("aria-expanded", "false");
        _userActiveIndex = -1;
        _typeBuf = "";
      }
      function openUsernameMenu(){
        if(!usernameMenu || !usernameDisplay) return;
        if(usernameDisplay.disabled) return;

        usernameMenu.classList.add("open");
        usernameDisplay.setAttribute("aria-expanded", "true");

        const items = menuItems();
        if(!items.length) return;

        const idx = items.findIndex(it => (it.dataset.value || "") === (usernameSel.value || ""));
        setActiveIndex(idx >= 0 ? idx : 0, true);
      }
      function toggleUsernameMenu(){ if(isMenuOpen()) closeUsernameMenu(); else openUsernameMenu(); }

      function syncUsernameDisplay(){
        if(!usernameSel || !usernameDisplay) return;
        const opt = usernameSel.options[usernameSel.selectedIndex];
        const txt = opt ? String(opt.textContent || "").trim() : "";
        if(!txt || (opt && opt.disabled)) usernameDisplay.textContent = "請選擇使用者";
        else usernameDisplay.textContent = txt;
      }

      function selectByValue(val){
        if(!val) return;
        usernameSel.value = val;
        syncUsernameDisplay();
        const items = menuItems();
        items.forEach(it => it.setAttribute("aria-selected", (it.dataset.value === val) ? "true" : "false"));
      }

      function setActiveIndex(nextIndex, scrollIntoView){
        const items = menuItems();
        if(!items.length) { _userActiveIndex = -1; return; }

        const n = items.length;
        let idx = nextIndex;
        if(idx < 0) idx = 0;
        if(idx >= n) idx = n - 1;

        _userActiveIndex = idx;
        items.forEach((it, i) => it.classList.toggle("active", i === idx));

        if(scrollIntoView){
          try{ items[idx].scrollIntoView({ block:"nearest" }); }catch(e){}
        }
      }

      function buildUsernameMenu(){
        if(!usernameMenu || !usernameSel || !usernameDisplay) return;
        usernameMenu.innerHTML = "";

        const opts = Array.from(usernameSel.options || []);
        const usable = opts.filter(o => !o.disabled && String(o.value||"").trim());

        if(!usable.length){
          usernameDisplay.textContent = "（尚無使用者，請先到「系統 / 權限」新增）";
          usernameDisplay.disabled = true;
          closeUsernameMenu();
          return;
        }

        usernameDisplay.disabled = false;

        usable.forEach((o, i) => {
          const item = document.createElement("div");
          item.className = "select-option";
          item.setAttribute("role", "option");
          item.dataset.value = o.value;
          item.textContent = o.textContent;

          const selected = (o.value === usernameSel.value);
          item.setAttribute("aria-selected", selected ? "true" : "false");

          item.addEventListener("mouseenter", () => { if(isMenuOpen()) setActiveIndex(i, false); });
          item.addEventListener("click", () => {
            selectByValue(o.value);
            closeUsernameMenu();
            usernameDisplay.focus();
          });

          usernameMenu.appendChild(item);
        });
      }

      function refreshUsernamePicker(){
        if(!usernameSel) return;

        const opt = usernameSel.options[usernameSel.selectedIndex];
        if(opt && opt.disabled){
          const first = Array.from(usernameSel.options).find(o => !o.disabled && String(o.value||"").trim());
          if(first) usernameSel.value = first.value;
        }

        syncUsernameDisplay();
        buildUsernameMenu();
      }

      if(usernameDisplay){
        usernameDisplay.addEventListener("click", toggleUsernameMenu);

        usernameDisplay.addEventListener("keydown", (e) => {
          if(usernameDisplay.disabled) return;

          const key = e.key;

          if(key === "ArrowDown" || key === "ArrowUp"){
            e.preventDefault();
            if(!isMenuOpen()) openUsernameMenu();
            const items = menuItems();
            if(!items.length) return;

            const dir = (key === "ArrowDown") ? 1 : -1;
            const next = (_userActiveIndex < 0) ? 0 : (_userActiveIndex + dir);
            setActiveIndex(next, true);
            return;
          }

          if(key === "Enter"){
            e.preventDefault();
            if(!isMenuOpen()){ openUsernameMenu(); return; }
            const items = menuItems();
            if(!items.length) return;

            const idx = (_userActiveIndex >= 0) ? _userActiveIndex : 0;
            const val = items[idx]?.dataset?.value || "";
            if(val) selectByValue(val);
            closeUsernameMenu();
            return;
          }

          if(key === "Escape"){ e.preventDefault(); closeUsernameMenu(); return; }

          if(key && key.length === 1 && !e.ctrlKey && !e.metaKey && !e.altKey){
            if(!isMenuOpen()) openUsernameMenu();
            _typeBuf += key.toLowerCase();
            clearTimeout(_typeTimer);
            _typeTimer = setTimeout(()=>{ _typeBuf=""; }, 650);

            const items = menuItems();
            const idx = items.findIndex(it => String(it.textContent||"").trim().toLowerCase().startsWith(_typeBuf));
            if(idx >= 0) setActiveIndex(idx, true);
          }
        });
      }

      document.addEventListener("click", (e) => {
        if(!usernameWrap || !usernameMenu) return;
        if(isMenuOpen() && !usernameWrap.contains(e.target)) closeUsernameMenu();
      });
      document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeUsernameMenu(); });

      function populateUserSelect(){
        syncAuthUsersBeforeLogin();
        AUTH_TABLE = loadAuthTable(LEGACY_BUTTON_KEYS.length);
        usernameSel.innerHTML = "";

        if(!AUTH_TABLE.length){
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "（尚無使用者，請先到「系統 / 權限」新增）";
          opt.disabled = true;
          opt.selected = true;
          usernameSel.appendChild(opt);
          refreshUsernamePicker();
          return;
        }

        const ph = document.createElement("option");
        ph.value = "";
        ph.textContent = "請選擇使用者";
        ph.disabled = true;
        ph.selected = true;
        usernameSel.appendChild(ph);

        const names = Array.from(new Set(AUTH_TABLE.map(r => String(r.username || '').trim()).filter(Boolean)));
        names.sort((a,b)=>a.localeCompare(b, "zh-Hant"));
        if(loginSub) loginSub.textContent = `使用者清單：本機/雲端共 ${names.length} 位　｜　版次：${String(window.__CACHE_V || window.TASUN_APP_VER || window.APP_VER || '')}`;
        names.forEach(name => {
          const opt = document.createElement("option");
          opt.value = name;
          opt.textContent = name;
          usernameSel.appendChild(opt);
        });

        refreshUsernamePicker();
      }

      function tryEnterBySessionSilently(){
        try{
          if(sessionStorage.getItem(INDEX_SESSION_KEY) !== "1") return false;
          const sess = getSession();
          if(!sess || !sess.user) return false;
          const u = AUTH_TABLE.find(r => r.username === sess.user);
          if(!u){
            clearSession();
            try{ localStorage.removeItem("tasunSso_v1"); }catch(_e){}
            return false;
          }
          if(String(u.level||"").toLowerCase() !== String(sess.role||"").toLowerCase()){
            clearSession();
            return false;
          }
          applyUser(u);
          return true;
        }catch(e){
          return false;
        }
      }

      function tryAutoLoginSSO(){
        try{
          const raw = localStorage.getItem(SSO_KEY);
          if(!raw) return false;
          const sso = safeJsonParse(raw, null);
          if(!sso || !sso.name) return false;
          const nonce = sessionStorage.getItem(SSO_NONCE_KEY) || "";
          if(!nonce || nonce !== String(sso.nonce || "")) return false;
          if(sso.exp && Date.now() > Number(sso.exp)) return false;
          const u = AUTH_TABLE.find(r => r.username === String(sso.name).trim());
          if(!u) return false;
          applyUser(u);
          return true;
        }catch(e){
          return false;
        }
      }

      function showLogin(){
        document.body.classList.add("locked");
        if(loginOverlay) loginOverlay.style.display = "flex";
        if(loginError) loginError.textContent = "";
        if(loginSub) loginSub.textContent = "";
        try{ if(loginPass) loginPass.value = ""; else $("#password").value = ""; }catch(e){}
        populateUserSelect();
        resetButtonsForLogout();
        if(userInfo){
          userInfo.textContent = "目前使用者：未登入";
          userInfo.setAttribute("data-text", "目前使用者：未登入");
        }
        try{ scheduleAll(); }catch(e){}
        setTimeout(() => { try{ usernameDisplay && usernameDisplay.focus(); }catch(e){} }, 0);
      }

      function autoEnterIfSessionValid(){
        try{
          if(!window.TasunAuthV4) return false;
          const sess = window.TasunAuthV4.getSession && window.TasunAuthV4.getSession();
          if(!sess || !sess.user) return false;
          const u = AUTH_TABLE.find(r => r.username === String(sess.user).trim());
          if(!u) return false;
          applyUser(u);
          return true;
        }catch(e){
          return false;
        }
      }      function applyUser(user){
        document.body.classList.remove("locked");
        loginOverlay.style.display = "none";
        loginSub.textContent = "";

        // v4.1: 登入狀態由 TasunAuthV4 以 Session Cookie + sessionStorage 維持（同瀏覽器工作階段一次登入即可）
        try{ sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ user: user.username, role: user.level })); }catch(e){}

        CURRENT_USER = user;

        const t = `目前使用者：${user.username} (${user.level})`;
        userInfo.textContent = t;
        userInfo.setAttribute("data-text", t);

        refreshButtonsForCurrentUser();
        scheduleExport("login:applyUser");

        ensureCloudMounted(user).catch(()=>{});

        scheduleAll();
      }

      /* ✅攔截 localStorage 寫入：自動備份 + 自動雲端合併寫入 */
      (function patchLocalStorageOnce(){
        try{
          if(localStorage.__tasun_patched__) return;
          Object.defineProperty(localStorage, "__tasun_patched__", { value: true, enumerable:false });

          const _set = localStorage.setItem.bind(localStorage);
          const _remove = localStorage.removeItem.bind(localStorage);

          localStorage.setItem = function(k, v){
            _set(k, v);
            scheduleExport("save:setItem:" + k);

            if(CLOUD_KEY_SET.has(String(k))){
              const ro = !!(cloudCtrl && cloudCtrl.__readOnly__);
              scheduleCloudSave(ro);
            }
          };
          localStorage.removeItem = function(k){
            _remove(k);
            scheduleExport("save:removeItem:" + k);

            if(CLOUD_KEY_SET.has(String(k))){
              const ro = !!(cloudCtrl && cloudCtrl.__readOnly__);
              scheduleCloudSave(ro);
            }
          };
        }catch(e){}
      })();

      let scheduleLayout = ()=>{};
      function scheduleAll(){ try{ scheduleLayout(); }catch(e){} }
      scheduleLayout = rafDebounce(layoutButtons);

      AUTH_TABLE = loadAuthTable(LEGACY_BUTTON_KEYS.length);
      buildMainButtonsDOM();

      ensureCloudMounted(null).catch(()=>{});

      // ✅進入首頁：先嘗試同瀏覽器有效 session / SSO，失敗時一定顯示登入
      if(!(tryAutoLoginSSO() || tryEnterBySessionSilently() || autoEnterIfSessionValid())){
        showLogin();
      }
if(zenImg){
        zenImg.addEventListener("load", () => { scheduleAll(); }, { once:false });
      }

      requestAnimationFrame(() => {
        document.body.classList.remove("booting");
        scheduleAll();
        onFontsReady(() => scheduleAll());
      });

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const username = (usernameSel && usernameSel.value ? String(usernameSel.value) : "").trim();
        const password = String($("#password") ? $("#password").value : "").trim();

        if(!username){
          loginError.textContent = "請選擇使用者";
          return;
        }
        if(!password){
          loginError.textContent = "請輸入密碼";
          return;
        }

        loginError.textContent = "登入中…";

        try{
          // ✅登入前先修復權限表資料，確保四個基準帳號都存在，避免桌機/手機顯示不一致
          syncAuthUsersBeforeLogin();
          AUTH_TABLE = loadAuthTable(LEGACY_BUTTON_KEYS.length);
          const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(username));

          if(!u){
            loginError.textContent = "查無此使用者（請到「系統 / 權限」新增）";
            return;
          }

          const pwHash = await sha256Hex(password);
          const storedHash = String(u.passHash || "").trim().toLowerCase();
          const storedPlain = String(u.password || u.pass || "").trim();
          const baseline = getDefaultAuthTableLegacy(LEGACY_BUTTON_KEYS.length).find(r => canonUserKey(r.user) === canonUserKey(username));
          const baselineHash = String((baseline && baseline.passHash) || "").trim().toLowerCase();

          const ok = (storedHash && pwHash === storedHash) || (baselineHash && pwHash === baselineHash) || (!!storedPlain && password === storedPlain);

          if(!ok){
            loginError.textContent = "密碼錯誤";
            return;
          }

          // ✅建立同分頁/同瀏覽器工作階段登入（sessionStorage + session cookie）
          setSession({ username: u.username, level: u.level });
          try{ localStorage.setItem(CURRENT_KEY, JSON.stringify({ user: u.username, role: u.level })); }catch(_e){}

          // ✅建立 SSO token（子頁免重複登入）
          try{ setSSO({ name: u.username, role: u.level }); }catch(_e){}

          // ✅套用使用者、顯示按鍵
          applyUser(u);

          // 清空密碼
          try{ $("#password").value = ""; }catch(_e){}
          loginError.textContent = "";
        }catch(err){
          loginError.textContent = "登入失敗：" + (err && err.message ? err.message : String(err));
        }
      });btnForceRelogin.addEventListener("click", () => {
        clearSession();
        loginSub.textContent = "請重新輸入密碼登入";
        loginError.textContent = "";
        const pwd = $("#password");
        pwd.value = "";
        pwd.focus();
        scheduleAll();
      });

      btnSwitch.addEventListener("click", () => {
        clearSession();
        localStorage.removeItem(CURRENT_KEY);
        CURRENT_USER = null;
        showLogin();
        scheduleExport("switchUser");
        scheduleAll();
      });

      btnTogglePwd.addEventListener("click", () => {
        const pwd = $("#password");
        pwd.type = (pwd.type === "password") ? "text" : "password";
      });

      btnExport.addEventListener("click", () => {
        exportBackupNow("manual:button", { download:true });
      });

      // ✅避免 resize 連續重排卡頓：只排程 rAF；vv scroll 不再觸發 layout（由上方 stabilizer 處理）
      window.addEventListener("resize", () => scheduleAll(), { passive:true });
      if(window.visualViewport){
        window.visualViewport.addEventListener("resize", () => scheduleAll(), { passive:true });
      }
    }    // ✅啟動保險：不論 Loader/Core 是否存在，都安排一個 fallback，避免「Loader 存在但 ready 沒呼叫」導致首頁不出登入
    if(window.TasunLoader && typeof window.TasunLoader.ready === "function"){
      try{ window.TasunLoader.ready(runIndexApp, 8000); }catch(_e){}
    }else if(window.TasunCore && typeof window.TasunCore.ready === "function"){
      try{ window.TasunCore.ready(runIndexApp, 8000); }catch(_e){}
    }else{
      setTimeout(runIndexApp, 0);
    }
    // fallback（idempotent：runIndexApp 內有 started guard）
    setTimeout(()=>{ try{ runIndexApp(); }catch(_e){} }, 1200);

  })();
  </script>

<script>
(function(){
  function forceLoginOverlay(){
    try{
      var overlay = document.getElementById('loginOverlay');
      if(!overlay) return;
      var hidden = getComputedStyle(overlay).display === 'none';
      var bodyLocked = document.body && document.body.classList.contains('locked');
      var noButtons = !document.querySelector('.nav-area .nav-btn:not([style*="display: none"])');
      if((bodyLocked || noButtons) && hidden){
        overlay.style.display = 'flex';
        document.body.classList.add('locked');
      }
    }catch(e){}
  }
  window.addEventListener('error', function(){ setTimeout(forceLoginOverlay, 30); });
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(forceLoginOverlay, 900); });
  window.addEventListener('load', function(){ setTimeout(forceLoginOverlay, 1200); });
})();
</script>
