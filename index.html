  <script>
  (function () {
    "use strict";

    const VER = String(window.TASUN_APP_VER || window.APP_VER || "").trim();
    const url = new URL(location.href);
    const curV = url.searchParams.get("v") || "";

    if (VER && curV !== VER) {
      url.searchParams.set("v", VER);
      location.replace(url.toString());
      return;
    }

    window.__CACHE_V = VER || curV || "";

    window.__withV = window.__withV || function (u) {
      const vv = String(window.__CACHE_V || "").trim();
      if (!vv) return u;
      try {
        const uu = new URL(u, document.baseURI);
        if (uu.origin === location.origin) {
          uu.searchParams.set("v", vv);
          return uu.toString();
        }
        return u;
      } catch (e) {
        const s = String(u || "");
        if (!s || /^https?:\/\//i.test(s) || /^mailto:/i.test(s)) return s;
        const sep = s.includes("?") ? "&" : "?";
        return s + sep + "v=" + encodeURIComponent(vv);
      }
    };

    /* ✅ iOS 地址列跳動抑制：取「最小可視高度」作為 appH（只會變小，不會因收合而變大造成跳動）
       ✅（手機修正）同時提供 appHLive（即時可視高度）→ 手機用它補滿畫面，避免底部留白 */
    (function initViewportStabilizer(){
      const root = document.documentElement;
      let minH = 0;
      let lastW = 0;

      function calcVV(reset){
        try{
          const vv = window.visualViewport;
          const h = Math.round(vv ? vv.height : window.innerHeight);
          const w = Math.round(vv ? vv.width  : window.innerWidth);

          const top = Math.round(vv ? vv.offsetTop : 0);
          const bottom = Math.max(0, Math.round(window.innerHeight - (vv ? (vv.height + vv.offsetTop) : window.innerHeight)));

          root.style.setProperty("--vv-top", top + "px");
          root.style.setProperty("--vv-bottom", bottom + "px");

          if(reset || !minH || Math.abs(w - lastW) > 180){
            minH = h;
            lastW = w;
          }else{
            minH = Math.min(minH, h);
          }

          // ✅原本穩定高度（最小高度）
          root.style.setProperty("--appH", minH + "px");
          // ✅新增：即時可視高度（手機用來補滿畫面避免留白）
          root.style.setProperty("--appHLive", h + "px");

          root.style.setProperty("--appW", w + "px");
        }catch(e){
          try{
            root.style.setProperty("--appH", window.innerHeight + "px");
            root.style.setProperty("--appHLive", window.innerHeight + "px");
            root.style.setProperty("--appW", window.innerWidth + "px");
          }catch(_){}
        }
      }

      calcVV(true);

      const onResize = () => calcVV(false);
      const onOrient = () => calcVV(true);

      window.addEventListener("resize", onResize, { passive:true });
      window.addEventListener("orientationchange", onOrient, { passive:true });
      if(window.visualViewport){
        window.visualViewport.addEventListener("resize", onResize, { passive:true });
        // ✅scroll 只更新 vv-top/vv-bottom/appH（不做 layout 量測，避免連續重排）
        window.visualViewport.addEventListener("scroll", onResize, { passive:true });
      }
      document.addEventListener("visibilitychange", ()=>{ if(document.visibilityState==="visible") calcVV(false); }, { passive:true });
    })();

    // ✅ preload 主圖（更快進來）
    try{
      const id = "preloadZen";
      if(!document.getElementById(id)){
        const l = document.createElement("link");
        l.id = id;
        l.rel = "preload";
        l.as = "image";
        l.href = window.__withV("佛教禪意主視覺.png");
        l.setAttribute("data-base", "佛教禪意主視覺.png");
        document.head.appendChild(l);
      }
    }catch(e){}

    function patchZenResources(){
      const withV = window.__withV || ((u)=>u);
      try{
        const l = document.getElementById("preloadZen");
        if(l){
          const base = l.getAttribute("data-base") || l.getAttribute("href") || "";
          if(base) l.href = withV(base);
        }
      }catch(e){}
      try{
        const img = document.getElementById("zenImg");
        if(img){
          const base = img.getAttribute("data-base") || img.getAttribute("src") || "";
          if(base) img.src = withV(base);
        }
      }catch(e){}
    }
    patchZenResources();
    document.addEventListener("DOMContentLoaded", patchZenResources, { once:true });

    // ✅動態載入（維持你原本架構）
    (function(){
      const withV = window.__withV || ((u)=>u);
      function loadScript(src){
        return new Promise((resolve)=>{
          try{
            const s = document.createElement("script");
            s.src = src;
            s.async = false;
            s.onload = ()=>resolve(true);
            s.onerror = ()=>resolve(false);
            document.head.appendChild(s);
          }catch(e){ resolve(false); }
        });
      }

      (async()=>{
        await loadScript(withV("tasun-boot.js"));
        await loadScript(withV("tasun-loader.js"));

        function tryStart(){
          try{
            if(window.TasunLoader && typeof window.TasunLoader.start === "function"){
              window.TasunLoader.start({
                pageKey: "index",
                verUrl: "tasun-version.json",
                corePath: "tasun-core.js",
                forceUrlV: true,
                forceVersionSync: false,
                patchResources: true,
                networkToast: true,
                appHeightVar: false,
                preloadId: "preloadZen",
                zenImgId: "zenImg",
                appVer: window.TASUN_APP_VER
              });
              return true;
            }
          }catch(e){}
          return false;
        }

        if(!tryStart()){
          let n=0;
          const t=setInterval(()=>{
            n++;
            if(tryStart() || n>120) clearInterval(t);
          }, 50);
        }
      })();
    })();
  })();

      box-shadow: none;
      opacity: 0;
      pointer-events:none;
      z-index:-1;
    }
    .zw-axis-text{
      font-size: var(--axis-size);
      white-space: pre;
      letter-spacing: 0;
      line-height: 1;
      opacity: 0.99;
    }

    .zw-side-col{
      position:absolute;
      top: var(--zen-fixed-y);
      transform: translateY(-50%);
      writing-mode: vertical-rl;
      text-orientation: mixed;
      letter-spacing: .18em;
      font-size: var(--side-size);
      opacity: var(--side-op);
      white-space: nowrap;
      padding: 10px 12px;
      border-radius: 20px;
    }
    #zwLeft{ left: calc(50% - var(--zen-fixed-x)); }
    #zwRight{ right: calc(50% - var(--zen-fixed-x)); }

    .zw-bottom-line{
      position:absolute;
      left:50%;
      transform: translateX(calc(-50% + var(--zw-bottom-x-shift)));
      bottom: var(--zw-bottom-pad);
      font-size: var(--bottom-size);
      letter-spacing: .28em;
      opacity: var(--bottom-op);
      white-space: nowrap;
      padding: 8px 10px;
      border-radius: 18px;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,0.18));
      isolation:isolate;
    }
    .zw-bottom-line::before{
      content:"";
      position:absolute;
      inset:-8px -14px;
      border-radius: 18px;
      background:
        radial-gradient(240px 100px at 50% 40%, rgba(255,255,255,0.16), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.08), rgba(0,0,0,0.08));
      border: 1px solid rgba(255,244,210,0.14);
      opacity: .38;
      z-index:-1;
      pointer-events:none;
    }

    /* ===== 使用者列 ===== */
    .user-bar{
      position:absolute;
      left: calc(var(--frame-inset) + var(--userbar-pad) + env(safe-area-inset-left));
      top:  calc(var(--frame-inset) + var(--userbar-pad) + env(safe-area-inset-top) + var(--vv-top));
      display:flex;
      gap: 10px;
      row-gap: 10px;
      flex-wrap: wrap;
      align-items:center;
      max-width: calc(100% - (var(--frame-inset) * 2) - 12px);
      z-index: 13;
      isolation: isolate;
      contain: layout paint;
    }

    .user-bar::before{
      content:"";
      position:absolute;
      inset:-10px -12px;
      border-radius: 999px;
      background:
        radial-gradient(260px 120px at 18% 28%, rgba(255,255,255,0.14), rgba(0,0,0,0) 70%),
        radial-gradient(320px 140px at 78% 30%, rgba(246,211,122,0.12), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.09), rgba(0,0,0,0.26));
      border: 1px solid rgba(255,244,210,0.32);
      box-shadow:
        0 18px 44px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.10);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      z-index: -1;
      pointer-events:none;
    }

    .user-pill{
      padding: 10px 14px;
      border-radius: 999px;
      background:
        radial-gradient(240px 90px at 24% 20%, rgba(255,255,255,0.10), rgba(0,0,0,0) 70%),
        radial-gradient(300px 120px at 78% 30%, rgba(246,211,122,0.09), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.06), rgba(0,0,0,0.22));
      border: 1px solid rgba(255,244,210,0.32);
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      font-size: 15px;
      letter-spacing: .06em;
      white-space:nowrap;
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
      font-weight: 900;

      color: rgba(255, 232, 175, 0.98);
      -webkit-text-stroke: 0px transparent;
      text-shadow: 0 9px 18px rgba(0,0,0,0.62), 0 0 10px rgba(255,210,140,0.16);
    }

    .btn-switch{
      border: 1px solid rgba(255,244,210,0.34);
      background:
        radial-gradient(220px 80px at 22% 22%, rgba(255,255,255,0.10), rgba(0,0,0,0) 70%),
        radial-gradient(260px 100px at 78% 28%, rgba(246,211,122,0.10), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.06), rgba(0,0,0,0.22));
      padding: 10px 14px;
      border-radius: 999px;
      cursor:pointer;
      backdrop-filter: blur(var(--panel-blur));
      -webkit-backdrop-filter: blur(var(--panel-blur));
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
      letter-spacing:.08em;
      font-weight: 900;
      font-size: 15px;

      color: rgba(255, 232, 175, 0.98);
      -webkit-text-stroke: 0px transparent;
      text-shadow: 0 9px 18px rgba(0,0,0,0.62), 0 0 10px rgba(255,210,140,0.16);
    }
    .btn-export{ opacity: .98; }

    /* ===== 導覽按鍵 ===== */
    .nav-area{
      position:absolute;
      inset: var(--frame-inset);
      z-index: 11;
      pointer-events:auto;
      contain: layout paint;
      container-type: inline-size;
      padding-top: var(--navTop);
      padding-bottom: var(--navBottom);
      padding-left: 16px;
      padding-right: 16px;
    }

    .nav-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;

      border-radius: 999px;
      border: 1px solid var(--btn-border);

      background:
        radial-gradient(340px 130px at 24% 20%, rgba(255,255,255,var(--btn-glass-a)), rgba(0,0,0,0) 64%),
        radial-gradient(380px 160px at 76% 26%, rgba(246,211,122,var(--btn-glass-b)), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, var(--btn-body-a), var(--btn-body-b));

      box-shadow:
        0 16px 46px rgba(0,0,0,0.28),
        0 0 34px rgba(246,211,122,0.12),
        inset 0 1px 0 rgba(255,255,255,0.10),
        inset 0 -10px 18px rgba(0,0,0,0.05);

      backdrop-filter: blur(var(--btn-blur));
      -webkit-backdrop-filter: blur(var(--btn-blur));

      user-select:none;
      -webkit-tap-highlight-color: transparent;

      position: relative;
      overflow: hidden;
      z-index: 1;

      height: var(--btnH);
      touch-action: manipulation;
    }

    .nav-btn::after{
      content:"";
      position:absolute;
      inset:-1px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.00) 46%),
        radial-gradient(220px 100px at 40% 12%, rgba(255,255,255,0.06), rgba(0,0,0,0) 70%);
      opacity: .14;
      mix-blend-mode: screen;
      pointer-events:none;
    }

    .nav-btn span{
      padding: 0 18px;
      position:relative;
      z-index: 1;

      font-size: clamp(1.16rem, calc(5.2cqw * var(--btnScale)), 2.05rem);

      color: var(--btn-text) !important;
      -webkit-text-fill-color: var(--btn-text);

      /* ✅FIX: 不用 stroke，改外描邊 shadow（避免黑邊跑到字上/錯位） */
      text-shadow:
        calc(var(--btn-ol)) 0 0 var(--btn-stroke),
        calc(var(--btn-ol) * -1) 0 0 var(--btn-stroke),
        0 calc(var(--btn-ol)) 0 var(--btn-stroke),
        0 calc(var(--btn-ol) * -1) 0 var(--btn-stroke),
        calc(var(--btn-ol)) calc(var(--btn-ol)) 0 var(--btn-stroke),
        calc(var(--btn-ol) * -1) calc(var(--btn-ol) * -1) 0 var(--btn-stroke),
        calc(var(--btn-ol)) calc(var(--btn-ol) * -1) 0 var(--btn-stroke),
        calc(var(--btn-ol) * -1) calc(var(--btn-ol)) 0 var(--btn-stroke),
        0 1px 0 rgba(0,0,0,0.18),
        0 7px 14px var(--btn-shadowA),
        0 0 10px var(--btn-glowA);

      letter-spacing: .06em;
      font-weight: 900;
      font-family:"標楷體","Noto Serif TC","Microsoft JhengHei",serif;
      line-height: 1.12;

      white-space: normal;
      text-align: center;
      text-wrap: balance;

      max-width: 92%;
      overflow-wrap: anywhere;
      word-break: keep-all;
      line-break: strict;
    }

    .nav-btn span.latin{
      font-family:"Noto Sans TC","Microsoft JhengHei","Noto Serif TC",sans-serif;
      letter-spacing: .04em;
      transform: scaleX(0.985);
    }
    .nav-btn span.latin-only{
      letter-spacing: .03em;
      transform: scaleX(0.975);
    }

    .nav-btn:hover{
      border-color: var(--btn-border-hi);
      box-shadow:
        0 20px 54px rgba(0,0,0,0.32),
        0 0 44px rgba(246,211,122,0.16),
        inset 0 1px 0 rgba(255,255,255,0.12),
        inset 0 -10px 18px rgba(0,0,0,0.06);
    }
    .nav-btn:focus{
      outline:none;
      border-color: var(--btn-border-hi);
      box-shadow:
        0 0 0 2px rgba(246,211,122,0.14),
        0 20px 54px rgba(0,0,0,0.32),
        0 0 44px rgba(246,211,122,0.16);
    }

    /* ✅ 系統/權限：更醒目但不突兀 */
    .nav-btn.is-system{
      --btn-border: rgba(255, 244, 210, 0.94);
      --btn-border-hi: rgba(255, 244, 210, 0.985);

      --btn-glass-a: 0.045;
      --btn-glass-b: 0.040;
      --btn-body-a: rgba(255, 248, 232, 0.040);
      --btn-body-b: rgba(18, 12, 8, 0.048);

      --btn-text: rgba(255, 214, 128, 0.995);

      /* ✅FIX: 系統鍵外描邊稍微薄一點（更乾淨不糊） */
      --btn-ol: 1.55px;
      --btn-stroke: rgba(10, 5, 2, 0.96);

      --btn-glowA: rgba(255, 196, 120, 0.22);
      --btn-shadowA: rgba(0,0,0,0.78);

      box-shadow:
        0 18px 54px rgba(0,0,0,0.30),
        0 0 52px rgba(246,211,122,0.16),
        inset 0 1px 0 rgba(255,255,255,0.14),
        inset 0 -10px 18px rgba(0,0,0,0.04);
    }
    .nav-btn.is-system::after{ opacity: .18; }
    .nav-btn.is-system:focus{
      box-shadow:
        0 0 0 2px rgba(255,244,210,0.16),
        0 20px 58px rgba(0,0,0,0.34),
        0 0 56px rgba(246,211,122,0.18);
    }

    /* ===== nav layout ===== */
    .nav-area.stack{
      display:flex;
      flex-direction: column;
      gap: var(--btnGap);
      justify-content:flex-start;
    }
    .nav-area.stack .nav-btn{
      position:relative;
      width: 100%;
      border-radius: 18px;
    }

    .nav-area.grid2{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--btnGap);
      align-content: start;
    }
    .nav-area.grid2 .nav-btn{
      position:relative;
      width: 100%;
      border-radius: 18px;
    }
    .nav-area.grid2 #systemBtn{ grid-column: 1 / -1; }

    /* ✅（手機版）左右兩列，中間留空：減少壓到蓮花本體 */
    .nav-area.grid3{
      display:grid;
      grid-template-columns: 1fr var(--midGap) 1fr;
      column-gap: var(--btnColGap);
      row-gap: var(--btnGap);
      align-content: start;
    }
    .nav-area.grid3 .nav-btn{
      position:relative;
      width: 100%;
      border-radius: 18px;
    }
    .nav-area.grid3 #systemBtn{ grid-column: 1 / -1; }

    /* 桌機 sides */
    .nav-area.sides{
      position:absolute;
      inset: var(--frame-inset);
      padding-top: 0;
      padding-bottom: 0;
      padding-left: 0;
      padding-right: 0;
    }
    .nav-area.sides .nav-btn{
      position:absolute;
      width: var(--btnW);
      height: var(--btnH);
    }

    /* ===== 登入遮罩 ===== */
    .login-overlay{
      position:fixed; inset:0; z-index: 3000;
      display:none; align-items:center; justify-content:center;
      background:
        radial-gradient(900px 560px at 50% 45%, rgba(0,0,0,0.30), rgba(0,0,0,0.66)),
        radial-gradient(1200px 760px at 50% 10%, rgba(246,211,122,0.10), rgba(0,0,0,0)),
        rgba(0,0,0,0.52);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .login-box{
      width: min(520px, calc(100vw - 36px));
      border-radius: 22px;
      padding: 22px 22px 18px;
      background: linear-gradient(180deg, rgba(34, 22, 12, 0.96), rgba(15, 10, 6, 0.97));
      border: 1px solid rgba(246,211,122,0.62);
      box-shadow: 0 26px 90px rgba(0,0,0,0.58), inset 0 1px 0 rgba(255,255,255,0.06);
    }
    .login-title{ font-size: 1.64rem; margin-bottom: 10px; text-align:center; }
    .login-sub{
      text-align:center; min-height: 18px; font-size: 14px; opacity:.86; margin-bottom: 14px;
      color: rgba(255,232,175,0.90);
      letter-spacing:.06em;
      -webkit-text-stroke: 0.55px rgba(92,56,22,0.52);
      text-shadow: 0 7px 14px rgba(0,0,0,0.46);
      font-weight: 900;
    }
    .login-field{ display:flex; flex-direction: column; gap: 8px; margin: 12px 0; }
    .login-field label{
      font-size: 14px; letter-spacing: .12em; color: rgba(255,232,175,0.90);
      -webkit-text-stroke: 0.50px rgba(92,56,22,0.52);
      text-shadow: 0 7px 14px rgba(0,0,0,0.42);
      font-weight: 900;
    }
    .login-pwd-wrapper{ display:flex; gap: 10px; align-items:center; }
    .login-pwd-input{
      flex:1; padding: .78rem .96rem; border-radius:999px;
      border:1px solid rgba(246,211,122,0.78);
      background:
        linear-gradient(180deg, rgba(255,250,235,0.08), rgba(0,0,0,0.00)),
        linear-gradient(180deg, rgba(10, 7, 4, 0.78), rgba(0,0,0,0.44));
      color: rgba(255, 244, 210, 0.99); caret-color: rgba(255, 244, 210, 0.99);
      -webkit-text-stroke: .72px rgba(92,56,22,0.52);
      text-shadow: 0 1px 0 rgba(10,6,2,0.28), 0 5px 10px rgba(10,6,2,0.44);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 12px 20px rgba(0,0,0,0.24);
      outline:none;
      font-size: 15px;
      font-weight: 900;
    }
    .login-pwd-input:focus{
      border-color: rgba(255,244,210,0.96);
      box-shadow: 0 0 0 2px rgba(246,211,122,0.18), 0 0 22px rgba(246,211,122,0.22), inset 0 1px 0 rgba(255,255,255,0.08);
    }
    .btn-eye-login{
      width: 44px; height: 44px; border-radius: 999px;
      border:1px solid rgba(246,211,122,0.62);
      background: rgba(0,0,0,0.22);
      color: rgba(255,232,175,0.96);
      cursor:pointer;
      box-shadow: 0 12px 22px rgba(0,0,0,0.26);
      -webkit-text-stroke: 0.65px rgba(92,56,22,0.52);
      text-shadow: 0 8px 16px rgba(0,0,0,0.50);
      font-weight: 900;
    }
    .login-error{
      min-height: 18px; color: rgba(255,190,160,0.98); font-size: 14px; letter-spacing: .06em; margin-top: 6px; text-align:center;
      -webkit-text-stroke: 0.45px rgba(0,0,0,0.40);
      text-shadow: 0 8px 16px rgba(0,0,0,0.48);
      font-weight: 900;
    }
    .login-actions{ display:flex; gap: 12px; justify-content:center; margin-top: 14px; }
    .btn-login, .btn-secondary{
      border-radius: 999px; padding: 12px 18px;
      border: 1px solid rgba(255,244,210,0.40);
      background:
        radial-gradient(240px 90px at 24% 18%, rgba(255,255,255,0.16), rgba(0,0,0,0) 70%),
        radial-gradient(300px 120px at 78% 26%, rgba(246,211,122,0.14), rgba(0,0,0,0) 72%),
        linear-gradient(180deg, rgba(255,244,210,0.10), rgba(0,0,0,0.24));
      cursor:pointer; letter-spacing: .12em;
      box-shadow:
        0 16px 34px rgba(0,0,0,0.32),
        inset 0 1px 0 rgba(255,255,255,0.10);
      font-size: 15px;
      font-weight: 900;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);

      color: rgba(255,232,175,0.98);
      -webkit-text-stroke: 0px transparent;
      text-shadow: 0 10px 18px rgba(0,0,0,0.62), 0 0 10px rgba(255,210,140,0.14);
    }

    /* ===== 自製下拉（保留） ===== */
    .select-wrap{ position:relative; width:100%; }
    .select-wrap select{ position:absolute; inset:0; opacity:0; pointer-events:none; }
    .select-display{
      width:100%; display:flex; align-items:center; justify-content:flex-start; text-align:left;
      padding: .78rem 2.90rem .78rem .96rem;
      border-radius:999px; border:1px solid rgba(246,211,122,0.78);
      background:
        linear-gradient(180deg, rgba(255,250,235,0.08), rgba(0,0,0,0.00)),
        linear-gradient(180deg, rgba(10, 7, 4, 0.78), rgba(0,0,0,0.44));
      color: rgba(255,232,175,0.96);
      -webkit-text-stroke: .70px rgba(92,56,22,0.52);
      text-shadow: 0 1px 0 rgba(10,6,2,0.28), 0 6px 12px rgba(0,0,0,0.46);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 12px 20px rgba(0,0,0,0.24);
      cursor:pointer; user-select:none; position:relative; appearance:none;
      backdrop-filter:none; -webkit-backdrop-filter:none;
      font-size: 15px;
      font-weight: 900;
    }
    .select-display::after{
      content:"▾";
      position:absolute; right: .88rem; top: 50%; transform: translateY(-50%);
      opacity: .98;
      font-size: 1.36rem;
      color: rgba(255,226,156,0.98);
      -webkit-text-stroke: 0.85px rgba(92,56,22,0.62);
      text-shadow: 0 7px 14px rgba(0,0,0,0.52), 0 0 10px rgba(255,210,140,0.14);
      pointer-events:none;
      font-weight: 900;
    }
    .select-menu{
      position:absolute; left:0; right:0; top: calc(100% + 10px);
      max-height: 280px; overflow:auto;
      border-radius: 16px; border: 1px solid rgba(246,211,122,0.62);
      background: rgba(8,5,3,0.98);
      box-shadow: 0 22px 60px rgba(0,0,0,0.46), 0 0 24px rgba(246,211,122,0.10);
      display:none; z-index: 4005; padding: 6px;
    }
    .select-menu.open{ display:block; }
    .select-option{
      padding: .70rem .96rem; border-radius: 12px; cursor:pointer
      ;color: rgba(255,232,175,0.98); letter-spacing:.06em;
      -webkit-text-stroke: .50px rgba(92,56,22,0.42);
      text-shadow: 0 2px 10px rgba(0,0,0,0.38);
      user-select:none; border: 1px solid transparent;
      font-weight: 900;
    }
    .select-option:hover{ background: rgba(255,244,210,0.10); }
    .select-option[aria-selected="true"]{ background: rgba(246,211,122,0.14); border-color: rgba(246,211,122,0.20); }
    .select-option.active{ background: rgba(255,244,210,0.14); border-color: rgba(255,244,210,0.22); outline: none; }

    /* ===== 手機重新排版（只改手機） ===== */
    @media (max-width: 900px){
      :root{
        --panel-blur: 12px;
        --btn-blur: 12px;

        --side-size: clamp(1.02rem, 3.0vw, 1.30rem);
        --bottom-size: clamp(1.10rem, 3.1vw, 1.40rem);
        --axis-size: clamp(1.72rem, 5.1vw, 2.55rem);

        --zen-fixed-x: clamp(56px, 12vw, 140px);

        /* ✅手機：空無明再往上、底部留更多給按鍵 */
        --axis-top: clamp(62px, 8.6vh, 132px);
        --zw-bottom-lift: clamp(2.35cm, 5.6vh, 3.20cm); /* ✅調整：手機底部禪字上移 */

        /* ✅手機：按鍵更透明（重疊仍看得到蓮花） */
        --btn-glass-a: 0.040;
        --btn-glass-b: 0.036;
        --btn-body-a: rgba(255, 248, 232, 0.040);
        --btn-body-b: rgba(30, 22, 14, 0.055);

        /* ✅手機：把蓮花焦點稍微往下，讓上方更乾淨可放按鍵 */
        --zen-posY: 60%;
      }

      /* ✅手機：舞台補滿可視高度（避免底部留白） */
      .hero{
        min-height: var(--appHLive, 100dvh);
        align-items: stretch;
      }
      .hero-inner{
        height: calc(var(--appHLive, 100dvh) - (var(--outer-side) * 2));
      }

      /* ✅FIX: user-bar 比例縮小且隨螢幕縮放 */
      .user-bar{
        left: calc(var(--frame-inset) + 10px + env(safe-area-inset-left));
        right: calc(var(--frame-inset) + 10px + env(safe-area-inset-right));
        max-width: none;

        display:grid;
        grid-template-columns: 1fr 1fr;
        grid-template-areas:
          "pill pill"
          "switch export";
        gap: 8px;
        align-items: stretch;
      }
      .user-bar::before{
        inset:-8px -10px; /* ✅縮小背景膜 */
      }

      .user-pill{ grid-area: pill; white-space: normal; text-wrap: balance; }
      #btnSwitchUser{ grid-area: switch; }
      #btnExport{ grid-area: export; }

      .btn-switch, .user-pill{
        font-size: clamp(12px, 3.2vw, 14px);
        padding: clamp(7px, 2.1vw, 10px) clamp(9px, 2.8vw, 12px);
      }

      .site-title{ letter-spacing: .12em; }

      /* ✅手機按鍵字再放大一點，但仍受 btnScale 控制（JS 會做二次自動微調） */
      .nav-btn span{
        font-size: clamp(1.12rem, calc(5.9cqw * var(--btnScale)), 2.12rem);
      }
    }

    <script>
  (function(){
    "use strict";

    async function sha256Hex(str){
      str = String(str == null ? "" : str);
      if(!(window.crypto && crypto.subtle && window.TextEncoder)){
        let h = 0;
        for(let i=0;i<str.length;i++){ h = ((h<<5)-h) + str.charCodeAt(i); h |= 0; }
        return (h>>>0).toString(16).padStart(64,"0").slice(0,64);
      }
      const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
    }

    function runIndexApp(){
      if(window.__tasun_index_app_started__) return;
      window.__tasun_index_app_started__ = true;

      const $ = (sel)=>document.querySelector(sel);

      const navArea = $("#navArea");
      const heroInner = $("#heroInner");
      const zwTopAxis = $("#zwTopAxis");
      const zwLeft = $("#zwLeft");
      const zwRight = $("#zwRight");
      const zwBottomLine = $("#zwBottomLine");
      const rootStyle = document.documentElement.style;
      const usernameSel = $("#username");
      const usernameWrap = $("#usernameWrap");
      const usernameDisplay = $("#usernameDisplay");
      const usernameMenu = $("#usernameMenu");
      const passwordInput = $("#password");
      const zenImg = $("#zenImg");

      const AUTH_KEY = "tasunAuthTable_v1";
      const CURRENT_KEY = "tasunCurrentUser_v1";
      const NAV_KEY = "tasunNavButtons_v1";
      const ROUTE_KEY_A = "tasunNavRoutes_v1";
      const ROUTE_KEY_B = "tasunRoutes_v1";
      const PERM_MATRIX_KEY = "tasunPermMatrix_v1";
      const SESSION_KEY = "tasunSessionLogin_v1";
      const INDEX_SESSION_KEY = "tasunIndexSessionAuthed_v1";
      const SSO_KEY = "tasunSso_v1";
      const SSO_NONCE_KEY = "tasunSsoNonce_v1";
      const SSO_TTL_MS = 10 * 60 * 1000;
      const CLOUD_RESOURCE_KEY = "tasun-index-db";

      const DEFAULT_NAV = [
        { id:"btn1", label:"臻鼎時代大廈管理表" },
        { id:"btn2", label:"捷運汐東線" },
        { id:"btn3", label:"雲端檔案" },
        { id:"btn4", label:"工程資料庫" },
        { id:"btn5", label:"資料庫" }
      ];
      const FIXED_ROUTES = { btn2:"汐東工程管理表.html", systemBtn:"權限表.html" };
      const DEFAULT_AUTH = [
        { user:"alex",  passHash:"7b58036f696822b2de0208fe7d52372c42756c1ded52ebdd676610b68aeb5f07", role:"admin", btn1:true, btn2:true, btn3:true, btn4:true, btn5:true },
        { user:"JOYCE", passHash:"d558060dec275fb1eeec5d557de6b1d5058a865271c32ca028f5d426204a4815", role:"admin", btn1:true, btn2:true, btn3:true, btn4:true, btn5:true },
        { user:"tasun", passHash:"cebfd54a6f2db4a1314e5071f0bb7c778185d41eae81c0914d5f77c854ce4dba", role:"write", btn1:true, btn2:true, btn3:true, btn4:true, btn5:true },
        { user:"wu",    passHash:"8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92", role:"read",  btn1:false, btn2:false, btn3:false, btn4:false, btn5:true }
      ];

      let AUTH_TABLE = [];
      let NAV_BTNS = [];
      let ROUTES = {};
      let CURRENT_USER = null;
      let cloudCtrl = null;

      function inferRole(name, role){
        const r = String(role || "").trim().toLowerCase();
        if(r) return r;
        const u = String(name || "").trim().toLowerCase();
        if(u === "alex" || u === "joyce") return "admin";
        if(u === "tasun") return "write";
        return "read";
      }
      function safeParse(s, fallback){ try{ return JSON.parse(s); }catch(_e){ return fallback; } }
      function withV(href){ try{ return (typeof window.__withV === "function") ? window.__withV(href) : href; }catch(_e){ return href; } }
      function scheduleAll(){
        layoutButtons();
        fitZenWords();
      }

      function getOrCreateNonce(){
        try{
          let n = sessionStorage.getItem(SSO_NONCE_KEY) || "";
          if(!n){
            n = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : ("n_" + Math.random().toString(16).slice(2) + Date.now());
            sessionStorage.setItem(SSO_NONCE_KEY, n);
          }
          return n;
        }catch(_e){ return ""; }
      }
      function setSSO(user){
        try{
          const now = Date.now();
          const name = user.username || user.user || user.name;
          const role = inferRole(name, user.level || user.role);
          const nonce = getOrCreateNonce();
          localStorage.setItem(SSO_KEY, JSON.stringify({ name, role, nonce, at:now, lastActive:now, exp:now + SSO_TTL_MS, v:String(window.TASUN_APP_VER || window.APP_VER || "") }));
          localStorage.setItem(CURRENT_KEY, JSON.stringify({ name, user:name, role }));
          sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ name, user:name, role }));
          sessionStorage.setItem("tasunSsoTab_v1", "1");
        }catch(_e){}
      }
      function getSSO(){
        try{
          const raw = localStorage.getItem(SSO_KEY);
          if(!raw) return null;
          const o = JSON.parse(raw);
          const nonce = sessionStorage.getItem(SSO_NONCE_KEY) || "";
          if(!o || !o.name || !nonce || !o.nonce || o.nonce !== nonce) return null;
          if(o.exp && Date.now() > Number(o.exp)) return null;
          return o;
        }catch(_e){ return null; }
      }
      function touchSSO(){
        try{
          const o = getSSO();
          if(!o) return;
          const now = Date.now();
          o.lastActive = now;
          o.exp = now + SSO_TTL_MS;
          localStorage.setItem(SSO_KEY, JSON.stringify(o));
        }catch(_e){}
      }
      ["click","keydown","touchstart","focus"].forEach(ev=>{
        try{ window.addEventListener(ev, ()=>touchSSO(), { passive:true, capture: ev !== "focus" }); }catch(_e){}
      });

      function setSession(user){
        const payload = { user:user.username, role:inferRole(user.username, user.level), t:Date.now() };
        try{
          sessionStorage.setItem(SESSION_KEY, JSON.stringify(payload));
          sessionStorage.setItem(INDEX_SESSION_KEY, "1");
        }catch(_e){}
        setSSO(user);
      }
      function getSession(){
        const obj = safeParse(sessionStorage.getItem(SESSION_KEY) || "null", null);
        if(obj && obj.user) return obj;
        const sso = getSSO();
        if(sso && sso.name){
          const sess = { user:sso.name, role:inferRole(sso.name, sso.role), t:Date.now() };
          try{
            sessionStorage.setItem(SESSION_KEY, JSON.stringify(sess));
            sessionStorage.setItem(INDEX_SESSION_KEY, "1");
          }catch(_e){}
          return sess;
        }
        return null;
      }
      function clearSession(){
        try{
          sessionStorage.removeItem(SESSION_KEY);
          sessionStorage.removeItem(INDEX_SESSION_KEY);
          sessionStorage.removeItem(CURRENT_KEY);
          sessionStorage.removeItem("tasunSsoTab_v1");
        }catch(_e){}
        try{
          localStorage.removeItem(CURRENT_KEY);
          localStorage.removeItem(SSO_KEY);
        }catch(_e){}
      }

      function loadAuthTable(){
        let raw = localStorage.getItem(AUTH_KEY);
        if(!raw){
          localStorage.setItem(AUTH_KEY, JSON.stringify(DEFAULT_AUTH));
          raw = localStorage.getItem(AUTH_KEY);
        }
        const arr = safeParse(raw || "[]", []);
        AUTH_TABLE = (Array.isArray(arr) ? arr : []).map(r=>{
          const username = String(r.username ?? r.user ?? r.name ?? "").trim();
          const level = inferRole(username, r.level ?? r.role);
          const buttons = Array.isArray(r.buttons) ? r.buttons.slice(0,5).map(Boolean) : null;
          return { username, password:String(r.password ?? r.pass ?? ""), passHash:String(r.passHash ?? r.passwordHash ?? ""), level, buttons, btn1:r.btn1, btn2:r.btn2, btn3:r.btn3, btn4:r.btn4, btn5:r.btn5 };
        }).filter(r=>r.username);
        return AUTH_TABLE;
      }
      function loadNavButtons(){
        const raw = localStorage.getItem(NAV_KEY);
        NAV_BTNS = safeParse(raw || "null", null);
        if(!Array.isArray(NAV_BTNS) || !NAV_BTNS.length){
          NAV_BTNS = DEFAULT_NAV.slice();
          localStorage.setItem(NAV_KEY, JSON.stringify(NAV_BTNS));
        }
      }
      function loadRoutes(){
        const a = safeParse(localStorage.getItem(ROUTE_KEY_A) || "null", null);
        const b = safeParse(localStorage.getItem(ROUTE_KEY_B) || "null", null);
        ROUTES = Object.assign({}, (a && typeof a==="object" ? a : {}), (b && typeof b==="object" ? b : {}), FIXED_ROUTES);
      }

      function populateUserSelect(){
        loadAuthTable();
        usernameSel.innerHTML = "";
        const ph = document.createElement("option");
        ph.value = ""; ph.textContent = "請選擇使用者"; ph.disabled = true; ph.selected = true;
        usernameSel.appendChild(ph);
        Array.from(new Set(AUTH_TABLE.map(r=>r.username))).sort((a,b)=>a.localeCompare(b,"zh-Hant")).forEach(name=>{
          const opt = document.createElement("option");
          opt.value = name; opt.textContent = name;
          usernameSel.appendChild(opt);
        });
        refreshUsernamePicker();
      }
      function buildUserMenu(){
        usernameMenu.innerHTML = "";
        Array.from(usernameSel.options).forEach(opt=>{
          if(!opt.value) return;
          const div = document.createElement("div");
          div.className = "select-option";
          div.textContent = opt.textContent;
          div.setAttribute("role","option");
          div.setAttribute("aria-selected", String(usernameSel.value === opt.value));
          div.tabIndex = 0;
          div.addEventListener("click", ()=>{
            usernameSel.value = opt.value;
            refreshUsernamePicker();
            closeUsernameMenu();
            try{ passwordInput.focus(); }catch(_e){}
          });
          div.addEventListener("keydown", e=>{
            if(e.key === "Enter" || e.key === " "){ e.preventDefault(); div.click(); }
          });
          usernameMenu.appendChild(div);
        });
      }
      function refreshUsernamePicker(){
        const text = usernameSel.value || "請選擇使用者";
        usernameDisplay.textContent = text;
        usernameDisplay.setAttribute("aria-expanded", "false");
        buildUserMenu();
      }
      function openUsernameMenu(){ usernameMenu.classList.add("open"); usernameDisplay.setAttribute("aria-expanded", "true"); }
      function closeUsernameMenu(){ usernameMenu.classList.remove("open"); usernameDisplay.setAttribute("aria-expanded", "false"); }
      usernameDisplay.addEventListener("click", ()=>usernameMenu.classList.contains("open") ? closeUsernameMenu() : openUsernameMenu());
      document.addEventListener("click", e=>{ if(usernameWrap && !usernameWrap.contains(e.target)) closeUsernameMenu(); });
      usernameSel.addEventListener("change", refreshUsernamePicker);

      function getPermFromMatrix(username, btnId){
        try{
          const pm = safeParse(localStorage.getItem(PERM_MATRIX_KEY) || "null", null);
          const key = String(username||"").trim().toLowerCase();
          const node = pm && pm.users && pm.users[key] && pm.users[key]["index.html"];
          if(node && Object.prototype.hasOwnProperty.call(node, btnId)) return !!node[btnId];
        }catch(_e){}
        return null;
      }
      function isAllowed(user, btnId){
        if(btnId === "systemBtn") return String(user.level||"").toLowerCase() === "admin";
        const matrix = getPermFromMatrix(user.username, btnId);
        if(matrix !== null) return matrix;
        if(Array.isArray(user.buttons)){
          const idx = Number(String(btnId).replace("btn","")) - 1;
          if(idx >= 0) return !!user.buttons[idx];
        }
        if(user[btnId] !== undefined) return !!user[btnId];
        return String(user.level||"").toLowerCase() !== "read" || btnId === "btn5";
      }

      function labelToFile(label){
        let s = String(label || "").trim();
        if(!s) return "#";
        if(/\.html?$/i.test(s)) return s;
        s = s.replace(/[\\/:*?"<>|]/g, "").replace(/\s+/g, "");
        return s + ".html";
      }
      function resolveHref(cfg){
        if(ROUTES[cfg.id]) return ROUTES[cfg.id];
        if(cfg.label && ROUTES[cfg.label]) return ROUTES[cfg.label];
        return labelToFile(cfg.label);
      }
      function markLatin(span){
        const t = String(span.textContent || "");
        if(/[A-Za-z0-9_./-]/.test(t)) span.classList.add("latin");
        if(/[A-Za-z]/.test(t) && !/[\u3400-\u9FFF]/.test(t)) span.classList.add("latin-only");
      }
      function buildButtons(){
        loadNavButtons(); loadRoutes();
        navArea.innerHTML = "";
        const list = NAV_BTNS.concat([{ id:"systemBtn", label:"系統 / 權限" }]);
        list.forEach(cfg=>{
          const a = document.createElement("a");
          a.className = "nav-btn" + (cfg.id === "systemBtn" ? " is-system" : "");
          a.id = cfg.id;
          const href = resolveHref(cfg);
          a.href = withV(href);
          if(cfg.id === "btn3" && /^https?:\/\//i.test(href)){
            a.target = "_blank";
            a.rel = "noopener noreferrer";

          const span = document.createElement("span");
          span.textContent = cfg.label;
          markLatin(span);
          a.appendChild(span);
          navArea.appendChild(a);

      }
      function layoutButtons(){
        const w = window.innerWidth || 0;
        const root = document.documentElement;
        if(w < 640){
          navArea.className = "nav-area stack";
          rootStyle.setProperty("--btnScale", "0.96");
          Array.from(navArea.querySelectorAll(".nav-btn")).forEach(btn=>{
            btn.style.left = "";
            btn.style.top = "";
            btn.style.width = "";
            btn.style.height = "";
            btn.style.setProperty("--btnScale", "0.96");
          });
          return;
        }
        if(w < 1180){
          navArea.className = "nav-area grid2";
          rootStyle.setProperty("--btnScale", "0.92");
          Array.from(navArea.querySelectorAll(".nav-btn")).forEach(btn=>{
            btn.style.left = "";
            btn.style.top = "";
            btn.style.width = "";
            btn.style.height = "";
            btn.style.setProperty("--btnScale", "0.92");
          });
          return;
        }

        navArea.className = "nav-area sides";

        const areaW = Math.max(0, navArea.clientWidth || heroInner.clientWidth || window.innerWidth);
        const areaH = Math.max(0, navArea.clientHeight || heroInner.clientHeight || window.innerHeight);

        const outer = 32;
        const rowGap = 14;
        const btnH = 58;
        const topBase = Math.max(112, Math.round((parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--navTop")) || 140) - 24));

        const leftEdgeLimit = Math.round(areaW * 0.355);
        const rightEdgeStart = Math.round(areaW * 0.645);

        const leftX = outer;
        const rightX = rightEdgeStart;

        let leftW = leftEdgeLimit - leftX;
        let rightW = (areaW - outer) - rightX;

        leftW = Math.max(270, Math.min(420, leftW));
        rightW = Math.max(270, Math.min(420, rightW));

        const row1 = topBase;
        const row2 = row1 + btnH + rowGap;
        const row3 = row2 + btnH + rowGap;

        const scale = areaW >= 1700 ? 1 : (areaW >= 1480 ? 0.95 : 0.90);
        rootStyle.setProperty("--btnScale", String(scale));
        navArea.dataset.leftEdgeLimit = String(leftX + leftW);
        navArea.dataset.rightEdgeStart = String(rightX);
        navArea.dataset.row1 = String(row1);
        navArea.dataset.row3 = String(row3);
        navArea.dataset.btnH = String(btnH);

        const positions = {
          btn1: { x:leftX,  y:row1, w:leftW },
          btn3: { x:leftX,  y:row2, w:leftW },
          btn5: { x:leftX,  y:row3, w:leftW },
          btn2: { x:rightX, y:row1, w:rightW },
          btn4: { x:rightX, y:row2, w:rightW },
          systemBtn: { x:rightX, y:row3, w:rightW }
        };

        Array.from(navArea.querySelectorAll(".nav-btn")).forEach(btn=>{
          const p = positions[btn.id];
          if(!p){
            btn.style.left = "";
            btn.style.top = "";
            btn.style.width = "";
            btn.style.height = "";
            return;
          }
          btn.style.left = p.x + "px";
          btn.style.top = p.y + "px";
          btn.style.width = p.w + "px";
          btn.style.height = btnH + "px";
          btn.style.setProperty("--btnScale", String(scale));
        });
      }

      function fitZenWords(){
        const w = window.innerWidth || 0;
        const areaW = Math.max(0, heroInner ? heroInner.clientWidth : window.innerWidth);
        const areaH = Math.max(0, heroInner ? heroInner.clientHeight : window.innerHeight);

        if(w < 640){
          rootStyle.setProperty("--zen-fixed-x", "92px");
          rootStyle.setProperty("--axis-op", "0.92");
          rootStyle.setProperty("--side-op", "0.74");
          rootStyle.setProperty("--bottom-op", "0.95");
          rootStyle.setProperty("--zw-bottom-lift", "118px");
          rootStyle.setProperty("--zw-bottom-x-shift", "0px");
          return;
        }

        const leftEdgeLimit = Number(navArea.dataset.leftEdgeLimit || Math.round(areaW * 0.355));
        const rightEdgeStart = Number(navArea.dataset.rightEdgeStart || Math.round(areaW * 0.645));
        const gapCenterLeft = leftEdgeLimit + Math.round(areaW * 0.028);
        const gapCenterRight = rightEdgeStart - Math.round(areaW * 0.028);

        const sideX = Math.max(150, Math.min(270, Math.round((areaW * 0.5) - gapCenterLeft)));
        rootStyle.setProperty("--zen-fixed-x", sideX + "px");

        const axisTopPx = Math.max(88, Math.min(148, Math.round(areaH * 0.17)));
        rootStyle.setProperty("--axis-top", axisTopPx + "px");

        const bottomLiftPx = Math.max(150, Math.min(210, Math.round(areaH * 0.205)));
        rootStyle.setProperty("--zw-bottom-lift", bottomLiftPx + "px");
        rootStyle.setProperty("--zw-bottom-x-shift", "0px");

        const axisSizePx = Math.max(40, Math.min(62, Math.round(areaW * 0.028)));
        const sideSizePx = Math.max(22, Math.min(31, Math.round(areaW * 0.0145)));
        const bottomSizePx = Math.max(24, Math.min(34, Math.round(areaW * 0.016)));
        rootStyle.setProperty("--axis-size", axisSizePx + "px");
        rootStyle.setProperty("--side-size", sideSizePx + "px");
        rootStyle.setProperty("--bottom-size", bottomSizePx + "px");

        const brightFactor = areaW >= 1600 ? 1 : (areaW >= 1360 ? 0.97 : 0.94);
        rootStyle.setProperty("--axis-op", String(0.94 * brightFactor));
        rootStyle.setProperty("--side-op", String(0.80 * brightFactor));
        rootStyle.setProperty("--bottom-op", String(0.98 * brightFactor));

        if(zwTopAxis){
          zwTopAxis.style.maxWidth = Math.max(220, gapCenterRight - gapCenterLeft) + "px";
        }
        if(zwBottomLine){
          zwBottomLine.style.maxWidth = Math.max(220, gapCenterRight - gapCenterLeft + 70) + "px";
        }
        if(zwLeft){
          zwLeft.style.top = Math.max(50, Math.min(64, (areaH / 100) * 58)) + "%";
        }
        if(zwRight){
          zwRight.style.top = Math.max(50, Math.min(64, (areaH / 100) * 58)) + "%";
        }
      }
      function refreshButtonsForCurrentUser(){
        Array.from(navArea.querySelectorAll(".nav-btn")).forEach(btn=>{
          btn.style.display = CURRENT_USER && isAllowed(CURRENT_USER, btn.id) ? "flex" : "none";
        });
        layoutButtons();
      }

      function setLoginMsg(msg, isError){
        loginError.textContent = isError ? String(msg || "") : "";
        loginSub.textContent = isError ? "" : String(msg || "");
      }
      function hideLogin(){ document.body.classList.remove("locked"); loginOverlay.style.display = "none"; }
      function showLogin(){
        document.body.classList.add("locked");
        loginOverlay.style.display = "flex";
        setLoginMsg("", false);
        passwordInput.value = "";
        CURRENT_USER = null;
        userInfo.textContent = "目前使用者：未登入";
        userInfo.setAttribute("data-text", "目前使用者：未登入");
        Array.from(navArea.querySelectorAll(".nav-btn")).forEach(btn=>btn.style.display = "none");
        populateUserSelect();
        scheduleAll();
      }
      function applyUser(user){
        CURRENT_USER = user;
        const t = `目前使用者：${user.username} (${user.level})`;
        userInfo.textContent = t;
        userInfo.setAttribute("data-text", t);
        setSSO(user);
        try{
          const payload = JSON.stringify({ name:user.username, user:user.username, role:user.level });
          localStorage.setItem(CURRENT_KEY, payload);
          sessionStorage.setItem(CURRENT_KEY, payload);
        }catch(_e){}
        hideLogin();
        refreshButtonsForCurrentUser();
        scheduleAll();
        ensureCloudMounted();
      }
      function goNextIfNeeded(){
        try{
          const u = new URL(location.href);
          const next = String(u.searchParams.get("next") || "").trim();
          if(!next) return false;
          u.searchParams.delete("next");
          history.replaceState(null,"",u.toString());
          location.href = withV(next);
          return true;
        }catch(_e){ return false; }
      }
      function enterWithUser(username, role){
        loadAuthTable();
        const u = AUTH_TABLE.find(r => r.username === String(username || "").trim());
        if(!u) return false;
        const user = { ...u, level: inferRole(u.username, role || u.level) };
        setSession(user);
        applyUser(user);
        setTimeout(()=>goNextIfNeeded(), 50);
        return true;
      }
      function tryEnterBySession(){
        const sso = getSSO();
        if(sso && sso.name) return enterWithUser(sso.name, sso.role);
        const sess = getSession();
        if(sess && sess.user) return enterWithUser(sess.user, sess.role);
        return false;
      }
      async function validateLocalLogin(username, password){
        loadAuthTable();
        const u = AUTH_TABLE.find(r => r.username === username);
        if(!u) return null;
        if(u.passHash){
          const hex = await sha256Hex(password);
          if(hex !== u.passHash) return null;
        }else if(String(u.password || "") !== password){
          return null;
        }
        return { ...u, level: inferRole(u.username, u.level) };
      }

      loginForm.addEventListener("submit", async (e)=>{
        e.preventDefault();
        const username = String(usernameSel.value || "").trim();
        const password = String(passwordInput.value || "").trim();
        if(!username || !password){ setLoginMsg("請輸入帳號與密碼", true); return; }
        setLoginMsg("登入中…", false);
        try{
          let user = await validateLocalLogin(username, password);
          if(!user && window.TasunAuthV4 && typeof window.TasunAuthV4.login === "function"){
            const apiBase = (window.TasunCloudWrapV4 && window.TasunCloudWrapV4.getApiBase && window.TasunCloudWrapV4.getApiBase()) || (window.TASUN_API_BASE || "");
            const r = await window.TasunAuthV4.login({ apiBase, username, password });
            if(r && r.ok) user = { username, level: inferRole(username, r.role || r.level || "read") };
          }
          if(!user){ setLoginMsg("帳號或密碼錯誤", true); return; }
          passwordInput.value = "";
          enterWithUser(user.username, user.level);
          setLoginMsg("", false);
        }catch(err){
          setLoginMsg("登入失敗：" + (err && err.message ? err.message : String(err)), true);
        }
      });

      btnForceRelogin.addEventListener("click", ()=>{
        clearSession();
        setLoginMsg("請重新輸入密碼登入", false);
        passwordInput.value = "";
        try{ passwordInput.focus(); }catch(_e){}
      });
      btnSwitch.addEventListener("click", ()=>{ clearSession(); showLogin(); });
      if(btnLogout) btnLogout.addEventListener("click", ()=>{ clearSession(); showLogin(); });
      btnTogglePwd.addEventListener("click", ()=>{ passwordInput.type = (passwordInput.type === "password") ? "text" : "password"; });
      btnExport.addEventListener("click", ()=>{
        const keys = [AUTH_KEY, NAV_KEY, ROUTE_KEY_A, ROUTE_KEY_B, PERM_MATRIX_KEY, CURRENT_KEY, SSO_KEY];
        const payload = { ts:new Date().toISOString(), data:{} };
        keys.forEach(k=>payload.data[k]=localStorage.getItem(k));
        const blob = new Blob([JSON.stringify(payload, null, 2)], { type:"application/json;charset=utf-8" });
        const u = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = u; a.download = "Tasun備份_" + new Date().toISOString().replace(/[:.]/g,"-") + ".json";
        a.click();
        setTimeout(()=>URL.revokeObjectURL(u), 1000);
      });

      async function ensureCloudMounted(){
        if(cloudCtrl) return cloudCtrl;
        try{
          if(!(window.TasunCloudKit && window.TasunCloudKit.init && window.TasunCloudKit.mount)) return null;
          window.TasunCloudKit.init({
            appVer: (window.TASUN_APP_VER || window.APP_VER || ""),
            resourcesUrl: withV("tasun-resources.json"),
            ui: { enabled:true, hideLockButtons:true, position:"bottom-right" },
            lock: { enabled:false, auto:false }
          });
          cloudCtrl = window.TasunCloudKit.mount({
            resourceKey: CLOUD_RESOURCE_KEY,
            idField: "id",
            getLocal: ()=>({ db:[
              { id:1, k:AUTH_KEY, v:localStorage.getItem(AUTH_KEY) || "" },
              { id:2, k:NAV_KEY, v:localStorage.getItem(NAV_KEY) || "" },
              { id:3, k:ROUTE_KEY_B, v:localStorage.getItem(ROUTE_KEY_B) || localStorage.getItem(ROUTE_KEY_A) || "" }
            ], counter:3 }),
            apply: (payload)=>{
              try{
                (payload && Array.isArray(payload.db) ? payload.db : []).forEach(row=>{
                  const k = String(row && row.k || "");
                  const v = String(row && row.v || "");
                  if(k === AUTH_KEY || k === NAV_KEY || k === ROUTE_KEY_A || k === ROUTE_KEY_B) localStorage.setItem(k, v);
                });
                loadAuthTable(); loadNavButtons(); loadRoutes(); buildButtons();
                if(CURRENT_USER){
                  const hit = AUTH_TABLE.find(r => r.username === CURRENT_USER.username);
                  if(hit) CURRENT_USER = { ...hit, level: inferRole(hit.username, hit.level) };
                  refreshButtonsForCurrentUser();
                }else{
                  showLogin();
                }
              }catch(_e){}
            }
          });
          return cloudCtrl;
        }catch(_e){ return null; }
      }

      window.addEventListener("storage", (e)=>{
        if([AUTH_KEY,NAV_KEY,ROUTE_KEY_A,ROUTE_KEY_B,PERM_MATRIX_KEY,CURRENT_KEY,SSO_KEY].includes(e.key)){
          loadAuthTable(); loadNavButtons(); loadRoutes(); buildButtons();
          if(CURRENT_USER){
            const hit = AUTH_TABLE.find(r=>r.username === CURRENT_USER.username);
            if(hit) CURRENT_USER = { ...hit, level: inferRole(hit.username, hit.level) };
            refreshButtonsForCurrentUser();
          }else{
            layoutButtons();
          }
        }
      });

      window.addEventListener("resize", scheduleAll, { passive:true });
      if(zenImg) zenImg.addEventListener("load", scheduleAll, { passive:true });

      loadAuthTable(); loadNavButtons(); loadRoutes(); buildButtons();
      requestAnimationFrame(()=>{ document.body.classList.remove("booting"); scheduleAll(); });
      if(!tryEnterBySession()) showLogin();
    }

    if(window.TasunLoader && typeof window.TasunLoader.ready === "function"){
      try{ window.TasunLoader.ready(runIndexApp, 8000); }catch(_e){ setTimeout(runIndexApp, 0); }
    }else if(window.TasunCore && typeof window.TasunCore.ready === "function"){
      try{ window.TasunCore.ready(runIndexApp, 8000); }catch(_e){ setTimeout(runIndexApp, 0); }
    }else{
      setTimeout(runIndexApp, 0);
    }
    setTimeout(()=>{ try{ runIndexApp(); }catch(_e){} }, 1200);
  })();
  </script>

</body>
