      const INDEX_SESSION_KEY = "tasunIndexSessionAuthed_v1";
      const SESSION_KEY = "tasunSessionLogin_v1";
      const NAV_KEY = "tasunNavButtons_v1";
      const ROUTE_KEY = "tasunNavRoutes_v1";
      const ROUTE_KEY_ALT = "tasunRoutes_v1";
      const SSO_NONCE_KEY = "tasunSsoNonce_v1";
      const LEGACY_BUTTON_KEYS = ["btn1","btn2","btn3","btn4","btn5"];
      const COOKIE_NAME = "tasun_session_v3";
      const COOKIE_TTL_MS = 1000 * 60 * 60 * 12;

      const loginOverlay = $("#loginOverlay");
      const loginForm = $("#loginForm");
      const loginError = $("#loginError");
      const loginSub = $("#loginSub");
      const userInfo = $("#userInfo");
      const btnSwitch = $("#btnSwitchUser");
      const btnExport = $("#btnExport");
      const btnTogglePwd = $("#btnTogglePwd");
      const btnForceRelogin = $("#btnForceRelogin");
      const btnLogout = $("#btnLogout");
      const navArea = $("#navArea");
      const usernameWrap = document.getElementById("usernameWrap");
      const usernameSel = document.getElementById("username");
      const usernameDisplay = document.getElementById("usernameDisplay");
      const usernameMenu = document.getElementById("usernameMenu");

      const FIXED_ROUTES = {
        "捷運汐東線事項紀錄": "sxdh-notes.html",
        "捷運汐東線事項記錄": "sxdh-notes.html",
        "捷運汐東線記事": "sxdh-notes.html",
        "sxdh-notes": "sxdh-notes.html",
        "sxdh-notes.html": "sxdh-notes.html",
        "btn2": "汐東工程管理表.html"
      };
      const ROLE_MAP = {
        "btn1": ["admin","write","read"],
        "btn2": ["admin","write","read"],
        "btn3": ["admin","write","read"],
        "btn4": ["admin","write"],
        "btn5": ["admin","write","read"],
        "systemBtn": ["admin"]
      };

      let BTN_CONFIGS = [];
      let mainNavBtns = [];
      let AUTH_TABLE = [];
      let CURRENT_USER = null;

      const safeJsonParse = (s,f)=>{ try{return JSON.parse(s);}catch(e){return f;} };
      const canonUserKey = (v)=>String(v || "").trim().toLowerCase();
      const markLatin = (span)=>{ const t = String(span.textContent || ""); if(/[A-Za-z0-9_./-]/.test(t)) span.classList.add("latin"); };
      const hrefToDom = (href)=>{/^https?:\/\//i.test(href)||/^mailto:/i.test(href)?href:(href||"#")};
      const inferRole = (name, role)=>{ const r=String(role||"").trim().toLowerCase(); if(r) return r; const u=canonUserKey(name); if(u==="alex"||u==="joyce") return "admin"; if(u==="tasun") return "write"; return "read"; };

      function getDefaultAuthTableLegacy(btnCount){
        const keys = Array.from({length: btnCount}, (_, i) => `btn${i+1}`);
        const mkAll = () => Object.fromEntries(keys.map(k => [k, true]));
        const mkOnlyLast = () => Object.fromEntries(keys.map((k, i) => [k, i === btnCount - 1]));
        return [
          { user:"alex",  passHash:"7b58036f696822b2de0208fe7d52372c42756c1ded52ebdd676610b68aeb5f07", role:"admin", ...mkAll() },
          { user:"JOYCE", passHash:"d558060dec275fb1eeec5d557de6b1d5058a865271c32ca028f5d426204a4815", role:"admin", ...mkAll() },
          { user:"tasun", passHash:"cebfd54a6f2db4a1314e5071f0bb7c778185d41eae81c0914d5f77c854ce4dba", role:"write", ...mkAll() },
          { user:"wu",    passHash:"8d969eef6ecad3c29a3a629280e686cf0c3f5d5a86aff3ca12020c923adc6c92", role:"read",  ...mkOnlyLast() }
        ];
      }
      function normalizeAuthLikeRow(row, btnCount){
        if(!row || typeof row !== "object") return null;
        const username = String(row.username ?? row.user ?? row.name ?? row.account ?? "").trim();
        if(!username) return null;
        const level = inferRole(username, row.level ?? row.role ?? "read");
        const passHash = String(row.passHash ?? row.passwordHash ?? row.hash ?? "").trim().toLowerCase();
        const password = String(row.password ?? row.pass ?? row.pw ?? "").trim();
        let buttons = Array.isArray(row.buttons) ? row.buttons.slice(0, btnCount) : [];
        if(!buttons.length){
          for(let i=0;i<btnCount;i++){
            const k = `btn${i+1}`;
            if(Object.prototype.hasOwnProperty.call(row, k)) buttons[i] = !!row[k];
          }
        }
        while(buttons.length < btnCount) buttons.push(undefined);
        return { username, level, passHash, password, buttons };
      }
      function authRowToStorageShape(row){
        if(!row) return null;
        const out = { user: row.username, username: row.username, role: row.level, level: row.level, passHash: row.passHash || "" };
        if(row.password && !row.passHash) out.password = row.password;
        if(Array.isArray(row.buttons) && row.buttons.length) out.buttons = row.buttons.slice();
        return out;
      }
      function mergeAuthRowsKeepOrder(primary, fallback, btnCount){
        const out = [];
        const seen = new Map();
        const push = (row) => {
          const n = normalizeAuthLikeRow(row, btnCount);
          if(!n) return;
          const key = canonUserKey(n.username);
          if(seen.has(key)){
            const cur = out[seen.get(key)];
            cur.level = n.level || cur.level;
            if(n.passHash) cur.passHash = n.passHash;
            if(!cur.passHash && n.password) cur.password = n.password;
            if(Array.isArray(n.buttons) && n.buttons.length) cur.buttons = n.buttons.slice();
            return;
          }
          seen.set(key, out.length);
          out.push({ ...n });
        };
        (Array.isArray(primary) ? primary : []).forEach(push);
        (Array.isArray(fallback) ? fallback : []).forEach(push);
        return out;
      }
      function parseAuthStorageRows(raw, btnCount){
        const parsed = safeJsonParse(String(raw || ""), null);
        const arr = Array.isArray(parsed) ? parsed : (parsed && Array.isArray(parsed.users) ? parsed.users : []);
        return mergeAuthRowsKeepOrder(arr, [], btnCount);
      }
      function baselineRows(btnCount){
        return getDefaultAuthTableLegacy(btnCount).map(r => normalizeAuthLikeRow(r, btnCount)).filter(Boolean);
      }
      function hasBaselineAccounts(rows, btnCount){
        const want = new Set(baselineRows(btnCount).map(r => canonUserKey(r.username)));
        const got = new Set((Array.isArray(rows)?rows:[]).map(r => canonUserKey(r.username)).filter(Boolean));
        for(const k of want) if(!got.has(k)) return false;
        return true;
      }
      function sanitizeAuthRows(rows, btnCount){
        const merged = mergeAuthRowsKeepOrder(rows, baselineRows(btnCount), btnCount);
        return hasBaselineAccounts(merged, btnCount) ? merged : baselineRows(btnCount);
      }
      function persistAuthRows(rows, btnCount){
        const sane = sanitizeAuthRows(rows, btnCount);
        const payload = JSON.stringify(sane.map(authRowToStorageShape).filter(Boolean));
        try{ localStorage.setItem(AUTH_KEY, payload); }catch(e){}
        try{ localStorage.setItem(AUTH_SHADOW_KEY, payload); }catch(e){}
        return sane;
      }
      function repairAuthTableStorage(btnCount){
        const localRows = parseAuthStorageRows(localStorage.getItem(AUTH_KEY), btnCount);
        const shadowRows = parseAuthStorageRows(localStorage.getItem(AUTH_SHADOW_KEY), btnCount);
        const preferred = hasBaselineAccounts(localRows, btnCount) ? localRows : (hasBaselineAccounts(shadowRows, btnCount) ? shadowRows : []);
        return persistAuthRows(preferred, btnCount);
      }
      function loadAuthTable(btnCount){ return repairAuthTableStorage(btnCount); }
      function ensureLoginUsersReady(btnCount){ return repairAuthTableStorage(btnCount); }
      function syncAuthUsersBeforeLogin(){ AUTH_TABLE = ensureLoginUsersReady(LEGACY_BUTTON_KEYS.length); return !!AUTH_TABLE.length; }

      function setSSO(user){
        try{
          const now = Date.now();
          const payload = { name:user.username, role:user.level, at:now, exp:now + 1000*60*60*12, v:(window.__CACHE_V||""), nonce:String(now)+"_"+Math.random().toString(36).slice(2) };
          sessionStorage.setItem(SSO_NONCE_KEY, payload.nonce);
          sessionStorage.setItem(SSO_KEY, JSON.stringify(payload));
          localStorage.setItem(SSO_KEY, JSON.stringify(payload));
          sessionStorage.setItem("tasunSsoTab_v1", "1");
          sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ user:user.username, role:user.level, name:user.username }));
        }catch(e){}
      }
      function getSSO(){
        try{ const raw = sessionStorage.getItem(SSO_KEY) || localStorage.getItem(SSO_KEY); const o = safeJsonParse(raw, null); if(!o||!o.name) return null; if(o.exp && Date.now()>Number(o.exp)) return null; return o; }catch(e){ return null; }
      }
      function _b64e(s){ try{ return btoa(unescape(encodeURIComponent(s))); }catch(_e){ return ""; } }
      function _b64d(s){ try{ return decodeURIComponent(escape(atob(s))); }catch(_e){ return ""; } }
      function setCookieSession(user){ try{ const now=Date.now(); const payload={u:user.username,r:user.level,exp:now+COOKIE_TTL_MS,v:(window.__CACHE_V||"")}; document.cookie=`${COOKIE_NAME}=${encodeURIComponent(_b64e(JSON.stringify(payload)))}; Path=/; SameSite=Lax; Secure`; }catch(e){} }
      function clearCookieSession(){ try{ document.cookie = `${COOKIE_NAME}=; Path=/; Max-Age=0; SameSite=Lax; Secure`; }catch(e){} }
      function getCookieSession(){ try{ const m=document.cookie.match(new RegExp("(?:^|; )"+COOKIE_NAME.replace(/[.*+?^${}()|[\\]\\]/g,"\\$&")+"=([^;]*)")); if(!m) return null; const o=safeJsonParse(_b64d(decodeURIComponent(m[1]||"")), null); if(!o||!o.u) return null; if(o.exp && Date.now()>Number(o.exp)) return null; return { user:String(o.u), role:String(o.r||"").toLowerCase() }; }catch(e){ return null; } }
      function setSession(user){ try{ sessionStorage.setItem(SESSION_KEY, JSON.stringify({ user:user.username, role:user.level, t:Date.now() })); sessionStorage.setItem(INDEX_SESSION_KEY, "1"); sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ user:user.username, role:user.level })); }catch(e){} setCookieSession(user); }
      function clearSession(){ try{ sessionStorage.removeItem(SESSION_KEY); sessionStorage.removeItem(INDEX_SESSION_KEY); sessionStorage.removeItem(CURRENT_KEY); }catch(e){} clearCookieSession(); }
      function getSession(){ const obj=safeJsonParse(sessionStorage.getItem(SESSION_KEY)||"null", null); if(obj&&obj.user) return obj; const ck=getCookieSession(); if(ck&&ck.user){ try{ sessionStorage.setItem(SESSION_KEY, JSON.stringify({ user:ck.user, role:ck.role, t:Date.now() })); sessionStorage.setItem(INDEX_SESSION_KEY, "1"); }catch(e){} return ck; } return null; }

      function loadRoutes(){
        const seed = { btn1:"臻鼎管理表.html", btn2:"汐東工程管理表.html", btn3:"https://www.dropbox.com/", btn4:"工程資料庫.html", btn5:"資料庫.html", systemBtn:"權限表.html" };
        const raw = localStorage.getItem(ROUTE_KEY) || localStorage.getItem(ROUTE_KEY_ALT);
        const parsed = safeJsonParse(raw, null);
        const out = (parsed && typeof parsed === "object") ? { ...parsed } : {};
        Object.keys(seed).forEach(k => { if(!out[k]) out[k] = seed[k]; });
        Object.keys(FIXED_ROUTES).forEach(k => { out[k] = FIXED_ROUTES[k]; });
        try{ const json = JSON.stringify(out, null, 2); localStorage.setItem(ROUTE_KEY, json); localStorage.setItem(ROUTE_KEY_ALT, json); }catch(e){}
        return out;
      }
      function loadNavButtonsSeedIfMissing(){
        const seed = [
          { id:"btn1", label:"臻鼎時代大廈管理表" },
          { id:"btn2", label:"捷運汐止東湖線" },
          { id:"btn3", label:"雲端檔案" },
          { id:"btn4", label:"工程資料庫" },
          { id:"btn5", label:"資料庫" }
        ];
        const arr = safeJsonParse(localStorage.getItem(NAV_KEY) || "null", null);
        if(Array.isArray(arr) && arr.length) return arr;
        try{ localStorage.setItem(NAV_KEY, JSON.stringify(seed)); }catch(e){}
        return seed;
      }
      function resolveHref(cfg, routes){
        if(FIXED_ROUTES[cfg.label]) return FIXED_ROUTES[cfg.label];
        if(routes[cfg.id]) return routes[cfg.id];
        return cfg.id === "systemBtn" ? "權限表.html" : `${cfg.label}.html`;
      }
      function buildMainButtonsDOM(){
        const routes = loadRoutes();
        const navArr = loadNavButtonsSeedIfMissing();
        BTN_CONFIGS = navArr.map(x => ({ id:String(x.id||""), label:String(x.label||""), roles:ROLE_MAP[String(x.id||"")] || ["admin","write","read"], target:String(x.id)==="btn3"?"_blank":"" })).concat([{ id:"systemBtn", label:"系統 / 權限", roles:["admin"], target:"" }]);
        navArea.innerHTML = "";
        mainNavBtns = [];
        BTN_CONFIGS.forEach(cfg => {
          const a = document.createElement("a");
          a.className = "nav-btn";
          a.id = cfg.id;
          const span = document.createElement("span");
          span.textContent = cfg.label;
          markLatin(span);
          a.appendChild(span);
          a.href = hrefToDom(resolveHref(cfg, routes));
          if(cfg.target){ a.target = cfg.target; a.rel = "noopener noreferrer"; }
          a.style.display = "none";
          navArea.appendChild(a);
          mainNavBtns.push(a);
        });
      }
      function isRoleAllowed(cfg, level){ return !cfg || !Array.isArray(cfg.roles) || cfg.roles.includes(level); }
      function isAllowedByAuth(user, cfg){
        if(cfg.id === "systemBtn") return user.level === "admin";
        const m = String(cfg.id||"").match(/^btn(\d+)$/i);
        if(!m) return true;
        const idx = parseInt(m[1], 10) - 1;
        const v = Array.isArray(user.buttons) ? user.buttons[idx] : undefined;
        return v === undefined ? true : !!v;
      }
      function refreshButtonsForCurrentUser(){
        if(!CURRENT_USER) return;
        const routes = loadRoutes();
        mainNavBtns.forEach((btn, index) => {
          const cfg = BTN_CONFIGS[index];
          const ok = isRoleAllowed(cfg, CURRENT_USER.level) && isAllowedByAuth(CURRENT_USER, cfg);
          btn.style.display = ok ? "flex" : "none";
          btn.href = hrefToDom(resolveHref(cfg, routes));
        });
      }
      function resetButtonsForLogout(){ mainNavBtns.forEach(btn => btn.style.display = "none"); }

      function syncUsernameDisplay(){
        const opt = usernameSel.options[usernameSel.selectedIndex];
        const txt = opt ? String(opt.textContent || "").trim() : "";
        usernameDisplay.textContent = (!txt || (opt && opt.disabled)) ? "請選擇使用者" : txt;
      }
      function menuItems(){ return Array.from(usernameMenu.querySelectorAll('.select-option')); }
      function closeUsernameMenu(){ usernameMenu.classList.remove('open'); usernameDisplay.setAttribute('aria-expanded','false'); }
      function setActiveIndex(nextIndex, scrollIntoView){ const items=menuItems(); if(!items.length) return; const idx=Math.max(0, Math.min(items.length-1, nextIndex)); items.forEach((it,i)=>it.classList.toggle('active', i===idx)); if(scrollIntoView){ try{ items[idx].scrollIntoView({block:'nearest'}); }catch(e){} } }
      function buildUsernameMenu(){
        usernameMenu.innerHTML = "";
        const usable = Array.from(usernameSel.options).filter(o => !o.disabled && String(o.value||"").trim());
        if(!usable.length){
          usernameDisplay.textContent = "（尚無使用者，請先到「系統 / 權限」新增）";
          usernameDisplay.disabled = true;
          closeUsernameMenu();
          return;
        }
        usernameDisplay.disabled = false;
        usable.forEach((o, i) => {
          const item = document.createElement('div');
          item.className = 'select-option';
          item.setAttribute('role','option');
          item.dataset.value = o.value;
          item.textContent = o.textContent;
          item.setAttribute('aria-selected', (o.value===usernameSel.value)?'true':'false');
          item.addEventListener('mouseenter', ()=>setActiveIndex(i, false));
          item.addEventListener('click', ()=>{ usernameSel.value = o.value; syncUsernameDisplay(); buildUsernameMenu(); closeUsernameMenu(); usernameDisplay.focus(); });
          usernameMenu.appendChild(item);
        });
      }
      function refreshUsernamePicker(){
        const first = Array.from(usernameSel.options).find(o => !o.disabled && String(o.value||"").trim());
        if(first && (!usernameSel.value || usernameSel.selectedIndex < 0 || usernameSel.options[usernameSel.selectedIndex].disabled)) usernameSel.value = first.value;
        syncUsernameDisplay();
        buildUsernameMenu();
      }
      function getLoginCatalogRows(){ return sanitizeAuthRows(ensureLoginUsersReady(LEGACY_BUTTON_KEYS.length), LEGACY_BUTTON_KEYS.length); }
      function populateUserSelect(){
        let rows = [];
        try{ rows = getLoginCatalogRows(); }catch(e){ rows = baselineRows(LEGACY_BUTTON_KEYS.length); }
        AUTH_TABLE = rows;
        persistAuthRows(rows, LEGACY_BUTTON_KEYS.length);
        usernameSel.innerHTML = "";
        const ph = document.createElement('option');
        ph.value = ""; ph.textContent = "請選擇使用者"; ph.disabled = true; ph.selected = true; usernameSel.appendChild(ph);
        const names = Array.from(new Set(rows.map(r => String(r.username||"").trim()).filter(Boolean))).sort((a,b)=>a.localeCompare(b, 'zh-Hant'));
        names.forEach(name => { const opt=document.createElement('option'); opt.value=name; opt.textContent=name; usernameSel.appendChild(opt); });
        loginSub.textContent = `使用者清單：固定基準 ${Math.max(4, names.length)} 位　｜　版次：${String(window.__CACHE_V || '')}`;
        refreshUsernamePicker();
      }

      usernameDisplay.addEventListener('click', ()=>{
        if(usernameDisplay.disabled) return;
        if(usernameMenu.classList.contains('open')) closeUsernameMenu();
        else { usernameMenu.classList.add('open'); usernameDisplay.setAttribute('aria-expanded','true'); setActiveIndex(0, true); }
      });
      document.addEventListener('click', (e)=>{ if(!usernameWrap.contains(e.target)) closeUsernameMenu(); });

      function showLogin(){
        document.body.classList.add('locked');
        document.body.classList.remove('auth-ok');
        loginOverlay.style.display = 'flex';
        loginError.textContent = '';
        loginSub.textContent = '';
        try{ document.getElementById('password').value = ''; }catch(e){}
        populateUserSelect();
        resetButtonsForLogout();
        if(userInfo){ userInfo.textContent = '目前使用者：未登入'; userInfo.setAttribute('data-text', '目前使用者：未登入'); }
      }
      function applyUser(user){
        CURRENT_USER = user;
        document.body.classList.remove('locked');
        document.body.classList.add('auth-ok');
        loginOverlay.style.display = 'none';
        loginSub.textContent = '';
        try{ sessionStorage.setItem(CURRENT_KEY, JSON.stringify({ user:user.username, role:user.level, name:user.username })); }catch(e){}
        userInfo.textContent = `目前使用者：${user.username} (${user.level})`;
        userInfo.setAttribute('data-text', userInfo.textContent);
        refreshButtonsForCurrentUser();
      }
      function tryEnterBySessionSilently(){
        const sess = getSession();
        if(!sess || !sess.user || sessionStorage.getItem(INDEX_SESSION_KEY)!=="1") return false;
        const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(sess.user));
        if(!u) return false;
        applyUser(u); return true;
      }
      function tryAutoLoginSSO(){
        const sso = getSSO();
        if(!sso || !sso.name) return false;
        const nonce = sessionStorage.getItem(SSO_NONCE_KEY) || "";
        if(sso.nonce && nonce && String(sso.nonce)!==nonce) return false;
        const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(sso.name));
        if(!u) return false;
        setSession({ username:u.username, level:u.level });
        applyUser(u); return true;
      }
      function autoEnterIfSessionValid(){
        try{ if(!window.TasunAuthV4) return false; const sess = window.TasunAuthV4.getSession && window.TasunAuthV4.getSession(); if(!sess || !sess.user) return false; const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(sess.user)); if(!u) return false; applyUser(u); return true; }catch(e){ return false; }
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        syncAuthUsersBeforeLogin();
        AUTH_TABLE = getLoginCatalogRows();
        const username = String(usernameSel.value || '').trim();
        const password = String(document.getElementById('password').value || '').trim();
        if(!username){ loginError.textContent = '請選擇使用者'; return; }
        if(!password){ loginError.textContent = '請輸入密碼'; return; }
        loginError.textContent = '登入中…';
        try{
          const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(username));
          if(!u){ loginError.textContent = '查無此使用者（請到「系統 / 權限」新增）'; populateUserSelect(); return; }
          const pwHash = await sha256Hex(password);
          const baseline = getDefaultAuthTableLegacy(LEGACY_BUTTON_KEYS.length).find(r => canonUserKey(r.user) === canonUserKey(username));
          const ok = (u.passHash && pwHash === u.passHash) || (!!u.password && password === u.password) || (!!baseline && pwHash === String(baseline.passHash||'').trim().toLowerCase());
          if(!ok){ loginError.textContent = '密碼錯誤'; return; }
          setSession({ username:u.username, level:u.level });
          try{ localStorage.setItem(CURRENT_KEY, JSON.stringify({ user:u.username, role:u.level })); }catch(e){}
          setSSO({ username:u.username, level:u.level });
          applyUser(u);
          document.getElementById('password').value = '';
          loginError.textContent = '';
        }catch(err){
          loginError.textContent = '登入失敗：' + (err && err.message ? err.message : String(err));
        }
      });

      btnForceRelogin.addEventListener('click', ()=>{ clearSession(); loginSub.textContent = '請重新輸入密碼登入'; loginError.textContent=''; document.getElementById('password').value=''; showLogin(); document.getElementById('password').focus(); });
      btnSwitch.addEventListener('click', ()=>{ clearSession(); try{ localStorage.removeItem(CURRENT_KEY); }catch(e){} CURRENT_USER=null; showLogin(); });
      btnLogout.addEventListener('click', ()=>{ clearSession(); try{ localStorage.removeItem(SSO_KEY); }catch(e){} try{ sessionStorage.removeItem(SSO_KEY); sessionStorage.removeItem(SSO_NONCE_KEY); }catch(e){} try{ localStorage.removeItem(CURRENT_KEY); }catch(e){} CURRENT_USER=null; showLogin(); });
      btnTogglePwd.addEventListener('click', ()=>{ const pwd=document.getElementById('password'); pwd.type = (pwd.type === 'password') ? 'text' : 'password'; });
      btnExport.addEventListener('click', ()=>{ /* preserve button; no-op hotfix */ });

      // hotfix: ignore stale/invalid cloud auth payloads from old normal-window storage
      window.__TASUN_INDEX_AUTH_SANITIZER__ = function(raw){
        const sane = sanitizeAuthRows(parseAuthStorageRows(raw, LEGACY_BUTTON_KEYS.length), LEGACY_BUTTON_KEYS.length);
        persistAuthRows(sane, LEGACY_BUTTON_KEYS.length);
        return sane;
      };

      // initialize
      AUTH_TABLE = getLoginCatalogRows();
      buildMainButtonsDOM();
      if(!(tryAutoLoginSSO() || tryEnterBySessionSilently() || autoEnterIfSessionValid())) showLogin();
      document.body.classList.remove('booting');
    }

    setTimeout(()=>{ try{ runIndexApp(); }catch(_e){} }, 0);
    setTimeout(()=>{ try{ runIndexApp(); }catch(_e){} }, 1200);
  })();
  </script>

  <script>
  (function(){
    function forceLoginOverlay(){
      try{
        var overlay = document.getElementById('loginOverlay');
        if(!overlay) return;
        var hidden = getComputedStyle(overlay).display === 'none';
        var bodyLocked = document.body && document.body.classList.contains('locked');
        var noButtons = !document.querySelector('.nav-area .nav-btn:not([style*="display: none"])');
        if((bodyLocked || noButtons) && hidden){
          overlay.style.display = 'flex';
          document.body.classList.add('locked');
        }
      }catch(e){}
    }
    window.addEventListener('error', function(){ setTimeout(forceLoginOverlay, 30); });
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(forceLoginOverlay, 900); });
    window.addEventListener('load', function(){ setTimeout(forceLoginOverlay, 1200); });
  })();
  </script>
</body>
