      (function patchLocalStorageOnce(){
        try{
          if(window.__tasun_localstorage_patched__) return;

      async function verifyUserPassword(username, password){
        const wanted = String(username || '').trim().toLowerCase();
        const plain = String(password || '').trim();
        if(!wanted || !plain) return null;
        const pwHash = (await sha256Hex(plain)).toLowerCase();
        const candidates = AUTH_TABLE.filter(r => String(r.username || '').trim().toLowerCase() === wanted);
        for(const u of candidates){
          const storedHash = String(u.passHash || '').trim().toLowerCase();
          const storedPlain = String(u.password || u.pass || '').trim();
          if((storedHash && pwHash === storedHash) || (!!storedPlain && plain === storedPlain)) return u;
        }
        const fallbackHash = String(DEFAULT_AUTH_HASH[wanted] || '').trim().toLowerCase();
        if(fallbackHash && pwHash === fallbackHash){
          const matched = candidates[0] || { username: username, level: inferRole(username, '') };
          return Object.assign({}, matched, {
            username: String(matched.username || username).trim(),
            level: String(matched.level || matched.role || inferRole(username, '')).trim().toLowerCase() || 'read',
            passHash: fallbackHash
          });
        }
        return null;
      }



      function __tasunSaveLoginBridge(username, password, role){
        try{
          const nowIso = new Date().toISOString();
          const u = String(username || '').trim();
          const p = String(password || '');
          const r = String(role || '').trim().toLowerCase() || 'read';

          if(!u) return false;

          const userObj = {
            user: u,
            name: u,
            role: r,
            at: nowIso
          };

          const bridgeObj = {
            user: u,
            name: u,
            role: r,
            at: nowIso
          };

          try{ sessionStorage.setItem('tasunCurrentUser_v1', JSON.stringify(userObj)); }catch(e){}
          try{ localStorage.setItem('tasunCurrentUser_v1', JSON.stringify(userObj)); }catch(e){}
          try{ sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(bridgeObj)); }catch(e){}
          try{ localStorage.setItem('tasunSessionBridge_v1', JSON.stringify(bridgeObj)); }catch(e){}
          try{ sessionStorage.setItem('tasunIndexSession_v1', '1'); }catch(e){}
          try{ localStorage.setItem('tasunIndexSession_v1', '1'); }catch(e){}

          if(p){
            try{ sessionStorage.setItem('tasunLastLoginPass_v1', p); }catch(e){}
            try{ localStorage.setItem('tasunLastLoginPass_v1', p); }catch(e){}
            try{ sessionStorage.setItem('tasunLastLoginPass_v1__' + u, p); }catch(e){}
            try{ localStorage.setItem('tasunLastLoginPass_v1__' + u, p); }catch(e){}
          }

          return true;
        }catch(err){
          console.warn('save login bridge failed', err);
          return false;
        }
      }

      async function __tasunBridgeWorkerTokenNow(username, password, role){
        try{
          const user = String(username || '').trim();
          const pass = String(password || '').trim();
          const finalRole = String(role || 'read').trim().toLowerCase() || 'read';
          if(!user || !pass) return false;
          const apiBase = 'https://tasun-worker.wutasun.workers.dev';
          const res = await fetch(apiBase + '/api/tasun/login', {
            method:'POST',
            cache:'no-store',
            credentials:'include',
            headers:{ 'content-type':'application/json', 'accept':'application/json' },
            body: JSON.stringify({ username:user, password:pass, user:user, pass:pass })
          });
          if(!res.ok) return false;
          const json = await res.json().catch(() => ({}));
          const token = String(
            json.token || json.accessToken || json.authToken || json.bearer || json.workerToken || json.cloudToken || json.apiKey ||
            ((json.auth || {}).token || (json.auth || {}).accessToken || (json.auth || {}).authToken || (json.auth || {}).bearer || (json.auth || {}).apiKey) ||
            ((json.session || {}).token || (json.session || {}).accessToken || (json.session || {}).authToken || (json.session || {}).bearer || (json.session || {}).apiKey) ||
            ((json.data || {}).token || (json.data || {}).accessToken || (json.data || {}).authToken || (json.data || {}).bearer || (json.data || {}).apiKey) ||
            ((json.payload || {}).token || (json.payload || {}).accessToken || (json.payload || {}).authToken || (json.payload || {}).bearer || (json.payload || {}).apiKey) ||
            ''
          ).trim();
          if(!token) return false;

          const tokenKeys = [
            'tasunCloudToken_v1',
            'tasunCloudToken_v1__index',
            'tasunCloudToken_v1__auth-table',
            'tasunBearerToken_v1',
            'tasunAccessToken_v1',
            'tasunAuthToken_v1',
            'tasunSessionToken_v1',
            'tasun_token',
            'tasunToken',
            'tasun_auth_token',
            'authToken',
            'access_token',
            'token',
            'x-api-key',
            'tasunApiKey_v1'
          ];
          tokenKeys.forEach((k) => {
            try{ sessionStorage.setItem(k, token); }catch(e){}
            try{ localStorage.setItem(k, token); }catch(e){}
          });

          const bridge = { user:user, name:user, role:finalRole, token:token, accessToken:token, authToken:token, bearer:token, at:new Date().toISOString() };
          try{ sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(bridge)); }catch(e){}
          try{ localStorage.setItem('tasunSessionBridge_v1', JSON.stringify(bridge)); }catch(e){}
          return true;
        }catch(err){
          console.warn('worker token bridge failed', err);
          return false;
        }
      }

      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const username = (usernameSel && usernameSel.value ? String(usernameSel.value) : '').trim();
        const password = String(passwordInput ? passwordInput.value : '').trim();

        if(!username){
          loginError.textContent = '請選擇使用者';

        if(!password){

        loginError.textContent = '登入中…';

        try{
          repairKnownAuthSecrets();

              String(r.username || '').trim().toLowerCase() === String(username).trim().toLowerCase()
            );
            loginError.textContent = exists ? '密碼錯誤' : '查無此使用者（請到「系統 / 權限」新增）';
            return;
          }

          const finalRole = String(u.level || u.role || inferRole(u.username, '') || 'read').trim().toLowerCase();

          setSession({ username: u.username, level: finalRole });

          __tasunSaveLoginBridge(u.username, password, finalRole);
          await __tasunBridgeWorkerTokenNow(u.username, password, finalRole);

          applyUser(
            Object.assign({}, u, { level: finalRole }),
            { skipBroadcast:true }
          );

          loginError.textContent = '';

          if(passwordInput) passwordInput.value = '';
        }catch(err){
          loginError.textContent = '登入失敗：' + (err && err.message ? err.message : String(err));
        }
      });
      btnForceRelogin.addEventListener('click', () => { clearSession(); loginSub.textContent = '請重新輸入密碼登入'; loginError.textContent = ''; if(passwordInput) passwordInput.value = ''; try{ if(passwordInput) passwordInput.focus(); }catch(e){} scheduleAll(); });
      btnSwitch.addEventListener('click', () => { clearSession(); try{ localStorage.removeItem(CURRENT_KEY); }catch(e){} CURRENT_USER = null; showLogin(); scheduleExport('switchUser'); scheduleAll(); });
      btnTogglePwd.addEventListener('click', () => { if(passwordInput) passwordInput.type = (passwordInput.type === 'password') ? 'text' : 'password'; });
      if(btnLogout) btnLogout.addEventListener('click', () => { clearSession(); try{ localStorage.removeItem(CURRENT_KEY); }catch(e){} CURRENT_USER = null; showLogin(); try{ if(loginBootInline) loginBootInline.hidden = true; }catch(e){} scheduleExport('logout'); scheduleAll(); });
      btnExport.addEventListener('click', () => { exportBackupNow('manual:button', { download:true }); });
      window.addEventListener('resize', () => scheduleAll(), { passive:true });
      if(window.visualViewport) window.visualViewport.addEventListener('resize', () => scheduleAll(), { passive:true });
      document.addEventListener('visibilitychange', ()=>{
        if(document.visibilityState === 'visible'){
          scheduleAll();
          try{ if(cloudCtrl && cloudCtrl.pullNow) cloudCtrl.pullNow().catch(()=>{}); }catch(e){}
          syncAuthTableFromAuthority().catch(()=>{});
          if(!CURRENT_USER){ tryRestoreLogin(); }
        }
      }, { passive:true });
      window.addEventListener('focus', ()=>{ try{ if(cloudCtrl && cloudCtrl.pullNow) cloudCtrl.pullNow().catch(()=>{}); }catch(e){} try{ syncAuthTableFromAuthority().catch(()=>{}); }catch(e){} }, { passive:true });
      window.addEventListener('storage', (e)=>{
        if(!e) return;
        if(e.key === '__tasun_auth_sync__' && e.newValue){
          try{
            const msg = JSON.parse(e.newValue);
            if(msg && msg.tabId !== TAB_ID){
              if(msg.kind === 'logout'){ CURRENT_USER = null; forceLogoutAndShowLogin('已於其他分頁登出'); }
              else if(msg.kind === 'login' || msg.kind === 'state'){ tryRestoreLogin(); }
            }
          }catch(_e){}
          return;
        }
        if(e.storageArea !== localStorage) return;
        if(CLOUD_KEY_SET.has(String(e.key || ''))){ onIndexConfigApplied(); }
      });
      if(authChannel){
        authChannel.onmessage = function(ev){
          try{
            const msg = ev && ev.data;
            if(!msg || msg.tabId === TAB_ID) return;
            if(msg.kind === 'logout'){ CURRENT_USER = null; forceLogoutAndShowLogin('已於其他分頁登出'); }
            else if(msg.kind === 'login' || msg.kind === 'state'){ tryRestoreLogin(); }
          }catch(e){}
        };
      }
    }

    if(window.TasunLoader && typeof window.TasunLoader.ready === 'function'){
      try{ window.TasunLoader.ready(runIndexApp, 8000); }catch(_e){}
    }else if(window.TasunCore && typeof window.TasunCore.ready === 'function'){
      try{ window.TasunCore.ready(runIndexApp, 8000); }catch(_e){}
    }else{
      setTimeout(runIndexApp, 0);
    }
    setTimeout(()=>{ try{ runIndexApp(); }catch(_e){} }, 1200);
  })();
  });

  <!-- Tasun v5 正式收斂：首頁登入後同步橋接 Worker token 到子頁 -->
  <script>
(function(){
  'use strict';
  if (window.__TASUN_INDEX_WORKER_TOKEN_BRIDGE_PATCH_V1__) return;
  window.__TASUN_INDEX_WORKER_TOKEN_BRIDGE_PATCH_V1__ = true;

  var API_BASE = 'https://tasun-worker.wutasun.workers.dev';
  var CURRENT_KEY = 'tasunCurrentUser_v1';
  var LAST_LOGIN_PASS_KEY = 'tasunLastLoginPass_v1';
  var SESSION_KEY = 'tasunSessionLogin_v2';
  var TOKEN_KEYS = [
    'tasunCloudToken_v1',
    'tasunCloudToken_v1__index',
    'tasunCloudToken_v1__auth-table',
    'tasunBearerToken_v1',
    'tasunAccessToken_v1',
    'tasunAuthToken_v1',
    'tasunSessionToken_v1',
    'tasun_token',
    'tasunToken',
    'tasun_auth_token',
    'authToken',
    'access_token',
    'token',
    'x-api-key',
    'tasunApiKey_v1'
  ];

  function norm(v){ return String(v == null ? '' : v).trim(); }
  function nowISO(){ try{ return new Date().toISOString(); }catch(e){ return ''; } }
  function safeParse(raw){ try{ return JSON.parse(raw); }catch(e){ return null; } }
  function readStorage(storage, key){ try{ return storage.getItem(key) || ''; }catch(e){ return ''; } }
  function writeStorage(storage, key, value){ try{ storage.setItem(key, value); }catch(e){} }
  function removeStorage(storage, key){ try{ storage.removeItem(key); }catch(e){} }
  function readCookie(name){
    try{
      var esc = String(name || '').replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      var m = document.cookie.match(new RegExp('(?:^|; )' + esc + '=([^;]*)'));
      return m ? decodeURIComponent(m[1] || '') : '';
    }catch(e){ return ''; }
  }
  function readJSONKeys(keys){
    keys = Array.isArray(keys) ? keys : [];
    for(var i=0;i<keys.length;i++){
      var raw = readStorage(sessionStorage, keys[i]) || readStorage(localStorage, keys[i]);
      if(!raw) continue;
      var js = safeParse(raw);
      if(js && typeof js === 'object') return js;
    }
    return null;
  }
  function getCurrentUser(){
    var js = readJSONKeys([CURRENT_KEY, SESSION_KEY, 'tasunSessionBridge_v1', 'tasunSso_v2', 'tasunSso_v1', 'tasunCurrentUser_v2']);
    if(js && typeof js === 'object'){
      var user = norm(js.user || js.name || js.username || js.account);
      if(user) return { user:user, role:norm(js.role || js.level || 'read') || 'read' };
    }
    try{
      if(window.TasunAuthV4 && typeof window.TasunAuthV4.getCurrentUser === 'function'){
        var u = window.TasunAuthV4.getCurrentUser();
        var user2 = norm(u && (u.user || u.name || u.username));
        if(user2) return { user:user2, role:norm(u.role || u.level || 'read') || 'read' };
      }
    }catch(e){}
    return null;
  }
  function getLastPass(user){
    user = norm(user);
    return norm(
      (user ? readStorage(sessionStorage, LAST_LOGIN_PASS_KEY + '__' + user) : '') ||
      (user ? readStorage(localStorage,  LAST_LOGIN_PASS_KEY + '__' + user) : '') ||
      readStorage(sessionStorage, LAST_LOGIN_PASS_KEY) ||
      readStorage(localStorage, LAST_LOGIN_PASS_KEY)
    );
  }
  function extractToken(obj){
    if(!obj || typeof obj !== 'object') return '';
    return norm(
      obj.token || obj.accessToken || obj.authToken || obj.bearer || obj.workerToken || obj.cloudToken || obj.apiKey ||
      (obj.auth && (obj.auth.token || obj.auth.accessToken || obj.auth.authToken || obj.auth.bearer || obj.auth.apiKey)) ||
      (obj.session && (obj.session.token || obj.session.accessToken || obj.session.authToken || obj.session.bearer || obj.session.apiKey)) ||
      (obj.data && (obj.data.token || obj.data.accessToken || obj.data.authToken || obj.data.bearer || obj.data.apiKey)) ||
      (obj.payload && (obj.payload.token || obj.payload.accessToken || obj.payload.authToken || obj.payload.bearer || obj.payload.apiKey)) ||
      ''
    );
  }
  function getAnyToken(){
    for(var i=0;i<TOKEN_KEYS.length;i++){
      var v = norm(readStorage(sessionStorage, TOKEN_KEYS[i]) || readStorage(localStorage, TOKEN_KEYS[i]));
      if(v) return v;
    }
    var bridge = readJSONKeys(['tasunSessionBridge_v1', 'tasunSso_v2', 'tasunSso_v1', CURRENT_KEY, SESSION_KEY]);
    var t = extractToken(bridge);
    if(t) return t;
    try{
      if(window.TasunAuthV4 && typeof window.TasunAuthV4.getToken === 'function'){
        t = norm(window.TasunAuthV4.getToken() || '');
        if(t) return t;
      }
    }catch(e){}
    try{
      var ga = window.TasunGlobalAuth || window.tasunGlobalAuth || window.TASUN_AUTH || null;
      if(ga){
        t = norm(ga.token || ga.accessToken || ga.authToken || ga.apiKey || (typeof ga.getToken === 'function' ? ga.getToken() : '') || '');
        if(t) return t;
      }
    }catch(e){}
    return norm(readCookie('tasun_bearer_token') || readCookie('tasun_token') || readCookie('token') || readCookie('tasun_auth_token'));
  }
  function bridgeToken(token, user, role, password){
    token = norm(token);
    user = norm(user);
    role = norm(role || 'read') || 'read';
    if(!token || !user) return false;
    for(var i=0;i<TOKEN_KEYS.length;i++){
      writeStorage(sessionStorage, TOKEN_KEYS[i], token);
      writeStorage(localStorage, TOKEN_KEYS[i], token);
    }
    var bridge = { user:user, name:user, role:role, token:token, accessToken:token, authToken:token, bearer:token, at:nowISO() };
    writeStorage(sessionStorage, 'tasunSessionBridge_v1', JSON.stringify(bridge));
    writeStorage(localStorage, 'tasunSessionBridge_v1', JSON.stringify(bridge));
    writeStorage(sessionStorage, CURRENT_KEY, JSON.stringify({ user:user, name:user, role:role, at:nowISO() }));
    writeStorage(localStorage, CURRENT_KEY, JSON.stringify({ user:user, name:user, role:role, at:nowISO() }));
    if(password){
      writeStorage(sessionStorage, LAST_LOGIN_PASS_KEY, password);
      writeStorage(localStorage, LAST_LOGIN_PASS_KEY, password);
      writeStorage(sessionStorage, LAST_LOGIN_PASS_KEY + '__' + user, password);
      writeStorage(localStorage, LAST_LOGIN_PASS_KEY + '__' + user, password);
    }
    return true;
  }
  function clearBridgedToken(){
    for(var i=0;i<TOKEN_KEYS.length;i++){
      removeStorage(sessionStorage, TOKEN_KEYS[i]);
      removeStorage(localStorage, TOKEN_KEYS[i]);
    }
    try{
      var js = safeParse(readStorage(sessionStorage, 'tasunSessionBridge_v1')) || safeParse(readStorage(localStorage, 'tasunSessionBridge_v1'));
      if(js && typeof js === 'object'){
        delete js.token; delete js.accessToken; delete js.authToken; delete js.bearer; delete js.workerToken; delete js.cloudToken; delete js.apiKey;
        writeStorage(sessionStorage, 'tasunSessionBridge_v1', JSON.stringify(js));
        writeStorage(localStorage, 'tasunSessionBridge_v1', JSON.stringify(js));
      }
    }catch(e){}
  }
  async function workerLogin(user, password, role){
    user = norm(user); password = norm(password); role = norm(role || 'read') || 'read';
    if(!user || !password) return '';
    var res = await fetch(API_BASE + '/api/tasun/login', {
      method:'POST',
      cache:'no-store',
      credentials:'include',
      headers:{ 'content-type':'application/json', 'accept':'application/json' },
      body: JSON.stringify({ username:user, password:password, user:user, pass:password })
    });
    if(!res.ok){
      var txt = await res.text().catch(function(){ return ''; });
      throw new Error('worker login failed: ' + res.status + ' ' + String(txt).slice(0,200));
    }
    var json = await res.json().catch(function(){ return {}; });
    var token = extractToken(json);
    if(token) bridgeToken(token, user, norm(json.role || role) || role, password);
    return token;
  }
  function syncExistingTokenBridge(){
    var cur = getCurrentUser();
    if(!cur || !cur.user) return false;
    var token = getAnyToken();
    if(!token) return false;
    return bridgeToken(token, cur.user, cur.role, '');
  }
  var pendingCred = null;
  var inflight = false;
  async function ensureWorkerBridgeFromCred(cred){
    if(inflight) return false;
    inflight = true;
    try{
      cred = cred || pendingCred || {};
      var user = norm(cred.user);
      var role = norm(cred.role || 'read') || 'read';
      var pass = norm(cred.pass) || getLastPass(user);
      if(!user){
        var cur = getCurrentUser();
        user = norm(cur && cur.user);
        role = norm((cur && cur.role) || role || 'read') || 'read';
      }
      if(!user || !pass) return false;
      var token = getAnyToken();
      if(token){ bridgeToken(token, user, role, pass); return true; }
      token = await workerLogin(user, pass, role).catch(function(){ return ''; });
      return !!token;
    }finally{
      inflight = false;
    }
  }
  function queueEnsureBridge(cred, delay){
    pendingCred = cred || pendingCred;
    window.setTimeout(function(){ ensureWorkerBridgeFromCred(pendingCred).catch(function(){}); }, Number(delay || 0));
  }

  function installSubmitPatch(){
    var form = document.getElementById('loginForm');
    var usernameSel = document.getElementById('username');
    var passwordInput = document.getElementById('password');
    if(!form || !usernameSel || !passwordInput) return false;
    form.addEventListener('submit', function(){
      pendingCred = {
        user: norm(usernameSel.value),
        pass: String(passwordInput.value || ''),
        role: norm((getCurrentUser() || {}).role || 'read') || 'read'
      };
      queueEnsureBridge(pendingCred, 80);
      queueEnsureBridge(pendingCred, 500);
      queueEnsureBridge(pendingCred, 1200);
    }, true);
    return true;
  }
  function installLogoutPatch(){
    ['btnLogout','btnSwitchUser','btnForceRelogin'].forEach(function(id){
      var el = document.getElementById(id);
      if(!el) return;
      el.addEventListener('click', function(){ clearBridgedToken(); }, true);
    });
  }
  function boot(){
    installSubmitPatch();
    installLogoutPatch();
    syncExistingTokenBridge();
    var cur = getCurrentUser();
    if(cur && cur.user){ queueEnsureBridge({ user:cur.user, role:cur.role, pass:getLastPass(cur.user) }, 300); }
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once:true });
