        const candidates = AUTH_TABLE.filter(r => String(r.username || '').trim().toLowerCase() === wanted);
        for(const u of candidates){
          const storedHash = String(u.passHash || '').trim().toLowerCase();
          const storedPlain = String(u.password || u.pass || '').trim();
          if((storedHash && pwHash === storedHash) || (!!storedPlain && plain === storedPlain)) return u;
        }
        const fallbackHash = String(DEFAULT_AUTH_HASH[wanted] || '').trim().toLowerCase();
        if(fallbackHash && pwHash === fallbackHash){
          const matched = candidates[0] || { username: username, level: inferRole(username, '') };
          return Object.assign({}, matched, {
            username: String(matched.username || username).trim(),
            level: String(matched.level || matched.role || inferRole(username, '')).trim().toLowerCase() || 'read',
            passHash: fallbackHash
          });
        }
        return null;
      }

<script id="tasun-v5-buttons-fallback-script">
(function(){
  function applyButtonsFallback(){
    try{
      var navArea = document.getElementById('navArea');
      if(!navArea) return;
      var btns = Array.from(navArea.querySelectorAll('.nav-btn'));
      if(!btns.length) return;
      var bodyLocked = !!(document.body && document.body.classList.contains('locked'));
      var loginOverlay = document.getElementById('loginOverlay');
      var loginShowing = !!(loginOverlay && getComputedStyle(loginOverlay).display !== 'none');
      if(bodyLocked || loginShowing){
        btns.forEach(function(btn){
          btn.style.display = 'none';
          btn.style.opacity = '0';
          btn.style.visibility = 'hidden';
          btn.style.pointerEvents = 'none';
        });
        return;
      }
      var userRaw = sessionStorage.getItem('tasunCurrentUser_v1') || localStorage.getItem('tasunCurrentUser_v1') || '{}';
      var user = {};
      try{ user = JSON.parse(userRaw) || {}; }catch(e){}
      var role = String(user.role || user.level || '').trim().toLowerCase();
      if(!role){
        var sessRaw = sessionStorage.getItem('tasunSessionLogin_v2') || '{}';
        try{ var sess = JSON.parse(sessRaw) || {}; role = String(sess.role || '').trim().toLowerCase(); }catch(e){}
      }
      if(!role) return;
      btns.forEach(function(btn){
        var isSystem = btn.id === 'systemBtn' || btn.dataset.sourceId === 'auth';
        btn.style.display = (isSystem && role !== 'admin') ? 'none' : 'flex';
      });
      if (typeof window.scheduleAll === 'function') { try{ window.scheduleAll(); }catch(e){} }
    }catch(e){}
  }
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(applyButtonsFallback, 400); setTimeout(applyButtonsFallback, 1200); });
  window.addEventListener('load', function(){ setTimeout(applyButtonsFallback, 300); setTimeout(applyButtonsFallback, 1500); });
  window.addEventListener('storage', function(){ setTimeout(applyButtonsFallback, 120); });
})();
</script>
