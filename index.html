<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tasun · 首頁</title>

  <!-- 你若想手動指定 apiBase，也可用這個 meta（會被 query/localStorage 覆寫） -->
  <!-- <meta name="tasun-api-base" content="https://YOUR-WORKER-DOMAIN"> -->

  <style>
    :root{
      --bg0:#050608; --bg1:#0c0f14;
      --gold:#d7b56d; --gold2:#f3d9a0;
      --paper: rgba(255,255,255,.06);
      --paper2: rgba(255,255,255,.10);
      --shadow: 0 10px 30px rgba(0,0,0,.55);
      --danger:#ff6b6b; --ok:#35d07f; --warn:#ffcc66;
      --radius: 18px;
      --titleSize: clamp(22px, 2.6vw, 34px);
      --textSize: clamp(14px, 1.2vw, 16px);
    }

    html,body{height:100%; margin:0; font-family: "Noto Sans TC", system-ui, -apple-system, Segoe UI, Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif; color:#eae7df;}
    body{
      background:
        radial-gradient(1200px 800px at 70% 20%, rgba(215,181,109,.13), transparent 60%),
        radial-gradient(900px 700px at 20% 80%, rgba(243,217,160,.08), transparent 60%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      overflow-x:hidden;
    }

    /* 主視覺（保留你原本全螢幕禪風感，避免大改 UI） */
    .stage{
      min-height:100%;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:32px 18px 80px;
      position:relative;
    }
    .lotus{
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 550px at 50% 45%, rgba(215,181,109,.10), transparent 60%),
        radial-gradient(700px 450px at 52% 48%, rgba(255,255,255,.06), transparent 62%);
      pointer-events:none;
      filter: blur(.2px);
    }

    /* 頂部狀態列 */
    .topbar{
      position:fixed;
      top:14px; left:14px; right:14px;
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:space-between;
      z-index:30;
    }
    .chip{
      display:flex; align-items:center; gap:10px;
      background: rgba(0,0,0,.35);
      border:1px solid rgba(215,181,109,.22);
      box-shadow: var(--shadow);
      border-radius: 999px;
      padding: 10px 12px;
      backdrop-filter: blur(10px);
    }
    .chip .k{opacity:.75; font-size:12px;}
    .chip .v{font-weight:700; color: var(--gold2); font-size:13px;}
    .btn{
      border:1px solid rgba(215,181,109,.26);
      background: rgba(255,255,255,.06);
      color:#f2ead9;
      padding: 9px 12px;
      border-radius: 999px;
      cursor:pointer;
      font-weight:700;
      transition:.15s;
      user-select:none;
    }
    .btn:hover{ background: rgba(255,255,255,.10); transform: translateY(-1px);}
    .btn:active{ transform: translateY(0px); }
    .btn.danger{ border-color: rgba(255,107,107,.35); }
    .btn.danger:hover{ background: rgba(255,107,107,.12); }

    /* 主卡片 */
    .card{
      width:min(980px, 100%);
      background: linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      border:1px solid rgba(215,181,109,.22);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      padding: 26px 22px 22px;
      position:relative;
      overflow:hidden;
    }
    .title{
      font-size: var(--titleSize);
      letter-spacing:.18em;
      margin: 0 0 6px;
      color: var(--gold2);
      text-shadow: 0 0 18px rgba(215,181,109,.25);
    }
    .subtitle{
      margin: 0 0 18px;
      font-size: var(--textSize);
      opacity:.85;
      line-height:1.65;
    }

    /* 六顆按鈕 */
    .grid{
      display:grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 14px;
    }
    @media (max-width: 760px){
      .grid{ grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 420px){
      .grid{ grid-template-columns: 1fr; }
    }
    .nav-btn{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height: 72px;
      border-radius: 20px;
      border:1px solid rgba(215,181,109,.20);
      background: rgba(0,0,0,.22);
      color:#f6f1e6;
      font-weight:800;
      letter-spacing:.08em;
      cursor:pointer;
      transition:.15s;
      box-shadow: 0 8px 18px rgba(0,0,0,.32);
      text-decoration:none;
      user-select:none;
    }
    .nav-btn:hover{ transform: translateY(-2px); background: rgba(0,0,0,.28); }
    .nav-btn:active{ transform: translateY(0px); }

    .foot{
      margin-top: 16px;
      display:flex;
      flex-wrap:wrap;
      gap:10px 12px;
      align-items:center;
      justify-content:space-between;
      font-size:12px;
      opacity:.85;
    }
    .mono{ font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }

    /* 登入遮罩 */
    .mask{
      position:fixed; inset:0;
      background: rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
      padding: 24px 14px;
      backdrop-filter: blur(8px);
    }
    .mask.show{ display:flex; }
    .login{
      width:min(520px, 100%);
      border-radius: 22px;
      border:1px solid rgba(215,181,109,.24);
      background: linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.06));
      box-shadow: var(--shadow);
      padding: 18px 16px 14px;
    }
    .login h3{
      margin: 4px 4px 10px;
      color: var(--gold2);
      letter-spacing:.12em;
      text-shadow: 0 0 14px rgba(215,181,109,.22);
    }
    .row{ display:flex; gap:10px; margin: 10px 4px; }
    .col{ flex:1; }
    label{ display:block; font-size:12px; opacity:.8; margin: 0 0 6px; }
    input{
      width:100%;
      box-sizing:border-box;
      border-radius: 14px;
      border:1px solid rgba(215,181,109,.18);
      background: rgba(0,0,0,.24);
      color:#f4efe4;
      padding: 11px 12px;
      outline:none;
      font-size:14px;
    }
    input:focus{ border-color: rgba(243,217,160,.55); box-shadow: 0 0 0 3px rgba(215,181,109,.12); }
    .hint{
      margin: 6px 4px 0;
      font-size:12px;
      line-height:1.55;
      opacity:.9;
    }
    .msg{
      margin: 10px 4px 0;
      padding: 10px 12px;
      border-radius: 14px;
      border:1px solid rgba(255,255,255,.10);
      background: rgba(0,0,0,.22);
      font-size:12px;
      line-height:1.55;
    }
    .msg.ok{ border-color: rgba(53,208,127,.35); }
    .msg.warn{ border-color: rgba(255,204,102,.40); }
    .msg.bad{ border-color: rgba(255,107,107,.40); }
    .actions{
      display:flex;
      gap:10px;
      justify-content:flex-end;
      margin: 12px 4px 2px;
      flex-wrap:wrap;
    }
  </style>
</head>

<body>
  <!-- 頂部狀態列 -->
  <div class="topbar">
    <div class="chip">
      <div class="k">目前使用者</div>
      <div class="v" id="who">未登入</div>
      <div class="k">角色</div>
      <div class="v" id="role">-</div>
    </div>

    <div class="chip" style="gap:8px;">
      <button class="btn" id="btnSwitch">切換帳號</button>
      <button class="btn danger" id="btnLogout" style="display:none;">登出</button>
    </div>
  </div>

  <!-- 主舞台 -->
  <div class="stage">
    <div class="lotus"></div>

    <div class="card">
      <h1 class="title">空 無 明</h1>
      <p class="subtitle">
        Tasun · B 架構最終強化版（自動偵測 apiBase · 強化登入提示 · SHA-256 密碼不存明碼 · 防呆機制）
      </p>

      <div class="grid">
        <a class="nav-btn" href="臻鼎管理表.html" data-roles="admin,write,read" id="nav1">1 號按鈕</a>
        <a class="nav-btn" href="工程資料庫.html" data-roles="admin,write,read" id="nav2">2 號按鈕</a>
        <a class="nav-btn" href="#" data-roles="admin,write" id="nav3">3 號按鈕</a>
        <a class="nav-btn" href="#" data-roles="admin,write" id="nav4">4 號按鈕</a>
        <a class="nav-btn" href="#" data-roles="admin" id="nav5">5 號按鈕</a>

        <!-- 第 6 顆：權限表（固定 admin 才顯示） -->
        <a class="nav-btn" href="權限表.html" data-roles="admin" id="nav6">權 限 表</a>
      </div>

      <div class="foot">
        <div>apiBase：<span class="mono" id="apiBaseText">偵測中…</span></div>
        <div>狀態：<span class="mono" id="statusText">初始化…</span></div>
      </div>
    </div>
  </div>

  <!-- 登入遮罩 -->
  <div class="mask" id="mask">
    <div class="login">
      <h3>登入</h3>

      <div class="row">
        <div class="col">
          <label for="u">帳號</label>
          <input id="u" autocomplete="username" inputmode="text" placeholder="例如：alex" />
        </div>
        <div class="col">
          <label for="p">密碼</label>
          <input id="p" type="password" autocomplete="current-password" placeholder="請輸入密碼" />
        </div>
      </div>

      <div class="hint" id="envHint">
        環境：<span class="mono" id="envText">-</span><br/>
        提示：<span class="mono">CapsLock</span> 開啟會影響密碼；連續錯誤會短暫鎖定。
      </div>

      <div class="msg warn" id="msg" style="display:none;"></div>

      <div class="actions">
        <button class="btn" id="btnInitAdmin" title="第一次使用，建立/重設 admin 密碼">建立/重設 admin</button>
        <button class="btn" id="btnLogin">登入</button>
        <button class="btn danger" id="btnCancel">取消</button>
      </div>
    </div>
  </div>

<script>
/**
 * Tasun B 架構最終強化版（前端）
 * - 自動偵測 apiBase：?apiBase= > localStorage 覆寫 > tasun-resources.json > meta > fallback 同源
 * - localStorage：AUTH_KEY / CURRENT_KEY
 * - 密碼：SHA-256(salt + password)；不存明碼
 * - 防呆：欄位檢查、錯誤節流/鎖定、CapsLock 提示、避免暴力嘗試
 */

(() => {
  'use strict';

  const AUTH_KEY = 'tasunAuthTable_v2';        // v2：hash+salt（不存明碼）
  const CURRENT_KEY = 'tasunCurrentUser_v2';   // v2：登入狀態
  const API_OVERRIDE_KEY = 'tasunApiBase_override_v1';

  // 你原本有 btn1–btn5 控制顯示；第 6 顆固定 admin 顯示
  const BTN_KEYS = ['btn1','btn2','btn3','btn4','btn5'];

  const $ = (sel) => document.querySelector(sel);

  const elWho = $('#who');
  const elRole = $('#role');
  const elApiBaseText = $('#apiBaseText');
  const elStatusText = $('#statusText');
  const elMask = $('#mask');
  const elMsg = $('#msg');
  const elEnvText = $('#envText');

  const elU = $('#u');
  const elP = $('#p');

  const btnSwitch = $('#btnSwitch');
  const btnLogout = $('#btnLogout');
  const btnLogin = $('#btnLogin');
  const btnCancel = $('#btnCancel');
  const btnInitAdmin = $('#btnInitAdmin');

  // ---- utils ----
  const sleep = (ms) => new Promise(r => setTimeout(r, ms));

  function nowISO(){ return new Date().toISOString(); }

  function safeJsonParse(s, fallback){
    try { return JSON.parse(s); } catch { return fallback; }
  }

  function getQueryParam(name){
    const u = new URL(location.href);
    const v = u.searchParams.get(name);
    return v && v.trim() ? v.trim() : '';
  }

  function setStatus(s){ elStatusText.textContent = s; }

  function showMsg(text, type='warn'){
    elMsg.style.display = '';
    elMsg.className = 'msg ' + (type || 'warn');
    elMsg.textContent = text;
  }

  function hideMsg(){
    elMsg.style.display = 'none';
    elMsg.textContent = '';
  }

  function showMask(){
    hideMsg();
    elMask.classList.add('show');
    setTimeout(() => elU.focus(), 30);
  }

  function hideMask(){
    elMask.classList.remove('show');
  }

  function normalizeUserId(s){
    return String(s || '').trim().toLowerCase();
  }

  function randomHex(bytes=16){
    const a = new Uint8Array(bytes);
    crypto.getRandomValues(a);
    return Array.from(a).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function sha256Hex(text){
    const enc = new TextEncoder().encode(text);
    const buf = await crypto.subtle.digest('SHA-256', enc);
    const bytes = new Uint8Array(buf);
    return Array.from(bytes).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  // ---- apiBase auto detect ----
  async function detectApiBase(){
    // 1) query param
    const qp = getQueryParam('apiBase');
    if (qp) return qp.replace(/\/+$/,'');

    // 2) localStorage override
    const ov = localStorage.getItem(API_OVERRIDE_KEY);
    if (ov && ov.trim()) return ov.trim().replace(/\/+$/,'');

    // 3) try tasun-resources.json
    try{
      const r = await fetch('./tasun-resources.json', { cache: 'no-store' });
      if (r.ok){
        const j = await r.json();
        // 你若有既定格式（例如 j.API_BASE 或 j.apiBase），都會吃得到
        const v = (j && (j.API_BASE || j.apiBase || j.api_base)) ? (j.API_BASE || j.apiBase || j.api_base) : '';
        if (v && String(v).trim()) return String(v).trim().replace(/\/+$/,'');
      }
    }catch{ /* ignore */ }

    // 4) meta
    const meta = document.querySelector('meta[name="tasun-api-base"]');
    if (meta && meta.content && meta.content.trim()) return meta.content.trim().replace(/\/+$/,'');

    // 5) fallback same origin
    return location.origin;
  }

  // ---- auth storage ----
  function loadAuthTable(){
    const raw = localStorage.getItem(AUTH_KEY);
    const obj = safeJsonParse(raw, null);
    if (obj && obj.version === 2 && obj.users && typeof obj.users === 'object') return obj;
    return null;
  }

  function saveAuthTable(t){
    localStorage.setItem(AUTH_KEY, JSON.stringify(t));
  }

  function loadCurrent(){
    const raw = localStorage.getItem(CURRENT_KEY);
    const obj = safeJsonParse(raw, null);
    if (obj && obj.uid && obj.role) return obj;
    return null;
  }

  function saveCurrent(c){
    localStorage.setItem(CURRENT_KEY, JSON.stringify(c));
  }

  function clearCurrent(){
    localStorage.removeItem(CURRENT_KEY);
  }

  function ensureAuthTable(){
    // 如果不存在，就建立一份「預設帳號（沒有明碼，第一次需設定密碼）」的表
    let t = loadAuthTable();
    if (t) return t;

    // 預設角色與按鈕權限（可在權限表頁 admin 編輯）
    // 注意：這裡不放明碼；hash 先留空，要求 admin 初始化
    t = {
      version: 2,
      updatedAt: nowISO(),
      users: {
        alex:  { role:'admin', salt: randomHex(16), passHash:'', btn:{btn1:true,btn2:true,btn3:true,btn4:true,btn5:true} },
        tasun: { role:'write', salt: randomHex(16), passHash:'', btn:{btn1:true,btn2:true,btn3:true,btn4:true,btn5:false} },
        wu:    { role:'read',  salt: randomHex(16), passHash:'', btn:{btn1:true,btn2:true,btn3:false,btn4:false,btn5:false} },
      }
    };
    saveAuthTable(t);
    return t;
  }

  function applyRoleVisibility(role){
    // 依 data-roles 控制顯示
    document.querySelectorAll('[data-roles]').forEach(el => {
      const allow = (el.getAttribute('data-roles') || '')
        .split(',')
        .map(s => s.trim())
        .filter(Boolean);
      el.style.display = allow.includes(role) ? '' : 'none';
    });
  }

  function applyBtnVisibilityByAuth(uid){
    // 依權限表 btn1–btn5 控制顯示；第6顆依 data-roles 已是 admin only
    const t = ensureAuthTable();
    const u = t.users[uid];
    if (!u) return;

    BTN_KEYS.forEach((k, idx) => {
      const el = document.getElementById('nav' + (idx+1));
      if (!el) return;
      const enabled = !!(u.btn && u.btn[k]);
      el.style.display = enabled ? '' : 'none';
    });
  }

  // ---- login guards ----
  const guard = {
    failCount: 0,
    lockUntil: 0,
    lastFailAt: 0,
  };

  function isLocked(){
    return Date.now() < guard.lockUntil;
  }

  function bumpFail(){
    guard.failCount++;
    guard.lastFailAt = Date.now();

    // 漸進鎖定：3 次→3s、5 次→10s、8 次→30s
    if (guard.failCount >= 8) guard.lockUntil = Date.now() + 30000;
    else if (guard.failCount >= 5) guard.lockUntil = Date.now() + 10000;
    else if (guard.failCount >= 3) guard.lockUntil = Date.now() + 3000;
  }

  function resetFail(){
    guard.failCount = 0;
    guard.lockUntil = 0;
    guard.lastFailAt = 0;
  }

  async function verifyPassword(uid, password){
    const t = ensureAuthTable();
    const rec = t.users[uid];
    if (!rec) return { ok:false, reason:'帳號不存在' };

    if (!rec.passHash){
      return { ok:false, reason:'此帳號尚未設定密碼，請先用「建立/重設 admin」或到權限表由 admin 設定。' };
    }

    const hash = await sha256Hex(rec.salt + password);
    if (hash !== rec.passHash) return { ok:false, reason:'密碼錯誤' };

    return { ok:true, role: rec.role };
  }

  function renderCurrent(){
    const cur = loadCurrent();
    if (!cur){
      elWho.textContent = '未登入';
      elRole.textContent = '-';
      btnLogout.style.display = 'none';
      applyRoleVisibility('none');
      // nav1~nav5 先全隱（避免未登入看到）
      document.querySelectorAll('.nav-btn').forEach(a => a.style.display = 'none');
      return;
    }

    elWho.textContent = cur.uid;
    elRole.textContent = cur.role;
    btnLogout.style.display = '';
    applyRoleVisibility(cur.role);
    applyBtnVisibilityByAuth(cur.uid);
  }

  async function doLogin(){
    hideMsg();

    if (isLocked()){
      const sec = Math.ceil((guard.lockUntil - Date.now())/1000);
      showMsg(`連續錯誤過多，暫時鎖定 ${sec} 秒後再試。`, 'bad');
      return;
    }

    const uid = normalizeUserId(elU.value);
    const pwd = String(elP.value || '');

    if (!uid){
      showMsg('請輸入帳號。', 'warn');
      elU.focus(); return;
    }
    if (!pwd || pwd.length < 4){
      showMsg('請輸入密碼（至少 4 碼）。', 'warn');
      elP.focus(); return;
    }

    setStatus('驗證登入…');

    const res = await verifyPassword(uid, pwd);
    if (!res.ok){
      bumpFail();
      const lockedNote = isLocked() ? `（已鎖定 ${Math.ceil((guard.lockUntil-Date.now())/1000)} 秒）` : '';
      showMsg(`${res.reason} ${lockedNote}`.trim(), 'bad');
      setStatus('登入失敗');
      return;
    }

    resetFail();
    saveCurrent({ uid, role: res.role, loginAt: nowISO() });
    elP.value = '';
    hideMask();
    renderCurrent();
    setStatus('已登入');
  }

  function doLogout(){
    clearCurrent();
    renderCurrent();
    showMask();
    setStatus('已登出');
  }

  // 建立/重設 admin（不存明碼：存 salt+pass 的 sha256）
  async function initOrResetAdmin(){
    hideMsg();
    const t = ensureAuthTable();

    // 只允許在「未登入」或「已登入且為 admin」時操作
    const cur = loadCurrent();
    if (cur && cur.role !== 'admin'){
      showMsg('只有 admin 可以重設 admin 密碼。', 'bad');
      return;
    }

    // 用 prompt 做最小改動；你若想要更漂亮的 UI 也可再改
    const p1 = prompt('請輸入新的 admin 密碼（至少 6 碼）：');
    if (p1 === null) return;
    if (String(p1).length < 6){
      showMsg('密碼長度不足（至少 6 碼）。', 'bad');
      return;
    }
    const p2 = prompt('請再輸入一次確認：');
    if (p2 === null) return;
    if (p1 !== p2){
      showMsg('兩次輸入不一致。', 'bad');
      return;
    }

    const admin = t.users.alex || (t.users.alex = { role:'admin', salt: randomHex(16), passHash:'', btn:{btn1:true,btn2:true,btn3:true,btn4:true,btn5:true} });
    admin.role = 'admin';
    if (!admin.salt) admin.salt = randomHex(16);
    admin.passHash = await sha256Hex(admin.salt + p1);

    t.updatedAt = nowISO();
    saveAuthTable(t);

    showMsg('已建立/重設 admin 密碼完成。請用 admin 帳號登入。', 'ok');
    setStatus('admin 已設定');
  }

  // CapsLock 偵測（提升提示）
  function wireCapsLockHint(){
    elP.addEventListener('keydown', (e) => {
      const caps = e.getModifierState && e.getModifierState('CapsLock');
      if (caps){
        showMsg('CapsLock 目前為「開啟」狀態，可能導致密碼輸入錯誤。', 'warn');
      }
    });
  }

  // ---- boot ----
  async function boot(){
    setStatus('偵測 apiBase…');
    const apiBase = await detectApiBase();
    elApiBaseText.textContent = apiBase;
    elEnvText.textContent = `${location.origin}  |  apiBase=${apiBase}`;

    ensureAuthTable();

    // 若沒登入，直接要求登入（可依你需求改成「允許 read 免登入」之類）
    const cur = loadCurrent();
    renderCurrent();

    if (!cur) showMask();
    else setStatus('已登入');

    // events
    btnSwitch.addEventListener('click', () => showMask());
    btnLogout.addEventListener('click', () => doLogout());
    btnCancel.addEventListener('click', () => hideMask());
    btnLogin.addEventListener('click', () => doLogin());
    btnInitAdmin.addEventListener('click', () => initOrResetAdmin());

    elP.addEventListener('keyup', (e) => { if (e.key === 'Enter') doLogin(); });
    elU.addEventListener('keyup', (e) => { if (e.key === 'Enter') elP.focus(); });

    wireCapsLockHint();

    setStatus('就緒');
  }

  boot().catch(err => {
    console.error(err);
    setStatus('初始化失敗');
    showMsg('初始化失敗，請開啟 DevTools 查看錯誤。', 'bad');
  });

})();
</script>
</body>
</html>
