      function fitButtonLabels(btns){
        try{
          const list = Array.isArray(btns) ? btns : [];
          if(!list.length) return;
          let longest = 0;
          list.forEach((btn)=>{
            const span = btn ? btn.querySelector('span') : null;
            if(span) longest = Math.max(longest, String(span.textContent || '').trim().length);
          });
          list.forEach((btn)=>{
            const span = btn ? btn.querySelector('span') : null;
            if(!span) return;
            span.style.fontSize = '';
            const br = btn.getBoundingClientRect();
            const w = Math.max(1, br.width);
            const h = Math.max(1, br.height);
            const innerW = Math.max(40, w - Math.max(28, Math.round(w * 0.14)));
            const innerH = Math.max(18, h - Math.max(14, Math.round(h * 0.30)));
            const maxPx = clamp(Math.round(Math.min(h * 0.40, w * 0.10)), 15, 32);
            const minPx = clamp(Math.round(maxPx - 10 - Math.max(0, (longest - 9) * 0.7)), 11, 18);
            let lo = minPx, hi = maxPx, best = minPx;
            for(let i = 0; i < 10; i++){
              const mid = Math.round((lo + hi) / 2);
              span.style.fontSize = mid + 'px';
              const fits = span.scrollWidth <= innerW + 1 && span.scrollHeight <= innerH + 1;
              if(fits){ best = mid; lo = mid + 1; } else { hi = mid - 1; }

            span.style.fontSize = best + 'px';

        }catch(e){}

      async function verifyUserPassword(username, password){
        const wanted = String(username || '').trim().toLowerCase();
        const plain = String(password || '').trim();
        if(!wanted || !plain) return null;
        const pwHash = (await sha256Hex(plain)).toLowerCase();
        const candidates = AUTH_TABLE.filter(r => String(r.username || '').trim().toLowerCase() === wanted);
        for(const u of candidates){
          const storedHash = String(u.passHash || '').trim().toLowerCase();
          const storedPlain = String(u.password || u.pass || '').trim();
          if((storedHash && pwHash === storedHash) || (!!storedPlain && plain === storedPlain)) return u;
        }
        const fallbackHash = String(DEFAULT_AUTH_HASH[wanted] || '').trim().toLowerCase();
        if(fallbackHash && pwHash === fallbackHash){
          const matched = candidates[0] || { username: username, level: inferRole(username, '') };
          return Object.assign({}, matched, {
            username: String(matched.username || username).trim(),
            level: String(matched.level || matched.role || inferRole(username, '')).trim().toLowerCase() || 'read',
            passHash: fallbackHash
          });
        }
        return null;
      }

            ((json.session || {}).token || (json.session || {}).accessToken || (json.session || {}).authToken || (json.session || {}).bearer || (json.session || {}).apiKey) ||

    try{

      if(cur && cur.user){
        sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(cur));
        localStorage.setItem('tasunSessionBridge_v1', JSON.stringify(cur));
      }
    }catch(e){}
    var tokenKeys = ['tasunCloudToken_v1','tasunCloudToken_v1__sxdh-notes','tasunCloudToken_v1__auth-table','tasunBearerToken_v1','tasunAccessToken_v1','tasunAuthToken_v1','tasunSessionToken_v1','tasun_token','tasunToken','tasun_auth_token','authToken','access_token','token','x-api-key','tasunApiKey_v1'];
    try{
      var token = '';
      for(var i=0;i<tokenKeys.length;i++){
        token = String(sessionStorage.getItem(tokenKeys[i]) || localStorage.getItem(tokenKeys[i]) || '').trim();
        if(token) break;
      }
      if(token){
        tokenKeys.forEach(function(k){
          try{ sessionStorage.setItem(k, token); }catch(e){}
          try{ localStorage.setItem(k, token); }catch(e){}
        });
      }
    }catch(e){}
  }
  function patchAnchors(){
    document.querySelectorAll('a[href]').forEach(function(a){
      var href = a.getAttribute('href') || '';
      if(!href || href === '#' || /^https?:\/\//i.test(href) || /^mailto:/i.test(href) || /^tel:/i.test(href) || a.target === '_blank') return;
      a.setAttribute('href', withV(href));
      a.addEventListener('click', function(ev){
        try{
          persistNavBridgeToChild(href);
          if(!/^https?:\/\//i.test(href) && !/^mailto:/i.test(href) && !/^tel:/i.test(href)){
            ev.preventDefault();
            try{ sessionStorage.setItem('tasun_child_jump_lock_v1', href); }catch(_e){}
            try{ localStorage.setItem('tasun_child_jump_lock_v1', href); }catch(_e){}
            window.location.assign(withV(href));
          }
        }catch(e){}
      }, true);
    });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function(){ syncBridge(); patchAnchors(); }, {once:true});
  else { syncBridge(); patchAnchors(); }
})();
</script>
