      if(btnLogout) btnLogout.addEventListener("click", ()=>{ clearSession(); try{ localStorage.removeItem(CURRENT_KEY); }catch(e){} CURRENT_USER=null; showLogin(); scheduleExport("logout"); scheduleAll(); });
      btnTogglePwd.addEventListener("click", ()=>{ if(loginPass) loginPass.type = (loginPass.type === "password") ? "text" : "password"; });
      btnExport.addEventListener("click", ()=>{ exportBackupNow("manual:button", {download:true}); });
      window.addEventListener("resize", ()=>scheduleAll(), {passive:true});
      if(window.visualViewport) window.visualViewport.addEventListener("resize", ()=>scheduleAll(), {passive:true});
    }

    if(window.TasunLoader && typeof window.TasunLoader.ready === "function"){
      try{ window.TasunLoader.ready(runIndexApp, 8000); }catch(e){}
    }else if(window.TasunCore && typeof window.TasunCore.ready === "function"){
      try{ window.TasunCore.ready(runIndexApp, 8000); }catch(e){}
    }else{
      setTimeout(runIndexApp, 0);
    }
    setTimeout(()=>{ try{ runIndexApp(); }catch(e){} }, 1200);
  })();
  </script>

  <script>
  (function(){
    function forceLoginOverlay(){
      try{
        var overlay = document.getElementById('loginOverlay');
        if(!overlay) return;
        var hidden = getComputedStyle(overlay).display === 'none';
        var bodyLocked = document.body && document.body.classList.contains('locked');
        var noButtons = !document.querySelector('.nav-area .nav-btn:not([style*="display: none"])');
        var authOk = document.body && document.body.classList.contains('auth-ok');
        if(!authOk && (bodyLocked || noButtons || hidden)){
          overlay.style.display = 'flex';
          document.body.classList.remove('auth-ok');
          document.body.classList.add('locked');
        }
      }catch(e){}
    }
    window.addEventListener('error', function(){ setTimeout(forceLoginOverlay, 30); });
    document.addEventListener('DOMContentLoaded', function(){ setTimeout(forceLoginOverlay, 900); });
    window.addEventListener('load', function(){ setTimeout(forceLoginOverlay, 1200); });
  })();
  </script>

  <script>
  (function(){
    "use strict";
    const INDEX_SESSION_KEY = "tasunIndexSessionAuthed_v1";
    const SESSION_KEY = "tasunSessionLogin_v1";
    const CURRENT_KEY = "tasunCurrentUser_v1";
    const SSO_KEY = "tasunSso_v1";
    const BRIDGE_KEY = "tasunSessionBridge_v1";
    const COOKIE_NAMES = ["tasun_session_v3","tasun_session_v2","tasun_session_v1"];

    function clearCookie(name){
      try{
        document.cookie = name + "=; Path=/; Max-Age=0; SameSite=Lax";
        document.cookie = name + "=; Path=/; Max-Age=0; SameSite=Lax; Secure";
      }catch(e){}
    }

    function hasStrictIndexSession(){
      try{
        return sessionStorage.getItem(INDEX_SESSION_KEY) === "1" && !!sessionStorage.getItem(SESSION_KEY);
      }catch(e){
        return false;
      }
    }

    function clearStaleIndexAuth(){
      try{
        sessionStorage.removeItem(SESSION_KEY);
        sessionStorage.removeItem(INDEX_SESSION_KEY);
        sessionStorage.removeItem(CURRENT_KEY);
        sessionStorage.removeItem(SSO_KEY);
        sessionStorage.removeItem("tasunSsoTab_v1");
      }catch(e){}
      try{
        localStorage.removeItem(CURRENT_KEY);
        localStorage.removeItem(BRIDGE_KEY);
      }catch(e){}
      try{ COOKIE_NAMES.forEach(clearCookie); }catch(e){}
    }

    function enforceLoginMask(){
      try{
        if(hasStrictIndexSession()) return;
        clearStaleIndexAuth();
        if(document.body){ document.body.classList.remove("auth-ok"); document.body.classList.add("locked"); }
        const overlay = document.getElementById("loginOverlay");
        if(overlay) overlay.style.display = "flex";
        document.querySelectorAll(".nav-area .nav-btn").forEach(btn=>{ btn.style.display = "none"; });
        const userInfo = document.getElementById("userInfo");
        if(userInfo) userInfo.textContent = "目前使用者：未登入";
      }catch(e){}
    }

    document.addEventListener("DOMContentLoaded", enforceLoginMask, { passive:true });
    window.addEventListener("pageshow", ()=>setTimeout(enforceLoginMask, 0), { passive:true });
    window.addEventListener("focus", ()=>setTimeout(enforceLoginMask, 0), { passive:true });
    setTimeout(enforceLoginMask, 80);
    setTimeout(enforceLoginMask, 500);
    setTimeout(enforceLoginMask, 1200);
    let guardCount = 0;
    const guard = setInterval(()=>{
      guardCount++;
      if(hasStrictIndexSession() || guardCount > 40){
        clearInterval(guard);
        return;
      }
      enforceLoginMask();
    }, 250);
  })();
  </script>

  <script>
  (function(){
    "use strict";
    const INDEX_SESSION_KEY = "tasunIndexSessionAuthed_v1";
    const SESSION_KEY = "tasunSessionLogin_v1";
    function authed(){
      try{ return sessionStorage.getItem(INDEX_SESSION_KEY)==="1" && !!sessionStorage.getItem(SESSION_KEY); }catch(e){ return false; }
    }
    function syncGate(){
      try{
        const ok = authed();
        const body = document.body;
        const overlay = document.getElementById("loginOverlay");
        if(!body || !overlay) return;
        if(ok){
          body.classList.add("auth-ok");
          body.classList.remove("locked");
          overlay.style.display = "none";
        }else{
          body.classList.remove("auth-ok");
          body.classList.add("locked");
          overlay.style.display = "flex";
          document.querySelectorAll(".nav-area .nav-btn").forEach(btn=>btn.style.display="none");
        }
      }catch(e){}
    }
    document.addEventListener("DOMContentLoaded", syncGate, {passive:true});
    window.addEventListener("focus", syncGate, {passive:true});
    window.addEventListener("pageshow", syncGate, {passive:true});
    const mo = new MutationObserver(syncGate);
    window.addEventListener("load", function(){
      syncGate();
      try{ mo.observe(document.documentElement, {attributes:true, subtree:true, attributeFilter:["class","style"]}); }catch(e){}
    }, {passive:true});
    setInterval(syncGate, 300);
  })();
  </script>
