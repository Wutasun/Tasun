      function resetButtonsForLogout(){ mainNavBtns.forEach(btn => btn.style.display = "none"); }
      function showLogin(msg){ document.body.classList.add('locked'); document.body.classList.remove('auth-ok'); loginOverlay.style.display = 'flex'; loginError.textContent = ''; loginSub.textContent = msg || ''; try{ document.getElementById('password').value = ''; }catch(e){} populateUserSelect(); resetButtonsForLogout(); if(userInfo){ userInfo.textContent = '目前使用者：未登入'; userInfo.setAttribute('data-text', '目前使用者：未登入'); } }
      function applyUser(user){ CURRENT_USER = user; document.body.classList.remove('locked'); document.body.classList.add('auth-ok'); loginOverlay.style.display = 'none'; loginSub.textContent = ''; userInfo.textContent = `目前使用者：${user.username} (${user.level})`; userInfo.setAttribute('data-text', userInfo.textContent); refreshButtonsForCurrentUser(); }
      function tryEnterBySessionSilently(){ const sess = getStrictSession(); if(!sess || !sess.user) return false; const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(sess.user)); if(!u) return false; applyUser(u); return true; }
      loginForm.addEventListener('submit', async (e) => { e.preventDefault(); AUTH_TABLE = ensureAuthTable(5); const username = String(usernameSel.value || '').trim(); const password = String(document.getElementById('password').value || '').trim(); if(!username){ loginError.textContent = '請選擇使用者'; return; } if(!password){ loginError.textContent = '請輸入密碼'; return; } loginError.textContent = '登入中…'; try{ const u = AUTH_TABLE.find(r => canonUserKey(r.username) === canonUserKey(username)); if(!u){ loginError.textContent = '查無此使用者'; populateUserSelect(); return; } const pwHash = await sha256Hex(password); const baseline = getDefaultAuthTableLegacy(5).find(r => canonUserKey(r.user) === canonUserKey(username)); const ok = (u.passHash && pwHash === u.passHash) || (!!u.password && password === u.password) || (!!baseline && pwHash === String(baseline.passHash||'').trim().toLowerCase()); if(!ok){ loginError.textContent = '密碼錯誤'; return; } setSession({ username:u.username, level:u.level }); setSSO({ username:u.username, level:u.level }); applyUser(u); document.getElementById('password').value = ''; loginError.textContent = ''; }catch(err){ loginError.textContent = '登入失敗：' + (err && err.message ? err.message : String(err)); } });
      btnForceRelogin.addEventListener('click', ()=>{ clearSession(); CURRENT_USER=null; showLogin('請重新輸入密碼登入'); document.getElementById('password').focus(); });
      btnSwitch.addEventListener('click', ()=>{ clearSession(); CURRENT_USER=null; showLogin('請重新選擇帳號登入'); });
      btnLogout.addEventListener('click', ()=>{ clearSession(); CURRENT_USER=null; showLogin('已登出'); });
      btnTogglePwd.addEventListener('click', ()=>{ const pwd=document.getElementById('password'); pwd.type = (pwd.type === 'password') ? 'text' : 'password'; });
      btnExport.addEventListener('click', ()=>{});
      AUTH_TABLE = ensureAuthTable(5);
      buildMainButtonsDOM();
      if(!tryEnterBySessionSilently()) showLogin('請先登入');
      if(zenImg){ zenImg.addEventListener("load", layoutButtons); }
      window.addEventListener("resize", layoutButtons, { passive:true });
      requestAnimationFrame(()=>{ document.body.classList.remove('booting'); layoutButtons(); });
    }
    if(window.TasunLoader && typeof window.TasunLoader.ready === "function"){ try{ window.TasunLoader.ready(runIndexApp, 8000); }catch(_e){} }else if(window.TasunCore && typeof window.TasunCore.ready === "function"){ try{ window.TasunCore.ready(runIndexApp, 8000); }catch(_e){} }else{ setTimeout(runIndexApp, 0); }
    setTimeout(()=>{ try{ runIndexApp(); }catch(_e){} }, 1200);
  })();
  </script>
<script>
(function(){
  function forceLoginOverlay(){
    try{
      var overlay = document.getElementById('loginOverlay');
      if(!overlay) return;
      var hidden = getComputedStyle(overlay).display === 'none';
      var bodyLocked = document.body && document.body.classList.contains('locked');
      var noButtons = !document.querySelector('.nav-area .nav-btn:not([style*="display: none"])');
      if((bodyLocked || noButtons) && hidden){
        overlay.style.display = 'flex';
        document.body.classList.add('locked');
        document.body.classList.remove('auth-ok');
      }
    }catch(e){}
  }
  window.addEventListener('error', function(){ setTimeout(forceLoginOverlay, 30); });
  document.addEventListener('DOMContentLoaded', function(){ setTimeout(forceLoginOverlay, 300); });
  window.addEventListener('load', function(){ setTimeout(forceLoginOverlay, 500); });
})();
</script>
