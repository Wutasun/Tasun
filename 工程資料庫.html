<!-- Tasun token bridge standard boot -->
<script src="tasun-global-core.js"></script>
<script>
(function(){
  'use strict';
  function boot(){
    try{ window.__TASUN_REQUIRE_LOGIN__ = true; }catch(_e){}
    try{
      var core = window.TasunGlobalCore;
      var auth = window.TasunAuthV4;
      if(!core) return;
      var cur = (auth && auth.getCurrent && auth.getCurrent()) || (core.getCurrentUser && core.getCurrentUser()) || null;
      var tk = (auth && auth.getToken && auth.getToken()) || (core.getCloudToken && core.getCloudToken()) || '';
      var pass = '';
      try{ pass = sessionStorage.getItem('tasunLastLoginPass_v1') || localStorage.getItem('tasunLastLoginPass_v1') || ''; }catch(_e){}
      if(cur && cur.user && core.bridgeAuth){
        core.bridgeAuth(cur, tk, pass);
      }else if(cur && cur.user && core.setCurrentUser){
        core.setCurrentUser(cur);
      }
      window.__TASUN_GLOBAL_CORE_READY__ = true;
      window.__TASUN_GLOBAL_CORE_VERSION__ = core.version || '';
    }catch(_e){}
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once:true });
  else boot();
})();
</script>
<script>
(function(){
  const Core = window.TasunCore;
  const withV = Core.withV;

  const $ = (id)=>document.getElementById(id);

  function toast(msg){
    const t=$("toast");
    t.textContent=msg;
    t.style.display="block";
    clearTimeout(toast._tm);
    toast._tm=setTimeout(()=>t.style.display="none",2200);
  }

  function syncUserUI(){
    const u = Core.Auth.current();
    $("uName").textContent = u?.username || "—";
    $("uRole").textContent = Core.Auth.role();
  }

  function start(){
    if(!Core.Auth.ensureLoggedIn()) return;

    syncUserUI();

    $("btnHome").onclick = ()=> location.href = withV("index.html");
    $("btnReLogin").onclick = ()=> Core.Auth.open("請重新登入或切換帳號");

    document.querySelectorAll(".card[data-href]").forEach(el=>{
      el.addEventListener("click", ()=>{
        const href = el.getAttribute("data-href");
        if(!href) return;

        const external = el.getAttribute("data-external")==="1" || /^https?:\/\//i.test(href);
        if(external) window.open(href, "_blank", "noopener");
        else location.href = withV(href);
      });
    });
  }

  Core.Auth.init({
    onAuthed: ()=>{ toast("登入成功"); start(); },
    onSessionChange: ()=>{ syncUserUI(); },
    onForceRelogin: (msg)=>{ toast(msg || "請重新登入"); syncUserUI(); }
  });

  start();
})();
</script>

<script src="tasun-global-auth-v65.js"></script>
