<script id="tasun-direct-open-login-guard-r456">
(function(){
  "use strict";
  if(window.__TASUN_DIRECT_OPEN_LOGIN_GUARD_R456__) return;
  window.__TASUN_DIRECT_OPEN_LOGIN_GUARD_R456__ = true;
  window.__TASUN_REQUIRE_LOGIN__ = true;
  window.__TASUN_DIRECT_PAGE__ = true;
  window.__TASUN_CHILD_PAGE__ = true;
  window.__TASUN_NO_INDEX_REDIRECT__ = false;

  var PAGE_FILE = "工程資料庫.html";
  var PAGE_KEY = "engineering-data-home";
  var PAGE_TITLE = "工程資料";
  var TARGET_KEYS = ["tasun_direct_open_target_v1","tasun_entry_next_v1","tasun_next_path_v1"];
  var SESSION_KEYS = [
    "tasunCurrentUser_v1","tasunSessionBridge_v1","tasunSession_v1","tasunSessionLogin_v2",
    "tasunSso_v2","tasunSso_v1","tasunAuthSession_v1","tasunCurrentUser_v2","tasunIndexUser_v1"
  ];

  function norm(v){ return v===undefined || v===null ? "" : String(v).trim(); }
  function parse(v){ try{ return JSON.parse(v); }catch(_e){ return null; } }
  function roleOf(u,r){
    r = norm(r).toLowerCase();
    if(r === "admin" || r === "write" || r === "read") return r;
    u = norm(u).toLowerCase();
    if(u === "alex") return "admin";
    if(u === "tasun") return "write";
    return "read";
  }
  function sessionCandidate(raw){
    raw = norm(raw);
    if(!raw) return null;
    var obj = parse(raw);
    if(!obj && /^[A-Za-z0-9_.@\-一-鿿]+$/.test(raw)) obj = { user: raw, role: "read" };
    if(!obj || typeof obj !== "object" || Array.isArray(obj)) return null;
    if(obj.deleted || obj.disabled || obj.revoked) return null;
    var exp = Number(obj.exp || obj.expiresAt || obj.expireAt || 0);
    if(exp && exp < Date.now()) return null;
    var user = norm(obj.user || obj.username || obj.name || obj.account || obj.uid);
    if(!user || user === "—" || user === "-") return null;
    var role = roleOf(user, obj.role || obj.level || obj.permission || obj.perm);
    return {
      user:user, username:user, name:user, role:role, level:role,
      token:norm(obj.token || obj.accessToken || obj.authToken || obj.bearer || obj.workerToken || obj.cloudToken || ""),
      at: obj.at || new Date().toISOString(),
      source:"direct-open-guard-r456",
      page:PAGE_FILE
    };
  }
  function readSession(){
    for(var i=0;i<SESSION_KEYS.length;i++){
      var k = SESSION_KEYS[i], raw = "";
      try{ raw = sessionStorage.getItem(k) || ""; }catch(_e){ raw = ""; }
      if(!raw){ try{ raw = localStorage.getItem(k) || ""; }catch(_e){ raw = ""; } }
      var hit = sessionCandidate(raw);
      if(hit) return hit;
    }
    try{
      var m = document.cookie.match(/(?:^|;\s*)tasun_session_v4=([^;]+)/);
      if(m && m[1]){
        var hit2 = sessionCandidate(decodeURIComponent(m[1]));
        if(hit2) return hit2;
      }
    }catch(_e){}
    return null;
  }
  function persistSession(payload){
    if(!payload || !payload.user) return;
    var text = JSON.stringify(payload);
    ["tasunCurrentUser_v1","tasunSessionBridge_v1","tasunSession_v1"].forEach(function(k){
      try{ sessionStorage.setItem(k, text); }catch(_e){}
      try{ localStorage.setItem(k, text); }catch(_e){}
    });
    if(payload.token){
      ["tasunBearerToken_v1","tasunCloudToken_v1","tasunToken","tasun_token","tasunWorkerToken","tasun_auth_token","authToken","access_token","token"].forEach(function(k){
        try{ sessionStorage.setItem(k, payload.token); }catch(_e){}
        try{ localStorage.setItem(k, payload.token); }catch(_e){}
      });
    }
    try{ sessionStorage.setItem("tasunIndexSession_v1", "1"); }catch(_e){}
    try{ localStorage.setItem("tasunIndexSession_v1", "1"); }catch(_e){}
    try{ sessionStorage.setItem("tasunIndexSessionAuthed_v2", "1"); }catch(_e){}
    try{ localStorage.setItem("tasunIndexSessionAuthed_v2", "1"); }catch(_e){}
    window.__TASUN_SSO_OK__ = true;
    window.__TASUN_AUTH_DIRECT_OPEN_VERIFIED_R456__ = true;
    window.__TASUN_AUTH_BLOCKED__ = false;
  }
  function targetValue(){
    try{ return location.pathname + location.search + location.hash; }catch(_e){ return PAGE_FILE; }
  }
  function rememberTarget(){
    var v = targetValue();
    TARGET_KEYS.forEach(function(k){
      try{ sessionStorage.setItem(k, v); }catch(_e){}
      try{ localStorage.setItem(k, v); }catch(_e){}
    });
    try{ sessionStorage.setItem("tasun_direct_open_page_file_v1", PAGE_FILE); }catch(_e){}
  }
  function indexUrl(){
    var u = new URL("index.html", location.href);
    u.searchParams.set("next", targetValue());
    u.searchParams.set("_login", "1");
    u.searchParams.set("_auth", "direct");
    u.searchParams.set("_", String(Date.now()));
    return u.toString();
  }
  function escapeHtml(s){ return norm(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
  function showBlocker(){
    try{
      var old = document.getElementById("tasunDirectLoginBlockerR456");
      if(old) return;
      var div = document.createElement("div");
      div.id = "tasunDirectLoginBlockerR456";
      div.innerHTML = '<div class="tasun-card" role="dialog" aria-modal="true"><div class="tasun-title">登入驗證</div><div class="tasun-msg">此頁「' + escapeHtml(PAGE_TITLE) + '」需要先登入 Tasun 首頁，驗證完成後才能開啟。</div><button type="button" id="tasunDirectLoginGoR456">前往登入</button></div>';
      (document.body || document.documentElement).appendChild(div);
      var btn = document.getElementById("tasunDirectLoginGoR456");
      if(btn) btn.onclick = function(){ location.href = indexUrl(); };
    }catch(_e){}
  }
  function block(){
    window.__TASUN_AUTH_BLOCKED__ = true;
    window.__TASUN_AUTH_DIRECT_OPEN_BLOCKED_R456__ = true;
    rememberTarget();
    document.documentElement.classList.remove("tasun-auth-pending");
    document.documentElement.classList.add("tasun-auth-blocked");
    setTimeout(showBlocker, 120);
    try{ location.replace(indexUrl()); }catch(_e){ try{ location.href = indexUrl(); }catch(__e){} }
  }
  function registerSelfHeal(){
    try{
      var core = window.TasunSelfHealV5 || window.__TASUN_SELF_HEAL_CORE__ || null;
      if(core && typeof core.register === "function" && !window.__TASUN_DIRECT_OPEN_LOGIN_GUARD_R456_SELFHEAL__){
        window.__TASUN_DIRECT_OPEN_LOGIN_GUARD_R456_SELFHEAL__ = true;
        core.register(PAGE_KEY + ":directOpenLoginRequiredR456", {
          check:function(){ return !!readSession() || !!window.__TASUN_AUTH_DIRECT_OPEN_BLOCKED_R456__; },
          repair:function(){ var s = readSession(); if(s){ persistSession(s); return true; } rememberTarget(); return true; },
          verify:function(){ return !!readSession() || !!window.__TASUN_AUTH_DIRECT_OPEN_BLOCKED_R456__; },
          coolDownMs:1600,
          maxRetry:4
        });
      }
    }catch(_e){}
  }
  try{ document.documentElement.classList.add("tasun-auth-pending"); }catch(_e){}
  var session = readSession();
  if(session && session.user){
    persistSession(session);
    document.documentElement.classList.remove("tasun-auth-pending");
    document.documentElement.classList.remove("tasun-auth-blocked");
    registerSelfHeal();
    if(document.readyState === "loading") document.addEventListener("DOMContentLoaded", registerSelfHeal, { once:true, passive:true }); else registerSelfHeal();
    setTimeout(registerSelfHeal, 800);
    return;
  }
  block();
})();
</script>

  <script>
  (function(){
    'use strict';
    function withV(url){
      try{
        if(window.__withV) return window.__withV(url);
      }catch(_e){}
      return url;
    }
    function start(){
      var core = window.TasunGlobalCore;
      var status = document.getElementById('statusText');
      if(core && core.getCurrentUser){
        try{
          var u = core.getCurrentUser();
          if(u && (u.user || u.name)){
            status.textContent = '使用者：' + (u.user || u.name) + '　權限：' + (u.role || 'read');
          }else{
            status.textContent = '尚未登入';
          }
        }catch(_e){}
      }
      var back = document.getElementById('btnBack');
      if(back) back.setAttribute('href', withV('index.html'));
      document.querySelectorAll('.card[data-href]').forEach(function(el){
        el.addEventListener('click', function(ev){
          ev.preventDefault();
          var href = el.getAttribute('data-href') || '';
          if(!href) return;
          var external = el.getAttribute('data-external') === '1' || /^https?:\/\//i.test(href);
          if(external) window.open(href, '_blank', 'noopener');
          else location.href = withV(href);
        });
      });
    }
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start, {once:true});
    else start();
  })();
  </script>
