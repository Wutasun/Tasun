<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>工 程 資 料</title>
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script src="tasun-version-loader.js"></script>
  <script>
    window.__TASUN_REQUIRE_LOGIN__ = true;
  </script>
  <script src="tasun-auth-v4.js"></script>
  <script src="tasun-global-core.js"></script>
  <script src="tasun-guard-v5.js"></script>
  <style>
    :root{
      --bg1:#11160f;
      --bg2:#1a2417;
      --gold:#e3c27a;
      --gold-soft:rgba(227,194,122,.28);
      --panel:rgba(20,24,18,.60);
      --panel-2:rgba(255,255,255,.06);
      --text:#f4e7c4;
      --shadow:0 18px 42px rgba(0,0,0,.34);
      --radius:24px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Noto Serif TC","Microsoft JhengHei",serif;
      color:var(--text);
      background:
        radial-gradient(1000px 420px at 50% 8%, rgba(255,220,140,.12), transparent 60%),
        radial-gradient(700px 280px at 50% 0%, rgba(255,240,200,.08), transparent 65%),
        linear-gradient(180deg, var(--bg2), var(--bg1));
      overflow-x:hidden;
    }
    body::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        radial-gradient(420px 220px at 50% 12%, rgba(255,230,170,.06), transparent 72%),
        radial-gradient(600px 500px at 50% 55%, rgba(255,220,150,.04), transparent 70%);
      mix-blend-mode:screen;
    }
    .page{
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      padding:18px 18px 36px;
      gap:18px;
    }
    .topbar{
      width:min(1320px, calc(100vw - 36px));
      display:flex;
      justify-content:flex-start;
      align-items:center;
    }
    .back{
      border:1px solid rgba(227,194,122,.32);
      color:#553d12;
      background:linear-gradient(180deg, #fff7e6, #ead9b6);
      box-shadow:var(--shadow);
      border-radius:999px;
      padding:10px 18px;
      font-weight:700;
      text-decoration:none;
      white-space:nowrap;
    }
    .hero{
      width:min(1320px, calc(100vw - 36px));
      border-radius:32px;
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(227,194,122,.18);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      padding:22px 26px 24px;
      text-align:center;
    }
    .title{
      margin:0;
      font-size:clamp(30px, 4.2vw, 54px);
      letter-spacing:.18em;
      color:var(--gold);
      text-shadow:0 2px 0 rgba(80,54,12,.72), 0 0 18px rgba(255,219,143,.12);
    }
    .subtitle{
      margin-top:10px;
      color:rgba(244,231,196,.76);
      font-size:14px;
      letter-spacing:.24em;
    }
    .grid{
      width:min(1320px, calc(100vw - 36px));
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:22px;
    }
    .card{
      min-width:260px;
      max-width:320px;
      flex:1 1 260px;
      padding:24px 18px;
      border-radius:999px;
      text-decoration:none;
      color:var(--text);
      text-align:center;
      background:
        linear-gradient(180deg, rgba(255,255,255,.11), rgba(255,255,255,.05)),
        radial-gradient(120% 120% at 50% 0%, rgba(255,243,210,.12), transparent 52%),
        var(--panel);
      border:1px solid rgba(227,194,122,.24);
      box-shadow:var(--shadow);
      backdrop-filter:blur(10px);
      transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      cursor:pointer;
      user-select:none;
    }
    .card:hover{
      transform:translateY(-2px);
      border-color:rgba(227,194,122,.40);
      box-shadow:0 24px 48px rgba(0,0,0,.42);
    }
    .card .label{
      display:block;
      font-size:clamp(22px, 2.2vw, 30px);
      font-weight:700;
      letter-spacing:.18em;
      color:var(--gold);
      text-shadow:0 1px 0 rgba(73,49,10,.7);
    }
    .status{
      width:min(1320px, calc(100vw - 36px));
      display:flex; justify-content:flex-end; align-items:center;
      color:rgba(244,231,196,.68);
      font-size:12px;
    }
    @media (max-width:640px){
      .page{padding:14px 12px 26px}
      .topbar,.hero,.grid,.status{width:calc(100vw - 24px)}
      .hero{padding:18px 16px 18px}
      .grid{gap:14px}
      .card{min-width:100%; flex-basis:100%; padding:18px 14px}
      .card .label{font-size:24px}
      .back{padding:9px 14px; font-size:14px}
      .subtitle{font-size:12px; letter-spacing:.18em}
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <a id="btnBack" class="back" href="index.html">返回首頁</a>
    </div>

    <section class="hero">
      <h1 class="title">工 程 資 料</h1>
      <div class="subtitle">工程資料登錄 / 查詢 / 明細表 / 雲端資料庫入口</div>
    </section>

    <section class="grid" id="grid">
      <a class="card" data-href="工程資料登錄.html"><span class="label">工程資料登錄</span></a>
      <a class="card" data-href="工程資料查詢.html"><span class="label">工程資料查詢</span></a>
      <a class="card" data-href="工程資料明細表.html"><span class="label">工程資料明細表</span></a>
      <a class="card" data-external="1" data-href="https://www.dropbox.com/home?_tk=web_left_nav_bar&di=left_nav"><span class="label">雲端資料庫入口</span></a>
    </section>

    <div class="status" id="statusText">登入狀態檢查中…</div>
  </div>

  <script>
  (function(){
    'use strict';
    function withV(url){
      try{
        if(window.__withV) return window.__withV(url);
      }catch(_e){}
      return url;
    }
    function start(){
      var core = window.TasunGlobalCore;
      var status = document.getElementById('statusText');
      if(core && core.getCurrentUser){
        try{
          var u = core.getCurrentUser();
          if(u && (u.user || u.name)){
            status.textContent = '使用者：' + (u.user || u.name) + '　權限：' + (u.role || 'read');
          }else{
            status.textContent = '尚未登入';
          }
        }catch(_e){}
      }
      var back = document.getElementById('btnBack');
      if(back) back.setAttribute('href', withV('index.html'));
      document.querySelectorAll('.card[data-href]').forEach(function(el){
        el.addEventListener('click', function(ev){
          ev.preventDefault();
          var href = el.getAttribute('data-href') || '';
          if(!href) return;
          var external = el.getAttribute('data-external') === '1' || /^https?:\/\//i.test(href);
          if(external) window.open(href, '_blank', 'noopener');
          else location.href = withV(href);
        });
      });
    }
    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start, {once:true});
    else start();
  })();
  </script>
</body>
</html>
