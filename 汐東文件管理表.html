function readSession(){const keys=["tasunCurrentUser_v1","tasunSessionBridge_v1","tasunSession_v1","tasunSso_v2","tasunSso_v1","tasunAuthSession_v1","tasunCurrentUser_v2","tasunIndexUser_v1"];for(const k of keys){let raw="";try{raw=sessionStorage.getItem(k)||""}catch(_){}if(!raw)try{raw=localStorage.getItem(k)||""}catch(_){}const s=sessionCandidate(raw);if(s)return s}return{user:"",role:"read"}}
function updateStatus(){session=readSession();$("#uiUser").textContent=session.user||"未登入";$("#uiRole").textContent=session.role||"read"}
function readPermMatrix(){try{return safeJson(localStorage.getItem(PERM_MATRIX_KEY)||"{}",{})}catch(_){return{}}}
function buttonAllowed(btn){const role=session.role||"read";const user=session.user||"";const pm=readPermMatrix();const users=pm&&pm.users?pm.users:{};const u=users[user]||users[user.toLowerCase()]||null;if(u){for(const entry of [PAGE_FILE,PAGE_KEY,"汐東文件管理表.html","xidong-doc-manager","汐東收發文管理","汐東工程管理表.html"]){if(u[entry]&&Object.prototype.hasOwnProperty.call(u[entry],btn.key))return!!u[entry][btn.key];if(u[entry]&&Object.prototype.hasOwnProperty.call(u[entry],btn.sourceId))return!!u[entry][btn.sourceId]}}return Array.isArray(btn.roles)?btn.roles.includes(role):true}
function withV(href){try{const v=norm(window.__CACHE_V||window.TASUN_APP_VER||window.APP_VER||BUILD);const u=new URL(href,location.href);if(u.origin===location.origin&&v)u.searchParams.set("v",v);return u.toString()}catch(_){return href}}
function render(){const bar=$("#moduleBar");if(!bar)return;bar.innerHTML="";BUTTONS.forEach(btn=>{const a=document.createElement("a");a.className="moduleBtn";if(!buttonAllowed(btn))a.classList.add("disabled");a.dataset.sourceId=btn.sourceId;a.dataset.key=btn.key;a.href=withV(btn.href);a.innerHTML='<span class="cardIcon">'+escapeHtml(btn.icon||"📄")+'</span><span class="cardText"><b>'+escapeHtml(btn.label)+'</b></span>';a.addEventListener("click",ev=>{if(!buttonAllowed(btn)){ev.preventDefault();toast("此按鍵未開放給目前權限。");return}try{sessionStorage.setItem("tasun_child_jump_lock_v1",btn.href);localStorage.setItem("tasun_child_jump_lock_v1",btn.href)}catch(_){}});bar.appendChild(a)})}
function registerRoutes(){try{const routes=safeJson(localStorage.getItem(ROUTE_KEY)||"{}",{});BUTTONS.forEach((b,i)=>{routes[b.label]=b.href;routes[b.key]=b.href;routes[b.sourceId]=b.href;routes["xidong_doc_btn"+(i+1)]=b.href});routes["捷運汐止東湖線工程監造文件管理"]="汐東文件管理表.html";routes["汐東文件管理表"]="汐東文件管理表.html";localStorage.setItem(ROUTE_KEY,JSON.stringify(routes))}catch(_){}try{const reg=safeJson(localStorage.getItem(ENTRY_REGISTRY_KEY)||"[]",[]);const map=new Map((Array.isArray(reg)?reg:[]).map(x=>[x.file||x.href||x.name,x]));PAGE_ENTRIES.forEach(f=>map.set(f,{file:f,name:f.replace(/\.html$/,""),href:f,pageKey:f.replace(/\.html$/,""),group:"汐東文件管理",buttons:BUTTONS}));localStorage.setItem(ENTRY_REGISTRY_KEY,JSON.stringify(Array.from(map.values())))}catch(_){}}
function registerSelfHeal(){try{const core=window.TasunSelfHealV5||window.__TASUN_SELF_HEAL_CORE__||null;if(core&&typeof core.register==="function"&&!window.__TASUN_XIDONG_DOC_MANAGER_APP_SELFHEAL_R484__){window.__TASUN_XIDONG_DOC_MANAGER_APP_SELFHEAL_R484__=true;core.register(PAGE_KEY+":officialDocsR484DocManagerReceiveSendBlock3D",{check(){return document.querySelectorAll("#moduleBar .moduleBtn").length===3&&!!document.querySelector(".zoneTitle")},repair(){render();return true},verify(){return document.querySelectorAll("#moduleBar .moduleBtn").length===3&&!!document.querySelector(".zoneTitle")},coolDownMs:1200,maxRetry:5});core.register(PAGE_KEY+":officialDocsR484TitleCenteredRemoveExplanatoryTexts",{check(){const h=document.querySelector(".titlePanel h1");return!!h&&!document.querySelector(".subtitle,.docHero,.zoneHint,.notice,.cardText small")},repair(){document.querySelectorAll(".subtitle,.docHero,.zoneHint,.notice,.cardText small").forEach(el=>el.remove());return true},verify(){return!!document.querySelector(".titlePanel h1")&&!document.querySelector(".subtitle,.docHero,.zoneHint,.notice,.cardText small")},coolDownMs:1200,maxRetry:5})}}catch(e){console.warn(e)}}
function init(){try{document.documentElement.classList.remove("tasun-auth-pending","tasun-auth-blocked")}catch(_){}updateStatus();registerRoutes();render();registerSelfHeal();$("#btnBack")?.addEventListener("click",()=>location.href=withV("汐東工程管理表.html"));}
if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init,{once:true});else init();
})();
