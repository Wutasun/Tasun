<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Tasun 入口轉向</title>
<style>
  html,body{margin:0;height:100%;font-family:"Noto Sans TC",system-ui,Arial,sans-serif;background:#f7f7f7;color:#8a5511;}
  body{display:flex;align-items:center;justify-content:center;text-align:center;}
  .box{padding:24px;border-radius:18px;background:rgba(255,255,255,.9);box-shadow:0 18px 48px rgba(0,0,0,.12);}
</style>
<script id="tasun-entry-direct-router-r162">
(function(){
  'use strict';
  var DEFAULT_PAGE = '汐東工程管理表.html';
  var ALLOW = {
    '汐東工程管理表.html': true,
    '捷運汐東線權責分工精簡版.html': true,
    '捷運汐東線事項記錄.html': true,
    '捷運汐止東湖線統包工程-資料庫.html': true,
    '捷運汐止東湖線統包工程-資料明細表.html': true,
    'index.html': true
  };
  function norm(v){ return String(v == null ? '' : v).trim(); }
  function decodeDeep(v){
    var s = norm(v);
    for(var i=0;i<4;i++){
      try{ var d = decodeURIComponent(s); if(d === s) break; s = d; }catch(_e){ break; }
    }
    return s;
  }
  function basename(p){
    p = decodeDeep(p).replace(/^https?:\/\/[^/]+/i,'');
    p = p.split('#')[0].split('?')[0];
    var parts = p.split('/').filter(Boolean);
    return decodeDeep(parts.pop() || '');
  }
  function pickTarget(){
    var u = new URL(location.href);
    var n = norm(u.searchParams.get('next') || u.searchParams.get('to') || u.searchParams.get('page') || '');
    if(!n){ try{ n = norm(sessionStorage.getItem('tasun_entry_next_v1') || sessionStorage.getItem('tasun_next_path_v1') || localStorage.getItem('tasun_entry_next_v1') || localStorage.getItem('tasun_next_path_v1') || ''); }catch(_e){} }
    if(!n){
      var hm = String(location.hash || '').match(/(?:next|to|page)=([^&]+)/i);
      if(hm) n = hm[1];
    }
    var b = basename(n);
    if(/汐東工程管理表|捷運汐止東湖線|捷運汐東線管理/i.test(decodeDeep(n))) b = '汐東工程管理表.html';
    if(!ALLOW[b]) b = DEFAULT_PAGE;
    return b;
  }
  function bridge(){
    try{
      var keys=['tasunCurrentUser_v1','tasunSessionBridge_v1','tasunSession_v1','tasunSso_v2','tasunSso_v1'];
      var found='';
      keys.some(function(k){ found = sessionStorage.getItem(k) || localStorage.getItem(k) || ''; return !!found; });
      if(found){ keys.forEach(function(k){ try{ sessionStorage.setItem(k, found); localStorage.setItem(k, found); }catch(_e){} }); }
      ['tasun_next_path_v1','tasun_entry_next_v1','tasun_child_jump_lock_v1'].forEach(function(k){ try{ sessionStorage.removeItem(k); localStorage.removeItem(k); }catch(_e){} });
      sessionStorage.setItem('tasunIndexSession_v1','1');
      sessionStorage.setItem('tasunIndexSessionAuthed_v2','1');
    }catch(_e){}
  }
  function go(){
    bridge();
    var target = pickTarget();
    var out = new URL(target, location.href);
    var v = norm(new URL(location.href).searchParams.get('v') || window.__CACHE_V || window.TASUN_APP_VER || window.APP_VER || '');
    if(v) out.searchParams.set('v', v);
    out.searchParams.set('_', String(Date.now()));
    location.replace(out.toString());
  }
  window.__TASUN_ENTRY_GO__ = go;
  go();
})();
</script>
</head>
<body>
  <div class="box">Tasun 入口轉向中…<br>若未自動轉向，請返回首頁重新進入。</div>
</body>
</html>
