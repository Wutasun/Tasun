<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tasun Entry</title>
  <meta name="robots" content="noindex,nofollow" />
</head>
<body style="font-family:system-ui,Segoe UI,Arial; padding:16px;">
  <div>正在進入 Tasun…</div>
<script>
/**
 * Tasun Entry v1 (hash-based next)
 * - Uses location.hash (#next=...) so the "next" payload is NOT sent to the server (prevents 414 URI Too Long).
 * - Stores next into sessionStorage, then redirects to index.html with a short URL.
 */
(function(){
  const NEXT_KEY = "tasun_next_path_v1";
  const V = "20260305_entry_v1";

  function safeDecode(s){
    try { return decodeURIComponent(s); } catch(e){ return s; }
  }

  function pickNext(){
    // Prefer hash (#next=...) then query (?next=...)
    const h = (location.hash || "").replace(/^#/, "");
    if (h.startsWith("next=")) return safeDecode(h.slice(5));
    const sp = new URLSearchParams(location.search || "");
    const q = sp.get("next");
    if (q) return safeDecode(q);
    return "";
  }

  function normalizeNext(n){
    if (!n) return "";
    // Only allow same-origin relative paths (hard safety)
    try {
      const u = new URL(n, location.origin);
      if (u.origin !== location.origin) return "";
      const path = u.pathname + u.search + u.hash;
      // Prevent recursive chains
      if (/\/index\.html\?next=/i.test(path) || /\/index\.html#next=/i.test(path)) return "";
      return path;
    } catch(e){
      if (n.startsWith("/")) {
        if (/\/index\.html\?next=/i.test(n) || /\/index\.html#next=/i.test(n)) return "";
        return n;
      }
      return "";
    }
  }

  const nextRaw = pickNext();
  const next = normalizeNext(nextRaw);

  if (next) {
    try { sessionStorage.setItem(NEXT_KEY, next); } catch(e){}
  }

  // Always jump to index with a short URL (cache-busting v)
  const target = "index.html?v=" + encodeURIComponent(V);
  location.replace(target);
})();
</script>
</body>
</html>
