  <style>
    body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans TC",sans-serif;background:#0b0b0b;color:#e8d9b0;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .card{max-width:760px;padding:24px 22px;border:1px solid rgba(232,217,176,.25);border-radius:18px;box-shadow:0 12px 40px rgba(0,0,0,.45);background:rgba(255,255,255,.03)}
    a{color:#f3d58a;text-decoration:none;border-bottom:1px dashed rgba(243,213,138,.55)}
  </style>
</head>
<body>
  <div class="card">
    <h2 style="margin:0 0 8px 0">Tasun 入口</h2>
    <div style="opacity:.9;line-height:1.6">已套用 Tasun v5 單一規則入口守門。若你是從子頁被導回，系統會保留原始目標頁，登入完成後自動返回。</div>
  </div>
  <script>
  (function(){
    var NEXT_KEY='tasun_next_path_v1';
    function norm(s){ return (s==null)?'':String(s).trim(); }
    function consumeNext(){
      var p='';
      try{ p = norm(sessionStorage.getItem(NEXT_KEY)); sessionStorage.removeItem(NEXT_KEY); }catch(e){}
      if(!p){
        try{ var h = new URL(location.href).hash || ''; if(/^#next=/i.test(h)) p = decodeURIComponent(h.slice(6)); }catch(e){}
      }
      return p;
    }
    var next = consumeNext();
    if(next){
      try{ sessionStorage.setItem(NEXT_KEY, next); }catch(e){}
      var home = (window.__withV?window.__withV('index.html'):'index.html');
      location.replace(home);
    }
  })();
  </script>
</body>
