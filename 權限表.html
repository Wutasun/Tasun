<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Tasun 權限表</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script>
  (function () {
    const FALLBACK = "20260312_30";
    const VER_KEY = "tasun_app_ver_auth_v1";
    const TAB_GUARD = "tasun_tab_replaced_once_auth_v1";
    const u = new URL(location.href);
    const curV = (u.searchParams.get("v") || "").trim();
    function applyVersion(ver) {
      const v = String(ver || FALLBACK).trim() || FALLBACK;
      window.__CACHE_V = v;
      localStorage.setItem(VER_KEY, v);
      window.__withV = function(href){
        try{
          if(!href) return href;
          if(/^https?:\/\//i.test(href) || /^mailto:/i.test(href) || /^tel:/i.test(href)) return href;
          const uu = new URL(href, location.href);
          uu.searchParams.set("v", v);
          return uu.pathname + uu.search + uu.hash;
        }catch(_){ return href; }
      };
      return v;
    }
    applyVersion(FALLBACK);
    let alreadyReplaced = false;
    try{ alreadyReplaced = sessionStorage.getItem(TAB_GUARD) === "1"; }catch(e){}
    fetch('tasun-version.json?_=' + Date.now(), { cache:'no-store' })
      .then(r => r.ok ? r.json() : null)
      .then(j => {
        const remote = applyVersion((j && (j.version || j.ver || j.appVer)) || FALLBACK);
        if (curV !== remote && !alreadyReplaced) {
          try{ sessionStorage.setItem(TAB_GUARD, "1"); }catch(e){}
          u.searchParams.set("v", remote);
          location.replace(u.toString());
        }
      })
      .catch(() => {});
  })();
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&display=swap" rel="stylesheet">
  <style>body{font-family:"Noto Serif TC","Microsoft JhengHei",sans-serif;background:#050302;color:#f6d37a;margin:0} .wrap{max-width:1100px;margin:24px auto;padding:24px;border:1px solid rgba(246,211,122,.2);border-radius:20px;background:rgba(0,0,0,.25)} .row{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin:12px 0} .btn,.field{border-radius:999px;border:1px solid rgba(246,211,122,.3);padding:10px 14px;background:rgba(0,0,0,.35);color:#f6d37a} .field{min-width:320px} table{width:100%;border-collapse:collapse;margin-top:16px} th,td{border-bottom:1px solid rgba(246,211,122,.12);padding:10px;text-align:left} .msg{white-space:pre-wrap;opacity:.9;margin-top:16px}</style>
</head>
<body>
<div class="wrap">
  <h1>Tasun 權限表</h1>
  <div class="row">
    <button class="btn" id="backBtn">返回首頁</button>
    <button class="btn" id="saveBtn">儲存並同步固定首頁設定</button>
  </div>
  <div class="row"><label>btn1</label><select class="field" id="nav1"></select></div>
  <div class="row"><label>btn2</label><select class="field" id="nav2"></select></div>
  <div class="row"><label>btn3</label><select class="field" id="nav3"></select></div>
  <div class="row"><label>btn4</label><select class="field" id="nav4"></select></div>
  <div class="row"><label>btn5</label><select class="field" id="nav5"></select></div>
  <table>
    <thead><tr><th>固定按鍵</th><th>名稱</th><th>連結</th></tr></thead>
    <tbody id="tb"></tbody>
  </table>
  <div class="msg" id="msg"></div>
</div>
<script>
(() => {
  const NAV_KEY = 'tasunNavButtons_v1';
  const ROUTE_KEY = 'tasunRoutes_v1';
  const LEGACY_ROUTE_KEY = 'tasunNavRoutes_v1';
  const HOME_BUTTON_LIBRARY = [
    { sourceId:'zhending', label:'臻鼎時代大廈管理表', href:'臻鼎管理表.html', target:'' },
    { sourceId:'metro',    label:'捷運汐止東湖線',     href:'汐東工程管理表.html', target:'' },
    { sourceId:'cloud',    label:'雲端檔案',           href:'https://www.dropbox.com/home?_tk=web_left_nav_bar&di=left_nav', target:'_blank' },
    { sourceId:'engdb',    label:'工程資料庫',         href:'工程資料庫.html', target:'' },
    { sourceId:'database', label:'資料庫',             href:'資料庫.html', target:'' },
    { sourceId:'auth',     label:'系統/權限',         href:'權限表.html', target:'' }
  ];
  const selects = [nav1, nav2, nav3, nav4, nav5];
  const msg = document.getElementById('msg');
  const tb = document.getElementById('tb');
  function setMsg(t){ msg.textContent = t || ''; }
  function optionText(it){ return `${it.label} ｜ ${it.href}`; }
  function setRoutes(){
    const routes = {};
    HOME_BUTTON_LIBRARY.forEach(it => { routes[it.label] = it.href; });
    routes.btn1 = '臻鼎管理表.html';
    routes.btn2 = '汐東工程管理表.html';
    routes.btn3 = 'https://www.dropbox.com/home?_tk=web_left_nav_bar&di=left_nav';
    routes.btn4 = '工程資料庫.html';
    routes.btn5 = '資料庫.html';
    routes.systemBtn = '權限表.html';
    localStorage.setItem(ROUTE_KEY, JSON.stringify(routes));
    localStorage.setItem(LEGACY_ROUTE_KEY, JSON.stringify(routes));
  }
  function loadNav(){
    const arr = JSON.parse(localStorage.getItem(NAV_KEY) || 'null');
    if(Array.isArray(arr) && arr.length === 5) return arr;
    return HOME_BUTTON_LIBRARY.slice(0,5).map((it, idx) => ({ id:`btn${idx+1}`, sourceId:it.sourceId, label:it.label, href:it.href, target:it.target, roles:[] }));
  }
  function syncFixedHomeBindings(){
    const current = loadNav();
    const out = selects.map((sel, idx) => {
      const sourceId = String(sel?.value || current[idx]?.sourceId || HOME_BUTTON_LIBRARY[idx].sourceId);
      const lib = HOME_BUTTON_LIBRARY.find(x => x.sourceId === sourceId) || HOME_BUTTON_LIBRARY[idx];
      return { id:`btn${idx+1}`, sourceId:lib.sourceId, label:lib.label, href:lib.href, target:lib.target, roles:[] };
    });
    localStorage.setItem(NAV_KEY, JSON.stringify(out));
    setRoutes();
    render();
  }
  function fillSelects(){
    selects.forEach((sel) => {
      sel.innerHTML = HOME_BUTTON_LIBRARY.slice(0,5).map(it => `<option value="${it.sourceId}">${optionText(it)}</option>`).join('');
    });
    const current = loadNav();
    selects.forEach((sel, idx) => { sel.value = current[idx]?.sourceId || HOME_BUTTON_LIBRARY[idx].sourceId; });
  }
  function render(){
    const current = loadNav();
    tb.innerHTML = current.map((it, idx) => `<tr><td>btn${idx+1}</td><td>${it.label}</td><td>${it.href}</td></tr>`).join('') + `<tr><td>systemBtn</td><td>系統/權限</td><td>權限表.html</td></tr>`;
  }
  document.getElementById('saveBtn').addEventListener('click', () => { syncFixedHomeBindings(); setMsg('已固定首頁按鍵名稱與連結綁定。'); });
  document.getElementById('backBtn').addEventListener('click', () => { location.href = window.__withV ? window.__withV('index.html') : 'index.html'; });
  selects.forEach(sel => sel.addEventListener('change', syncFixedHomeBindings));
  fillSelects();
  syncFixedHomeBindings();
})();
</script>
</body>
</html>
