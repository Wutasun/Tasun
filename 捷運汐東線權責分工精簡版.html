  <!-- ✅✅✅ APP_VER 強制同步（全站同一版號 / URL 自動帶 ?v=APP_VER / 跨頁連結自動附加 v） -->
  <script>
  (function(){
    /* 你只要改這個版號即可（建議：YYYYMMDD_HHMM 或 2026.01.26.1） */
    const APP_VER = String(window.__CACHE_V || window.TASUN_APP_VER || window.APP_VER || "20260406_tasun_v5_syncfix_v63").trim() || "20260406_tasun_v5_syncfix_v63";
    const KEY = "tasun_app_ver_v1";

    try{
      const u = new URL(location.href);
      const cur = (u.searchParams.get("v") || "").trim();
      const saved = (sessionStorage.getItem(KEY) || localStorage.getItem(KEY) || "").trim();

      // ✅ 目標版號優先序：APP_VER(固定) > URL v > 已存的 v
      const target = (APP_VER || cur || saved || "").trim();
      if(!target) return;

      // ✅ 存起來（跨頁一致）
      sessionStorage.setItem(KEY, target);
      localStorage.setItem(KEY, target);

      // ✅ 若當前網址 v 不一致，強制同步（避免多人不同頁面版本不同步）
      if(cur !== target){
        u.searchParams.set("v", target);
        location.replace(u.toString());
        return;
      }

      // ✅ 供全站使用：固定版號全域欄位
      window.__TASUN_PAGE_FIXED_VERSION__ = target;
      window.TASUN_APP_VER = target;
      window.APP_VER = target;
      window.__APP_VER = target;
      window.__CACHE_V = target;
      window.__withV = function(url){
        const vv = (window.__CACHE_V || "").trim();
        if(!vv) return url;
        try{
          const uu = new URL(url, document.baseURI);
          if(uu.origin === location.origin){
            uu.searchParams.set("v", vv);
            return uu.toString();
          }
          return url;
        }catch(e){
          return url;
        }
      };
    }catch(e){}
  })();
  </script>

<script>
(function(){
  'use strict';
  if(window.__TASUN_CHILD_PREBRIDGE_V2__) return;
  window.__TASUN_CHILD_PREBRIDGE_V2__ = true;
  function jparse(s,f){ try{return JSON.parse(s);}catch(_){ return f; } }
  function norm(v){ return String(v == null ? '' : v).trim(); }
  function inferRole(n,r){
    var rr = norm(r).toLowerCase();
    if(rr === 'admin' || rr === 'write' || rr === 'read') return rr;
    var nn = norm(n).toLowerCase();
    if(nn === 'alex' || nn === 'joyce') return 'admin';
    if(nn === 'tasun') return 'write';
    return 'read';
  }
  var cur = null;
  try{
    cur = jparse(sessionStorage.getItem('tasunCurrentUser_v1') || localStorage.getItem('tasunCurrentUser_v1') || sessionStorage.getItem('tasunSessionBridge_v1') || localStorage.getItem('tasunSessionBridge_v1') || sessionStorage.getItem('tasunSession_v1') || localStorage.getItem('tasunSession_v1') || sessionStorage.getItem('tasunSso_v2') || localStorage.getItem('tasunSso_v2') || sessionStorage.getItem('tasunSso_v1') || localStorage.getItem('tasunSso_v1') || 'null', null);
  }catch(_e){ cur = null; }
  if(cur){
    var user = norm(cur.user || cur.name || cur.username || cur.account);
    var role = inferRole(user, cur.role || cur.level);
    if(user){
      var payload = { user:user, name:user, username:user, role:role, level:role, at:new Date().toISOString() };
      try{ sessionStorage.setItem('tasunCurrentUser_v1', JSON.stringify(payload)); }catch(_e){}
      try{ localStorage.setItem('tasunCurrentUser_v1', JSON.stringify(payload)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSession_v1', JSON.stringify(payload)); }catch(_e){}
      try{ localStorage.setItem('tasunSession_v1', JSON.stringify(payload)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(payload)); }catch(_e){}
      try{ localStorage.setItem('tasunSessionBridge_v1', JSON.stringify(payload)); }catch(_e){}
      try{
        var sso = { name:user, user:user, role:role, at:Date.now(), exp:Date.now() + 1000*60*60*12, v:(window.__CACHE_V || window.TASUN_APP_VER || window.APP_VER || '') };
        sessionStorage.setItem('tasunSso_v1', JSON.stringify(sso));
        localStorage.setItem('tasunSso_v1', JSON.stringify(sso));
        sessionStorage.setItem('tasunSso_v2', JSON.stringify(sso));
        localStorage.setItem('tasunSso_v2', JSON.stringify(sso));
      }catch(_e){}
      try{ sessionStorage.setItem('tasunIndexSession_v1', '1'); }catch(_e){}
      try{ localStorage.setItem('tasunIndexSession_v1', '1'); }catch(_e){}
      try{ sessionStorage.setItem('tasunIndexSessionAuthed_v2', '1'); }catch(_e){}
      try{ localStorage.setItem('tasunIndexSessionAuthed_v2', '1'); }catch(_e){}
      window.__TASUN_SSO_OK__ = true;
      window.__TASUN_REQUIRE_LOGIN__ = false;
    }
  }
})();

      var cur = core.getCurrentUser();

<script>
(function(){
  function applyZenAsciiToUI(){
    try{
      document.querySelectorAll('.btn, .pill b, .title, .label, thead th, .controls input, .controls select, #hint').forEach(function(el){
        var txt=(el.value || el.textContent || '').trim();
        var ascii=/^[\x00-\x7F\s]+$/.test(txt) && txt !== '';
        el.classList.toggle('ascii-tight', ascii);
      });
    }catch(e){}
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', applyZenAsciiToUI, {once:true});
  }else{
    applyZenAsciiToUI();
  }
  window.__applyZenAsciiToUI = applyZenAsciiToUI;
})();

    function pickHeaderIndex(header){
      const map = header.map(normHead);
      const findAny = (keys)=> {
        for(const k of keys){

        .replaceAll("'","&#39;");

    function isAsciiLike(s){

    function buildModalComboMenu(inputId, forceOpen){
      const input = $(inputId);
      const menu = getModalComboMenu(inputId);

      if(!input || !menu || !field) return;
      const kw = norm(input.value).toLowerCase();

    function initModalCombos(){
      const ids = Object.keys(MODAL_COMBO_FIELDS);
      ids.forEach((id)=>{

        input.dataset.comboBound = "1";

        input.addEventListener("input", ()=> buildModalComboMenu(id, true));
        input.addEventListener("change", ()=> applyAsciiTight(input));
        if(btn){
          btn.addEventListener("click", (e)=>{

            const menu = getModalComboMenu(id);

        if(!input) return;
        input.value = item.getAttribute("data-value") || "";
        applyAsciiTight(input);

    // ===== ✅ SheetJS 自動補載（避免多人版本眾多、避免額外下載/放檔）=====
    const SHEETJS_URLS = [
      "https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js",
      "https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"
    ];

    function loadScriptOnce(url){
      return new Promise((resolve, reject)=>{
        const existed = [...document.scripts].some(s => (s.src || "").includes(url));
        if(existed){ resolve(true); return; }
        const s = document.createElement("script");
        s.src = url;
        s.async = true;
        s.onload = ()=> resolve(true);
        s.onerror = ()=> reject(new Error("load failed: " + url));
        document.head.appendChild(s);
      });
    }

    async function ensureXLSX(){
      if(window.XLSX) return true;
      for(const url of SHEETJS_URLS){
        try{
          await loadScriptOnce(url);
          if(window.XLSX) return true;
        }catch(e){}
      }
      return false;
    }

    // ===== Auth Table (唯一真相來源) =====
    function mapRole(v){
      const s=(v??"").toString().trim().toLowerCase();
      if(!s) return "read";
      if(s==="admin") return "admin";
      if(s==="write"||s==="edit") return "write";
      if(s==="read"||s==="view") return "read";
      if(s==="0") return "admin";
      if(s==="1") return "write";
      if(s==="2") return "read";
      return s;
    }

    function loadAuthTable(){
      try{
        const raw = localStorage.getItem(AUTH_KEY);
        if(!raw) return [];
        const parsed = JSON.parse(raw);
        if(Array.isArray(parsed)) return parsed;
        if(parsed && Array.isArray(parsed.users)) return parsed.users;
        return [];
      }catch(e){ return []; }
    }

    function pickUsername(row){ return norm(row?.username ?? row?.user ?? row?.account ?? row?.name); }
    function pickPassword(row){ return (row?.password ?? row?.pass ?? row?.pwd ?? "").toString(); }
    function pickRole(row){ return mapRole(row?.role ?? row?.level ?? row?.perm ?? row?.permission); }

    function findAuthUser(username){
      const u = norm(username).toLowerCase();
      if(!u) return null;
      const rows = loadAuthTable();
      for(const r of rows){
        const ru = pickUsername(r).toLowerCase();
        if(ru && ru===u){
          return { user: pickUsername(r), pass: pickPassword(r), role: pickRole(r) || "read" };
        }
      }
      return null;
    }

    function loadCurrentUser(){
      try{ currentUser = JSON.parse(localStorage.getItem(CURRENT_KEY) || "null"); }
      catch(e){ currentUser = null; }

      if(currentUser && typeof currentUser==="object"){
        const uname = norm(currentUser.user ?? currentUser.username ?? currentUser.account ?? currentUser.name);
        if(uname){
          currentUser.user = uname;
          currentUser.username = uname;
        }
        currentUser.role = mapRole(currentUser.role ?? currentUser.level ?? "read");
        currentUser.level = currentUser.role;
        currentUser.authStamp = (currentUser.authStamp ?? "").toString();
      }
    }

    function setCurrentUser(user, role, authStamp){
      const obj = {
        user,
        username: user,
        role: mapRole(role),
        level: mapRole(role),
        authStamp: (authStamp || "").toString()
      };
      localStorage.setItem(CURRENT_KEY, JSON.stringify(obj));
      currentUser = obj;
    }

    function role(){ return mapRole(currentUser?.role ?? currentUser?.level ?? "read"); }
    function canWrite(){ const r=role(); return r==="admin" || r==="write"; }
    function isAdmin(){ return role()==="admin"; }

    // ===== Session Watch Patch =====
    const SESSION_WATCH_MS = 3000;
    let _watchStarted = false;

    function fnv1a(str){
      let h = 0x811c9dc5;
      for(let i=0;i<str.length;i++){
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 0x01000193);
      }
      return (h >>> 0).toString(16).padStart(8, "0");
    }
    function authStampFromAuth(auth){
      return fnv1a(`${auth.user}|${auth.pass ?? ""}`);
    }

    function rebuildUserDropdown(preselectUser){
      const sel = $("loginUser");
      const rows = loadAuthTable();
      const users = rows.map(r => pickUsername(r)).filter(Boolean);

      const seen = new Set();
      const uniq = [];
      for(const u of users){
        const k = u.toLowerCase();
        if(seen.has(k)) continue;
        seen.add(k);
        uniq.push(u);
      }

      sel.innerHTML = `<option value="">請選擇帳號</option>` + uniq.map(u=>{
        const s = (preselectUser && u.toLowerCase() === preselectUser.toLowerCase()) ? "selected" : "";
        return `<option value="${escHtml(u)}" ${s}>${escHtml(u)}</option>`;
      }).join("");
    }

    function openLoginModal(msg){
      $("loginErr").style.display="none";
      if(msg){
        $("loginErr").textContent = msg;
        $("loginErr").style.display="block";
      }
      loadCurrentUser();
      rebuildUserDropdown(currentUser?.user || "");

      $("loginPass").value="";
      $("loginMask").classList.add("show");
      $("loginMask").setAttribute("aria-hidden","false");
      setTimeout(()=>{
        if($("loginUser").value) $("loginPass").focus();
        else $("loginUser").focus();
      },0);
    }
    function closeLoginModal(){
      $("loginMask").classList.remove("show");
      $("loginMask").setAttribute("aria-hidden","true");
    }

    function forceReLogin(msg){
      try{ localStorage.removeItem(CURRENT_KEY); }catch(e){}
      currentUser = null;
      toast(msg || "權限表已更新，請重新登入");
      openLoginModal(msg || "權限表已更新，請重新登入");
      $("uName").textContent="—";
      $("uRole").textContent="—";
    }

    function validateSession(){
      const lm = $("loginMask");
      if(lm && lm.classList.contains("show")) return;

      loadCurrentUser();
      if(!currentUser || !currentUser.user) return;

      const auth = findAuthUser(currentUser.user);
      if(!auth){ forceReLogin("帳號已被移除，請重新登入"); return; }

      const stampNow = authStampFromAuth(auth);

      if(!currentUser.authStamp){
        setCurrentUser(auth.user, auth.role || "read", stampNow);
        $("uName").textContent = auth.user;
        $("uRole").textContent = role();
        return;
      }

      if(currentUser.authStamp !== stampNow){
        forceReLogin("密碼已更新，請重新登入");
        return;
      }

      const r = auth.role || "read";
      if(mapRole(currentUser.role) !== r){
        setCurrentUser(auth.user, r, stampNow);
        $("uRole").textContent = r;
      }
    }

    function startSessionWatch(){
      if(_watchStarted) return;
      _watchStarted = true;

      window.addEventListener("storage", (e)=>{
        if(e.key === AUTH_KEY || e.key === CURRENT_KEY){
          validateSession();
        }
      });

      setInterval(validateSession, SESSION_WATCH_MS);
    }

    function ensureLoggedIn(){
      loadCurrentUser();
      const rows = loadAuthTable();
      if(!Array.isArray(rows) || rows.length === 0){
        openLoginModal("尚未建立權限表：請先到「權限表.html」建立帳號。");
        return false;
      }

      if(!currentUser || !currentUser.user){
        openLoginModal();
        return false;
      }

      const auth = findAuthUser(currentUser.user);
      if(!auth){ forceReLogin("帳號已被移除，請重新登入"); return false; }

      const stampNow = authStampFromAuth(auth);
      if(currentUser.authStamp && currentUser.authStamp !== stampNow){
        forceReLogin("密碼已更新，請重新登入");
        return false;
      }

      setCurrentUser(auth.user, auth.role || "read", stampNow);
      $("uName").textContent = auth.user;
      $("uRole").textContent = role();
      return true;
    }

    function doLogin(){
      const u = norm($("loginUser").value);
      const p = ($("loginPass").value ?? "").toString();
      const rows = loadAuthTable();

      if(!Array.isArray(rows) || rows.length === 0){
        $("loginErr").textContent = "尚未建立權限表：請先到「權限表.html」建立帳號。";
        $("loginErr").style.display = "block";
        return;
      }
      if(!u){
        $("loginErr").textContent = "請先選擇帳號。";
        $("loginErr").style.display = "block";
        return;
      }
      if(!p){
        $("loginErr").textContent = "請輸入密碼。";
        $("loginErr").style.display = "block";
        return;
      }

      const auth = findAuthUser(u);
      if(!auth){
        $("loginErr").textContent = "帳號不存在（以權限表為準）。";
        $("loginErr").style.display = "block";
        return;
      }
      if((auth.pass ?? "") !== p){
        $("loginErr").textContent = "密碼錯誤（以權限表為準）。";
        $("loginErr").style.display = "block";
        return;
      }

      const stampNow = authStampFromAuth(auth);
      setCurrentUser(auth.user, auth.role || "read", stampNow);

      closeLoginModal();
      toast("登入成功");
      start();
    }

    }
    function nextCounter(){

      localStorage.setItem(COUNTER_KEY, String(n));

    function loadDict(key){

        return Array.isArray(arr) ? arr.map(norm).filter(Boolean) : [];

    function ensureSeedDict(){

    function uniqueFromDB(field, rows = db){
      const set = new Set();
      for(const r of rows){
        const v = norm(r[field]);
        if(v) set.add(v);
      }
      return set;
    }
    function sortedValuesFromSet(set){
      return Array.from(set).sort((a,b)=> a.localeCompare(b, "zh-Hant"));
    }
    function filteredRowsBase(excludeKeys = []){
      const ignore = new Set(excludeKeys);
      const project = ignore.has("project") ? "" : comboValueOrEmpty("fProject").toLowerCase();
      const focus = ignore.has("focus") ? "" : comboValueOrEmpty("fFocus");
      const stage = ignore.has("stage") ? "" : comboValueOrEmpty("fStage");
      const unit = ignore.has("unit") ? "" : comboValueOrEmpty("fUnit");
      const responsibility = ignore.has("responsibility") ? "" : comboValueOrEmpty("fResponsibility");

      let rows = db.slice();
      if(project){
        rows = rows.filter(r => norm(r.project).toLowerCase().includes(project));
      }
      if(focus) rows = rows.filter(r => norm(r.focus) === focus);
      if(stage) rows = rows.filter(r => norm(r.stage) === stage);
      if(unit){
        const field = UNIT_FIELD_MAP[unit] || "";
        rows = field ? rows.filter(r => norm(r[field])) : rows;
      }
      if(responsibility){
        if(unit){
          const field = UNIT_FIELD_MAP[unit] || "";
          rows = field ? rows.filter(r => norm(r[field]) === responsibility) : rows;
        }else{
          rows = rows.filter(r => Object.values(UNIT_FIELD_MAP).some(field => norm(r[field]) === responsibility));
        }
      }
      return rows;
    }

    function comboValueOrEmpty(id){
      const v = norm($(id)?.value);
      return (v === "全部") ? "" : v;
    }

    function getFilterComboMenu(id){
      return $(id + "Menu");
    }

    function closeAllFilterCombos(exceptId){
      document.querySelectorAll(".filterComboMenu.open").forEach(menu=>{
        if(exceptId && menu.id === exceptId + "Menu") return;
        menu.classList.remove("open");
      });
    }

    function setFilterComboItems(id, items, keepValue){
      const input = $(id);
      const menu = getFilterComboMenu(id);
      if(!input || !menu) return;
      const normalized = ["", ...items.filter(Boolean)];
      input.dataset.options = JSON.stringify(normalized);
      const current = norm(keepValue != null ? keepValue : input.value);
      if(!current) input.placeholder = "全部";
      menu.innerHTML = normalized.length
        ? normalized.map(v=>{
            const label = v || "全部";
            return `<button class="filterComboItem" type="button" data-target="${id}" data-value="${escHtml(v)}">${escHtml(label)}</button>`;
          }).join("")
        : `<div class="filterComboEmpty">目前沒有可用選項</div>`;
    }

    function buildFilterComboMenu(id, forceOpen){
      const input = $(id);
      const menu = getFilterComboMenu(id);
      if(!input || !menu) return;
      let options = [];
      try{ options = JSON.parse(input.dataset.options || '[]'); }catch(e){ options = []; }
      const kw = norm(input.value).toLowerCase();
      const items = options.filter(v=>{
        const label = (v || '全部').toLowerCase();
        return !kw || label.includes(kw);
      });
      menu.innerHTML = items.length
        ? items.map(v=>{
            const label = v || "全部";
            return `<button class="filterComboItem" type="button" data-target="${id}" data-value="${escHtml(v)}">${escHtml(label)}</button>`;
          }).join("")
        : `<div class="filterComboEmpty">查無符合選項，可直接手動輸入</div>`;
      if(forceOpen) menu.classList.add("open");
      applyAsciiTight(input);
    }

    function initFilterCombos(){
      ["fProject","fFocus","fStage","fUnit","fResponsibility"].forEach((id)=>{
        const input = $(id);
        const btn = document.querySelector(`.filterComboBtn[aria-label][id]`) && document.querySelector(`.filterCombo [id="${id}"]`) ? document.querySelector(`.filterComboBtn[id="btn${id.charAt(1).toUpperCase()+id.slice(2)}Dropdown"]`) : null;
        if(!input || input.dataset.filterComboBound === "1") return;
        input.dataset.filterComboBound = "1";
        input.addEventListener("focus", ()=> buildFilterComboMenu(id, true));
        input.addEventListener("input", ()=>{
          buildFilterComboMenu(id, true);
          if(id === "fProject") render();
          else if(id === "fUnit"){ $("fResponsibility").value = ""; render(); }
          else render();
        });
        input.addEventListener("change", ()=>{
          applyAsciiTight(input);
          if(id === "fUnit") $("fResponsibility").value = "";
          render();
        });
        if(btn){
          btn.addEventListener("click", (e)=>{
            e.preventDefault();
            const menu = getFilterComboMenu(id);
            const willOpen = !menu.classList.contains("open");
            closeAllFilterCombos();
            buildFilterComboMenu(id, willOpen);
            if(willOpen) menu.classList.add("open");
          });
        }
      });
      document.addEventListener("click", (e)=>{
        if(!e.target.closest(".filterCombo")) closeAllFilterCombos();
      });
      document.addEventListener("click", (e)=>{
        const item = e.target.closest(".filterComboItem[data-target]");
        if(!item) return;
        const id = item.getAttribute("data-target");
        const input = $(id);
        if(!input) return;
        input.value = item.getAttribute("data-value") || "";
        applyAsciiTight(input);
        closeAllFilterCombos();
        if(id === "fUnit") $("fResponsibility").value = "";
        render();
      });
    }

    function rebuildProjectDatalist(){
      const input = $("fProject");
      if(!input) return;
      const rows = filteredRowsBase(["project"]);
      const allArr = sortedValuesFromSet(uniqueFromDB("project", rows));
      setFilterComboItems("fProject", allArr);
    }

    function rebuildFilters(){
      const focusRows = filteredRowsBase(["focus"]);
      const stageRows = filteredRowsBase(["stage"]);
      const respRows = filteredRowsBase(["responsibility"]);

      const focuses = sortedValuesFromSet(uniqueFromDB("focus", focusRows));
      const stages  = sortedValuesFromSet(uniqueFromDB("stage", stageRows));

      const fSel = $("fFocus");
      const sSel = $("fStage");
      const uSel = $("fUnit");
      const rSel = $("fResponsibility");

      const keepF = comboValueOrEmpty("fFocus");
      const keepS = comboValueOrEmpty("fStage");
      const keepU = comboValueOrEmpty("fUnit");
      const keepR = comboValueOrEmpty("fResponsibility");

      setFilterComboItems("fFocus", focuses, keepF);
      setFilterComboItems("fStage", stages, keepS);
      setFilterComboItems("fUnit", UNIT_FILTER_OPTIONS, keepU);

      let respValues = [];
      if(keepU){
        const field = UNIT_FIELD_MAP[keepU] || "";
        respValues = field ? sortedValuesFromSet(uniqueFromDB(field, respRows)) : [];
      }else{
        const respSet = new Set();
        for(const field of Object.values(UNIT_FIELD_MAP)){
          for(const v of uniqueFromDB(field, respRows)) respSet.add(v);
        }
        respValues = sortedValuesFromSet(respSet);
      }
      setFilterComboItems("fResponsibility", respValues, keepR);

      fSel.value = focuses.includes(keepF) ? keepF : "";
      sSel.value = stages.includes(keepS)  ? keepS : "";
      uSel.value = UNIT_FILTER_OPTIONS.includes(keepU) ? keepU : "";
      rSel.value = respValues.includes(keepR) ? keepR : "";
      [fSel,sSel,uSel,rSel].forEach(el=> applyAsciiTight(el));
    }

    function filteredRows(){
      let rows = filteredRowsBase();
      rows.sort((a,b)=> (a.id||0) - (b.id||0));
      return rows;
    }

    function render(){
      rebuildFilters();
      rebuildProjectDatalist();

      const rows = filteredRows();

      $("btnAdd").style.display      = writable ? "inline-block" : "none";

    function setModalEditable(editable){
      $("btnSave").style.display = editable ? "inline-block" : "none";
      $("btnDelete").style.display = (editable && isAdmin() && editingId != null) ? "inline-block" : "none";

      if(options.length === 0){
        sel.innerHTML = `<option value="" disabled selected>${escHtml(placeholder)}</option>`;

        sel.innerHTML = options.map(v=>`<option value="${escHtml(v)}">${escHtml(v)}</option>`).join("");

    function refreshModalDropdowns(){
      refreshModalComboMenus();

    function openModal(id, editable){
      validateSession();
      if(!currentUser || !currentUser.user){
        openLoginModal();
        return;
      }

      const item = (id == null) ? null : (db.find(x => x.id === id) || null);
      editingId = item ? item.id : null;

      $("mTitle").textContent = editable ? (item ? "編輯" : "新增") : "查看";
      setModalEditable(editable);

      $("mStage").value = item?.stage || "";
      $("mFocus").value = item?.focus || "";
      $("mProject").value = item?.project || "";
      $("mPkg").value = item?.pkg || "";
      $("mSupervise").value = item?.supervise || "";
      $("mIvv").value = item?.ivv || "";
      $("mConsult").value = item?.consult || "";
      $("mAgency").value = item?.agency || "";
      $("mDue").value = item?.due || "";
      $("mPenalty").value = item?.penalty || "";
      $("mNote").value = item?.note || "";

    function closeModal(){ $("mask").style.display = "none"; }

    function saveItem(){
      validateSession();
      if(!currentUser || !currentUser.user){
        openLoginModal();
        return;
      }
      if(!canWrite()){ toast("唯讀權限不可儲存"); return; }

      const item = {
        stage: norm($("mStage").value),
        focus: norm($("mFocus").value),
        project: norm($("mProject").value),
        pkg: norm($("mPkg").value),
        supervise: norm($("mSupervise").value),
        ivv: norm($("mIvv").value),
        consult: norm($("mConsult").value),
        agency: norm($("mAgency").value),
        due: norm($("mDue").value),
        penalty: norm($("mPenalty").value),
        note: norm($("mNote").value)
      };

      if(!item.project){ toast("工程項目不可空白"); $("mProject").focus(); return; }

      if(editingId != null){
        const idx = db.findIndex(x => x.id === editingId);
        if(idx >= 0) db[idx] = { id: editingId, ...item };
      }else{
        const id = nextCounter();
        db.push({ id, ...item });
        selectedId = id;
      }

      saveDB();
      closeModal();
      render();
      toast("已儲存");
    }

    function deleteItem(){
      validateSession();
      if(!currentUser || !currentUser.user){
        openLoginModal();
        return;
      }
      if(!isAdmin()){ toast("僅 admin 可刪除"); return; }
      if(editingId == null) return;
      if(!confirm("確定刪除這筆資料？")) return;

      db = db.filter(x => x.id !== editingId);
      if(selectedId === editingId) selectedId = null;
      saveDB();

      closeModal();
      render();
      toast("已刪除");
    }

    function openPrompt(mode){
      validateSession();
      if(!currentUser || !currentUser.user){
        openLoginModal();
        return;
      }
      if(!canWrite()){ toast("read 權限不可新增選單"); return; }

      promptMode = mode;
      $("pInput").value = "";

      if(mode === "owner"){
        $("pTitle").textContent = "新增權責";
        $("pLabel").textContent = "請輸入新的權責";
        $("pInput").placeholder = "例如：監造 / 統包 / 業主 / 設計 / 施工廠商...";
      }else{
        $("pTitle").textContent = "新增期限";
        $("pLabel").textContent = "請輸入新的期限";
        $("pInput").placeholder = "例如：3日 / 7日 / 14日 / 依合約...";
      }

      setTimeout(()=> $("pInput").focus(), 0);
    }

    function closePrompt(){
      $("pMask").style.display = "none";
      promptMode = null;
    }

    function addOption(){
      if(!canWrite()) return;

      const v = norm($("pInput").value);
      if(!v){ toast("不可空白"); $("pInput").focus(); return; }

      const key = (promptMode === "owner") ? OWNER_DICT_KEY : DUE_DICT_KEY;
      const field = (promptMode === "owner") ? "owner" : "due";

      const exists = unionOptions(field, key).map(x=>x.toLowerCase());
      if(exists.includes(v.toLowerCase())){ toast("已存在相同選項"); return; }

      const dict = loadDict(key);
      dict.push(v);
      dict.sort((a,b)=> a.localeCompare(b, "zh-Hant"));
      saveDict(key, dict);

      refreshModalDropdowns();
      rebuildFilters();

      if(promptMode === "owner") $("mOwnerSel").value = v;
      else $("mDueSel").value = v;

      closePrompt();
      render();
      toast("已新增選項");
    }

    async function downloadExcel(){
      if(!canWrite()){ toast("唯讀不可下載"); return; }
      const ok = await ensureXLSX();
      if(!ok){ toast("Excel 功能載入失敗（請確認網路可連線）"); return; }

      try{
        const rows = filteredRows();
        const aoa = [["階段","工作重點","工程項目","統包廠商","監造單位","IV&V","專管顧問","主辦機關","期限","罰則","說明"]];
        for(const r of rows){
          aoa.push([
            norm(r.stage), norm(r.focus), norm(r.project), norm(r.pkg), norm(r.supervise),
            norm(r.ivv), norm(r.consult), norm(r.agency), norm(r.due), norm(r.penalty), norm(r.note)
          ]);
        }
        const ws = XLSX.utils.aoa_to_sheet(aoa);
        ws["!cols"] = [
          { wch: 12 }, { wch: 16 }, { wch: 42 }, { wch: 14 }, { wch: 14 },
          { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 10 }, { wch: 10 }, { wch: 24 }
        ];
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "權責分工精簡版");

        const d = new Date();
        const y = d.getFullYear();
        const m = String(d.getMonth()+1).padStart(2,"0");
        const dd= String(d.getDate()).padStart(2,"0");
        const base = `捷運汐東線權責分工精簡版_${y}${m}${dd}`;

        try{
          XLSX.writeFile(wb, `${base}.xlsx`, { bookType:"xlsx" });
          toast(`已下載 Excel（${rows.length} 筆；xlsx）`);
          return;
        }catch(e1){
          XLSX.writeFile(wb, `${base}.xls`, { bookType:"xls" });
          toast(`已下載 Excel（${rows.length} 筆；xls）`);
        }
      }catch(e){
        toast("執行下載失敗（Excel）");
      }
    }

    function triggerUpload(){
      if(!canWrite()){ toast("唯讀不可上傳"); return; }
      $("fileInput").value = "";
      $("fileInput").click();
    }

    async function importExcel(file){
      if(!canWrite()){ toast("唯讀不可上傳"); return; }
      const ok = await ensureXLSX();
      if(!ok){ toast("匯入功能載入失敗（請確認網路可連線）"); return; }

      const reader = new FileReader();
      reader.onload = (evt)=>{
        try{
          const data = new Uint8Array(evt.target.result);
          const wb = XLSX.read(data, { type:"array", cellDates:true });
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, { header:1, raw:false, defval:"" });

          if(!rows || rows.length < 1){ toast("檔案是空白"); return; }

          const mapNames = ["階段","工作重點","工程項目","統包廠商","監造單位","IV&V","專管顧問","主辦機關","期限","罰則","說明"];
          let headerRowIndex = -1;
          let headerMap = {};
          for(let i=0;i<Math.min(rows.length, 8);i++){
            const header = (rows[i] || []).map(normHead);
            const temp = {};
            mapNames.forEach(name=>{ temp[name] = header.indexOf(normHead(name)); });
            if(temp["工程項目"] >= 0){
              headerRowIndex = i;
              headerMap = temp;
              break;
            }
          }
          if(headerRowIndex < 0){
            toast("表頭需包含：階段 / 工作重點 / 工程項目 / 統包廠商 / 監造單位 / IV&V / 專管顧問 / 主辦機關 / 期限 / 罰則 / 說明");
            return;
          }

          let mode = "append";
          if(db.length > 0){
            const yes = confirm("是否要先清空既有資料，再匯入檔案內容？\n確定：清空後匯入\n取消：保留原資料並追加匯入");
            mode = yes ? "replace" : "append";
          }
          if(mode === "replace"){
            db = [];
            localStorage.setItem(COUNTER_KEY, "0");
          }

          const seen = new Set(db.map(r => [norm(r.stage), norm(r.focus), norm(r.project), norm(r.due)].join("｜").toLowerCase()));

          let addCount = 0;
          let skipCount = 0;
          for(let i=headerRowIndex+1;i<rows.length;i++){
            const r = rows[i] || [];
            const item = {
              stage: norm(r[headerMap["階段"]]),
              focus: norm(r[headerMap["工作重點"]]),
              project: norm(r[headerMap["工程項目"]]),
              pkg: norm(r[headerMap["統包廠商"]]),
              supervise: norm(r[headerMap["監造單位"]]),
              ivv: norm(r[headerMap["IV&V"]]),
              consult: norm(r[headerMap["專管顧問"]]),
              agency: norm(r[headerMap["主辦機關"]]),
              due: norm(r[headerMap["期限"]]),
              penalty: norm(r[headerMap["罰則"]]),
              note: norm(r[headerMap["說明"]])
            };

            if(Object.values(item).every(v => !v)) continue;
            if(!item.project){ skipCount++; continue; }

            const sig = [item.stage, item.focus, item.project, item.due].join("｜").toLowerCase();
            if(seen.has(sig)){ skipCount++; continue; }
            seen.add(sig);

            const id = nextCounter();
            db.push({ id, ...item });
            addCount++;
          }

          saveDB();
          rebuildProjectDatalist();
          rebuildFilters();
          render();

          if(addCount > 0){
            toast(`匯入完成：新增 ${addCount} 筆` + (skipCount ? `，略過 ${skipCount} 筆重複/空白` : ""));
          }else{
            toast("匯入完成，但沒有新增資料；請確認表頭或內容是否重複");
          }
        }catch(e){
          console.error(e);
          toast("匯入失敗：請確認檔案格式（xlsx/xls）與表頭");
        }
      };
      reader.readAsArrayBuffer(file);
    }

    function setupMoreMenu(backHref){
      const backBtn = $("mBack");
      const moreBtn = $("mMoreBtn");
      const menu = $("mMoreMenu");

      const close = ()=> menu.classList.remove("open");
      const toggle = (e)=>{
        e.preventDefault();
        e.stopPropagation();
        menu.classList.toggle("open");
      };

      backBtn.onclick = ()=> go(backHref);
      moreBtn.addEventListener("click", toggle);

      menu.addEventListener("click", (e)=>{
        e.stopPropagation();
        const item = e.target.closest("button.menuItem[data-href]");
        if(!item) return;
        const href = item.getAttribute("data-href");
        if(href) go(href);
      });

      document.addEventListener("click", close);
      window.addEventListener("keydown", (e)=>{ if(e.key === "Escape") close(); });
    }

    function start(){
      if(!ensureLoggedIn()) return;

      ensureSeedDict();
      loadDB();
      initModalCombos();

      $("navHome").onclick = () => go("index.html");
      setupMoreMenu("index.html");

      initFilterCombos();

      $("btnClear").onclick = () => {
        $("fProject").value = "";
        $("fFocus").value = "";
        $("fStage").value = "";
        $("fUnit").value = "";
        $("fResponsibility").value = "";
        closeAllFilterCombos();
        render();
      };

      $("btnAdd").onclick = ()=>{
        if(!canWrite()){ toast("唯讀不可新增"); return; }
        editingId = null;
        openModal(null, true);
      };

      $("btnEdit").onclick = ()=>{
        if(!canWrite()){ toast("唯讀不可編輯"); return; }
        if(!selectedId){ toast("請先點選一列再按編輯"); return; }
        openModal(selectedId, true);
      };

      $("btnTemplate").onclick = downloadExcel;
      $("btnUpload").onclick = triggerUpload;

      $("fileInput").addEventListener("change", ()=>{
        const f = $("fileInput").files?.[0];
        if(!f) return;
        importExcel(f);
      });

      $("btnClose").onclick = closeModal;
      $("btnCancel").onclick = closeModal;
      $("mask").addEventListener("click", (e)=>{ if(e.target === $("mask")) closeModal(); });

      $("btnSave").onclick = saveItem;
      $("btnDelete").onclick = deleteItem;


      $("pClose").onclick = closePrompt;
      $("pCancel").onclick = closePrompt;
      $("pOk").onclick = addOption;
      $("pMask").addEventListener("click", (e)=>{ if(e.target === $("pMask")) closePrompt(); });

      $("tbody").addEventListener("click", (e)=>{
        const viewBtn = e.target.closest("button[data-act='view']");
        if(viewBtn){
          const id = Number(viewBtn.getAttribute("data-id"));
          if(Number.isFinite(id)) openModal(id, false);
          return;
        }
        const tr = e.target.closest("tr[data-id]");
        if(!tr) return;
        const id = Number(tr.getAttribute("data-id"));
        if(!Number.isFinite(id)) return;
        selectedId = id;
        render();
      });

      window.addEventListener("keydown", (e)=>{
        if(e.key === "Escape"){
          if($("pMask").style.display === "flex") closePrompt();
          else if($("mask").style.display === "flex") closeModal();
        }
        if(e.key === "Enter" && $("pMask").style.display === "flex") addOption();
      });

      render();
    }

    (function bindLogin(){
      $("loginClose").onclick = closeLoginModal;
      $("loginToAuth").onclick = ()=> go("權限表.html");
      $("loginBtn").onclick = doLogin;

      $("loginMask").addEventListener("click",(e)=>{
        if(e.target === $("loginMask")) closeLoginModal();
      });

      window.addEventListener("keydown",(e)=>{
        if(e.key === "Escape" && $("loginMask").classList.contains("show")) closeLoginModal();
        if(e.key === "Enter" && $("loginMask").classList.contains("show")) doLogin();
      });

      $("loginUser").addEventListener("change", ()=>{
        if($("loginUser").value) $("loginPass").focus();
      });
    })();

    startSessionWatch();
    start();
  </script>

<script>
(function(){
  function syncBridge(){
    try{
      var cur = JSON.parse(sessionStorage.getItem('tasunCurrentUser_v1') || localStorage.getItem('tasunCurrentUser_v1') || sessionStorage.getItem('tasunSessionBridge_v1') || localStorage.getItem('tasunSessionBridge_v1') || 'null');
      if(cur && cur.user){
        sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(cur));
        localStorage.setItem('tasunSessionBridge_v1', JSON.stringify(cur));
      }
      var tokenKeys = ['tasunCloudToken_v1','tasunCloudToken_v1__sxdh-notes','tasunCloudToken_v1__auth-table','tasunBearerToken_v1','tasunAccessToken_v1','tasunAuthToken_v1','tasunSessionToken_v1','tasun_token','tasunToken','tasun_auth_token','authToken','access_token','token','x-api-key','tasunApiKey_v1'];
      var token = '';
      for(var i=0;i<tokenKeys.length;i++){ token = String(sessionStorage.getItem(tokenKeys[i]) || localStorage.getItem(tokenKeys[i]) || '').trim(); if(token) break; }
      if(token) tokenKeys.forEach(function(k){ try{sessionStorage.setItem(k, token);}catch(e){} try{localStorage.setItem(k, token);}catch(e){} });
      var who = document.getElementById('uName');
      var role = document.getElementById('uRole');
      if(cur && cur.user){
        if(who && (!who.textContent || who.textContent.trim()==='—' || who.textContent.trim()==='-')) who.textContent = cur.user;
        var rr = String(cur.role || cur.level || 'read').trim().toLowerCase() || 'read';
        if(role && (!role.textContent || role.textContent.trim()==='—' || role.textContent.trim()==='-')) role.textContent = rr;
      }
    }catch(e){}
  }
  function patchAnchors(){
    document.querySelectorAll('a[href], [data-href]').forEach(function(node){
      var href = node.getAttribute('href') || node.getAttribute('data-href') || '';
      if(!href || href === '#' || /^https?:\/\//i.test(href) || /^mailto:/i.test(href) || /^tel:/i.test(href)) return;
      if(window.__withV) {
        var vv = window.__withV(href);
        if(node.hasAttribute('href')) node.setAttribute('href', vv);
        if(node.hasAttribute('data-href')) node.setAttribute('data-href', vv);
      }
    });
  }
  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function(){ syncBridge(); patchAnchors(); }, {once:true});
  else { syncBridge(); patchAnchors(); }
})();
</script>
