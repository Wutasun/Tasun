<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><title>權限表逐步測試 v3</title>
<style>
body{font-family:Arial,"Microsoft JhengHei",sans-serif;padding:20px;background:#111;color:#eee}
button{margin:4px;padding:10px 14px;border-radius:8px;border:1px solid #888;background:#222;color:#fff;cursor:pointer}
button:hover{background:#333}
#summary{margin:12px 0;padding:10px 12px;border-radius:8px;background:#1a1a1a;border:1px solid #444}
#o{background:#1d1d1d;padding:12px;border-radius:8px;white-space:pre-wrap;min-height:280px;border:1px solid #444;line-height:1.7}
.ok{color:#7CFC98}.bad{color:#ff8a8a}.warn{color:#ffd27f}.title{color:#8ecbff;font-weight:700}
</style>
<h1>權限表逐步測試 v3</h1>
<p>這版會直接顯示測試結論，並在每一步輸出結果。</p>
<div>
<button onclick="runAll()">全部測試</button>
<button onclick="runSingle(testCurrent)">Step 1：目前使用者</button>
<button onclick="runSingle(testAuth)">Step 2：權限表</button>
<button onclick="runSingle(testEntry)">Step 3：入口與按鍵</button>
<button onclick="runSingle(testFuncs)">Step 4：缺失函式</button>
<button onclick="runSingle(testScripts)">Step 5：外部腳本</button>
</div>
<div id="summary">尚未測試</div>
<pre id="o"></pre>
<script>
const o=document.getElementById('o');
const summary=document.getElementById('summary');
let state={ok:0,bad:0,warn:0};
function resetState(){state={ok:0,bad:0,warn:0};o.innerHTML='';}
function line(msg,cls=''){const d=document.createElement('div');d.textContent=msg;if(cls){d.className=cls; if(state[cls]!==undefined) state[cls]++;}o.appendChild(d)}
function setSummary(title){summary.textContent=`${title}｜正常 ${state.ok} 項｜異常 ${state.bad} 項｜注意 ${state.warn} 項`; summary.style.color= state.bad? '#ffb0b0' : (state.warn? '#ffe1a3':'#b8ffcc');}
function j(v){try{return JSON.stringify(v,null,2)}catch(e){return String(v)}}
function runSingle(fn){resetState(); fn(); setSummary(fn.name+' 完成');}
function runAll(){resetState(); [testCurrent,testAuth,testEntry,testFuncs,testScripts].forEach(fn=>fn()); setSummary('全部測試完成');}
function testCurrent(){
  line('【Step 1】目前使用者','title');
  const keys=['tasunCurrentUser_v1','tasunCurrentUser_v2','tasunSso_v2','tasunSessionLogin_v2'];
  let hit=false;
  keys.forEach(k=>{let v=localStorage.getItem(k)||sessionStorage.getItem(k); if(v){hit=true; line(k+': '+v,'ok')}});
  if(!hit) line('找不到任何目前使用者 key','bad');
  line('');
}
function testAuth(){
  line('【Step 2】權限表','title');
  const raw=localStorage.getItem('tasunAuthTable_v1');
  if(!raw){ line('tasunAuthTable_v1 不存在','bad'); line(''); return; }
  try{
    const arr=JSON.parse(raw);
    if(Array.isArray(arr)){ line('tasunAuthTable_v1 筆數: '+arr.length,'ok'); if(arr.length===0) line('權限表存在但為空陣列','warn'); }
    else line('tasunAuthTable_v1 不是陣列','bad');
  }catch(e){line('tasunAuthTable_v1 JSON 解析失敗: '+e.message,'bad')}
  line('');
}
function testEntry(){
  line('【Step 3】入口與按鍵','title');
  const raw=localStorage.getItem('tasunNavButtons_v1');
  if(!raw){ line('tasunNavButtons_v1 不存在','bad'); line(''); return; }
  try{
    const arr=JSON.parse(raw);
    if(Array.isArray(arr)){ line('tasunNavButtons_v1 筆數: '+arr.length,'ok'); if(arr.length){ line('前 3 筆：','warn'); line(j(arr.slice(0,3))); } }
    else line('tasunNavButtons_v1 不是陣列','bad');
  }catch(e){line('tasunNavButtons_v1 JSON 解析失敗: '+e.message,'bad')}
  line('');
}
function testFuncs(){
  line('【Step 4】缺失函式','title');
  line('這一步要配合權限表主頁 console 檢查。','warn');
  ['normalizeEntryButtons','orderEntryButtons'].forEach(fn=> line(fn+'：若 console 顯示 is not defined，就是主因','warn'));
  line('');
}
function testScripts(){
  line('【Step 5】外部腳本','title');
  line('這一步要配合權限表主頁 console 檢查。','warn');
  line('若仍看到 Unexpected token 或 TasunCloudKit not found，代表主 script 或外部 script 路徑仍有問題。','warn');
  line('');
}
runAll();
</script></html>
