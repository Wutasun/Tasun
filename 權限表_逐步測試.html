<!doctype html><html lang="zh-Hant"><meta charset="utf-8"><title>權限表逐步測試</title>
<style>body{font-family:Arial,"Microsoft JhengHei",sans-serif;padding:20px;background:#111;color:#eee}button{margin:4px;padding:8px 12px}pre{background:#1d1d1d;padding:12px;border-radius:8px;white-space:pre-wrap}.ok{color:#7CFC98}.bad{color:#ff8a8a}</style>
<h1>權限表逐步測試</h1>
<p>這份測試檔會逐步檢查目前常見斷點。</p>
<div>
<button onclick="runAll()">全部測試</button>
<button onclick="testCurrent()">Step 1：目前使用者</button>
<button onclick="testAuth()">Step 2：權限表</button>
<button onclick="testEntry()">Step 3：入口與按鍵</button>
<button onclick="testFuncs()">Step 4：缺失函式</button>
<button onclick="testScripts()">Step 5：外部腳本</button>
</div>
<pre id=o></pre>
<script>
const o=document.getElementById('o');
function line(msg,cls=''){const d=document.createElement('div');d.textContent=msg;if(cls)d.className=cls;o.appendChild(d)}
function clearO(){o.innerHTML='';}
function j(v){try{return JSON.stringify(v,null,2)}catch(e){return String(v)}}
function runAll(){clearO(); testCurrent(); testAuth(); testEntry(); testFuncs(); testScripts();}
function testCurrent(){
  line('【Step 1】目前使用者');
  const keys=['tasunCurrentUser_v1','tasunCurrentUser_v2','tasunSso_v2','tasunSessionLogin_v2'];
  let hit=false;
  keys.forEach(k=>{let v=localStorage.getItem(k)||sessionStorage.getItem(k); if(v){hit=true; line(k+': '+v,'ok')}});
  if(!hit) line('找不到任何目前使用者 key','bad');
}
function testAuth(){
  line(''); line('【Step 2】權限表');
  const raw=localStorage.getItem('tasunAuthTable_v1');
  if(!raw) return line('tasunAuthTable_v1 不存在','bad');
  try{ const arr=JSON.parse(raw); line('tasunAuthTable_v1 筆數: '+(Array.isArray(arr)?arr.length:'非陣列'), Array.isArray(arr)?'ok':'bad'); }catch(e){line('tasunAuthTable_v1 JSON 解析失敗: '+e.message,'bad')}
}
function testEntry(){
  line(''); line('【Step 3】入口與按鍵');
  const raw=localStorage.getItem('tasunNavButtons_v1');
  if(!raw) return line('tasunNavButtons_v1 不存在','bad');
  try{const arr=JSON.parse(raw); line('tasunNavButtons_v1 筆數: '+(Array.isArray(arr)?arr.length:'非陣列'), Array.isArray(arr)?'ok':'bad'); if(Array.isArray(arr)) line(j(arr.slice(0,5)));}catch(e){line('tasunNavButtons_v1 JSON 解析失敗: '+e.message,'bad')}
}
function testFuncs(){
  line(''); line('【Step 4】缺失函式');
  ['normalizeEntryButtons','orderEntryButtons'].forEach(fn=>{ line(fn+': 需在權限表頁主 script 內存在','ok'); });
  line('這一步在權限表主頁開 console 檢查最準。');
}
function testScripts(){
  line(''); line('【Step 5】外部腳本');
  line('請在權限表主頁 console 檢查是否仍有 Unexpected token / TasunCloudKit not found','ok');
  line('若有，代表頁面本身主 script 先語法中斷，或外部 script 路徑 404。');
}
</script></html>
