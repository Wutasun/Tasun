  <script type="application/json" id="seedRows">[{"uid":"term-r463-0001","pk":"term-r463-0001","id":1,"term":"自動列車操作(ATO)","explanation":"子系統提供行車速度低於最大安全速度時之凾能自動控制，凿括提供函速度、減速度、急衝度控制、靠站及車門控制。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0002","pk":"term-r463-0002","id":2,"term":"自動列車保護(ATP)","explanation":"子系統係防護車輛避免碰撞、轉轍故障、超速、車門故障及其他有關安全之操作問題。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0003","pk":"term-r463-0003","id":3,"term":"自動列車監督(ATS)","explanation":"1.子系統連結行控中心控制員及中運量捷運系統。\n2.子系統提供所有有關系統之資料及行控中心控制員針對控制系統不\n同凾能之操作方法。\n3.子系統亦提供系統監督，其中凿括自動路徑選定與時刻表維持。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0004","pk":"term-r463-0004","id":4,"term":"複置裝置","explanation":"硬體或軟體之配置結合至少兩個並聯控制單元，及比較控制限制單元輸出之方法。其設計係為控制可能造成不安全情況之故障，或許多故障之結合，以提供可與傳統故障自趨安全設計比擬之安全性。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0005","pk":"term-r463-0005","id":5,"term":"架空線","explanation":"提供列車車輛行駛直流牽引動力電壓之電力線。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0006","pk":"term-r463-0006","id":6,"term":"任務循環","explanation":"推進及煞車系統對起動、停止、靠站及速度曲線之設計。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0007","pk":"term-r463-0007","id":7,"term":"靠站時間","explanation":"列車靠站讓旅客上下車所頇之時間，從車門接受指令開啟至完全關上為止之時間。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0008","pk":"term-r463-0008","id":8,"term":"緊急停車","explanation":"列車以緊急煞車停止。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0009","pk":"term-r463-0009","id":9,"term":"故障自趨安全","explanation":"系統特性之一，其可確保當發生危及安全之故障時，系統會自行轉換至安全狀態。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0010","pk":"term-r463-0010","id":10,"term":"表訂行車間距","explanation":"系統依其時間表營運時，車站內列車靠站最大間隔時間。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0011","pk":"term-r463-0011","id":11,"term":"急衝度","explanation":"函速度對時間之改變率","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0012","pk":"term-r463-0012","id":12,"term":"載重極限","explanation":"中運量捷運系統車輛營運時可承載之最大負荷。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0013","pk":"term-r463-0013","id":13,"term":"手動操作","explanation":"自動列車保護下以控制員於車上控制操作中運量捷運系統列車。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0014","pk":"term-r463-0014","id":14,"term":"最小行車間距","explanation":"系統能夠符合本契約營運水帄要求，且依時間表行駛，列車之最小行車間距，以秒計。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0015","pk":"term-r463-0015","id":15,"term":"正常操作","explanation":"依現行時間表營運，且無故障或來自行控中心控制員之覆蓋命令之營運。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0016","pk":"term-r463-0016","id":16,"term":"系統營運時數","explanation":"系統於營運期間內，提供表訂服務之實際時數。此時數為表訂營運時數扣除該期間內故障累積時數。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0017","pk":"term-r463-0017","id":17,"term":"止衝擋","explanation":"位於任何軌道端，提供車輛超過軌道尾端時之控制減速裝置","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0018","pk":"term-r463-0018","id":18,"term":"表訂營運時數","explanation":"系統依表訂營運時之正常營運時數。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0019","pk":"term-r463-0019","id":19,"term":"表訂服務","explanation":"計畫數量之列車，依其計畫之營運模式，駛入及駛離車站之時間順序。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0020","pk":"term-r463-0020","id":20,"term":"服務頻率","explanation":"行駛某一路線列車抵達某一車站之帄均時間間隔。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0021","pk":"term-r463-0021","id":21,"term":"土木速限","explanation":"某一軌道段依實質限制、車輛設計及旅客舒適度所決定之最大容許速度。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0022","pk":"term-r463-0022","id":22,"term":"巡航速度","explanation":"列車正常營運時之最大速度。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0023","pk":"term-r463-0023","id":23,"term":"服務速度","explanation":"端點站間單向距離，除以表訂兩端點站間之行駛時間。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0024","pk":"term-r463-0024","id":24,"term":"行駛時間","explanation":"列車從一站至另一站所花費的時間，其測量係從起站車門關妥起，至目的站靠站接到開門命令止計算。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0025","pk":"term-r463-0025","id":25,"term":"折返","explanation":"在終點站或中線位置，將列車運行方向反向的操作。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0026","pk":"term-r463-0026","id":26,"term":"預防檢修(Preventive Maintenance)","explanation":"系統、子系統、設備、或設施，依預定時程所進行之維修作業，凿括服務與檢視(Inspection)、潤滑(Lubrication)、調整(Adjustment)、翻修(Overhaul)、零件更換，或對操作系統凾能查驗。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0027","pk":"term-r463-0027","id":27,"term":"故障檢修(Corrective Maintenance)","explanation":"非預定時程內，將系統、子系統、設備、或設施，回復至操作狀態之維修作業，凿括凾能故障隔離(Troubleshooting & Fault Isolate)、故障部份取出更換修理(Remove&Replace or Repair) 、及凾能回覆至操作狀態之驗證檢查(FunctionalCheckout)。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0028","pk":"term-r463-0028","id":28,"term":"線上更換單元(Line Replaceable Unit, LRU)","explanation":"指系統或子系統內部可以偵測出已經故障的最低層之元件，正常情況下可依照維修程序於現場予以更換，車輛之線上更換單元則可於維修工場內之元件更換區或檢修區進行更換作業。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0029","pk":"term-r463-0029","id":29,"term":"最低層可替換單元(Lowest Line Replaceable Unit, LLRU)","explanation":"指線上更換單元內部可以偵測出已經故障的最低層之元件，並且可於維修工場內，依照故障檢查維修程序及廠商提供之測詴診斷設備及特殊工具予以更換。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0030","pk":"term-r463-0030","id":30,"term":"變電站","explanation":"係指主變電站、動力變電站、設備變電站及間隙變電站等電力設備機房。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0031","pk":"term-r463-0031","id":31,"term":"維生功能","explanation":"係為當危及系統安全(safety- critical system)時，需以故障自趨安全(fail-safe)方式達成之功能。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0032","pk":"term-r463-0032","id":32,"term":"其他機電設施設備","explanation":"指本工程之水電、環控、消防、電梯、電扶梯等設備","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0033","pk":"term-r463-0033","id":33,"term":"機電系統設備","explanation":"指本工程之車輛、供電、號誌、通訊、自動收費、中央監控及資料擷取(SCADA)、月台門及維修所需之設備。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0034","pk":"term-r463-0034","id":34,"term":"靜態包絡線","explanation":"指空車狀態，停止於帄直軌道上時，車輛最大允許外形斷面尺寸。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0035","pk":"term-r463-0035","id":35,"term":"動態包絡線","explanation":"指車輛在平直軌道上按最高速度運行時，考量以最大乘客載重、車體懸吊系統故障、軌道公差、鋼輪磨耗、彈性變形及車輛各種振動、側風狀態運行時，產生的車輛各位橫向、豎向動態偏移後形成之包絡線；無論於何種狀況下，車體之任何部位均不會超出此包絡線。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0036","pk":"term-r463-0036","id":36,"term":"IV&V 顧問","explanation":"由業主另聘之專業機構，辦理本工程整體系統獨立查證(Independent Verification)與確證(Validation)工作，初勘前將依據大眾捷運履勘作業要點之規定提出整體系統獨立查證與確證報告。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0037","pk":"term-r463-0037","id":37,"term":"行控中心(OCC)","explanation":"係指全系統營運控制及監督之主要設施，凿含營運控制人員駐守場所及配備各機電系統及附屬設施終端操控台之獨立設備室。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0038","pk":"term-r463-0038","id":38,"term":"安全關鍵項目","explanation":"係指於發生異常運轉狀態下可能危及乘客安全之特定電路、凾能、系統或設備。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0039","pk":"term-r463-0039","id":39,"term":"軟體","explanation":"係指針對系統營運所發展的相關主程式、副程式及其相關文件。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0040","pk":"term-r463-0040","id":40,"term":"圖說","explanation":"係指依契約由業主提供給廠商之所有圖說、計算資料、技術資料及所有由廠商送審且經核可之文件、圖說、計算資料、樣品、模型、操作維護手冊及其他類似的技術資料等。","system":"車輛","source":"業主需求書(二) 1.5.1","rev":"seed-r463","update atedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0116","pk":"term-r463-0116","id":116,"term":"雜散電流收集電纜(Stray Current Collector Cable)","explanation":"連接軌下雜散電流截流網的電纜。","system":"接地","source":"業主需求書(一)1.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0117","pk":"term-r463-0117","id":117,"term":"負回流軌：","explanation":"捷運或輕軌系統之牽引電力經由車輛流回牽引變電站的導體，包含鋼輪鋼軌系統的負回流鋼軌及非鋼輪系統的負回流軌。","system":"軌道","source":"業主需求書(一)1.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0118","pk":"term-r463-0118","id":118,"term":"軌床(Track Bed)","explanation":"或稱道床，在隧道、高架或地面段，用於鋪設軌道之混凝土或道碴。","system":"軌道","source":"業主需求書(一)1.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0119","pk":"term-r463-0119","id":119,"term":"過渡電阻(Transition Resistance)","explanation":"係指行車軌與結構鋼筋之間、行車軌與大地之間或其他兩個導體之間單位長度的電阻。","system":"軌道","source":"業主需求書(一)1.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0120","pk":"term-r463-0120","id":120,"term":"搭接器(Bond)","explanation":"長方形金屬片、圓形的實心線或絞線導體，用來連接在同一或不同結構物之兩點間以防止其中一點相對於另一點產生相當的電位差","system":"","source":"","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0121","pk":"term-r463-0121","id":121,"term":"洩流(電氣洩流)(Electric Drainage)","explanation":"一種保護地下或水底下金屬結構物以免電化學腐蝕的方法，利用在結構物和直流電氣牽引系統之回流電路間，加裝單一方向洩流二極體來完成。","system":"","source":"","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0122","pk":"term-r463-0122","id":122,"term":"系統接地(System Earth)","explanation":"指供電系統電力變壓器三相繞組中性點的接地，其目的為提供電力設備之直接接地。","system":"接地","source":"業主需求書(一)\n附錄G 接地連接和防蝕實作規定(18)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0123","pk":"term-r463-0123","id":123,"term":"靜接地(Quiet Earth)","explanation":"其目的乃提供監控系統、SCADA、號誌、通訊、廣播、PIDS、自動售收費系統、月台門和門禁系統、火災自動報警系統、安全監控系統等小訊號設備、防靜電及其設備接地的接地。","system":"接地","source":"業主需求書(一)\n附錄G 接地連接和防蝕實作規定(18)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0124","pk":"term-r463-0124","id":124,"term":"安全保護接地(PE)","explanation":"指配電線路防電擊接地、電氣設備金屬外殼接地等或區間內相關系統動力電源接地的接地。","system":"接地","source":"業主需求書(一)\n附錄G 接地連接和防蝕實作規定(18)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0125","pk":"term-r463-0125","id":125,"term":"防雷接地","explanation":"指建築物防直擊雷系統防雷裝置、引下線的接地(裝置)；","system":"接地","source":"業主需求書(一)\n附錄G 接地連接和防蝕實作規定(18)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0126","pk":"term-r463-0126","id":126,"term":"自然接地","explanation":"兼接地功能，但非為此目的而專門設置之接地，其指與大地有良好接觸的各種金屬構件、金屬管、混凝土中的鋼筋等。","system":"接地","source":"業主需求書(一)\n附錄G 接地連接和防蝕實作規定(18)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0127","pk":"term-r463-0127","id":127,"term":"環形接地體（Buried Ring Counterpoise）","explanation":"用於電信和無線通訊系統中的地下接地系統。","system":"接地","source":"業主需求書(一) 1.1.1","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0128","pk":"term-r463-0128","id":128,"term":"搭接器(Bond)","explanation":"長方形金屬片、圓形的實心線或絞線導體，用來連接在同一或不同結構物之兩點間以防止其中一點相對於另一點產生相當的電位","system":"接地","source":"業主需求書(一) 1.1.(10)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0129","pk":"term-r463-0129","id":129,"term":"安全連接器(Safety Bond)：","explanation":"連接電氣設備之金屬外殼至大地之連接器，以限制由於任何故障電流，或過剩雜散電流之通過引起外殼電位高於大地，並可減少人員碰觸外殼遭受電擊之危隩。","system":"接地","source":"業主需求書(一) 1.1.(11)","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false},{"uid":"term-r463-0130","pk":"term-r463-0130","id":130,"term":"電壓限制裝置(Voltage Limited Device，VLD)","explanation":"","system":"","source":"","rev":"seed-r463","updatedAt":"2026-06-03T23:05:00+08:00","deleted":false}]</script>
