'    .topbar.tasunHeaderMerged .nav-left{ order:-20 !important; width:100% !important; justify-content:flex-start !important; }\n' +
'    .topbar.tasunHeaderMerged .right{ order:-10 !important; width:100% !important; justify-content:flex-start !important; }\n' +
'    .topbar.tasunHeaderMerged .tasunStatusRow{ order:30 !important; min-height:30px !important; padding:4px 7px !important; font-size:11.5px !important; justify-content:flex-start !important; overflow:auto !important; }\n' +
'    .topbar.tasunHeaderMerged .tasunStatusRow .hb, .topbar.tasunHeaderMerged .tasunStatusRow .k, .topbar.tasunHeaderMerged .tasunStatusRow .v{ font-size:11.5px !important; }\n' +
'  }\n' +
'</style>\n';
  }

  function layoutMergeScript(){
    return '' +
'<script id="tasun-sxdh-layout-merge-r5-script">\n' +
'(function(){\n' +
'  \'use strict\';\n' +
'  if(window.__TASUN_SXDH_LAYOUT_MERGE_R5__) return;\n' +
'  window.__TASUN_SXDH_LAYOUT_MERGE_R5__ = true;\n' +
'  function toast(msg){ try{ if(typeof window.toast === \'function\'){ window.toast(msg); return; } var t=document.getElementById(\'toast\'); if(t){ t.textContent=msg; t.style.display=\'block\'; setTimeout(function(){ t.style.display=\'none\'; },2200); } }catch(_e){} }\n' +
'  function warnStop(msg){ try{ console.warn(\'[Tasun][捷運汐東線事項記錄] \'+msg); }catch(_e){} toast(msg); return false; }\n' +
'  function apply(){\n' +
'    var topbar = document.querySelector(\'.topbar\');\n' +
'    var panel = document.querySelector(\'.panel\');\n' +
'    var wrap = document.querySelector(\'.wrap\');\n' +
'    var panelHead = document.querySelector(\'.panelHead\');\n' +
'    var hint = (panelHead && panelHead.querySelector(\'.hint\')) || document.querySelector(\'.hint\');\n' +
'    if(!topbar || !panel || !hint) return warnStop(\'警告：找不到頂部區或狀態列 DOM，版面合併已中止。\');\n' +
'    if(wrap) wrap.classList.add(\'tasunLayoutMerged\');\n' +
'    topbar.classList.add(\'tasunHeaderMerged\');\n' +
'    panel.classList.add(\'tasunPanelMerged\');\n' +
'    hint.classList.add(\'tasunStatusRow\');\n' +
'    if(hint.parentNode !== topbar) topbar.appendChild(hint);\n' +
'    if(panelHead && !panelHead.querySelector(\'.controls\') && !panelHead.querySelector(\'.hint\')) panelHead.classList.add(\'tasunPanelHeadEmpty\');\n' +
'    return true;\n' +
'  }\n' +
'  function late(){ apply(); setTimeout(apply,80); setTimeout(apply,360); setTimeout(apply,900); }\n' +
'  if(document.readyState === \'loading\') document.addEventListener(\'DOMContentLoaded\', late, {once:true}); else late();\n' +
'  window.addEventListener(\'pageshow\', apply, {passive:true});\n' +
'  window.addEventListener(\'resize\', apply, {passive:true});\n' +
'  window.__TASUN_REBIND_LAYOUT_MERGE__ = apply;\n' +
'})();\n' +
'<\/script>\n';
  }

  function patchHtml(html){
    var out = String(html || '');

    // 1) 移除標題下方副標文字（桌機/手機同步）
    out = out.replace(/\s*<div\s+class=["']sub["']>\s*記事內容\s*·\s*工種\s*·\s*系統\s*·\s*出處\s*·\s*附件\s*·\s*登錄日期\s*<\/div>\s*/g, '\n');

    // 2) 先補實體 DOM：桌機「編輯功能」按鍵與下拉式選單
    if(out.indexOf('id="btnEditFunction"') < 0){
      var inserted = false;
      out = out.replace(/(<div\s+class=["']pill["']>\s*權限：<b\s+id=["']uRole["']>—<\/b><\/div>\s*)/, function(m){ inserted = true; return m + '\n' + actionMenuDom(); });
      if(!inserted){
        out = out.replace(/(<div\s+class=["']right["']>\s*)/, function(m){ inserted = true; return m + '\n' + actionMenuDom(); });
      }
      if(!inserted){ console.warn('[Tasun][捷運汐東線事項記錄] 警告：未找到 right DOM 插入點。'); }
    }

    // 2-1) 先補實體 DOM：桌機版「搜尋」按鍵與浮動搜尋表單
    if(out.indexOf('id="btnDesktopSearch"') < 0){
      var sInserted = false;
      out = out.replace(/(<div\s+class=["']pill["']>\s*權限：<b\s+id=["']uRole["']>—<\/b><\/div>\s*)/, function(m){ sInserted = true; return m + '\n' + desktopSearchDom(); });
      if(!sInserted){
        out = out.replace(/(<div\s+class=["']right["']>\s*)/, function(m){ sInserted = true; return m + '\n' + desktopSearchDom(); });
      }
      if(!sInserted){ console.warn('[Tasun][捷運汐東線事項記錄] 警告：未找到搜尋按鍵插入點。'); }
    }

    // 3) 綁 CSS/JS：找不到節點會中止並警告
    if(out.indexOf('tasun-sxdh-edit-function-menu-r1') < 0){
      out = out.replace(/<\/head>/i, actionMenuStyle() + '</head>');
    }
    if(out.indexOf('tasun-sxdh-desktop-search-float-r3') < 0){
      out = out.replace(/<\/head>/i, desktopSearchStyle() + '</head>');
    }
    if(out.indexOf('tasun-sxdh-layout-merge-r5') < 0){
      out = out.replace(/<\/head>/i, layoutMergeStyle() + '</head>');
    }
    if(out.indexOf('tasun-sxdh-edit-function-menu-r1-script') < 0){
      out = out.replace(/<\/body>/i, actionMenuScript() + '</body>');
    }
    if(out.indexOf('tasun-sxdh-desktop-search-float-r3-script') < 0){
      out = out.replace(/<\/body>/i, desktopSearchScript() + '</body>');
    }
    if(out.indexOf('tasun-sxdh-layout-merge-r5-script') < 0){
      out = out.replace(/<\/body>/i, layoutMergeScript() + '</body>');
    }

    // 4) 標記本次修正，避免「說明有改、網頁未改」無法辨識
    if(out.indexOf('tasun-sxdh-notes-layout-merge-hotfix-20260424-r5') < 0){
      out = out.replace(/<head>/i, '<head>\n  <!-- tasun-sxdh-notes-layout-merge-hotfix-20260424-r5 -->');
    }
    return out;
  }

  async function boot(){
    hideBoot();
    var lastErr = null;
    for(var i=0;i<SOURCE_URLS.length;i++){
      try{
        var html = await fetchHtmlFrom(SOURCE_URLS[i]);
        writePage(html);
        return;
      }catch(err){
        lastErr = err;
        try{ console.warn('[Tasun][捷運汐東線事項記錄] source failed', SOURCE_URLS[i], err); }catch(_e){}
      }
    }

    try{
      var cached = localStorage.getItem(LAST_GOOD_KEY);
      if(cached && cached.indexOf('捷運汐東線事項記錄') >= 0){
        document.open();
        document.write(cached);
        document.close();
        return;
      }
    }catch(_e){}

    bootAttempts++;
    showError('背景載入重試中：' + (lastErr && lastErr.message ? lastErr.message : lastErr));
    if(bootAttempts < MAX_ATTEMPTS){
      setTimeout(boot, Math.min(15000, 900 + bootAttempts * 850));
    }
  }
  boot();
})();
</script>
