  <script>
  (function(){
    'use strict';

    function $(id){ return document.getElementById(id); }
    function norm(v){ return v == null ? '' : String(v).trim(); }
    function safeJSON(s, f){ try{ return JSON.parse(s); }catch(_e){ return f; } }
    function esc(s){ return String(s == null ? '' : s).replace(/[&<>"']/g, function(m){ return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]; }); }
    function nowISO(){ return new Date().toISOString(); }
    function todayISO(){ return new Date().toISOString().slice(0,10); }
    function uuid(){ return 'uid_' + Date.now().toString(16) + '_' + Math.random().toString(16).slice(2,10); }
    function inferRole(name, role){
      var r = norm(role).toLowerCase();
      if(r === 'admin' || r === 'write' || r === 'read') return r;
      var n = norm(name).toLowerCase();
      if(n === 'alex' || n === 'joyce') return 'admin';
      if(n === 'tasun') return 'write';
      return 'read';
    }
    function trace(step, payload){ try{ console.log('[Tasun][捷運汐東線事項記錄][' + step + ']', payload); }catch(_e){} }
    function withV(url){ try{ return typeof window.__withV === 'function' ? window.__withV(url) : url; }catch(_e){ return url; } }
    function parseJsonLenient(raw){ raw = raw == null ? '' : String(raw); try{ return JSON.parse(raw); }catch(e){} try{ return JSON.parse(raw.replace(/\/\*[\s\S]*?\*\//g,'').replace(/,\s*([}\]])/g,'$1')); }catch(e2){} return null; }

    function showDomWarning(message){ var bar = $('domWarn'); if(!bar) return; bar.textContent = message; bar.style.display = 'block'; }
    function ensureRequiredDom(){
      var required = ['navHome','uName','uRole','btnSearch','btnSync','btnClear','searchPanel','fKeyword','fStatus','fOwner','fDateFrom','fDateTo','fDueMode','tbody','hint','mask','mTitle','btnClose','btnCancel','btnSave','btnDelete','mSource','mRecordDate','mSubject','mContent','mOwner','mAssist','mDueDate','mStatus','mProgress','mNote','toast','domWarn','loginBlocker','loginBlockerText','loginBlockerBackBtn'];

      console.warn('[Tasun][捷運汐東線事項記錄] missing DOM nodes:', missing);
      return false;
    }

    var G = window.__TASUN_GLOBALS__ = window.__TASUN_GLOBALS__ || {};
    var PAGE_KEY = String(G.PAGE_KEY || '捷運汐東線事項記錄.html');
    var CURRENT_KEY = String(G.CURRENT_KEY || 'tasunCurrentUser_v1');
    var CFG = {
      PAGE_KEY: PAGE_KEY,
      DB_KEY: 'tasun_db_v2__xidong_issue_record__' + PAGE_KEY,
      LEGACY_DB_KEY: 'tasun_db_v1__xidong_issue_record__' + PAGE_KEY,
      COUNTER_KEY: 'tasun_counter_v2__xidong_issue_record__' + PAGE_KEY,
      LEGACY_COUNTER_KEY: 'tasun_counter_v1__xidong_issue_record__' + PAGE_KEY,
      IDB_NAME: 'tasun_issue_record_idb_v1',
      META_STORE: 'meta',
      ROWS_STORE: 'rows',
      AUTH_KEY: 'tasunAuthTable_v1',
      DEFAULT_API_BASE: 'https://tasun-worker.wutasun.workers.dev',
      DEFAULT_ENDPOINTS: { read:'/api/tasun/read', merge:'/api/tasun/merge' },
      TOKEN_KEYS: ['tasunCloudToken_v1','tasunCloudToken_v1__sxdh-notes','tasunCloudToken_v1__auth-table','tasunBearerToken_v1','tasunAccessToken_v1','tasunAuthToken_v1','tasunSessionToken_v1','tasun_token','tasunToken','tasun_auth_token','authToken','access_token','token','x-api-key','tasunApiKey_v1'],
      SESSION_WATCH_MS: 3000
    };
    var CLOUD_CFG_CACHE = null;

    var FIELDS = ['source','recordDate','subject','content','owner','assist','dueDate','status','progress','note'];
    var FIELD_IDS = { source:'mSource', recordDate:'mRecordDate', subject:'mSubject', content:'mContent', owner:'mOwner', assist:'mAssist', dueDate:'mDueDate', status:'mStatus', progress:'mProgress', note:'mNote' };

    var state = {
      rows: [],
      counter: 0,
      selectedUid: '',
      editingUid: '',
      editable: false,
      dirty: false,
      syncing: false,
      lastSyncAt: 0,
      currentUser: null
    };

    function showToast(msg){ var t = $('toast'); if(!t) return; t.textContent = msg; t.style.display = 'block'; clearTimeout(showToast._tm); showToast._tm = setTimeout(function(){ t.style.display = 'none'; }, 2600); }
    function showLoginBlocker(message){ var wrap = $('loginBlocker'); var textNode = $('loginBlockerText'); if(textNode) textNode.textContent = message || '未登入無法進入網頁'; if(wrap) wrap.classList.add('show'); try{ document.body.style.overflow = 'hidden'; }catch(_e){} }
    function hideLoginBlocker(){ var wrap = $('loginBlocker'); if(wrap) wrap.classList.remove('show'); try{ document.body.style.overflow = ''; }catch(_e){} }

    function getToken(){
      for(var i=0;i<CFG.TOKEN_KEYS.length;i++){
        var key = CFG.TOKEN_KEYS[i];
        try{
          var v = norm(sessionStorage.getItem(key) || localStorage.getItem(key) || '');
          if(v) return v;
        }catch(_e){}
      }
      return '';
    }
    function buildAuthHeaders(extra){
      var headers = {};
      for(var k in (extra || {})) headers[k] = extra[k];
      var token = getToken();
      if(token && !headers.Authorization && !headers.authorization){ headers.Authorization = /^Bearer\s+/i.test(token) ? token : ('Bearer ' + token); }
      return headers;
    }
    function isValidApiBase(v){ return /^https?:\/\//i.test(norm(v)); }
    function normalizeEndpoints(ep){ ep = ep && typeof ep === 'object' ? ep : {}; return { read: norm(ep.read || CFG.DEFAULT_ENDPOINTS.read) || CFG.DEFAULT_ENDPOINTS.read, merge: norm(ep.merge || CFG.DEFAULT_ENDPOINTS.merge) || CFG.DEFAULT_ENDPOINTS.merge }; }
    function joinApiBase(base, path){ base = norm(base).replace(/\/+$/,''); path = norm(path); if(/^https?:\/\//i.test(path)) return path; if(path && path.charAt(0) !== '/') path = '/' + path; return base + path; }
    function addV(url){ try{ return withV(url); }catch(_e){ return url; } }
    function getFileName(){ try{ return decodeURIComponent((location.pathname || '').split('/').pop() || PAGE_KEY); }catch(_e){ return PAGE_KEY; } }

    function decodeSessionCookie(raw){
      try{
        if(!raw) return null;
        var txt = decodeURIComponent(escape(atob(String(raw))));
        var js = safeJSON(txt, null);
        if(!js || typeof js !== 'object') return null;
        var user = norm(js.user || js.name || js.username || js.account || js.u);
        if(!user) return null;
        var role = inferRole(user, js.role || js.level || js.r);
        return { user:user, name:user, username:user, role:role, level:role, at:new Date().toISOString() };
      }catch(_e){ return null; }
    }
    function readCookie(name){
      try{
        var m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.$?*|{}()\[\]\\/+^]/g,'\\$&') + '=([^;]*)'));
        return m ? decodeURIComponent(m[1]) : '';
      }catch(_e){ return ''; }
    }
    function getActiveSessionPayload(){
      var keys = ['tasunCurrentUser_v1','tasunSessionBridge_v1','tasunSession_v1','tasunSso_v2','tasunSso_v1'];
      for(var i=0;i<keys.length;i++){
        try{
          var raw = sessionStorage.getItem(keys[i]) || localStorage.getItem(keys[i]) || '';
          if(raw){
            var js = safeJSON(raw, null);
            if(js && typeof js === 'object'){
              var user = norm(js.user || js.name || js.username || js.account);
              if(user) return { user:user, name:user, username:user, role:inferRole(user, js.role || js.level), level:inferRole(user, js.role || js.level), at:new Date().toISOString() };
            }
          }
        }catch(_e){}
      }
      var cookiePayload = decodeSessionCookie(readCookie('tasun_session')) || decodeSessionCookie(readCookie('tasunSession'));
      if(cookiePayload && cookiePayload.user) return cookiePayload;
      return null;
    }
    function persistSessionPayload(payload){
      try{ sessionStorage.setItem(CURRENT_KEY, JSON.stringify(payload)); }catch(_e){}
      try{ localStorage.setItem(CURRENT_KEY, JSON.stringify(payload)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(payload)); }catch(_e){}
      try{ localStorage.setItem('tasunSessionBridge_v1', JSON.stringify(payload)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSession_v1', JSON.stringify(payload)); }catch(_e){}
      try{ localStorage.setItem('tasunSession_v1', JSON.stringify(payload)); }catch(_e){}
    }
    function ensureSessionAccess(){
      var payload = getActiveSessionPayload();
      if(payload && payload.user){
        persistSessionPayload(payload);
        hideLoginBlocker();
        return payload;
      }
      showLoginBlocker('未登入無法進入網頁，請先登入 Tasun 首頁後再進入此頁。');
      return null;
    }
    function getCurrentUser(){ return ensureSessionAccess() || { user:'', role:'read' }; }
    function canWrite(){ return ['admin','write'].indexOf((state.currentUser && state.currentUser.role) || 'read') >= 0; }
    function isAdmin(){ return ((state.currentUser && state.currentUser.role) || 'read') === 'admin'; }
    function bindLoginBlocker(){ var btn = $('loginBlockerBackBtn'); if(btn && !btn.__tasunBound){ btn.__tasunBound = true; btn.addEventListener('click', function(){ location.href = withV('index.html'); }); } }

    function ensureRow(raw){
      raw = raw && typeof raw === 'object' ? raw : {};
      var row = { uid:norm(raw.uid || raw.pk || raw.key || ''), id:Number(raw.id || 0) || 0, rev:Number(raw.rev || 0) || 0, updatedAt:norm(raw.updatedAt || raw.updated_at || ''), deleted:!!raw.deleted };
      FIELDS.forEach(function(k){ row[k] = norm(raw[k]); });
      if(!row.uid) row.uid = uuid();
      if(!row.updatedAt) row.updatedAt = nowISO();
      if(!row.recordDate) row.recordDate = todayISO();
      if(!row.status) row.status = '未開始';
      return row;
    }
    function canonicalRows(rows){
      var map = Object.create(null);
      (rows || []).forEach(function(item){
        var r = ensureRow(item);
        var prev = map[r.uid];
        if(!prev){ map[r.uid] = r; return; }
        var prevRev = Number(prev.rev || 0), curRev = Number(r.rev || 0);
        var pick = (curRev > prevRev) || (curRev === prevRev && norm(r.updatedAt) > norm(prev.updatedAt)) ? r : prev;
        map[r.uid] = pick;
      });
      return Object.keys(map).map(function(k){ return map[k]; }).sort(function(a,b){
        var aid = Number(a.id || 0), bid = Number(b.id || 0);
        if(aid && bid && aid !== bid) return aid - bid;
        return norm(a.updatedAt).localeCompare(norm(b.updatedAt));
      });
    }
    function nextDisplayId(){ state.counter = Math.max(state.counter, canonicalRows(state.rows).reduce(function(m,r){ return Math.max(m, Number(r.id||0)||0); }, 0)) + 1; return state.counter; }
    function touchRow(row){ row = ensureRow(row); if(!row.id) row.id = nextDisplayId(); row.rev = Number(row.rev || 0) + 1; row.updatedAt = nowISO(); row.deleted = !!row.deleted; return row; }
    function mergeIncoming(rows){ state.rows = canonicalRows((state.rows || []).concat((rows || []).map(ensureRow))); }
    function markDeleted(uid){ state.rows = canonicalRows(state.rows).map(function(r){ if(r.uid !== uid) return r; r.deleted = true; return touchRow(r); }); }

    async function openIDB(){
      return await new Promise(function(resolve, reject){
        var req = indexedDB.open(CFG.IDB_NAME, 1);
        req.onupgradeneeded = function(){
          var db = req.result;
          if(!db.objectStoreNames.contains(CFG.META_STORE)) db.createObjectStore(CFG.META_STORE, { keyPath:'pageKey' });
          if(!db.objectStoreNames.contains(CFG.ROWS_STORE)){
            var store = db.createObjectStore(CFG.ROWS_STORE, { keyPath:['pageKey','uid'] });
            store.createIndex('by_page', 'pageKey', { unique:false });
          }
        };
        req.onsuccess = function(){ resolve(req.result); };
        req.onerror = function(){ reject(req.error || new Error('idb open fail')); };
      });
    }
    async function loadLocalDb(){
      var db, meta = null, rows = [];
      try{
        db = await openIDB();
        meta = await new Promise(function(resolve, reject){ var tx = db.transaction([CFG.META_STORE], 'readonly'); var req = tx.objectStore(CFG.META_STORE).get(PAGE_KEY); req.onsuccess = function(){ resolve(req.result || null); }; req.onerror = function(){ reject(req.error); }; });
        rows = await new Promise(function(resolve, reject){ var tx = db.transaction([CFG.ROWS_STORE], 'readonly'); var req = tx.objectStore(CFG.ROWS_STORE).index('by_page').getAll(PAGE_KEY); req.onsuccess = function(){ resolve(req.result || []); }; req.onerror = function(){ reject(req.error); }; });
      }catch(_e){ meta = null; rows = []; }
      var backup = safeJSON(localStorage.getItem(CFG.DB_KEY) || localStorage.getItem(CFG.LEGACY_DB_KEY), null);
      var arr = rows && rows.length ? rows.map(function(r){ var c = Object.assign({}, r); delete c.pageKey; return c; }) : [];
      if((!arr.length) && backup && Array.isArray(backup.items)) arr = backup.items;
      state.rows = canonicalRows(arr);
      var maxId = 0;
      state.rows.forEach(function(r){ maxId = Math.max(maxId, Number(r.id||0)||0); });
      state.counter = Math.max(Number(localStorage.getItem(CFG.COUNTER_KEY) || localStorage.getItem(CFG.LEGACY_COUNTER_KEY) || 0) || 0, Number(meta && meta.counter || 0) || 0, maxId);
      state.lastSyncAt = Number(meta && meta.lastSyncAt || 0) || 0;
      await persistLocal(false);
    }
    async function persistLocal(markSyncTs){
      var items = canonicalRows(state.rows);
      var pack = { items: items, counter: state.counter, updatedAt: nowISO() };
      try{ localStorage.setItem(CFG.DB_KEY, JSON.stringify(pack)); }catch(_e){}
      try{ localStorage.setItem(CFG.COUNTER_KEY, String(state.counter)); }catch(_e){}
      try{
        var idb = await openIDB();
        await new Promise(function(resolve,reject){
          var tx = idb.transaction([CFG.META_STORE, CFG.ROWS_STORE], 'readwrite');
          var metaStore = tx.objectStore(CFG.META_STORE);
          var rowStore = tx.objectStore(CFG.ROWS_STORE);
          var idx = rowStore.index('by_page');
          var getKeys = idx.getAllKeys(PAGE_KEY);
          getKeys.onsuccess = function(){
            (getKeys.result || []).forEach(function(key){ rowStore.delete(key); });
            items.forEach(function(r){ rowStore.put(Object.assign({ pageKey: PAGE_KEY }, r)); });
            metaStore.put({ pageKey: PAGE_KEY, counter: state.counter, lastSyncAt: markSyncTs ? Date.now() : state.lastSyncAt, updatedAt: nowISO() });
          };
          getKeys.onerror = function(){ reject(getKeys.error); };
          tx.oncomplete = function(){ resolve(true); };
          tx.onerror = function(){ reject(tx.error); };
        });
      }catch(_e){}
    }
    async function loadCloudCfg(){
      if(CLOUD_CFG_CACHE) return CLOUD_CFG_CACHE;
      var cfg = { apiBase: CFG.DEFAULT_API_BASE, endpoints: Object.assign({}, CFG.DEFAULT_ENDPOINTS), credentials:'include' };
      try{
        var res = await fetch(addV('tasun-resources.json'), { cache:'no-store' });
        if(res && res.ok){
          var text = await res.text();
          var json = parseJsonLenient(text);
          if(json && json.resources && typeof json.resources === 'object'){
            var key = getFileName();
            var pick = json.resources[key] || json.resources[PAGE_KEY] || json.resources['*'] || null;
            if(pick){
              if(isValidApiBase(pick.apiBase)) cfg.apiBase = pick.apiBase;
              if(pick.endpoints) cfg.endpoints = normalizeEndpoints(pick.endpoints);
              if(norm(pick.credentials)) cfg.credentials = norm(pick.credentials);
            }
          }else if(json){
            if(isValidApiBase(json.apiBase)) cfg.apiBase = json.apiBase;
            if(json.endpoints) cfg.endpoints = normalizeEndpoints(json.endpoints);
            if(norm(json.credentials)) cfg.credentials = norm(json.credentials);
          }
        }
      }catch(_e){}
      CLOUD_CFG_CACHE = cfg;
      return cfg;
    }
    async function cloudRead(cfg){
      cfg = cfg || await loadCloudCfg();
      if(!cfg || !isValidApiBase(cfg.apiBase)) return { db:[], counter:0 };
      var url = joinApiBase(cfg.apiBase, cfg.endpoints.read) + '?resourceKey=' + encodeURIComponent(PAGE_KEY) + '&pageKey=' + encodeURIComponent(PAGE_KEY) + '&key=' + encodeURIComponent(PAGE_KEY);
      var res = await fetch(url, { method:'GET', cache:'no-store', credentials: cfg.credentials === 'omit' ? 'omit' : 'include', headers: buildAuthHeaders({ accept:'application/json' }) });
      if(!res.ok) throw new Error('read ' + res.status);
      var txt = await res.text();
      var json = parseJsonLenient(txt) || {};
      var payload = json.payload && typeof json.payload === 'object' ? json.payload : (json.data && typeof json.data === 'object' ? json.data : json);
      var rows = payload.db || payload.rows || payload.items || [];
      return { db: Array.isArray(rows) ? rows : [], counter: Number(payload.counter || (Array.isArray(rows) ? rows.length : 0)) || 0 };
    }
    async function cloudMerge(cfg, items){
      cfg = cfg || await loadCloudCfg();
      if(!cfg || !isValidApiBase(cfg.apiBase)) return { db:items, counter: state.counter };
      var body = { resourceKey: PAGE_KEY, key: PAGE_KEY, pageKey: PAGE_KEY, payload: { db: items, counter: state.counter }, client: { appVer: String(window.__CACHE_V || window.TASUN_APP_VER || window.APP_VER || ''), at: nowISO(), user: state.currentUser.user || '', role: state.currentUser.role || 'read' } };
      var res = await fetch(joinApiBase(cfg.apiBase, cfg.endpoints.merge), { method:'POST', cache:'no-store', credentials: cfg.credentials === 'omit' ? 'omit' : 'include', headers: buildAuthHeaders({ 'content-type':'application/json', accept:'application/json' }), body: JSON.stringify(body) });
      if(!res.ok) throw new Error('merge ' + res.status);
      var txt = await res.text();
      var json = parseJsonLenient(txt) || {};
      var payload = json.payload && typeof json.payload === 'object' ? json.payload : (json.data && typeof json.data === 'object' ? json.data : json);
      var rows = payload.db || payload.rows || payload.items || items;
      return { db: Array.isArray(rows) ? rows : items, counter: Number(payload.counter || state.counter) || state.counter };
    }
    async function syncAll(reason){
      if(state.syncing) return;
      state.syncing = true; render();
      try{
        state.rows = canonicalRows(state.rows);
        await persistLocal(false);
        var cfg = await loadCloudCfg();
        if(isValidApiBase(cfg.apiBase) && getToken()){
          var remote = await cloudRead(cfg).catch(function(){ return { db:[], counter:0 }; });
          var merged = canonicalRows((remote.db || []).concat(state.rows || []));
          state.rows = merged;
          state.counter = Math.max(state.counter, Number(remote.counter || 0) || 0, merged.reduce(function(m,r){ return Math.max(m, Number(r.id||0)||0); }, 0));
          var pushed = await cloudMerge(cfg, merged).catch(function(){ return { db: merged, counter: state.counter }; });
          state.rows = canonicalRows(pushed.db || merged);
          state.counter = Math.max(state.counter, Number(pushed.counter || 0) || 0);
        }
        state.lastSyncAt = Date.now();
        await persistLocal(true);
      }catch(e){ console.error('issue record sync fail', reason, e); }
      finally{ state.syncing = false; render(); }
    }

    function statusClass(status){
      var v = norm(status);
      if(v === '進行中' || v === '待回覆') return 'status-progress';
      if(v === '已完成' || v === '已結案') return 'status-done';
      if(v === '未開始') return 'status-open';
      return 'status-hold';
    }
    function visibleRows(){
      var kw = norm($('fKeyword') && $('fKeyword').value).toLowerCase();
      var status = norm($('fStatus') && $('fStatus').value);
      var owner = norm($('fOwner') && $('fOwner').value).toLowerCase();
      var dateFrom = norm($('fDateFrom') && $('fDateFrom').value);
      var dateTo = norm($('fDateTo') && $('fDateTo').value);
      var dueMode = norm($('fDueMode') && $('fDueMode').value);
      var today = todayISO();
      return canonicalRows(state.rows).filter(function(r){
        if(r.deleted) return false;
        if(kw){
          var hay = [r.source,r.subject,r.content,r.owner,r.assist,r.progress,r.note].join('\n').toLowerCase();
          if(hay.indexOf(kw) < 0) return false;
        }
        if(status && r.status !== status) return false;
        if(owner && [r.owner,r.assist].join('\n').toLowerCase().indexOf(owner) < 0) return false;
        if(dateFrom && norm(r.recordDate) && norm(r.recordDate) < dateFrom) return false;
        if(dateTo && norm(r.recordDate) && norm(r.recordDate) > dateTo) return false;
        if(dueMode === 'overdue' && (!r.dueDate || r.dueDate >= today || (r.status === '已完成' || r.status === '已結案'))) return false;
        if(dueMode === 'week'){
          if(!r.dueDate) return false;
          var diff = Math.ceil((new Date(r.dueDate + 'T00:00:00').getTime() - new Date(today + 'T00:00:00').getTime()) / 86400000);
          if(diff < 0 || diff > 7) return false;
        }
        if(dueMode === 'open' && (r.status === '已完成' || r.status === '已結案')) return false;
        return true;
      });
    }
    function formatDate(v){ return norm(v) || '—'; }
    function render(){
      var tbody = $('tbody');
      if(!tbody) return;
      state.currentUser = getCurrentUser();
      var writable = canWrite();
      $('uName').textContent = state.currentUser.user || '—';
      $('uRole').textContent = state.currentUser.role || 'read';
      $('btnAdd').style.display = writable ? 'inline-flex' : 'none';
      $('btnEdit').style.display = writable ? 'inline-flex' : 'none';
      $('btnTemplate').style.display = writable ? 'inline-flex' : 'none';
      $('btnUpload').style.display = writable ? 'inline-flex' : 'none';

      var rows = visibleRows();
      tbody.innerHTML = rows.length ? rows.map(function(r){
        var sel = state.selectedUid === r.uid ? ' sel' : '';
        return '<tr data-uid="' + esc(r.uid) + '" class="' + sel + '">' +
          '<td class="ta-center">' + esc(String(r.id || '')) + '</td>' +
          '<td>' + (esc(r.source) || '<span class="muted">—</span>') + '</td>' +
          '<td class="ta-center">' + esc(formatDate(r.recordDate)) + '</td>' +
          '<td>' + (esc(r.subject) || '<span class="muted">—</span>') + '</td>' +
          '<td class="ta-left">' + (esc(r.content) || '<span class="muted">—</span>') + '</td>' +
          '<td>' + (esc(r.owner) || '<span class="muted">—</span>') + '</td>' +
          '<td>' + (esc(r.assist) || '<span class="muted">—</span>') + '</td>' +
          '<td class="ta-center">' + (esc(formatDate(r.dueDate)) || '<span class="muted">—</span>') + '</td>' +
          '<td class="ta-center"><span class="statusChip ' + statusClass(r.status) + '">' + esc(r.status || '—') + '</span></td>' +
          '<td class="ta-left">' + (esc(r.progress) || '<span class="muted">—</span>') + '</td>' +
          '<td class="ta-left">' + (esc(r.note) || '<span class="muted">—</span>') + '</td>' +
          '<td class="ta-center"><button class="btn ghost" data-act="view" data-uid="' + esc(r.uid) + '" type="button">查看</button></td>' +
        '</tr>';
      }).join('') : '<tr><td colspan="12" class="muted" style="padding:18px;text-align:center;">尚無資料（write/admin 可用右上「新增」建立第一筆）</td></tr>';

      var activeRows = canonicalRows(state.rows).filter(function(r){ return !r.deleted; });
      var openCount = activeRows.filter(function(r){ return r.status !== '已完成' && r.status !== '已結案'; }).length;
      var lastSync = state.lastSyncAt ? new Date(state.lastSyncAt).toLocaleString('zh-TW', { hour12:false }) : '尚未同步';
      $('hint').innerHTML = '總筆數：<b>' + activeRows.length + '</b>，目前篩選：<b>' + rows.length + '</b>，未結案：<b>' + openCount + '</b>，同步：<b>' + esc(lastSync) + '</b>' + (state.syncing ? '（同步中）' : '');
    }

    function populateModal(row){
      FIELDS.forEach(function(k){ var el = $(FIELD_IDS[k]); if(el) el.value = norm(row[k]); });
      if(!$('mRecordDate').value) $('mRecordDate').value = todayISO();
      if(!$('mStatus').value) $('mStatus').value = '未開始';
      state.dirty = false;
      $('mTitle').textContent = state.editingUid ? (state.editable ? '編輯資料' : '查看資料') : '新增資料';
      $('btnDelete').style.display = (state.editable && state.editingUid && isAdmin()) ? 'inline-flex' : 'none';
      $('btnSave').style.display = state.editable ? 'inline-flex' : 'none';
      document.querySelectorAll('#mask input, #mask textarea, #mask select').forEach(function(el){ el.disabled = !state.editable; });
    }
    function gatherModal(){ var row = ensureRow({}); FIELDS.forEach(function(k){ var el = $(FIELD_IDS[k]); row[k] = norm(el && el.value); }); return row; }
    function openModal(uid, editable){
      state.currentUser = getCurrentUser();
      if(editable && !canWrite()){ showToast('唯讀不可新增/編輯'); return; }
      state.editable = !!editable;
      state.editingUid = norm(uid);
      var row = ensureRow({ recordDate: todayISO(), status:'未開始' });
      if(state.editingUid){
        var found = canonicalRows(state.rows).find(function(r){ return r.uid === state.editingUid; });
        if(found) row = found;
      }
      populateModal(row);
      $('mask').classList.add('show');
    }
    function closeModal(force){
      if(!force && state.editable && state.dirty){
        if(!confirm('尚未儲存，確定關閉？')) return;
      }
      $('mask').classList.remove('show');
      state.editingUid = '';
      state.editable = false;
      state.dirty = false;
    }
    async function saveItem(){
      state.currentUser = getCurrentUser();
      if(!canWrite()){ showToast('唯讀不可儲存'); return; }
      var row = gatherModal();
      if(!row.subject){ showToast('請輸入事項主題'); return; }
      if(!row.content){ showToast('請輸入事項內容'); return; }
      var existing = state.editingUid ? canonicalRows(state.rows).find(function(r){ return r.uid === state.editingUid; }) : null;
      row.uid = existing ? existing.uid : uuid();
      row.id = existing ? existing.id : 0;
      row.rev = existing ? existing.rev : 0;
      row.deleted = false;
      row = touchRow(row);
      mergeIncoming([row]);
      state.selectedUid = row.uid;
      await persistLocal(false);
      render();
      closeModal(true);
      syncAll('save');
      showToast('已儲存');
    }
    async function deleteItem(){
      state.currentUser = getCurrentUser();
      if(!isAdmin()){ showToast('僅 admin 可刪除'); return; }
      if(!state.editingUid) return;
      if(!confirm('確定刪除這筆資料？')) return;
      markDeleted(state.editingUid);
      await persistLocal(false);
      state.selectedUid = '';
      render();
      closeModal(true);
      syncAll('delete');
      showToast('已刪除');
    }

    function exportTemplate(){
      if(typeof XLSX === 'undefined'){ showToast('找不到 XLSX 函式庫'); return; }
      var aoa = [
        ['編號','來源／會議','日期','事項主題','事項內容','主責單位','協辦單位','期限','狀態','追蹤情形','備註'],
        ['1','週會', todayISO(), '請填寫事項主題', '請填寫事項內容', '統包廠商', '監造單位', '', '未開始', '', '']
      ];
      var ws = XLSX.utils.aoa_to_sheet(aoa);
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '事項記錄');
      var stamp = new Date().toISOString().slice(0,19).replace(/[T:]/g,'-');
      XLSX.writeFile(wb, '捷運汐東線事項記錄_' + stamp + '.xlsx');
    }
    function parseUploadRows(rows){
      if(!Array.isArray(rows) || !rows.length) return [];
      return rows.map(function(raw){
        raw = raw && typeof raw === 'object' ? raw : {};
        return ensureRow({
          id: Number(raw['編號'] || raw.id || 0) || 0,
          source: raw['來源／會議'] || raw['來源'] || raw.source || '',
          recordDate: raw['日期'] || raw.recordDate || raw.date || '',
          subject: raw['事項主題'] || raw.subject || '',
          content: raw['事項內容'] || raw.content || '',
          owner: raw['主責單位'] || raw.owner || '',
          assist: raw['協辦單位'] || raw.assist || '',
          dueDate: raw['期限'] || raw.dueDate || '',
          status: raw['狀態'] || raw.status || '未開始',
          progress: raw['追蹤情形'] || raw.progress || '',
          note: raw['備註'] || raw.note || ''
        });
      }).filter(function(r){ return r.subject || r.content || r.source || r.owner; });
    }
    async function importFile(file){
      if(typeof XLSX === 'undefined'){ showToast('找不到 XLSX 函式庫'); return; }
      if(!file) return;
      var data = await file.arrayBuffer();
      var wb = XLSX.read(data, { type:'array' });
      var sheet = wb.Sheets[wb.SheetNames[0]];
      if(!sheet){ showToast('找不到工作表'); return; }
      var rows = XLSX.utils.sheet_to_json(sheet, { defval:'', raw:false });
      var parsed = parseUploadRows(rows);
      if(!parsed.length){ showToast('上傳檔案沒有可匯入的事項記錄'); return; }
      parsed = parsed.map(function(r){ return touchRow(r); });
      mergeIncoming(parsed);
      state.counter = Math.max(state.counter, canonicalRows(state.rows).reduce(function(m,r){ return Math.max(m, Number(r.id||0)||0); }, 0));
      await persistLocal(false);
      render();
      syncAll('upload');
      showToast('已匯入 ' + parsed.length + ' 筆資料');
    }

    function bindDirty(){
      document.querySelectorAll('#mask input, #mask textarea, #mask select').forEach(function(el){
        if(el.dataset.dirtyBound === '1') return;
        el.dataset.dirtyBound = '1';
        el.addEventListener('input', function(){ if(state.editable) state.dirty = true; });
        el.addEventListener('change', function(){ if(state.editable) state.dirty = true; });
      });
    }
    function bindTable(){
      $('tbody').addEventListener('click', function(e){
        var btn = e.target.closest('button[data-act]');
        var tr = e.target.closest('tr[data-uid]');
        if(btn){
          var uid = norm(btn.getAttribute('data-uid'));
          if(uid){ state.selectedUid = uid; render(); openModal(uid, false); }
          return;
        }
        if(tr){ state.selectedUid = norm(tr.getAttribute('data-uid')); render(); }
      });
    }
    function bindActions(){
      $('navHome').addEventListener('click', function(){ location.href = withV('汐東工程管理表.html'); });
      $('btnSearch').addEventListener('click', function(){ $('searchPanel').classList.toggle('show'); });
      $('btnSync').addEventListener('click', function(){ syncAll('manual'); showToast('已啟動同步'); });
      $('btnClear').addEventListener('click', function(){ ['fKeyword','fStatus','fOwner','fDateFrom','fDateTo','fDueMode'].forEach(function(id){ if($(id)) $(id).value = ''; }); render(); });
      ['fKeyword','fStatus','fOwner','fDateFrom','fDateTo','fDueMode'].forEach(function(id){ $(id).addEventListener('input', render); $(id).addEventListener('change', render); });
      $('btnAdd').addEventListener('click', function(){ openModal('', true); });
      $('btnEdit').addEventListener('click', function(){ if(!state.selectedUid){ showToast('請先點選一列再按編輯'); return; } openModal(state.selectedUid, true); });
      $('btnTemplate').addEventListener('click', exportTemplate);
      $('btnUpload').addEventListener('click', function(){ if(!canWrite()){ showToast('唯讀不可上傳'); return; } $('fileInput').value = ''; $('fileInput').click(); });
      $('fileInput').addEventListener('change', function(){ var file = this.files && this.files[0]; if(file) importFile(file); });
      $('btnClose').addEventListener('click', function(){ closeModal(false); });
      $('btnCancel').addEventListener('click', function(){ closeModal(false); });
      $('btnSave').addEventListener('click', saveItem);
      $('btnDelete').addEventListener('click', deleteItem);
      $('mask').addEventListener('click', function(e){ if(e.target === $('mask')) closeModal(false); });
      window.addEventListener('keydown', function(e){ if(e.key === 'Escape' && $('mask').classList.contains('show')) closeModal(false); });
    }

    async function boot(){
      bindLoginBlocker();
      if(!ensureRequiredDom()) return;
      var session = ensureSessionAccess();
      if(!session) return;
      state.currentUser = session;
      bindDirty();
      bindActions();
      bindTable();
      await loadLocalDb();
      render();
      syncAll('boot');
      document.addEventListener('visibilitychange', function(){ if(document.visibilityState === 'visible'){ var session2 = ensureSessionAccess(); if(session2){ state.currentUser = session2; render(); syncAll('visibility'); } } }, { passive:true });
      setInterval(function(){ var payload = ensureSessionAccess(); if(payload){ state.currentUser = payload; render(); } }, CFG.SESSION_WATCH_MS);
      trace('boot_done', { pageKey: PAGE_KEY, buildStamp: window.__TASUN_PAGE_BUILD_STAMP__ || '', rows: state.rows.length });
    }

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once:true });
    else boot();
  })();
  </script>
</body>
