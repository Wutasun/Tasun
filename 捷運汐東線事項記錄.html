      try{ getVersion().catch(function(){}); }catch(_vErr){}
      write(buildStandaloneFallbackR52());
      return;
    }catch(e){
      window.__TASUN_ALIAS_BOOT_ACTIVE_R52__ = false;
      try{ console.warn('[Tasun][捷運汐東線事項記錄] standalone boot failed:', e); }catch(_e){}
      try{
        var f=document.getElementById('fail');
        if(f){ f.style.display='none'; }
        var shell=document.getElementById('tasun-r52-instant-shell');
        if(shell){ shell.style.display='flex'; }
      }catch(_e){}
    }
  }
  boot();
})();
</script>

<script id="tasun-sxdh-notes-blank-screen-watchdog-r52">
(function(){
  "use strict";
  function hasRealPage(){ try{ return !!document.querySelector(".wrap,.topbar,.panel,.hint,table,#tbl,#cards"); }catch(e){ return false; } }
  function keepShell(){
    try{
      var f=document.getElementById('fail');
      if(f) f.style.setProperty('display','none','important');
      var shell=document.getElementById('tasun-r52-instant-shell');
      if(shell && !hasRealPage()) shell.style.display='flex';
    }catch(e){}
  }
  [4000,9000,16000,30000].forEach(function(t){ setTimeout(keepShell,t); });
})();
</script>
