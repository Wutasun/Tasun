    var sources = [SOURCE_FILE, './' + SOURCE_FILE, 'https://raw.githubusercontent.com/Wutasun/Tasun/main/sxdh-notes.html', 'https://cdn.jsdelivr.net/gh/Wutasun/Tasun@main/sxdh-notes.html'];
    for(var i=0; i<sources.length; i++){
      try{ bootDone = true; clearTimeout(bootTimer); write(await fetchText(sources[i], ver)); return; }
      catch(e){ try{ console.warn('[Tasun][捷運汐東線事項記錄] source failed:', sources[i], e); }catch(_e){} }
    }
    try{
      var cached = localStorage.getItem(LAST_GOOD) || '';
      if(isGood(cached)){ bootDone = true; clearTimeout(bootTimer); write(cached); return; }
    }catch(_e){}
    bootDone = true; clearTimeout(bootTimer); showFail('最新版畫面載入未完成；已阻止載入錯誤頁面。');
  }
  boot();
})();
</script>

<script id="tasun-sxdh-notes-blank-screen-watchdog-r35">
(function(){
  "use strict";
  function hasRealPage(){ try{ return !!document.querySelector(".wrap,.topbar,.panel,.hint,table,#tbl,#cards"); }catch(e){ return false; } }
  function hideLoneSearch(){ try{ document.querySelectorAll('[id^="tasun-sxdh-notes-search-trigger-"]').forEach(function(b){ b.style.setProperty("display","none","important"); }); }catch(e){} }
  function showFail(){
    if(hasRealPage()) return;
    hideLoneSearch();
    try{
      var f=document.getElementById('fail');
      if(f){
        var m=f.querySelector('.msg');
        if(m) m.textContent='主畫面未完成載入，已阻止只顯示搜尋按鍵；請確認 sxdh-notes.html 與本檔已一起上傳 GitHub Pages。';
        f.style.display='flex';
      }
    }catch(e){}
  }
  [6500,11000,15000].forEach(function(t){ setTimeout(showFail,t); });
})();
</script>
