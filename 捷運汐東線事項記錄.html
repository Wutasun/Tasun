<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>捷運汐東線事項記錄 Worker 逐步測試</title>
<style>
body{font-family:Arial,"Noto Sans TC",sans-serif;background:#f5f5f5;color:#111;margin:0;padding:24px}
.card{background:#fff;border:1px solid #ddd;border-radius:14px;padding:18px;max-width:1100px;margin:0 auto 18px auto;box-shadow:0 6px 20px rgba(0,0,0,.06)}
label{display:block;margin:10px 0 4px}
input,button,textarea{font:inherit}
input,textarea{width:100%;padding:10px;border:1px solid #bbb;border-radius:10px}
button{padding:10px 16px;border:1px solid #999;border-radius:999px;background:#fff;cursor:pointer;margin-right:8px;margin-top:10px}
pre{white-space:pre-wrap;word-break:break-word;background:#fafafa;border:1px solid #eee;border-radius:10px;padding:12px;min-height:220px}
.ok{color:#0a7a00}.bad{color:#c20000}.muted{color:#666}
</style>
</head>
<body>
<div class="card">
  <h1>捷運汐東線事項記錄 Worker 逐步測試</h1>
  <div class="muted">用途：先測 Worker 授權與 read / merge 都正常，再回修正式頁。</div>
  <label>API Base</label>
  <input id="apiBase" value="https://tasun-worker.wutasun.workers.dev">
  <label>resourceKey</label>
  <input id="resourceKey" value="sxdh-notes">
  <label>帳號</label>
  <input id="username" value="alex">
  <label>密碼</label>
  <input id="password" type="password" placeholder="請輸入目前登入帳號密碼">
  <label>測試資料 JSON（merge 用）</label>
  <textarea id="payload" rows="7">{
  "db": [
    {
      "uid": "test_local_row_001",
      "item": 1,
      "content": "Worker 逐步測試資料",
      "trade": "測試工程",
      "system": "測試系統",
      "source": "測試來源",
      "remark": "可刪除",
      "updatedAt": 1774339600000,
      "rev": 1774339600000,
      "deleted": false
    }
  ],
  "counter": 1774339600000
}</textarea>
  <div>
    <button id="btnRun">執行完整測試</button>
    <button id="btnHealth">只測 health</button>
    <button id="btnLogin">只測 login</button>
    <button id="btnRead">只測 read</button>
    <button id="btnMerge">只測 merge</button>
  </div>
</div>
<div class="card">
  <h2>測試結果</h2>
  <pre id="out"></pre>
</div>
<script>
(function(){
  const $ = id => document.getElementById(id);
  let savedToken = '';
  function out(msg, cls){
    const el = $('out');
    const line = typeof msg === 'string' ? msg : JSON.stringify(msg, null, 2);
    el.textContent += line + "\n";
  }
  function reset(){ $('out').textContent = ''; }
  async function jres(res){
    const text = await res.text().catch(()=> '');
    let json = null; try{ json = text ? JSON.parse(text) : null; }catch(e){}
    return { status: res.status, ok: res.ok, bodyText: text, bodyJson: json };
  }
  function getBase(){ return String($('apiBase').value||'').trim().replace(/\/+$/,''); }
  function getResourceKey(){ return String($('resourceKey').value||'').trim(); }
  function getHeaders(extra){
    const h = Object.assign({ Accept: 'application/json' }, extra||{});
    if(savedToken) h.Authorization = /^Bearer\s+/i.test(savedToken) ? savedToken : 'Bearer ' + savedToken;
    return h;
  }
  async function stepHealth(){
    const res = await fetch(getBase() + '/api/tasun/health', { method:'GET', credentials:'include', cache:'no-store', headers:getHeaders() });
    const r = await jres(res); out('Step 1 health'); out(r); return r;
  }
  async function stepMe(label){
    const res = await fetch(getBase() + '/api/tasun/me', { method:'GET', credentials:'include', cache:'no-store', headers:getHeaders() });
    const r = await jres(res); out(label); out(r); return r;
  }
  async function stepLogin(){
    const body = { username: String($('username').value||'').trim(), password: String($('password').value||'').trim() };
    const res = await fetch(getBase() + '/api/tasun/login', { method:'POST', credentials:'include', cache:'no-store', headers:{ 'Content-Type':'application/json', Accept:'application/json' }, body: JSON.stringify(body) });
    const r = await jres(res);
    if(r.bodyJson && r.bodyJson.token) savedToken = String(r.bodyJson.token);
    out('Step 3 login'); out(r); return r;
  }
  async function stepRead(){
    const res = await fetch(getBase() + '/api/tasun/read', { method:'POST', credentials:'include', cache:'no-store', headers:getHeaders({ 'Content-Type':'application/json' }), body: JSON.stringify({ resourceKey: getResourceKey() }) });
    const r = await jres(res); out('Step 4 read'); out(r); return r;
  }
  async function stepMerge(){
    let payload = {}; try{ payload = JSON.parse($('payload').value||'{}'); }catch(e){ throw new Error('payload JSON 格式錯誤'); }
    const res = await fetch(getBase() + '/api/tasun/merge', { method:'POST', credentials:'include', cache:'no-store', headers:getHeaders({ 'Content-Type':'application/json' }), body: JSON.stringify({ resourceKey: getResourceKey(), payload, client:{ from:'worker-step-test', at:new Date().toISOString() } }) });
    const r = await jres(res); out('Step 5 merge'); out(r); return r;
  }
  async function runAll(){
    reset();
    out('=== Worker 逐步測試開始 ===');
    await stepHealth();
    savedToken = '';
    await stepMe('Step 2 me without token');
    await stepLogin();
    await stepMe('Step 4 me with token');
    await stepRead();
    await stepMerge();
    await stepRead();
    out('=== Worker 逐步測試完成 ===');
  }
  $('btnRun').onclick = () => runAll().catch(e=>out('ERROR: '+e.message));
  $('btnHealth').onclick = () => { reset(); stepHealth().catch(e=>out('ERROR: '+e.message)); };
  $('btnLogin').onclick = () => { reset(); stepLogin().catch(e=>out('ERROR: '+e.message)); };
  $('btnRead').onclick = () => { reset(); stepRead().catch(e=>out('ERROR: '+e.message)); };
  $('btnMerge').onclick = () => { reset(); stepMerge().catch(e=>out('ERROR: '+e.message)); };
})();
</script>
</body>
</html>
