  function downloadBlob(name,mime,text){
    var a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([text],{type:mime}));
    a.download=name;
    document.body.appendChild(a);
    a.click();
    setTimeout(function(){ try{ URL.revokeObjectURL(a.href); a.remove(); }catch(e){} },500);
  }
  function stamp(){
    var d=new Date();
    return d.getFullYear()+String(d.getMonth()+1).padStart(2,"0")+String(d.getDate()).padStart(2,"0")+"_"+String(d.getHours()).padStart(2,"0")+String(d.getMinutes()).padStart(2,"0");
  }
  function downloadBackup(){
    var rows=dedupe(state.rows.concat(domRows()));
    downloadBlob("捷運汐東線事項記錄_backup_"+stamp()+".json","application/json;charset=utf-8",JSON.stringify({pageKey:CONSTS.PAGE_KEY,pageFile:CONSTS.PAGE_FILE,rows:rows,exportedAt:new Date().toISOString()},null,2));
  }
  function downloadExcel(){
    var rows=dedupe(state.rows.concat(domRows()));
    var cols=["項次","記事內容","工種","系統","出處","附件","備註","登錄日期"];
    var html='<html><head><meta charset="UTF-8"></head><body><table border="1"><thead><tr>'+cols.map(function(c){return '<th>'+esc(c)+'</th>';}).join('')+'</tr></thead><tbody>'+rows.map(function(r,i){ return '<tr><td>'+(i+1)+'</td><td>'+esc(contentOf(r))+'</td><td>'+esc(workOf(r))+'</td><td>'+esc(systemOf(r))+'</td><td>'+esc(sourceOf(r))+'</td><td>'+esc(attachOf(r))+'</td><td>'+esc(remarkOf(r))+'</td><td>'+esc(dateOf(r))+'</td></tr>'; }).join('')+'</tbody></table></body></html>';
    downloadBlob("捷運汐東線事項記錄_"+stamp()+".xls","application/vnd.ms-excel;charset=utf-8",html);
  }
  function parseCsv(text){
    var rows=[], row=[], val="", q=false;
    for(var i=0;i<text.length;i++){
      var ch=text[i], nx=text[i+1];
      if(q){ if(ch==='"'&&nx==='"'){ val+='"'; i++; } else if(ch==='"'){ q=false; } else val+=ch; }
      else{ if(ch==='"') q=true; else if(ch===","){ row.push(val); val=""; } else if(ch==="\n"){ row.push(val); rows.push(row); row=[]; val=""; } else if(ch!=="\r") val+=ch; }
    }
    row.push(val); if(row.length>1 || clean(row[0])) rows.push(row);
    if(rows.length<2) return [];
    var head=rows.shift().map(compact);
    function at(names){ for(var i=0;i<names.length;i++){ var ix=head.findIndex(function(h){return h===compact(names[i]);}); if(ix>=0) return ix; } return -1; }
    var ix={content:at(["記事內容","記事内容","內容"]),work:at(["工種","工程"]),system:at(["系統"]),source:at(["出處"]),attach:at(["附件"]),remark:at(["備註"]),date:at(["登錄日期","日期"])};
    return rows.map(function(r){ return normRow({"記事內容":r[ix.content]||"","工種":r[ix.work]||"","系統":r[ix.system]||"","出處":r[ix.source]||"","附件":r[ix.attach]||"","備註":r[ix.remark]||"","登錄日期":r[ix.date]||""}); }).filter(Boolean);
  }
  function uploadData(){
    if(!canEdit()) return;
    var input=qs("#tasun-sxdh-upload-r79");
    if(!input){
      input=document.createElement("input"); input.type="file"; input.id="tasun-sxdh-upload-r79"; input.accept=".json,.csv,.txt,.xls,.html"; input.style.display="none";
      input.addEventListener("change",function(){
        var file=input.files && input.files[0]; if(!file) return;
        var fr=new FileReader();
        fr.onload=function(){
          try{
            var text=String(fr.result||""), rows=[], obj=parse(text);
            if(obj) rows=extractRows(obj); else rows=parseCsv(text);
            if(!rows.length){ alert("上傳檔案未讀到可匯入資料。"); return; }
            var merged=dedupe(state.rows.concat(domRows(),rows));
            renderRows(merged,"upload",true);
            syncCycle("upload");
            alert("上傳完成：已合併 "+rows.length+" 筆資料。");
          }catch(e){ alert("上傳失敗："+(e&&e.message?e.message:e)); }
          input.value="";
        };
        fr.readAsText(file,"utf-8");
      });
      document.body.appendChild(input);
    }
    input.click();
  }

  function bindEvents(){
    if(window.__TASUN_SXDH_R79_BOUND__) return;
    window.__TASUN_SXDH_R79_BOUND__=true;
    document.addEventListener("click",function(ev){
      var b=ev.target && ev.target.closest ? ev.target.closest("button,a,.btn,[role='button'],input[type='button'],input[type='submit']") : null;
      if(!b) return;
      if(b.id===CONSTS.SEARCH_BTN_ID){ ev.preventDefault(); ev.stopImmediatePropagation(); openSearch(); return; }
      if(b.id===CONSTS.READ_BTN_ID){ ev.preventDefault(); ev.stopImmediatePropagation(); toggleReadMode(); return; }
      if(b.id===CONSTS.EDIT_BTN_ID){ ev.preventDefault(); ev.stopImmediatePropagation(); toggleMenu(); return; }
      if(b.closest && b.closest("#"+CONSTS.EDIT_MENU_ID)){
        var a=b.getAttribute("data-r79-menu");
        if(a){ ev.preventDefault(); ev.stopImmediatePropagation(); closeMenu();
          if(a==="view") viewMode();
          else if(a==="add") addRow();
          else if(a==="edit") toggleEditMode();
          else if(a==="backup") downloadBackup();
          else if(a==="excel") downloadExcel();
          else if(a==="upload") uploadData();
          return;
        }
      }
      if(b.getAttribute("data-r79-search-close")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); closeSearch(); return; }
      if(b.getAttribute("data-r79-search-clear")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); clearFilter(); closeSearch(); return; }
      if(b.getAttribute("data-r79-search-apply")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); applySearch(); return; }
      if(b.getAttribute("data-r79-modal-close")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); closeViewModal(); return; }
      if((b.getAttribute("data-action")==="view" || compact(textOf(b))==="查看") && b.closest("tr")){ ev.preventDefault(); ev.stopImmediatePropagation(); openView(b.closest("tr")); return; }
      if(b.getAttribute("data-r79-edit-row")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); enterRowEdit(b.closest("tr")); return; }
      if(b.getAttribute("data-r79-save-row")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); saveRow(b.closest("tr")); return; }
      if(b.getAttribute("data-r79-cancel-row")==="1"){ ev.preventDefault(); ev.stopImmediatePropagation(); cancelRow(b.closest("tr")); return; }
    },true);
    document.addEventListener("click",function(ev){
      if(!ev.target || !ev.target.closest) return;
      if(!ev.target.closest("#"+CONSTS.EDIT_MENU_ID) && !ev.target.closest("#"+CONSTS.EDIT_BTN_ID)) closeMenu();
    },true);
    window.addEventListener("keydown",function(ev){ if(ev.key==="Escape"){ closeMenu(); closeSearch(); closeViewModal(); } },{passive:true});
    window.addEventListener("resize",function(){ positionMenu(); },{passive:true});
    window.addEventListener("orientationchange",function(){ setTimeout(function(){ arrangeStatus(); updateStatus(); },120); },{passive:true});
    ["focus","online","storage","tasun:auth-restored","tasun:session-bridge-ready","tasun:sxdh-worker-token-ready"].forEach(function(ev){
      window.addEventListener(ev,function(){ setTimeout(function(){ arrangeStatus(); syncCycle(ev); },160); },{passive:true});
    });
  }
  function startObservers(){
    if(state.observersStarted) return;
    state.observersStarted=true;
    try{
      var tb=ensureTable(), body=tb && tb.tBodies[0];
      if(body){
        var mo=new MutationObserver(function(){
          if(state.syncing) return;
          qsa("tbody tr",tb).forEach(function(tr,i){
            var r=rowFromTr(tr);
            if(r){ tr.setAttribute("data-uid",r.uid); tr.setAttribute("data-pk",r.uid); tr.setAttribute("data-resource-key",CONSTS.RESOURCE_KEY); if(tr.cells[0]) tr.cells[0].textContent=String(i+1); }
          });
          updateStatus();
        });
        mo.observe(body,{childList:true,subtree:true,characterData:true});
      }
    }catch(e){}
  }

  async function boot(reason){
    if(!ensureDom()) return;
    bindEvents();
    startObservers();
    arrangeStatus();
    ensureMenu();
    loadVersion();
    setCloudStatus(ls(CONSTS.CLOUD_STATUS_KEY)||ss(CONSTS.CLOUD_STATUS_KEY)||"待同步");
    var local=dedupe([].concat(storageRows(), await dbRows(), domRows()));
    if(local.length) renderRows(local,"boot-local-"+(reason||""),true);
    else updateStatus(0,0);
    syncCycle(reason||"boot");
    state.booted=true;
  }
  function scheduleBoot(reason,delay){ setTimeout(function(){ boot(reason); }, delay||0); }

  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",function(){ boot("domcontentloaded"); },{once:true});
  else boot("ready");
  [120,600,1500,3500,8000,15000].forEach(function(t){ scheduleBoot("timer-"+t,t); });
  window.addEventListener("pageshow",function(){ scheduleBoot("pageshow",120); },{passive:true});
})();
</script>
