      return getDbRows().then(function(dbRows){ local=dedupe(state.rows, readLocal(), dbRows); saveRows(local); renderRows(state.filtered); return api("/api/tasun/read",{phase:"download-before-upload",reason:reason||"r41"}); })
      .then(function(res){ if(!res||!res.ok) throw new Error("read HTTP "+(res?res.status:"ERR")); return res.json().catch(function(){return {};}); })
      .then(function(j){ var cloud=rowsFromAny(j); var merged=dedupe(cloud,local); saveRows(merged); renderRows(state.filtered); return api("/api/tasun/merge",{payload:{db:merged},phase:"upload-after-local-refresh",reason:reason||"r41"}); })
      .then(function(res){ if(!res||!res.ok) throw new Error("merge HTTP "+(res?res.status:"ERR")); return res.json().catch(function(){return {};}); })
      .then(function(j){ var finalRows=rowsFromAny(j); if(finalRows.length){ saveRows(finalRows); renderRows(state.filtered); } setCloud("已同步"); })
      .catch(function(e){ warn("雲端同步未完成："+(e&&e.message?e.message:e)); setCloud(state.rows.length?"本機資料":"待同步"); })
      .finally(function(){ state.syncing=false; updateHint(); refreshOptions(); });
    }
    function refreshOptions(){ var w={},s={}; state.rows.forEach(function(r){ if(n(r.工程)) w[r.工程]=1; if(n(r.系統)) s[r.系統]=1; }); if($("workSel")) $("workSel").innerHTML='<option>全部</option>'+Object.keys(w).sort().map(function(v){return '<option>'+esc(v)+'</option>';}).join(""); if($("sysSel")) $("sysSel").innerHTML='<option>全部</option>'+Object.keys(s).sort().map(function(v){return '<option>'+esc(v)+'</option>';}).join(""); }
    function openSearch(){ refreshOptions(); var o=$("searchOverlay"); if(o){ o.classList.add("open"); o.setAttribute("aria-hidden","false"); setTimeout(function(){ if($("kw")) $("kw").focus(); },30); } }
    function closeSearch(){ var o=$("searchOverlay"); if(o){ o.classList.remove("open"); o.setAttribute("aria-hidden","true"); } }
    function applySearch(){ var kw=n($("kw")&&$("kw").value).toLowerCase(), w=n($("workSel")&&$("workSel").value), s=n($("sysSel")&&$("sysSel").value); state.filtered=state.rows.filter(function(r){ var all=[r.記事內容,r.工程,r.系統,r.出處,r.附件,r.備註,r.登錄日期].map(n).join(" ").toLowerCase(); return (!kw||all.indexOf(kw)>=0)&&(!w||w==="全部"||n(r.工程)===w)&&(!s||s==="全部"||n(r.系統)===s); }); renderRows(state.filtered); closeSearch(); }
    function clearSearch(){ if($("kw")) $("kw").value=""; if($("workSel")) $("workSel").selectedIndex=0; if($("sysSel")) $("sysSel").selectedIndex=0; state.filtered=state.rows.slice(); renderRows(state.filtered); closeSearch(); }
    function bind(){
      var required=["app","tbl","tbody","hint","btnSearch"]; for(var i=0;i<required.length;i++){ if(!$(required[i])){ warn("找不到必要節點 #"+required[i]+"，已中止綁定。 "); return; } }
      $("btnBack").onclick=function(){ location.href="汐東工程管理表.html"; };
      $("btnInspect").onclick=function(){ syncCloud("inspect"); };
      $("btnCloud").onclick=function(){ syncCloud("cloud-button"); };
      $("btnExport").onclick=function(){ var blob=new Blob([JSON.stringify({pageKey:PAGE_KEY,pageFile:PAGE_FILE,rows:state.rows,exportedAt:new Date().toISOString()},null,2)],{type:"application/json"}); var a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="捷運汐東線事項記錄_備份.json"; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){URL.revokeObjectURL(a.href);},1000); };
      $("btnRead").onclick=function(){ document.body.classList.toggle("reading"); this.textContent=document.body.classList.contains("reading")?"閱讀模式：開":"閱讀模式：關"; };
      $("btnSearch").onclick=openSearch; $("btnCloseSearch").onclick=closeSearch; $("btnClearSearch").onclick=clearSearch; $("btnApplySearch").onclick=applySearch;
      $("searchOverlay").addEventListener("click",function(ev){ if(ev.target===$("searchOverlay")) closeSearch(); });
      $("kw").addEventListener("keydown",function(ev){ if(ev.key==="Enter"){ ev.preventDefault(); applySearch(); }});
      window.addEventListener("keydown",function(ev){ if(ev.key==="Escape") closeSearch(); });
      document.addEventListener("click",function(ev){ var b=ev.target&&ev.target.closest&&ev.target.closest("[data-view]"); if(!b) return; var id=b.getAttribute("data-view"); var r=state.rows.filter(function(x){return (x.uid||x.pk)===id;})[0]; if(r) alert(["記事內容："+r.記事內容,"工程："+r.工程,"系統："+r.系統,"出處："+r.出處,"附件："+r.附件,"備註："+r.備註,"登錄日期："+r.登錄日期].join("\n")); });
      ["pageshow","focus","storage"].forEach(function(ev){ window.addEventListener(ev,function(){ setTimeout(function(){ syncCloud(ev); },120); },{passive:true}); });
    }
    function loadVersion(){
      try{ var u=new URL(location.href); state.version=n(u.searchParams.get("v")||window.__CACHE_V||window.TASUN_APP_VER||window.APP_VER||"載入中"); }catch(e){}
      updateHint();
      timeoutFetch("tasun-version.json?_="+Date.now(),{cache:"no-store",credentials:"same-origin",headers:{"accept":"application/json"}},4000).then(function(r){ if(!r||!r.ok) return null; return r.json().catch(function(){return null;}); }).then(function(j){ if(!j) return; var m=j.meta||{}; var v=n(j.version||j.ver||j.appVer||j.cacheV||m.version||m.ver||m.appVer||m.cacheV); if(v){ state.version=v; window.__CACHE_V=v; window.TASUN_APP_VER=v; window.APP_VER=v; try{ var u=new URL(location.href); if(n(u.searchParams.get("v"))!==v){ u.searchParams.set("v",v); history.replaceState(null,document.title,u.toString()); } }catch(e){} updateHint(); } }).catch(function(){});
    }
    function boot(){
      try{ document.title="捷運汐東線事項記錄 · Tasun"; }catch(e){}
      bind(); loadVersion();
      var local=readLocal(); saveRows(local); renderRows(state.filtered); refreshOptions();
      getDbRows().then(function(dbRows){ if(dbRows.length){ saveRows(dedupe(state.rows,dbRows)); renderRows(state.filtered); refreshOptions(); } return syncCloud("boot"); });
      setTimeout(function(){ if(!$("tbl")||!$("tbody")){ warn("主畫面節點遺失，已重新補入基本資料表。 "); } },1200);
    }
    if(document.readyState==="loading") document.addEventListener("DOMContentLoaded",boot,{once:true}); else boot();
  })();
  </script>
