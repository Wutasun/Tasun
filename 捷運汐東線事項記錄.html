<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>捷運汐東線事項記錄 · Tasun</title>
  <meta http-equiv="Cache-Control" content="no-cache" />
  <style>
    html,body{height:100%;margin:0;font-family:"Noto Sans TC",system-ui,-apple-system,"Segoe UI",Arial,sans-serif;background:linear-gradient(180deg,#dbe3e1,#c7d4d1);color:#111;}
    .tasunBoot{height:100%;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;box-sizing:border-box;}
    .tasunBootBox{max-width:720px;border:1px solid rgba(0,0,0,.22);border-radius:22px;background:rgba(255,255,255,.92);box-shadow:0 18px 50px rgba(0,0,0,.12);padding:22px;line-height:1.8;font-weight:800;}
    .tasunBootTitle{font-family:"Noto Serif TC","Noto Sans TC",serif;font-size:clamp(24px,4vw,38px);letter-spacing:.12em;color:#9a6418;margin-bottom:8px;}
    .tasunBootMsg{font-size:15px;color:rgba(0,0,0,.72);}
  </style>
</head>
<body>
  <div class="tasunBoot" id="tasunBoot">
    <div class="tasunBootBox">
      <div class="tasunBootTitle">捷運汐東線事項記錄</div>
      <div class="tasunBootMsg">正在載入最新版畫面與修正項目…</div>
    </div>
  </div>

<script id="tasun-sxdh-notes-hotfix-loader-20260424-r1">
(function(){
  'use strict';

  var SOURCE_URL = 'https://raw.githubusercontent.com/Wutasun/Tasun/576a499e2ad1c55fc67c0481ad52fc05a06c956b/%E6%8D%B7%E9%81%8B%E6%B1%90%E6%9D%B1%E7%B7%9A%E4%BA%8B%E9%A0%85%E8%A8%98%E9%8C%84.html';

  function norm(v){ return v == null ? '' : String(v).trim(); }

  function showError(msg){
    var el = document.getElementById('tasunBoot');
    if(el){
      el.innerHTML = '<div class="tasunBootBox"><div class="tasunBootTitle">載入失敗</div><div class="tasunBootMsg"></div></div>';
      var m = el.querySelector('.tasunBootMsg');
      if(m) m.textContent = msg || '請重新整理或確認 GitHub Pages 網路連線。';
    }else{
      alert(msg || '載入失敗');
    }
  }

  function actionMenuStyle(){
    return '' +
'<style id="tasun-sxdh-edit-function-menu-r1">\n' +
'  .editFunctionWrap{ position:relative; display:inline-flex; }\n' +
'  .editFunctionMenu{\n' +
'    position:absolute; top:calc(100% + 8px); right:0; min-width:230px; z-index:180; display:none;\n' +
'    padding:8px; border-radius:16px; border:1px solid rgba(0,0,0,.22);\n' +
'    background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(244,238,224,.96));\n' +
'    box-shadow:0 18px 46px rgba(0,0,0,.20);\n' +
'  }\n' +
'  .editFunctionWrap.open .editFunctionMenu{ display:block; }\n' +
'  .editFunctionItem{\n' +
'    width:100%; border:0; border-radius:12px; padding:11px 13px; margin:2px 0; cursor:pointer;\n' +
'    background:transparent; color:rgba(55,34,12,.92); font-family:inherit; font-size:15px;\n' +
'    font-weight:900; letter-spacing:.06em; text-align:left; white-space:nowrap;\n' +
'  }\n' +
'  .editFunctionItem:hover{ background:rgba(170,110,18,.10); }\n' +
'  .editFunctionSep{ height:1px; margin:7px 6px; background:rgba(0,0,0,.12); }\n' +
'  @media (min-width:761px){\n' +
'    .desktopEditFunction{ display:inline-flex !important; }\n' +
'    .right > #btnView, .right > #btnAdd, .right > #btnEdit{ display:none !important; }\n' +
'    .panelHead #btnExcelExport, .panelHead #btnExcelImport{ display:none !important; }\n' +
'  }\n' +
'  @media (max-width:760px){ .desktopEditFunction{ display:none !important; } }\n' +
'</style>\n';
  }

  function actionMenuDom(){
    return '' +
'        <div class="editFunctionWrap desktopEditFunction" id="editFunctionWrap">\n' +
'          <button class="btn small" id="btnEditFunction" type="button" aria-haspopup="true" aria-expanded="false"><span class="t">編輯功能 ▾</span></button>\n' +
'          <div class="editFunctionMenu" id="editFunctionMenu" role="menu" aria-label="編輯功能選單">\n' +
'            <button class="editFunctionItem" type="button" data-action="add" data-write="1">新增</button>\n' +
'            <button class="editFunctionItem" type="button" data-action="view">檢視</button>\n' +
'            <button class="editFunctionItem" type="button" data-action="edit" data-write="1">編輯</button>\n' +
'            <div class="editFunctionSep" aria-hidden="true"></div>\n' +
'            <button class="editFunctionItem" type="button" data-action="excelImport" data-write="1">上傳Excel</button>\n' +
'            <button class="editFunctionItem" type="button" data-action="excelExport">下載Excel</button>\n' +
'          </div>\n' +
'        </div>\n';
  }

  function actionMenuScript(){
    return '' +
'<script id="tasun-sxdh-edit-function-menu-r1-script">\n' +
'(function(){\n' +
'  \'use strict\';\n' +
'  if(window.__TASUN_SXDH_EDIT_FUNCTION_MENU_R1__) return;\n' +
'  window.__TASUN_SXDH_EDIT_FUNCTION_MENU_R1__ = true;\n' +
'  function byId(id){ return document.getElementById(id); }\n' +
'  function norm(v){ return v == null ? \'\' : String(v).trim(); }\n' +
'  function toast(msg){\n' +
'    try{\n' +
'      if(typeof window.toast === \'function\'){ window.toast(msg); return; }\n' +
'      if(typeof window.showToast === \'function\'){ window.showToast(msg); return; }\n' +
'      var t = byId(\'toast\');\n' +
'      if(!t){ alert(msg); return; }\n' +
'      t.textContent = msg; t.style.display = \'block\';\n' +
'      clearTimeout(window.__tasunEditFunctionToastTm__);\n' +
'      window.__tasunEditFunctionToastTm__ = setTimeout(function(){ t.style.display = \'none\'; }, 2600);\n' +
'    }catch(_e){}\n' +
'  }\n' +
'  function warnStop(msg){ try{ console.warn(\'[Tasun][捷運汐東線事項記錄] \' + msg); }catch(_e){} toast(msg); return false; }\n' +
'  function currentRole(){ return norm((byId(\'uRole\') && byId(\'uRole\').textContent) || \'read\').toLowerCase() || \'read\'; }\n' +
'  function canWrite(){ var r = currentRole(); return r === \'admin\' || r === \'write\'; }\n' +
'  function refreshMenu(){\n' +
'    var writable = canWrite();\n' +
'    var menu = byId(\'editFunctionMenu\');\n' +
'    if(!menu) return false;\n' +
'    menu.querySelectorAll(\'[data-write="1"]\').forEach(function(item){ item.style.display = writable ? \'block\' : \'none\'; });\n' +
'    return true;\n' +
'  }\n' +
'  function closeMenu(){\n' +
'    var wrap = byId(\'editFunctionWrap\'), btn = byId(\'btnEditFunction\');\n' +
'    if(wrap) wrap.classList.remove(\'open\');\n' +
'    if(btn) btn.setAttribute(\'aria-expanded\', \'false\');\n' +
'  }\n' +
'  function toggleMenu(evt){\n' +
'    if(evt){ evt.preventDefault(); evt.stopPropagation(); }\n' +
'    var wrap = byId(\'editFunctionWrap\'), btn = byId(\'btnEditFunction\'), menu = byId(\'editFunctionMenu\');\n' +
'    if(!wrap || !btn || !menu) return warnStop(\'警告：找不到編輯功能選單 DOM，功能已中止。\');\n' +
'    refreshMenu();\n' +
'    var open = !wrap.classList.contains(\'open\');\n' +
'    wrap.classList.toggle(\'open\', open);\n' +
'    btn.setAttribute(\'aria-expanded\', open ? \'true\' : \'false\');\n' +
'    return false;\n' +
'  }\n' +
'  function execute(action){\n' +
'    var map = { add:\'btnAdd\', view:\'btnView\', edit:\'btnEdit\', excelImport:\'btnExcelImport\', excelExport:\'btnExcelExport\' };\n' +
'    var targetId = map[action];\n' +
'    if(!targetId) return warnStop(\'警告：未知功能項目，已中止。\');\n' +
'    var target = byId(targetId);\n' +
'    if(!target) return warnStop(\'警告：找不到「\' + targetId + \'」實體 DOM，功能已中止。\');\n' +
'    if((action === \'add\' || action === \'edit\' || action === \'excelImport\') && !canWrite()){ toast(\'目前權限不可執行此功能\'); return false; }\n' +
'    try{ target.click(); return true; }catch(err){ try{ console.error(err); }catch(_e){} return warnStop(\'編輯功能執行失敗，請再試一次。\'); }\n' +
'  }\n' +
'  function bind(){\n' +
'    var btn = byId(\'btnEditFunction\'), menu = byId(\'editFunctionMenu\');\n' +
'    if(!btn || !menu) return warnStop(\'警告：找不到編輯功能按鍵或選單，功能已中止。\');\n' +
'    if(btn.dataset.boundEditFunction === \'1\'){ refreshMenu(); return true; }\n' +
'    btn.dataset.boundEditFunction = \'1\';\n' +
'    btn.addEventListener(\'click\', toggleMenu);\n' +
'    menu.addEventListener(\'click\', function(evt){\n' +
'      var item = evt.target && evt.target.closest ? evt.target.closest(\'[data-action]\') : null;\n' +
'      if(!item) return;\n' +
'      evt.preventDefault(); evt.stopPropagation();\n' +
'      var act = item.getAttribute(\'data-action\');\n' +
'      closeMenu();\n' +
'      execute(act);\n' +
'    });\n' +
'    document.addEventListener(\'click\', function(evt){ if(!evt.target.closest || !evt.target.closest(\'#editFunctionWrap\')) closeMenu(); });\n' +
'    window.addEventListener(\'keydown\', function(evt){ if(evt.key === \'Escape\') closeMenu(); });\n' +
'    refreshMenu();\n' +
'    return true;\n' +
'  }\n' +
'  function lateBind(){ bind(); setTimeout(bind, 80); setTimeout(bind, 360); setTimeout(refreshMenu, 900); }\n' +
'  if(document.readyState === \'loading\') document.addEventListener(\'DOMContentLoaded\', lateBind, { once:true }); else lateBind();\n' +
'  window.addEventListener(\'pageshow\', refreshMenu, { passive:true });\n' +
'  window.addEventListener(\'focus\', refreshMenu, { passive:true });\n' +
'  window.__TASUN_REBIND_EDIT_FUNCTION_MENU__ = bind;\n' +
'})();\n' +
'<\/script>\n';
  }

  function patchHtml(html){
    var out = String(html || '');

    // 1) 移除標題下方副標文字（桌機/手機同步）
    out = out.replace(/\s*<div\s+class=["']sub["']>\s*記事內容\s*·\s*工種\s*·\s*系統\s*·\s*出處\s*·\s*附件\s*·\s*登錄日期\s*<\/div>\s*/g, '\n');

    // 2) 先補實體 DOM：桌機「編輯功能」按鍵與下拉式選單
    if(out.indexOf('id="btnEditFunction"') < 0){
      var inserted = false;
      out = out.replace(/(<div\s+class=["']pill["']>\s*權限：<b\s+id=["']uRole["']>—<\/b><\/div>\s*)/, function(m){ inserted = true; return m + '\n' + actionMenuDom(); });
      if(!inserted){
        out = out.replace(/(<div\s+class=["']right["']>\s*)/, function(m){ inserted = true; return m + '\n' + actionMenuDom(); });
      }
      if(!inserted){ console.warn('[Tasun][捷運汐東線事項記錄] 警告：未找到 right DOM 插入點。'); }
    }

    // 3) 綁 CSS/JS：找不到節點會中止並警告
    if(out.indexOf('tasun-sxdh-edit-function-menu-r1') < 0){
      out = out.replace(/<\/head>/i, actionMenuStyle() + '</head>');
    }
    if(out.indexOf('tasun-sxdh-edit-function-menu-r1-script') < 0){
      out = out.replace(/<\/body>/i, actionMenuScript() + '</body>');
    }

    // 4) 標記本次修正，避免「說明有改、網頁未改」無法辨識
    if(out.indexOf('tasun-sxdh-notes-ui-action-menu-hotfix-20260424-r1') < 0){
      out = out.replace(/<head>/i, '<head>\n  <!-- tasun-sxdh-notes-ui-action-menu-hotfix-20260424-r1 -->');
    }
    return out;
  }

  async function boot(){
    try{
      var res = await fetch(SOURCE_URL + '?_=' + Date.now(), { cache:'no-store', credentials:'omit' });
      if(!res.ok) throw new Error('HTTP ' + res.status);
      var html = await res.text();
      if(!html || html.indexOf('捷運汐東線事項記錄') < 0) throw new Error('遠端 HTML 身分不符');
      var patched = patchHtml(html);
      document.open();
      document.write(patched);
      document.close();
    }catch(err){
      try{ console.error('[Tasun][捷運汐東線事項記錄] hotfix loader failed', err); }catch(_e){}
      showError('修正版載入失敗：' + (err && err.message ? err.message : err) + '。請確認 GitHub Pages / raw.githubusercontent.com 可連線後重新整理。');
    }
  }
  boot();
})();
</script>
</body>
</html>
