          var latestBS = norm(json.buildStamp || json.build_stamp || json.pageBuildStamp || json.rebuildStamp || meta.buildStamp || meta.pageBuildStamp || '');

      row.rev = existing ? existing.rev : 0;
      row.deleted = false;
      row = touchRow(row);
      mergeIncoming([row]);
      state.selectedUid = row.uid;
      persistLocal();
      render();
      closeModal(true);
      syncAll('save');
      showToast('已儲存');
    }
    function deleteItem(){
      state.currentUser = getCurrentUser();
      if(!isAdmin()){ showToast('僅 admin 可刪除'); return; }
      if(!state.editingUid) return;
      if(!confirm('確定刪除這筆資料？')) return;
      markDeleted(state.editingUid);
      persistLocal();
      state.selectedUid = '';
      render();
      closeModal(true);
      syncAll('delete');
      showToast('已刪除');
    }

    function exportTemplate(){
      var rows = canonicalRows(state.rows).filter(function(r){ return !r.deleted; });
      var header = ['編號','來源／會議','日期','事項主題','事項內容','主責單位','協辦單位','期限','狀態','追蹤情形','備註'];
      var csvRows = [header].concat((rows.length ? rows : [ensureRow({id:1,source:'週會',recordDate:todayISO(),subject:'請填寫事項主題',content:'請填寫事項內容',owner:'統包廠商',assist:'監造單位',status:'未開始'})]).map(function(r){
        return [r.id,r.source,r.recordDate,r.subject,r.content,r.owner,r.assist,r.dueDate,r.status,r.progress,r.note].map(function(v){
          var s = norm(v).replace(/"/g,'""');
          return '"' + s + '"';
        }).join(',');
      }));
      var blob = new Blob(["\ufeff" + csvRows.join('\r\n')], { type:'text/csv;charset=utf-8;' });
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = '捷運汐東線事項記錄_' + todayISO().replace(/-/g,'') + '.csv';
      document.body.appendChild(a);
      a.click();
      setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); }, 1000);
      showToast('已下載CSV樣板');
    }
    function parseCsv(text){
      var rows = [];
      var cur = '', row = [], q = false;
      for(var i=0;i<text.length;i++){
        var ch = text[i], next = text[i+1];
        if(ch === '"'){
          if(q && next === '"'){ cur += '"'; i++; }
          else q = !q;
        }else if(ch === ',' && !q){
          row.push(cur); cur = '';
        }else if((ch === '\n' || ch === '\r') && !q){
          if(ch === '\r' && next === '\n') i++;
          row.push(cur); rows.push(row); row = []; cur = '';
        }else{
          cur += ch;
        }
      }
      if(cur.length || row.length){ row.push(cur); rows.push(row); }
      return rows;
    }
    function parseUploadRows(file){
      var name = norm(file && file.name).toLowerCase();
      if(/\.csv$/i.test(name)){
        return file.text().then(function(text){
          var table = parseCsv(String(text || '').replace(/^\ufeff/, ''));
          if(!table.length) return [];
          var head = table[0].map(norm);
          return table.slice(1).map(function(cols){
            var obj = {};
            head.forEach(function(k, i){ obj[k] = norm(cols[i]); });
            return ensureRow({
              id: Number(obj['編號'] || 0) || 0,
              source: obj['來源／會議'] || obj['來源'] || '',
              recordDate: obj['日期'] || '',
              subject: obj['事項主題'] || '',
              content: obj['事項內容'] || '',
              owner: obj['主責單位'] || '',
              assist: obj['協辦單位'] || '',
              dueDate: obj['期限'] || '',
              status: obj['狀態'] || '未開始',
              progress: obj['追蹤情形'] || '',
              note: obj['備註'] || ''
            });
          }).filter(function(r){ return r.subject || r.content || r.source || r.owner; });
        });
      }
      showToast('目前穩定版先支援 CSV 匯入，Excel 可先另存 CSV 再上傳');
      return Promise.resolve([]);
    }
    function importFile(file){
      if(!file) return;
      parseUploadRows(file).then(function(parsed){
        if(!parsed.length) return;
        parsed = parsed.map(function(r){ return touchRow(r); });
        mergeIncoming(parsed);
        state.counter = Math.max(state.counter, canonicalRows(state.rows).reduce(function(m, r){ return Math.max(m, Number(r.id || 0) || 0); }, 0));
        persistLocal();
        render();
        syncAll('upload');
        showToast('已匯入 ' + parsed.length + ' 筆資料');
      });
    }

    function bindDirty(){
      document.querySelectorAll('#mask input, #mask textarea, #mask select').forEach(function(el){
        if(el.dataset.dirtyBound === '1') return;
        el.dataset.dirtyBound = '1';
        el.addEventListener('input', function(){ if(state.editable) state.dirty = true; });
        el.addEventListener('change', function(){ if(state.editable) state.dirty = true; });
      });
    }
    function bindActions(){
      $('navHome').addEventListener('click', function(){ location.href = withV('汐東工程管理表.html'); });
      $('loginBlockerBackBtn').addEventListener('click', function(){ location.href = withV('index.html'); });
      $('btnSearch').addEventListener('click', function(){ $('searchPanel').classList.toggle('show'); });
      $('btnSync').addEventListener('click', function(){ syncAll('manual'); showToast('已啟動同步'); });
      $('btnClear').addEventListener('click', function(){ ['fKeyword','fStatus','fOwner','fDateFrom','fDateTo','fDueMode'].forEach(function(id){ $(id).value = ''; }); render(); });
      ['fKeyword','fStatus','fOwner','fDateFrom','fDateTo','fDueMode'].forEach(function(id){
        $(id).addEventListener('input', render);
        $(id).addEventListener('change', render);
      });
      $('btnAdd').addEventListener('click', function(){ openModal('', true); });
      $('btnEdit').addEventListener('click', function(){ if(!state.selectedUid){ showToast('請先點選一列再按編輯'); return; } openModal(state.selectedUid, true); });
      $('btnTemplate').addEventListener('click', exportTemplate);
      $('btnUpload').addEventListener('click', function(){ if(!canWrite()){ showToast('唯讀不可上傳'); return; } $('fileInput').value = ''; $('fileInput').click(); });
      $('fileInput').addEventListener('change', function(){ var file = this.files && this.files[0]; if(file) importFile(file); });
      $('btnClose').addEventListener('click', function(){ closeModal(false); });
      $('btnCancel').addEventListener('click', function(){ closeModal(false); });
      $('btnSave').addEventListener('click', saveItem);
      $('btnDelete').addEventListener('click', deleteItem);
      $('mask').addEventListener('click', function(e){ if(e.target === $('mask')) closeModal(false); });
      window.addEventListener('keydown', function(e){ if(e.key === 'Escape' && $('mask').classList.contains('show')) closeModal(false); });
      $('tbody').addEventListener('click', function(e){
        var btn = e.target.closest('button[data-act]');
        var tr = e.target.closest('tr[data-uid]');
        if(btn){
          var uid = norm(btn.getAttribute('data-uid'));
          if(uid){ state.selectedUid = uid; render(); openModal(uid, false); }
          return;
        }
        if(tr){ state.selectedUid = norm(tr.getAttribute('data-uid')); render(); }
      });
    }

    function boot(){
      if(!ensureRequiredDom()) return;
      var session = ensureSessionAccess();
      if(!session) return;
      state.currentUser = session;
      bindDirty();
      bindActions();
      loadLocalDb();
      render();
      syncAll('boot');
      lightweightVersionCheck(true);
      document.addEventListener('visibilitychange', function(){
        if(document.visibilityState === 'visible'){
          var session2 = ensureSessionAccess();
          if(session2){
            state.currentUser = session2;
            render();
            syncAll('visibility');
            lightweightVersionCheck(false);
          }
        }
      }, { passive:true });
      setInterval(function(){
        var payload = ensureSessionAccess();
        if(payload){
          state.currentUser = payload;
          render();
        }
      }, CFG.SESSION_WATCH_MS);
      trace('boot_done', { pageKey:PAGE_KEY, buildStamp:G.PAGE_BUILD_STAMP, rows:state.rows.length });
    }

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot, { once:true });
    else boot();
  })();
  </script>
</body>
</html>
