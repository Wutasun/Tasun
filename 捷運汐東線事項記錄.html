  function patchHtml(html){
    var out = String(html || '');

    // 1) 移除標題下方副標文字（桌機/手機同步）
    out = out.replace(/\s*<div\s+class=["']sub["']>\s*記事內容\s*·\s*工種\s*·\s*系統\s*·\s*出處\s*·\s*附件\s*·\s*登錄日期\s*<\/div>\s*/g, '\n');

    // 1-1) 修正雲端授權顯示與 token bridge：避免登入狀態正常時顯示「未授權」
    out = out.replace(/if\(c\.authState==="unauth"\)\s*return\s*"未授權";/g, 'if(c.authState==="unauth") return "待同步";');
    out = out.replace(/if\(c\.authState==="unauth"\s*\|\|\s*/g, 'if(');
    out = out.replace(/if\(isValidApiBase\(cfg\.apiBase\)\s*&&\s*getToken\(\)\)/g, 'if(isValidApiBase(cfg.apiBase))');

    // 2) 先補實體 DOM：桌機「編輯功能」按鍵與下拉式選單
    if(out.indexOf('id="btnEditFunction"') < 0){
      var inserted = false;
      out = out.replace(/(<div\s+class=["']pill["']>\s*權限：<b\s+id=["']uRole["']>—<\/b><\/div>\s*)/, function(m){ inserted = true; return m + '\n' + actionMenuDom(); });
      if(!inserted) out = out.replace(/(<div\s+class=["']right["']>\s*)/, function(m){ inserted = true; return m + '\n' + actionMenuDom(); });
      if(!inserted) console.warn('[Tasun][捷運汐東線事項記錄] 警告：未找到 right DOM 插入點。');
    }

    // 2-1) 先補實體 DOM：桌機版「搜尋」按鍵與浮動搜尋表單
    if(out.indexOf('id="btnDesktopSearch"') < 0){
      var sInserted = false;
      out = out.replace(/(<div\s+class=["']pill["']>\s*權限：<b\s+id=["']uRole["']>—<\/b><\/div>\s*)/, function(m){ sInserted = true; return m + '\n' + desktopSearchDom(); });
      if(!sInserted) out = out.replace(/(<div\s+class=["']right["']>\s*)/, function(m){ sInserted = true; return m + '\n' + desktopSearchDom(); });
      if(!sInserted) console.warn('[Tasun][捷運汐東線事項記錄] 警告：未找到搜尋按鍵插入點。');
    }

    // 3) 綁 CSS/JS：腳本抓不到節點會中止並顯示警告
    if(out.indexOf('tasun-sxdh-edit-function-menu-r6') < 0) out = out.replace(/<\/head>/i, actionMenuStyle() + '</head>');
    if(out.indexOf('tasun-sxdh-desktop-search-float-r6') < 0) out = out.replace(/<\/head>/i, desktopSearchStyle() + '</head>');
    if(out.indexOf('tasun-sxdh-layout-merge-r6') < 0) out = out.replace(/<\/head>/i, layoutMergeStyle() + '</head>');
    if(out.indexOf('tasun-sxdh-cloud-auth-display-r6-script') < 0) out = out.replace(/<\/head>/i, cloudAuthBridgeScript() + '</head>');
    if(out.indexOf('tasun-sxdh-edit-function-menu-r6-script') < 0) out = out.replace(/<\/body>/i, actionMenuScript() + '</body>');
    if(out.indexOf('tasun-sxdh-desktop-search-float-r6-script') < 0) out = out.replace(/<\/body>/i, desktopSearchScript() + '</body>');
    if(out.indexOf('tasun-sxdh-layout-merge-r6-script') < 0) out = out.replace(/<\/body>/i, layoutMergeScript() + '</body>');

    // 4) 標記本次修正，避免「說明有改、網頁未改」無法辨識
    if(out.indexOf('tasun-sxdh-notes-cloud-auth-display-hotfix-20260424-r6') < 0){
      out = out.replace(/<head>/i, '<head>\n  <!-- tasun-sxdh-notes-cloud-auth-display-hotfix-20260424-r6 -->');
    }
    return out;
  }

  async function boot(){
    hideBoot();
    var lastErr = null;
    for(var i=0;i<SOURCE_URLS.length;i++){
      try{ var html = await fetchHtmlFrom(SOURCE_URLS[i]); writePage(html); return; }
      catch(err){ lastErr = err; try{ console.warn('[Tasun][捷運汐東線事項記錄] source failed', SOURCE_URLS[i], err); }catch(_e){} }
    }
    try{
      var cached = localStorage.getItem(LAST_GOOD_KEY);
      if(cached && cached.indexOf('捷運汐東線事項記錄') >= 0){ document.open(); document.write(cached); document.close(); return; }
    }catch(_e){}
    bootAttempts++;
    showError('背景載入重試中：' + (lastErr && lastErr.message ? lastErr.message : lastErr));
    if(bootAttempts < MAX_ATTEMPTS) setTimeout(boot, Math.min(15000, 900 + bootAttempts * 850));
  }
  boot();
})();
