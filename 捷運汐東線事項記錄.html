  function buildSessionBridgeHead(){

(function(){
  "use strict";

    CURRENT:"tasunCurrentUser_v1",

  G.PAGE_KEY = "sxdh-notes";
  G.PAGE_FILE = "捷運汐東線事項記錄.html";
  G.RESOURCE_KEY = "sxdh-notes";
  window.__TASUN_PAGE_KEY__ = "sxdh-notes";
  window.__TASUN_RESOURCE_KEY__ = "sxdh-notes";
  window.__TASUN_ALIAS_PAGE_FILE__ = "捷運汐東線事項記錄.html";

  function norm(v){ return v == null ? "" : String(v).trim(); }
  function parse(s){ try{ return JSON.parse(s || "null"); }catch(e){ return null; } }
  function ss(k){ try{ return sessionStorage.getItem(k) || ""; }catch(e){ return ""; } }
  function setSS(k,v){ try{ sessionStorage.setItem(k, v); }catch(e){} }

    var r = norm(role).toLowerCase();
    if(r) return r;
    var u = norm(name).toLowerCase();
    if(u === "alex" || u === "joyce") return "admin";
    if(u === "tasun") return "write";
    return "read";

  function b64e(s){
    try{ return btoa(unescape(encodeURIComponent(s))); }

    try{ return decodeURIComponent(escape(atob(s))); }
    catch(e){ try{ return atob(s); }catch(_e){ return ""; } }
  }
  function readCookie(){
    try{
      var m = document.cookie.match(/(?:^|; )tasun_session_v4=([^;]*)/);
      if(!m) return null;
      var o = parse(b64d(decodeURIComponent(m[1] || "")));
      if(!o || !o.u) return null;
      if(o.exp && Date.now() > Number(o.exp)) return null;
      return {user:norm(o.u), username:norm(o.u), name:norm(o.u), role:roleOf(o.u, o.r), level:roleOf(o.u, o.r), exp:Number(o.exp || 0), source:"cookie"};

  function normalize(o, source){

    return {user:name, username:name, name:name, role:role, level:role, exp:exp, source:source || "session"};

      [KEYS.BRIDGE,"bridge"],
      [KEYS.LEGACY,"legacy"],
      [KEYS.SSO2,"sso2"],
      [KEYS.SSO1,"sso1"]
    ].forEach(function(pair){
      var o = normalize(parse(ss(pair[0])), pair[1]);
      if(o) out.push(o);

    return out;

  function hasSessionProof(cands){
    if(ss(KEYS.INDEX) === "1" || ss(KEYS.CHILD) === "1" || ss(KEYS.TAB) === "1") return true;
    for(var i=0; i<cands.length; i++){ if(cands[i].source === "cookie") return true; }

  function clearCookie(){

    setSS(KEYS.INDEX, "1");
    setSS(KEYS.CHILD, "1");

    setSS(KEYS.LEGACY, JSON.stringify(full));
    setSS(KEYS.SSO1, JSON.stringify(sso));
    setSS(KEYS.SSO2, JSON.stringify(sso));

    setLS(KEYS.INDEX, "1");
    setLS(KEYS.CHILD, "1");
    setLS(KEYS.CURRENT, JSON.stringify(full));
    setLS(KEYS.BRIDGE, JSON.stringify(full));
    setLS(KEYS.LEGACY, JSON.stringify(full));

  function buildSessionBridgePost(){
    return scriptTag('tasun-sxdh-notes-session-postfix-r13', String.raw`
(function(){
  "use strict";

  function auth(){ return window.__TASUN_SESSION_ONLY_AUTH__ || null; }
  function isShown(el){
    try{
      var cs = getComputedStyle(el);
      return cs.display !== "none" && cs.visibility !== "hidden" && Number(cs.opacity || 1) > 0;
    }catch(e){ return false; }
  }
  function setText(sel, text){
    try{ document.querySelectorAll(sel).forEach(function(el){ if(el) el.textContent = text; }); }catch(e){}
  }
  function reMirror(a){
    try{
      var s = JSON.stringify({user:a.user, username:a.user, name:a.user, role:a.role, level:a.role, at:new Date().toISOString(), exp:a.exp || Date.now()+43200000});
      ["tasunCurrentUser_v1","tasunSessionBridge_v1","tasunSession_v1"].forEach(function(k){
        sessionStorage.setItem(k, s);
        localStorage.setItem(k, s);
      });
      sessionStorage.setItem("tasunIndexSessionAuthed_v2", "1");
      sessionStorage.setItem("tasunIndexSession_v1", "1");
      localStorage.setItem("tasunIndexSessionAuthed_v2", "1");
      localStorage.setItem("tasunIndexSession_v1", "1");
    }catch(e){}
  }
  function unlock(){
    var a = auth();
    if(!a || !a.user) return;
    reMirror(a);
    try{ document.body && document.body.classList.remove("locked","needLogin","loginRequired","authLocked"); }catch(e){}
    try{
      document.querySelectorAll("#loginMask,.loginMask,#loginOverlay,.login-overlay,.authMask,[data-login-mask]").forEach(function(el){
        el.style.setProperty("display", "none", "important");
        el.style.setProperty("visibility", "hidden", "important");
        el.style.setProperty("pointer-events", "none", "important");
        el.setAttribute("aria-hidden", "true");
      });
    }catch(e){}
    setText("#curUser,#currentUser,#userName,#userText,#userInfo,[data-current-user]", a.user);
    setText("#curRole,#currentRole,#permText,#permissionText,#roleText,[data-current-role]", a.role);
    try{ window.dispatchEvent(new CustomEvent("tasun:auth-restored", {detail:a})); }catch(e){}
  }
  function observeChildLogin(){
    try{
      var cur = localStorage.getItem("tasunCurrentUser_v1") || sessionStorage.getItem("tasunCurrentUser_v1") || "";
      if(!cur) return;
      var o = JSON.parse(cur);
      var u = String(o.user || o.username || o.name || "").trim();
      if(!u) return;
      var masks = document.querySelectorAll("#loginMask,.loginMask,#loginOverlay,.login-overlay");
      var open = false;
      masks.forEach(function(m){ if(isShown(m)) open = true; });
      if(open) return;
      var r = String(o.role || o.level || "read").trim().toLowerCase() || "read";
      window.__TASUN_SESSION_ONLY_AUTH__ = {user:u, username:u, name:u, role:r, level:r, exp:Date.now()+43200000};
      unlock();
    }catch(e){}
  }

  ["DOMContentLoaded","load","pageshow","focus","tasun:session-bridge-ready"].forEach(function(e){
    window.addEventListener(e, function(){ setTimeout(unlock, 0); setTimeout(observeChildLogin, 220); }, {passive:true});
  });
  [0,60,180,420,900,1600,2600,4000].forEach(function(t){
    setTimeout(function(){ unlock(); observeChildLogin(); }, t);
  });
})();
`);

  function patch(html){
    if(!isGood(html)) throw new Error('HTML 身分檢查未通過');
    html = html.replace(/<title>[^<]*<\/title>/i, '<title>捷運汐東線事項記錄 · Tasun</title>');
    if(html.indexOf('tasun-sxdh-notes-session-bridge-r13') < 0){
      html = html.replace(/<head>/i, '<head>\n  <!-- tasun-sxdh-notes-session-bridge-20260425-r13 -->\n' + buildSessionBridgeHead());
    }
    if(html.indexOf('tasun-sxdh-notes-identity-guard-r13') < 0){
      html = html.replace(/<head>/i, '<head>\n  <!-- tasun-sxdh-notes-no-wrong-page-loader-20260425-r13 -->\n' + buildIdentityGuard());
    }
    if(html.indexOf('tasun-sxdh-notes-session-postfix-r13') < 0){
      if(/<\/body>/i.test(html)) html = html.replace(/<\/body>/i, buildSessionBridgePost() + '\n</body>');
      else html += buildSessionBridgePost();
    }
    return html;
  }
  function write(html){
    var p = patch(html);
    try{ localStorage.setItem(LAST_GOOD, p); }catch(_e){}
    document.open(); document.write(p); document.close();
  }
  async function boot(){
    var ver = await getVersion();
    var sources = [SOURCE_FILE, './' + SOURCE_FILE, 'https://raw.githubusercontent.com/Wutasun/Tasun/main/sxdh-notes.html', 'https://cdn.jsdelivr.net/gh/Wutasun/Tasun@main/sxdh-notes.html'];
    for(var i=0; i<sources.length; i++){
      try{ write(await fetchText(sources[i], ver)); return; }
      catch(e){ try{ console.warn('[Tasun][捷運汐東線事項記錄] source failed:', sources[i], e); }catch(_e){} }
    }
    try{
      var cached = localStorage.getItem(LAST_GOOD) || '';
      if(isGood(cached)){ write(cached); return; }
    }catch(_e){}
    showFail('最新版畫面載入未完成；已阻止載入錯誤頁面。');
  }
  boot();
})();
