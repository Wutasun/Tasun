  function bindLoginBlocker(){ var btn = $('loginBlockerBackBtn'); if(btn && !btn.__tasunBound){ btn.__tasunBound = true; btn.addEventListener('click', function(){ location.href = withV('index.html'); }); } }
  function ensureSessionAccess(){ var payload = getActiveSessionPayload(); if(payload && payload.user){ persistSessionPayload(payload); hideLoginBlocker(); return payload; } showLoginBlocker('未登入無法進入網頁，請先登入 Tasun 首頁後再進入此頁。'); return null; }
  function getCurrent(){ var obj = getActiveSessionPayload() || {}; var name = obj.name || obj.user || obj.username || obj.account || ''; return { name:name || '未登入', role:inferRole(name, obj.role || obj.level) }; }
  function persistBridgeForNav(href){ try{ persistSessionPayload(getCurrent()); }catch(_e){} try{ sessionStorage.setItem('tasun_next_path_v1', norm(href)); }catch(_e){} }
  window.__go = function(href){ persistBridgeForNav(href); location.href = withV(href); };


  function getToken(){
    var keys = [
      'tasunCloudToken_v1__' + RESOURCE_KEY,
      'tasunCloudToken_v1__' + PAGE_FILE,
      'tasunCloudToken_v1__auth-table',
      'tasunCloudToken_v1__index',
      'tasunCloudToken_v1',
      'tasunWorkerToken',
      'tasunWorkerToken_v1',
      'tasunBearerToken_v1',
      'tasunAccessToken_v1',
      'tasunAuthToken_v1',
      'tasunSessionToken_v1',
      'tasun_token',
      'tasunToken',
      'tasun_auth_token',
      'tasun_session_token',
      'authToken',
      'access_token',
      'token',
      'x-api-key',
      'tasunApiKey_v1'
    ];
    for(var i=0;i<keys.length;i++){
      try{
        var v = sessionStorage.getItem(keys[i]) || localStorage.getItem(keys[i]) || '';
        if(v) return norm(v);
      }catch(_e){}
    }
    return '';
  }
  function cloudHeaders(){
    var u = getCurrent();
    var headers = new Headers();
    headers.set('accept', 'application/json');
    headers.set('content-type', 'application/json');
    headers.set('x-tasun-session-bridge', 'xidong-manager-entry-r3');
    headers.set('x-tasun-user', norm(u.name || u.user || ''));
    headers.set('x-tasun-role', norm(u.role || 'read'));
    headers.set('x-tasun-page-key', PAGE_KEY);
    headers.set('x-tasun-page-file', PAGE_FILE);
    headers.set('x-tasun-resource-key', RESOURCE_KEY);
    headers.set('x-tasun-table-id', TABLE_ID);
    var tok = getToken();
    if(tok) headers.set('authorization', /^Bearer\s+/i.test(tok) ? tok : ('Bearer ' + tok));
    return headers;
  }
  async function postCloud(path, body, timeoutMs){
    if(!API_BASE || !window.fetch) return null;
    var ctl = null, tm = null;
    try{
      ctl = typeof AbortController !== 'undefined' ? new AbortController() : null;
      tm = setTimeout(function(){ try{ ctl && ctl.abort(); }catch(_e){} }, Number(timeoutMs || 5500));
      var res = await fetch(API_BASE + path, {
        method:'POST',
        mode:'cors',
        credentials:'include',
        cache:'no-store',
        headers: cloudHeaders(),
        body: JSON.stringify(body || {}),
        signal: ctl ? ctl.signal : undefined
      });
      var data = await res.json().catch(function(){ return null; });
      return { ok:!!(res.ok && data && data.ok !== false), status:res.status, data:data };
    }catch(e){
      return { ok:false, status:0, error:String(e && e.message ? e.message : e) };
    }finally{ try{ clearTimeout(tm); }catch(_e){} }
  }
  function normalizeCloudRow(item, fallbackId, idx){
    var fixed = normalizeStoredButton(item || {}, fallbackId);
    var sourceId = norm(fixed.sourceId || fixed.key || fallbackId || ('slot' + idx)).toLowerCase();
    if(!BUTTON_LIBRARY[sourceId]) return null;
    var ts = Number(item && item.updatedAt || item && item.rev || 0) || Date.now();
    var rev = Number(item && item.rev || ts) || ts;
    return Object.assign({}, fixed, {
      uid:sourceId,
      pk:sourceId,
      tableId:TABLE_ID,
      dbName:DB_NAME,
      pageKey:PAGE_KEY,
      pageFile:PAGE_FILE,
      resourceKey:RESOURCE_KEY,
      sourceId:sourceId,
      sortIndex:(SORTABLE_SOURCE_IDS.indexOf(sourceId) >= 0 ? SORTABLE_SOURCE_IDS.indexOf(sourceId) : idx),
      updatedAt:ts,
      rev:rev,
      deleted:!!(item && item.deleted)
    });
  }
  function defaultCloudRows(){
    return SORTABLE_SOURCE_IDS.map(function(sourceId, idx){ return normalizeCloudRow(BUTTON_LIBRARY[sourceId], sourceId, idx); }).filter(Boolean);
  }
  function getLocalCloudRows(){
    var rows = [];
    try{
      var store = safeParse(localStorage.getItem(AUTH_ENTRY_BUTTONS_KEY) || '{}', {});
      var raw = (store && Array.isArray(store[ENTRY_FILE])) ? store[ENTRY_FILE] : [];
      raw.forEach(function(item, idx){ var r = normalizeCloudRow(item, item && (item.sourceId || item.key) || SORTABLE_SOURCE_IDS[idx] || ('slot' + idx), idx); if(r) rows.push(r); });
    }catch(_e){}
    if(!rows.length) rows = defaultCloudRows();
    return dedupeCloudRows(rows);
  }
  function dedupeCloudRows(rows){
    var map = Object.create(null);
    (Array.isArray(rows) ? rows : []).forEach(function(item, idx){
      var r = normalizeCloudRow(item, item && (item.sourceId || item.key || item.uid) || SORTABLE_SOURCE_IDS[idx] || ('slot' + idx), idx);
      if(!r) return;
      var key = norm(r.sourceId || r.uid).toLowerCase();
      if(!key || SORTABLE_SOURCE_IDS.indexOf(key) < 0) return;
      var old = map[key];
      if(!old || Number(r.updatedAt || 0) > Number(old.updatedAt || 0) || (Number(r.updatedAt || 0) === Number(old.updatedAt || 0) && Number(r.rev || 0) >= Number(old.rev || 0))){
        map[key] = r;
      }
    });
    var out = [];
    SORTABLE_SOURCE_IDS.forEach(function(sourceId, idx){
      var r = map[sourceId] || normalizeCloudRow(BUTTON_LIBRARY[sourceId], sourceId, idx);
      if(r && !r.deleted){ r.sortIndex = idx; out.push(r); }
    });
    return out;
  }
  function persistCloudRowsToLocal(rows){
    var normalized = dedupeCloudRows(rows);
    try{
      var store = safeParse(localStorage.getItem(AUTH_ENTRY_BUTTONS_KEY) || '{}', {});
      if(!store || typeof store !== 'object') store = {};
      store[ENTRY_FILE] = normalized.map(function(r){
        return { key:r.key, sourceId:r.sourceId, name:r.name, href:r.href, target:r.target || '', roles:Array.isArray(r.roles) ? r.roles.slice() : [], uid:r.uid, rev:r.rev, updatedAt:r.updatedAt, deleted:false };
      });
      localStorage.setItem(AUTH_ENTRY_BUTTONS_KEY, JSON.stringify(store));
    }catch(_e){}
    refreshHiddenButtonTable(normalized);
    return normalized;
  }
  function refreshHiddenButtonTable(rows){
    var table = $(TABLE_ID);
    if(!table) return;
    try{
      table.setAttribute('data-page-key', PAGE_KEY);
      table.setAttribute('data-resource-key', RESOURCE_KEY);
      table.setAttribute('data-db-name', DB_NAME);
      table.setAttribute('data-has-individual-id', 'true');
      var tbody = table.querySelector('tbody') || table.appendChild(document.createElement('tbody'));
      tbody.innerHTML = '';
      dedupeCloudRows(rows).forEach(function(r){
        var tr = document.createElement('tr');
        tr.setAttribute('data-uid', r.uid);
        tr.setAttribute('data-source-id', r.sourceId);
        tr.setAttribute('data-rev', String(r.rev || 0));
        tr.setAttribute('data-updated-at', String(r.updatedAt || 0));
        ['uid','sourceId','name','href','rev','updatedAt'].forEach(function(k){ var td=document.createElement('td'); td.textContent=String(r[k] || ''); tr.appendChild(td); });
        tbody.appendChild(tr);
      });
    }catch(_e){}
  }
  async function synchronizeEntryButtonsCloud(reason){
    var localRows = dedupeCloudRows(getLocalCloudRows());
    refreshHiddenButtonTable(localRows);
    try{
      var read1 = await postCloud(API_ENDPOINTS.read, { resourceKey:RESOURCE_KEY, pageKey:PAGE_KEY, pageFile:PAGE_FILE, tableId:TABLE_ID, dbName:DB_NAME }, 4800);
      var remoteRows = (read1 && read1.ok && read1.data && Array.isArray(read1.data.rows)) ? read1.data.rows : [];
      var mergedRows = persistCloudRowsToLocal(dedupeCloudRows(remoteRows.concat(localRows)));
      var u = getCurrent();
      if(u && (u.role === 'admin' || u.role === 'write')){
        var merge = await postCloud(API_ENDPOINTS.merge, { resourceKey:RESOURCE_KEY, pageKey:PAGE_KEY, pageFile:PAGE_FILE, tableId:TABLE_ID, dbName:DB_NAME, payload:{ db:mergedRows } }, 6000);
        var afterRows = (merge && merge.ok && merge.data && Array.isArray(merge.data.rows)) ? merge.data.rows : mergedRows;
        mergedRows = persistCloudRowsToLocal(dedupeCloudRows(afterRows));
        var read2 = await postCloud(API_ENDPOINTS.read, { resourceKey:RESOURCE_KEY, pageKey:PAGE_KEY, pageFile:PAGE_FILE, tableId:TABLE_ID, dbName:DB_NAME, verify:true }, 4800);
        if(read2 && read2.ok && read2.data && Array.isArray(read2.data.rows)) mergedRows = persistCloudRowsToLocal(dedupeCloudRows(read2.data.rows));
      }
      trace('cloud_sync_' + reason, { resourceKey:RESOURCE_KEY, tableId:TABLE_ID, rows:mergedRows.length, api:API_BASE });
      return mergedRows;
    }catch(e){
      trace('cloud_sync_skip_' + reason, String(e && e.message ? e.message : e));
      return localRows;
    }
  }

  function canonicalizeRouteStore(){
    try{
      var routes = safeParse(localStorage.getItem(ROUTE_KEY) || '{}', {});
      if(!routes || typeof routes !== 'object') routes = {};
      RECORD_ALIASES.forEach(function(alias){ routes[alias] = canonicalRecordHref(); });
      routes[canonicalRecordName()] = canonicalRecordHref();
      Object.keys(BUTTON_LIBRARY).forEach(function(k){ var b = BUTTON_LIBRARY[k]; if(b && b.name && b.href){ routes[b.name] = b.href; routes[b.sourceId || k] = b.href; } });
      localStorage.setItem(ROUTE_KEY, JSON.stringify(routes));
      trace('route_store', routes);
    }catch(_e){}
  }
  function canonicalizeEntryButtonStore(){
    try{
      var store = safeParse(localStorage.getItem(AUTH_ENTRY_BUTTONS_KEY) || '{}', {});
      if(!store || typeof store !== 'object') store = {};
      var raw = Array.isArray(store[ENTRY_FILE]) ? store[ENTRY_FILE] : [];
      if(!raw.length) return;
      var seen = Object.create(null), normalized = [];
      raw.forEach(function(item, idx){
        var normalizedItem = normalizeStoredButton(item, item && (item.sourceId || item.key) || ('slot' + idx));
        var sourceId = norm(normalizedItem.sourceId).toLowerCase();
        if(!sourceId || sourceId === FIXED_AUTH_SOURCE_ID || SORTABLE_SOURCE_IDS.indexOf(sourceId) < 0 || seen[sourceId]) return;
        seen[sourceId] = true;
        normalized.push(normalizedItem);
      });
      store[ENTRY_FILE] = normalized;
      localStorage.setItem(AUTH_ENTRY_BUTTONS_KEY, JSON.stringify(store));
      trace('entry_store', normalized);
    }catch(_e){}
  }
  function resolveSortableButtons(){
    canonicalizeRouteStore();
    canonicalizeEntryButtonStore();
    var store = safeParse(localStorage.getItem(AUTH_ENTRY_BUTTONS_KEY) || '{}', {});
    var rawStore = Array.isArray(store[ENTRY_FILE]) ? store[ENTRY_FILE] : [];
    var ordered = [], seen = Object.create(null);
    rawStore.forEach(function(item, idx){
      var normalizedItem = normalizeStoredButton(item, item && (item.sourceId || item.key) || ('slot' + idx));
      var sourceId = norm(normalizedItem.sourceId).toLowerCase();
      if(!sourceId || sourceId === FIXED_AUTH_SOURCE_ID || SORTABLE_SOURCE_IDS.indexOf(sourceId) < 0 || seen[sourceId]) return;
      seen[sourceId] = true;
      ordered.push(getButtonBySourceId(sourceId));
    });
    SORTABLE_SOURCE_IDS.forEach(function(sourceId){ if(!seen[sourceId]){ seen[sourceId] = true; ordered.push(getButtonBySourceId(sourceId)); } });
    return ordered.filter(Boolean).map(function(item){ return normalizeStoredButton(item, item.sourceId); });
  }
  function hardSetRecordAnchor(anchor){ if(!anchor) return; var span = anchor.querySelector('span'); if(span) span.textContent = canonicalRecordName(); anchor.dataset.itemKey = 'xidong_record'; anchor.dataset.sourceId = 'xidong_record'; anchor.dataset.routeHref = canonicalRecordHref(); anchor.setAttribute('href', withV(canonicalRecordHref())); anchor.removeAttribute('target'); anchor.removeAttribute('rel'); }
  function forceRecordAnchorCanonical(){
    var anchors = [$('linkRecord'), $('linkDutyLite'), $('linkDB'), $('linkDetail'), $('linkDropbox')];
    anchors.forEach(function(a){
      if(!a) return;
      var span = a.querySelector('span');
      var label = span ? span.textContent : '';
      var href = norm(a.dataset.routeHref || a.getAttribute('href'));
      var sourceId = norm(a.dataset.sourceId || a.dataset.itemKey).toLowerCase();
      if(a.id === 'linkRecord' || sourceId === 'xidong_record' || isRecordAliasName(label) || isRecordAliasHref(href)) hardSetRecordAnchor(a);
    });
  }
  function applyEntryButtons(){
    var u = getCurrent();
    var role = norm(u.role || 'read').toLowerCase();
    var sortableSlots = [$('linkRecord'), $('linkDutyLite'), $('linkDB'), $('linkDetail'), $('linkDropbox')];
    var sortableItems = resolveSortableButtons().filter(function(item){ return !Array.isArray(item.roles) || !item.roles.length || item.roles.indexOf(role) >= 0; });
    sortableSlots.forEach(function(a, i){
      var item = sortableItems[i];
      if(!a || !item){
        if(a){ a.style.display = 'none'; a.removeAttribute('href'); a.removeAttribute('target'); a.removeAttribute('rel'); delete a.dataset.itemKey; delete a.dataset.sourceId; delete a.dataset.routeHref; }
        return;
      }
      var span = a.querySelector('span');
      var rawHref = norm(item.href || '#');
      var href = rawHref;
      if(!/^https?:\/\//i.test(href) && !/^mailto:/i.test(href) && !/^tel:/i.test(href)) href = withV(href);
      a.style.display = 'flex';
      if(span) span.textContent = item.name || item.key || ('按鍵' + (i + 1));
      a.setAttribute('href', href || '#');
      a.dataset.itemKey = norm(item.key || '');
      a.dataset.sourceId = norm(item.sourceId || item.key || '');
      a.dataset.routeHref = rawHref;
      if(item.target){ a.target = item.target; if(item.target === '_blank') a.rel = 'noopener'; }
      else { a.removeAttribute('target'); a.removeAttribute('rel'); }
    });
    var authAnchor = $('linkAuth');
    if(authAnchor){
      var authItem = getButtonBySourceId(FIXED_AUTH_SOURCE_ID);
      if(role !== 'admin'){
        authAnchor.style.display = 'none'; authAnchor.removeAttribute('href'); authAnchor.removeAttribute('target'); authAnchor.removeAttribute('rel'); delete authAnchor.dataset.itemKey; delete authAnchor.dataset.sourceId; delete authAnchor.dataset.routeHref;
      }else{
        var authSpan = authAnchor.querySelector('span'); authAnchor.style.display = 'flex'; if(authSpan) authSpan.textContent = authItem.name; authAnchor.dataset.itemKey = authItem.key; authAnchor.dataset.sourceId = authItem.sourceId; authAnchor.dataset.routeHref = authItem.href; authAnchor.setAttribute('href', withV(authItem.href)); authAnchor.removeAttribute('target'); authAnchor.removeAttribute('rel');
      }
    }
    forceRecordAnchorCanonical();
    trace('resolved_buttons', sortableSlots.map(function(a){ return a ? { id:a.id, text:a.querySelector('span') ? a.querySelector('span').textContent : '', routeHref:a.dataset.routeHref || '', href:a.getAttribute('href') || '', sourceId:a.dataset.sourceId || '' } : null; }));
  }
  function renderUser(){ var u = getCurrent(); $('who').textContent = u.name; $('role').textContent = u.role; applyEntryButtons(); }
  function bindStableNavigate(){
    if(window.__TASUN_XIDONG_MANAGER_NAV_BOUND__) return;
    window.__TASUN_XIDONG_MANAGER_NAV_BOUND__ = true;
    document.addEventListener('click', function(e){
      var a = e.target.closest('a[href]');
      if(!a) return;
      if(e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
      if(typeof e.button === 'number' && e.button !== 0) return;
      var routeHref = norm(a.dataset.routeHref || a.getAttribute('href') || '');
      var sourceId = norm(a.dataset.sourceId || a.dataset.itemKey).toLowerCase();
      var label = a.querySelector('span') ? a.querySelector('span').textContent : '';
      if(a.id === 'linkRecord' || sourceId === 'xidong_record' || isRecordAliasName(label) || isRecordAliasHref(routeHref)) routeHref = canonicalRecordHref();
      trace('click_target', { id:a.id || '', label:label, sourceId:sourceId, routeHref:routeHref, hrefAttr:a.getAttribute('href') || '' });
      if(!routeHref || routeHref === '#') return;
      if(/^https?:\/\//i.test(routeHref) || /^mailto:/i.test(routeHref) || /^tel:/i.test(routeHref) || a.target === '_blank') return;
      e.preventDefault();
      persistBridgeForNav(routeHref);
      window.__go(routeHref);
    }, { capture:true });
    $('btnBack').addEventListener('click', function(){ window.__go('index.html'); });
    $('btnSwitch').addEventListener('click', function(){ window.__go('index.html'); });
  }

  function syncDesktopStageScale(){
    try{
      var stage = document.querySelector('.stage');
      var wrap = document.querySelector('.wrap');
      if(!stage || !wrap) return;
      if(window.matchMedia('(max-width:860px)').matches){
        stage.style.transform='';
        stage.style.width='';
        wrap.style.minHeight='';
        return;
      }
      var mm5 = (function(){
        var d=document.createElement('div');
        d.style.cssText='position:absolute;left:-9999px;top:-9999px;width:5mm;height:0;visibility:hidden;';
        document.documentElement.appendChild(d);
        var px=d.getBoundingClientRect().width || 18.9;
        d.remove();
        return px;
      })();
      var availW = Math.max(760, window.innerWidth - mm5*2);
      var availH = Math.max(480, window.innerHeight - mm5*2);
      stage.style.transform='';
      var baseW = Math.min(1440, availW);
      stage.style.width = baseW + 'px';
      var h = stage.scrollHeight || stage.getBoundingClientRect().height || availH;
      var scale = Math.min(availW / Math.max(1, baseW), availH / Math.max(1, h));
      scale = Math.max(0.72, Math.min(1.28, scale));
      stage.style.transform = 'scale(' + scale.toFixed(4) + ')';
      wrap.style.minHeight = Math.ceil(h * scale + mm5*2) + 'px';
    }catch(_e){}
  }
  async function start(){
    restorePageVisibility();
    if(!ensureRequiredDom()) return;
    bindLoginBlocker();
    if(!ensureSessionAccess()) return;
    applyVehicleBg();
    syncDesktopStageScale();
    window.addEventListener('resize', syncDesktopStageScale, { passive:true });
    trace('record_file_static', { href:$('linkRecord') ? $('linkRecord').getAttribute('href') : '', recordFile:RECORD_FILE, resourceKey:RESOURCE_KEY, tableId:TABLE_ID, dbName:DB_NAME });
    persistCloudRowsToLocal(getLocalCloudRows());
    renderUser();
    bindStableNavigate();
    synchronizeEntryButtonsCloud('boot').then(function(){ renderUser(); }).catch(function(e){ trace('cloud_sync_boot_error', String(e && e.message ? e.message : e)); });
    if(!window.__TASUN_XIDONG_MANAGER_STORAGE_BOUND__){
      window.__TASUN_XIDONG_MANAGER_STORAGE_BOUND__ = true;
      window.addEventListener('storage', function(e){ if(!e || !e.key) return; if(e.key === AUTH_ENTRY_BUTTONS_KEY || e.key === ROUTE_KEY || e.key === CURRENT_KEY){ if(ensureSessionAccess()) synchronizeEntryButtonsCloud('storage').then(function(){ renderUser(); }); } });
    }
  }

  if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', function(){ Promise.resolve(start()).catch(function(e){ showDomWarning('頁面初始化失敗：' + (e && e.message ? e.message : e)); }); }, { once:true });
  else Promise.resolve(start()).catch(function(e){ showDomWarning('頁面初始化失敗：' + (e && e.message ? e.message : e)); });
  window.addEventListener('pageshow', function(){ restorePageVisibility(); syncDesktopStageScale(); }, { passive:true });
  window.addEventListener('load', function(){ restorePageVisibility(); syncDesktopStageScale(); }, { passive:true });
})();
</script>
