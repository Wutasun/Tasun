        location.replace(url.toString());
        return;

      min-height:clamp(52px, 6.6vh, 72px); padding:clamp(12px, 1.7vh, 18px) clamp(14px, 1.8vw, 20px);
    }
    a.navPill span{
      font-size:clamp(15px, 1vw + .55vh, 20px); letter-spacing:.05em; text-align:center; line-height:1.15;
      color:var(--goldText); -webkit-text-stroke:.88px rgba(58,35,10,.68);
      text-shadow:0 1px 0 rgba(255,255,255,.22), 0 2px 6px rgba(55,34,10,.20);
    }
    .domWarn{
      display:none; position:fixed; left:12px; right:12px; top:12px; z-index:99999;
      padding:12px 14px; border-radius:16px; border:1px solid rgba(190,92,92,.42);
      background:rgba(118,24,24,.95); color:#fff4f4; font-size:13px; line-height:1.6;
      box-shadow:0 16px 34px rgba(0,0,0,.22);
    }
    .loginBlocker{
      position:fixed; inset:0; z-index:99998;
      display:none; align-items:center; justify-content:center;
      padding:24px; background:rgba(8,6,4,.74);
      backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
    }
    .loginBlocker.show{ display:flex; }
    .loginBlockerCard{
      width:min(520px, calc(100vw - 32px));
      border-radius:24px; border:1px solid rgba(150,98,22,.26);
      background:linear-gradient(180deg, rgba(255,255,255,.92), rgba(246,240,228,.82));
      box-shadow:0 28px 68px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.72);
      padding:28px 24px; text-align:center;
    }
    .loginBlockerTitle{
      font-family:"Noto Serif TC","Noto Sans TC",serif; font-size:clamp(24px, 2.2vw, 32px);
      font-weight:900; color:var(--goldDeep); letter-spacing:.08em; margin-bottom:10px;
      text-shadow:0 2px 8px rgba(255,255,255,.36);
    }
    .loginBlockerText{ color:rgba(70,48,16,.88); font-size:15px; line-height:1.8; margin-bottom:18px; }
    .loginBlockerActions{ display:flex; justify-content:center; }
    @media (max-width:860px){
      :root{--stageW:100%; --stagePadX:12px; --titleSize:clamp(22px, 5.4vw, 30px); --subSize:clamp(11px, 2.8vw, 14px); --btnSize:clamp(13px, 3.4vw, 15px); --chipSize:clamp(11px, 2.7vw, 13px);}
      .wrap{padding:12px}
      .topRow{grid-template-columns:1fr; gap:10px}
      .leftTools,.rightTools{justify-content:center; flex-wrap:wrap}
      .brand{order:-1}
      .grid{grid-template-columns:1fr; gap:12px}
      button.btn{min-height:42px; padding:10px 14px}
      a.navPill{min-height:clamp(50px, 7vh, 64px); padding:12px 14px}
      a.navPill span{font-size:clamp(15px, 3.8vw, 18px); line-height:1.2}
      :root{--vehicle-w:clamp(1100px, 140vw, 2200px); --vehicle-y:84%; --vehicle-op:.12}
    }
    @media (max-width:520px){
      :root{--titleSize:clamp(20px, 6.1vw, 26px); --subSize:clamp(10px, 3.1vw, 12px)}
      .wrap{padding:10px}
      .topbar,.panel{border-radius:16px}
      .leftTools,.rightTools{gap:8px}
      .leftTools > *, .rightTools > *{flex:1 1 auto}
      button.btn, .chip{width:100%}
      a.navPill{min-height:52px}
      a.navPill span{font-size:clamp(14px, 4.2vw, 17px)}
    }
    @media (prefers-reduced-motion:reduce){.mistFlow{animation:none}}
  </style>
</head>

<body>
  <div class="vehicleBG" aria-hidden="true"></div>
  <div class="mistFlow" aria-hidden="true"></div>
  <div class="domWarn" id="domWarn"></div>
  <div class="loginBlocker" id="loginBlocker" aria-live="assertive">
    <div class="loginBlockerCard">
      <div class="loginBlockerTitle">未登入無法進入網頁</div>
      <div class="loginBlockerText" id="loginBlockerText">請先登入 Tasun 首頁後再進入此頁。</div>
      <div class="loginBlockerActions">
        <button class="btn glassBtn goldText" id="loginBlockerBackBtn" type="button">返回首頁</button>
      </div>
    </div>
  </div>

  <div class="wrap">
    <div class="stage">
      <header class="topbar glassStage">
        <div class="topRow">
          <div class="leftTools">
            <button class="btn glassBtn goldText" id="btnBack" type="button">返回首頁</button>
          </div>

          <div class="brand">
            <div class="t crystal">汐東工程管理表</div>
            <div class="s goldText">入口總表｜依權限顯示</div>
          </div>

          <div class="rightTools">
            <div class="chip" aria-label="使用者資訊">
              <span class="goldText">使用者：</span><span class="goldSharp" id="who">alex</span>
              <span class="goldText">權限：</span><span class="goldSharp" id="role">admin</span>
            </div>
            <button class="btn glassBtn goldText" id="btnSwitch" type="button">切換帳號</button>
          </div>
        </div>
      </header>

      <section class="panel glassStage">
        <div class="grid">
          <div class="group" id="leftGroup">
            <a class="navPill glassBtn" href="捷運汐東線事項記錄.html" id="linkRecord"><span>捷運汐東線事項記錄</span></a>
            <a class="navPill glassBtn" href="捷運汐東線權責分工精簡版.html" id="linkDutyLite"><span>權責分工精簡版</span></a>
            <a class="navPill glassBtn" href="捷運汐止東湖線統包工程-資料庫.html" id="linkDB"><span>捷運汐東線工程資料庫</span></a>
            <a class="navPill glassBtn" href="捷運汐止東湖線統包工程-資料明細表.html" id="linkDetail"><span>捷運系東線資料明細表</span></a>
            <a class="navPill glassBtn" href="權限表.html" id="linkAuth"><span>系統／權限</span></a>
          </div>
          <div class="group" id="rightGroup">
            <a class="navPill glassBtn" href="https://www.dropbox.com/scl/fo/glb4s65934h195bxuyuqm/AH5ClZ2u4MtPMvmgtfOUAa4?rlkey=tfxkpbpw8k9bctshx5xvuge8h&st=127vsul4&dl=0" target="_blank" rel="noopener" id="linkDropbox"><span>雲端檔案</span></a>
          </div>
        </div>
      </section>
    </div>
  </div>


  <script>
  (function(){
    'use strict';

    function $(id){ return document.getElementById(id); }
    function norm(v){ return String(v == null ? '' : v).trim(); }
    function safeParse(s, fallback){ try{ return JSON.parse(s); }catch(_e){ return fallback; } }
    function inferRole(name, role){
      var r = norm(role).toLowerCase();
      if(r === 'admin' || r === 'write' || r === 'read') return r;
      var n = norm(name).toLowerCase();
      if(n === 'alex' || n === 'joyce') return 'admin';
      if(n === 'tasun') return 'write';
      return 'read';
    }
    function clone(obj){ return JSON.parse(JSON.stringify(obj)); }

    function showDomWarning(message){
      var bar = $('domWarn');
      if(!bar) return;
      bar.textContent = message;
      bar.style.display = 'block';
    }

    function ensureRequiredDom(){
      var required = [
        'btnBack','btnSwitch','who','role','leftGroup','rightGroup',
        'linkRecord','linkDutyLite','linkDB','linkDetail','linkAuth','linkDropbox',
        'domWarn','loginBlocker','loginBlockerText','loginBlockerBackBtn'
      ];
      var missing = required.filter(function(id){ return !$(id); });
      if(!missing.length) return true;
      showDomWarning('頁面缺少必要節點，已中止腳本綁定：' + missing.join('、'));
      console.warn('[Tasun][汐東工程管理表] missing DOM nodes:', missing);
      return false;
    }

    var G = window.__TASUN_GLOBALS__ = window.__TASUN_GLOBALS__ || {};
    var CURRENT_KEY = String(G.CURRENT_KEY || 'tasunCurrentUser_v1');
    var AUTH_ENTRY_BUTTONS_KEY = String(G.AUTH_ENTRY_BUTTONS_KEY || 'tasunAuthEntryButtons_v1');
    var ROUTE_KEY = String(G.ROUTE_KEY || 'tasunRoutes_v1');
    var ENTRY_FILE = String(G.ENTRY_FILE || '汐東工程管理表.html');
    var RECORD_FILE = String(G.RECORD_FILE || '捷運汐東線事項記錄.html');

    var SORTABLE_SOURCE_IDS = ['xidong_record','xidong_duty','xidong_db','xidong_detail','xidong_cloud'];
    var FIXED_AUTH_SOURCE_ID = 'xidong_auth';
    var RECORD_ALIASES = [
      '捷運汐東線事項紀錄','捷運汐東線事項記錄',
      '捷運汐東線事項紀錄.html','捷運汐東線事項記錄.html',
      '捷運汐東線事項紀錄.htm','捷運汐東線事項記錄.htm',
      '捷運汐東線記事','捷運汐東線記事.html','捷運汐東線記事.htm'
    ];

    var BUTTON_LIBRARY = {
      xidong_record: { key:'xidong_record', sourceId:'xidong_record', name:'捷運汐東線事項記錄', href:RECORD_FILE, target:'', roles:['admin','write','read'] },
      xidong_duty:   { key:'xidong_duty', sourceId:'xidong_duty', name:'權責分工精簡版', href:'捷運汐東線權責分工精簡版.html', target:'', roles:['admin','write','read'] },
      xidong_db:     { key:'xidong_db', sourceId:'xidong_db', name:'工程資料庫', href:'捷運汐止東湖線統包工程-資料庫.html', target:'', roles:['admin','write','read'] },
      xidong_detail: { key:'xidong_detail', sourceId:'xidong_detail', name:'捷運系東線資料明細表', href:'捷運汐止東湖線統包工程-資料明細表.html', target:'', roles:['admin','write','read'] },
      xidong_cloud:  { key:'xidong_cloud', sourceId:'xidong_cloud', name:'雲端檔案', href:'https://www.dropbox.com/scl/fo/glb4s65934h195bxuyuqm/AH5ClZ2u4MtPMvmgtfOUAa4?rlkey=tfxkpbpw8k9bctshx5xvuge8h&st=127vsul4&dl=0', target:'_blank', roles:['admin','write','read'] },
      xidong_auth:   { key:'xidong_auth', sourceId:'xidong_auth', name:'系統／權限', href:'權限表.html', target:'', roles:['admin'] }
    };

    function normalizeNameToken(v){
      return norm(v).replace(/[\s　]+/g, '').replace(/[／]/g, '/').toLowerCase();
    }
    function canonicalRecordName(){ return BUTTON_LIBRARY.xidong_record.name; }
    function canonicalRecordHref(){ return BUTTON_LIBRARY.xidong_record.href; }
    function getButtonBySourceId(sourceId){
      var id = norm(sourceId).toLowerCase();
      return BUTTON_LIBRARY[id] ? clone(BUTTON_LIBRARY[id]) : null;
    }
    function isRecordAliasName(name){
      var token = normalizeNameToken(name);
      return RECORD_ALIASES.some(function(alias){ return token === normalizeNameToken(alias); });
    }
    function isRecordAliasHref(href){
      var h = norm(href).toLowerCase();
      if(!h) return false;
      if(h === canonicalRecordHref().toLowerCase()) return true;
      return RECORD_ALIASES.some(function(alias){ return h === alias.toLowerCase(); });
    }
    function detectSourceId(item, fallbackId){
      var sourceId = norm(item && item.sourceId).toLowerCase();
      var key = norm(item && item.key).toLowerCase();
      var name = norm(item && (item.name || item.label));
      var href = norm(item && item.href);
      if(BUTTON_LIBRARY[sourceId]) return sourceId;
      if(BUTTON_LIBRARY[key]) return key;
      if(isRecordAliasName(name) || isRecordAliasHref(href)) return 'xidong_record';
      if(normalizeNameToken(name).indexOf(normalizeNameToken('系統/權限')) >= 0 || norm(href).toLowerCase() === '權限表.html') return FIXED_AUTH_SOURCE_ID;
      if(normalizeNameToken(name) === normalizeNameToken('權責分工精簡版') || href === '捷運汐東線權責分工精簡版.html') return 'xidong_duty';
      if(normalizeNameToken(name) === normalizeNameToken('工程資料庫') || href === '捷運汐止東湖線統包工程-資料庫.html') return 'xidong_db';
      if(normalizeNameToken(name) === normalizeNameToken('捷運系東線資料明細表') || href === '捷運汐止東湖線統包工程-資料明細表.html') return 'xidong_detail';
      if(normalizeNameToken(name) === normalizeNameToken('雲端檔案') || /^https?:\/\//i.test(href)) return 'xidong_cloud';
      var fallback = norm(fallbackId).toLowerCase();
      return BUTTON_LIBRARY[fallback] ? fallback : '';
    }
    function normalizeStoredButton(item, fallbackId){
      var sourceId = detectSourceId(item, fallbackId);
      var fixed = getButtonBySourceId(sourceId);
      if(fixed) return fixed;
      return {
        key: norm(item && item.key || fallbackId || ''),
        sourceId: norm(item && item.sourceId || fallbackId || ''),
        name: norm(item && (item.name || item.label) || fallbackId || ''),
        href: norm(item && item.href),
        target: norm(item && item.target),
        roles: Array.isArray(item && item.roles) ? item.roles.slice() : []
      };
    }

    function withV(href){
      if(typeof window.__withV !== 'function') return href;
      return window.__withV(href);
    }
    function applyVehicleBg(){
      var file = String(G.VEHICLE_IMAGE || '捷運車輛.png');
      var url = (typeof window.__withV === 'function') ? window.__withV(file) : file;
      document.documentElement.style.setProperty('--vehicle-bg', 'url("' + url + '")');
    }

    function readCookie(name){
      try{
        var m = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[.$?*|{}()\[\]\/+^]/g,'\$&') + '=([^;]*)'));
        return m ? decodeURIComponent(m[1]) : '';
      }catch(_e){ return ''; }
    }
    function decodeSessionCookie(raw){
      try{
        if(!raw) return null;
        var txt = decodeURIComponent(escape(atob(String(raw))));
        var js = safeParse(txt, null);
        if(!js || typeof js !== 'object') return null;
        var user = norm(js.user || js.name || js.username || js.account || js.u);
        if(!user) return null;
        return { user:user, name:user, username:user, role:inferRole(user, js.role || js.level || js.r), level:inferRole(user, js.role || js.level || js.r) };
      }catch(_e){ return null; }
    }
    function persistSessionPayload(payload){
      if(!payload) return null;
      var user = norm(payload.user || payload.name || payload.username || payload.account);
      if(!user) return null;
      var role = inferRole(user, payload.role || payload.level);
      var data = { user:user, name:user, username:user, role:role, level:role, at:new Date().toISOString() };
      try{ sessionStorage.setItem(CURRENT_KEY, JSON.stringify(data)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSession_v1', JSON.stringify(data)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSessionBridge_v1', JSON.stringify(data)); }catch(_e){}
      try{ sessionStorage.setItem('tasunSessionLogin_v2', JSON.stringify({ user:user, role:role, t:Date.now() })); }catch(_e){}
      try{ sessionStorage.setItem('tasunIndexSession_v1', '1'); }catch(_e){}
      try{ sessionStorage.setItem('tasunIndexSessionAuthed_v2', '1'); }catch(_e){}
      try{
        var sso = { name:user, user:user, role:role, at:Date.now(), exp:Date.now() + 1000*60*60*12, v:(window.__CACHE_V || window.TASUN_APP_VER || window.APP_VER || '') };
        sessionStorage.setItem('tasunSso_v1', JSON.stringify(sso));
        sessionStorage.setItem('tasunSso_v2', JSON.stringify(sso));
      }catch(_e){}
      try{
        var cookiePayload = encodeURIComponent(btoa(unescape(encodeURIComponent(JSON.stringify({ u:user, r:role, exp:Date.now() + 1000*60*60*12, v:(window.__CACHE_V || '') }))))) ;
        document.cookie = 'tasun_session_v4=' + cookiePayload + '; Path=/; SameSite=Lax' + (location.protocol === 'https:' ? '; Secure' : '');
      }catch(_e){}
      try{ localStorage.removeItem(CURRENT_KEY); }catch(_e){}
      try{ localStorage.removeItem('tasunSession_v1'); }catch(_e){}
      try{ localStorage.removeItem('tasunSessionBridge_v1'); }catch(_e){}
      try{ localStorage.removeItem('tasunSso_v1'); }catch(_e){}
      try{ localStorage.removeItem('tasunSso_v2'); }catch(_e){}
      return data;
    }
    function getActiveSessionPayload(){
      var keys = [CURRENT_KEY,'tasunSessionBridge_v1','tasunSession_v1','tasunSso_v2','tasunSso_v1','tasunSessionLogin_v2'];
      for(var i=0;i<keys.length;i++){
        try{
          var raw = sessionStorage.getItem(keys[i]) || localStorage.getItem(keys[i]) || '';
          if(!raw) continue;
          var js = safeParse(raw, null);
          if(js && typeof js === 'object'){
            var user = norm(js.user || js.name || js.username || js.account);
            if(user) return { user:user, name:user, username:user, role:inferRole(user, js.role || js.level), level:inferRole(user, js.role || js.level) };
          }
        }catch(_e){}
      }
      return decodeSessionCookie(readCookie('tasun_session_v4'));
    }
    function showLoginBlocker(message){
      var wrap = $('loginBlocker');
      var textNode = $('loginBlockerText');
      if(textNode) textNode.textContent = message || '未登入無法進入網頁';
      if(wrap) wrap.classList.add('show');
      try{ document.body.style.overflow = 'hidden'; }catch(_e){}
    }
    function hideLoginBlocker(){
      var wrap = $('loginBlocker');
      if(wrap) wrap.classList.remove('show');
      try{ document.body.style.overflow = ''; }catch(_e){}
    }
    function bindLoginBlocker(){
      var btn = $('loginBlockerBackBtn');
      if(btn && !btn.__tasunBound){
        btn.__tasunBound = true;
        btn.addEventListener('click', function(){ location.href = withV('index.html'); });
      }
    }
    function ensureSessionAccess(){
      var payload = getActiveSessionPayload();
      if(payload && payload.user){
        persistSessionPayload(payload);
        hideLoginBlocker();
        return payload;
      }
      showLoginBlocker('未登入無法進入網頁，請先登入 Tasun 首頁後再進入此頁。');
      return null;
    }
    function getCurrent(){
      var obj = getActiveSessionPayload() || {};
      var name = obj.name || obj.user || obj.username || obj.account || '';
      return { name:name || '未登入', role:inferRole(name, obj.role || obj.level) };
    }
    function persistBridgeForNav(href){
      try{ persistSessionPayload(getCurrent()); }catch(_e){}
      try{ sessionStorage.setItem('tasun_next_path_v1', norm(href)); }catch(_e){}
    }
    window.__go = function(href){
      persistBridgeForNav(href);
      location.href = withV(href);
    };

    function canonicalizeRouteStore(){
      try{
        var routes = safeParse(localStorage.getItem(ROUTE_KEY) || '{}', {});
        if(!routes || typeof routes !== 'object') routes = {};
        RECORD_ALIASES.forEach(function(alias){ routes[alias] = canonicalRecordHref(); });
        routes[canonicalRecordName()] = canonicalRecordHref();
        localStorage.setItem(ROUTE_KEY, JSON.stringify(routes));
      }catch(_e){}
    }
    function canonicalizeEntryButtonStore(){
      try{
        var store = safeParse(localStorage.getItem(AUTH_ENTRY_BUTTONS_KEY) || '{}', {});
        if(!store || typeof store !== 'object') store = {};
        var raw = Array.isArray(store[ENTRY_FILE]) ? store[ENTRY_FILE] : [];
        if(!raw.length) return;
        var seen = Object.create(null);
        var normalized = [];
        raw.forEach(function(item, idx){
          var normalizedItem = normalizeStoredButton(item, item && (item.sourceId || item.key) || ('slot' + idx));
          var sourceId = norm(normalizedItem.sourceId).toLowerCase();
          if(!sourceId || sourceId === FIXED_AUTH_SOURCE_ID || SORTABLE_SOURCE_IDS.indexOf(sourceId) < 0 || seen[sourceId]) return;
          seen[sourceId] = true;
          normalized.push(normalizedItem);
        });
        store[ENTRY_FILE] = normalized;
        localStorage.setItem(AUTH_ENTRY_BUTTONS_KEY, JSON.stringify(store));
      }catch(_e){}
    }
    function resolveSortableButtons(){
      canonicalizeRouteStore();
      canonicalizeEntryButtonStore();
      var store = safeParse(localStorage.getItem(AUTH_ENTRY_BUTTONS_KEY) || '{}', {});
      var rawStore = Array.isArray(store[ENTRY_FILE]) ? store[ENTRY_FILE] : [];
      var ordered = [];
      var seen = Object.create(null);
      rawStore.forEach(function(item, idx){
        var normalizedItem = normalizeStoredButton(item, item && (item.sourceId || item.key) || ('slot' + idx));
        var sourceId = norm(normalizedItem.sourceId).toLowerCase();
        if(!sourceId || sourceId === FIXED_AUTH_SOURCE_ID || SORTABLE_SOURCE_IDS.indexOf(sourceId) < 0 || seen[sourceId]) return;
        seen[sourceId] = true;
        ordered.push(getButtonBySourceId(sourceId));
      });
      SORTABLE_SOURCE_IDS.forEach(function(sourceId){
        if(!seen[sourceId]){
          seen[sourceId] = true;
          ordered.push(getButtonBySourceId(sourceId));
        }
      });
      return ordered.filter(Boolean).map(function(item){ return normalizeStoredButton(item, item.sourceId); });
    }
    function forceRecordAnchorCanonical(){
      var anchors = [$('linkRecord'), $('linkDutyLite'), $('linkDB'), $('linkDetail'), $('linkDropbox')];
      anchors.forEach(function(a){
        if(!a) return;
        var span = a.querySelector('span');
        var label = span ? span.textContent : '';
        var href = norm(a.dataset.routeHref || a.getAttribute('href'));
        var sourceId = norm(a.dataset.sourceId || a.dataset.itemKey).toLowerCase();
        var looksRecord = sourceId === 'xidong_record' || isRecordAliasName(label) || isRecordAliasHref(href);
        if(!looksRecord) return;
        if(span) span.textContent = canonicalRecordName();
        a.dataset.itemKey = 'xidong_record';
        a.dataset.sourceId = 'xidong_record';
        a.dataset.routeHref = canonicalRecordHref();
        a.setAttribute('href', withV(canonicalRecordHref()));
        a.removeAttribute('target');
        a.removeAttribute('rel');
      });
    }
    function applyEntryButtons(){
      var u = getCurrent();
      var role = norm(u.role || 'read').toLowerCase();
      var sortableSlots = [$('linkRecord'), $('linkDutyLite'), $('linkDB'), $('linkDetail'), $('linkDropbox')];
      var sortableItems = resolveSortableButtons().filter(function(item){
        return !Array.isArray(item.roles) || !item.roles.length || item.roles.indexOf(role) >= 0;
      });
      sortableSlots.forEach(function(a, i){
        var item = sortableItems[i];
        if(!a || !item){
          if(a){
            a.style.display = 'none';
            a.removeAttribute('href');
            a.removeAttribute('target');
            a.removeAttribute('rel');
            delete a.dataset.itemKey;
            delete a.dataset.sourceId;
            delete a.dataset.routeHref;
          }
          return;
        }
        var span = a.querySelector('span');
        var rawHref = norm(item.href || '#');
        var href = rawHref;
        if(!/^https?:\/\//i.test(href) && !/^mailto:/i.test(href) && !/^tel:/i.test(href)) href = withV(href);
        a.style.display = 'flex';
        if(span) span.textContent = item.name || item.key || ('按鍵' + (i + 1));
        a.setAttribute('href', href || '#');
        a.dataset.itemKey = norm(item.key || '');
        a.dataset.sourceId = norm(item.sourceId || item.key || '');
        a.dataset.routeHref = rawHref;
        if(item.target){
          a.target = item.target;
          if(item.target === '_blank') a.rel = 'noopener';
        }else{
          a.removeAttribute('target');
          a.removeAttribute('rel');
        }
      });
      var authAnchor = $('linkAuth');
      if(authAnchor){
        var authItem = getButtonBySourceId(FIXED_AUTH_SOURCE_ID);
        if(role !== 'admin'){
          authAnchor.style.display = 'none';
          authAnchor.removeAttribute('href');
          authAnchor.removeAttribute('target');
          authAnchor.removeAttribute('rel');
          delete authAnchor.dataset.itemKey;
          delete authAnchor.dataset.sourceId;
          delete authAnchor.dataset.routeHref;
        }else{
          var authSpan = authAnchor.querySelector('span');
          authAnchor.style.display = 'flex';
          if(authSpan) authSpan.textContent = authItem.name;
          authAnchor.dataset.itemKey = authItem.key;
          authAnchor.dataset.sourceId = authItem.sourceId;
          authAnchor.dataset.routeHref = authItem.href;
          authAnchor.setAttribute('href', withV(authItem.href));
          authAnchor.removeAttribute('target');
          authAnchor.removeAttribute('rel');
        }
      }
      forceRecordAnchorCanonical();
    }
    function renderUser(){
      var u = getCurrent();
      $('who').textContent = u.name;
      $('role').textContent = u.role;
      applyEntryButtons();
    }
    function bindStableNavigate(){
      document.addEventListener('click', function(e){
        var a = e.target.closest('a[href]');
        if(!a) return;
        if(e.metaKey || e.ctrlKey || e.shiftKey || e.altKey) return;
        if(typeof e.button === 'number' && e.button !== 0) return;
        var routeHref = norm(a.dataset.routeHref || a.getAttribute('href') || '');
        var sourceId = norm(a.dataset.sourceId || a.dataset.itemKey).toLowerCase();
        var label = a.querySelector('span') ? a.querySelector('span').textContent : '';
        if(sourceId === 'xidong_record' || isRecordAliasName(label) || isRecordAliasHref(routeHref)) routeHref = canonicalRecordHref();
        if(!routeHref || routeHref === '#') return;
        if(/^https?:\/\//i.test(routeHref) || /^mailto:/i.test(routeHref) || /^tel:/i.test(routeHref) || a.target === '_blank') return;
        e.preventDefault();
        persistBridgeForNav(routeHref);
        window.__go(routeHref);
      }, { capture:true });
      $('btnBack').addEventListener('click', function(){ window.__go('index.html'); });
      $('btnSwitch').addEventListener('click', function(){ window.__go('index.html'); });
    }
    function start(){
      if(!ensureRequiredDom()) return;
      bindLoginBlocker();
      if(!ensureSessionAccess()) return;
      applyVehicleBg();
      renderUser();
      bindStableNavigate();
      window.addEventListener('storage', function(e){
        if(!e || !e.key) return;
        if(e.key === AUTH_ENTRY_BUTTONS_KEY || e.key === ROUTE_KEY || e.key === CURRENT_KEY){
          if(ensureSessionAccess()) renderUser();
        }
      });
    }

    if(document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start, { once:true });
    else start();
  })();
  </script>

</body>
</html>
