name: Tasun Auto Version Sync

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "**/*.html"
      - "**/*.htm"
      - "**/*.js"
      - "**/*.mjs"
      - "**/*.css"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - "**/*.txt"
      - "TASUN_REBUILD_STAMP"
      - ".github/workflows/release-version.yml"
      - "publish-version_tasun_project_autoscan.mjs"

permissions:
  contents: write

concurrency:
  group: tasun-auto-version-sync-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync-version-files:
    name: Sync tasun-version.json and TASUN_REBUILD_STAMP
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip tasun-version]') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run Tasun version autoscan
        run: |
          node publish-version_tasun_project_autoscan.mjs

      - name: Commit updated version files
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add tasun-version.json TASUN_REBUILD_STAMP
          git add "*.html" "*.htm" "*.js" "*.mjs" "*.css" "*.json" "*.yml" "*.yaml" "*.txt" || true
          git add .github/workflows/release-version.yml publish-version_tasun_project_autoscan.mjs || true

          git commit -m "chore(tasun): auto sync tasun-version and rebuild stamp [skip tasun-version]"
          git push
