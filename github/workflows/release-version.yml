name: Tasun Auto Version Sync

on:
  push:
    branches: [ main ]
    paths:
      - '**.html'
      - '**.js'
      - '**.mjs'
      - '**.css'
      - 'tasun-version.json'
      - 'tasun-resources.json'
      - '.github/workflows/release-version.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tasun-version-sync-${{ github.ref }}
  cancel-in-progress: false

jobs:
  sync-version-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync tasun-version.json from current pages
        run: node publish-version_tasun_project_autoscan.mjs

      - name: Commit synchronized tasun-version.json
        run: |
          if git diff --quiet; then
            echo "tasun-version.json already synchronized."
            exit 0
          fi
          git config user.name "tasun-version-bot"
          git config user.email "actions@github.com"
          git add tasun-version.json "*.html" publish-version_tasun_project_autoscan.mjs .github/workflows/release-version.yml
          git commit -m "chore: auto sync tasun-version.json"
          git push
