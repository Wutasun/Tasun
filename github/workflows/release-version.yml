name: Tasun auto version release

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'tasun-version.json'
      - 'TASUN_REBUILD_STAMP'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tasun-auto-version-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-version:
    name: Update tasun-version.json automatically
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Tasun version from source hash
        run: node publish-version_tasun_project_autoscan.mjs

      - name: Commit updated version files
        shell: bash
        run: |
          if [[ -z "$(git status --porcelain)" ]]; then
            echo "No version changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore(tasun): auto update version"
          git push
