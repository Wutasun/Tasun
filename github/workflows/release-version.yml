name: release-version

on:
  workflow_dispatch:
    inputs:
      reason:
        description: "Release reason"
        required: false
        default: "admin-button"
        type: string
      actor:
        description: "Triggered by"
        required: false
        default: "admin"
        type: string
      write_fallbacks:
        description: "Rewrite fallback versions"
        required: false
        default: "true"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    concurrency:
      group: tasun-release
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Ensure script exists
        run: |
          test -f publish-version_tasun_project_autoscan.mjs

      - name: Run release script
        env:
          ADMIN_RELEASE: "1"
        run: |
          node publish-version_tasun_project_autoscan.mjs --root . --write-fallbacks ${{ github.event.inputs.write_fallbacks }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tasun-version.json tasun-resources.json . || true
          git add '*.html' '*.js' '*.json' || true
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "release: auto version update (${{ github.event.inputs.reason || 'admin-button' }})"
          git push
