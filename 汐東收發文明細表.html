function ensureXLSXLoaded(){

    if(window.XLSX&&typeof window.XLSX.utils==='object') return resolve(window.XLSX);
    const exist=document.querySelector('script[data-xlsx-lib="1"]');
    if(exist){exist.addEventListener('load',()=>resolve(window.XLSX),{once:true});exist.addEventListener('error',()=>reject(new Error('XLSX_LOAD_FAIL')),{once:true});return;}
    const s=document.createElement('script');
    s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
    s.async=true;
    s.setAttribute('data-xlsx-lib','1');
    s.onload=()=>resolve(window.XLSX);
    s.onerror=()=>reject(new Error('XLSX_LOAD_FAIL'));
    document.head.appendChild(s);

function normalizeHeaderName(v){return norm(v).replace(/\s+/g,'').replace(/[()（）]/g,'').toLowerCase();}

function buildImportRowsFromSheet(rows2d){
  const cols=excelColumns();
  if(!Array.isArray(rows2d)||!rows2d.length) return {ok:false,errors:['Excel 內容為空。']};
  const header=rows2d[0]||[];
  const headerNorm=header.map(normalizeHeaderName);
  const errors=[];
  cols.forEach((c,idx)=>{if(headerNorm[idx]!==normalizeHeaderName(c.label)) errors.push('第 '+(idx+1)+' 欄應為「'+c.label+'」。');});
  if(errors.length) return {ok:false,errors};
  const imported=[];
  for(let i=1;i<rows2d.length;i++){
    const row=rows2d[i]||[];
    if(row.every(v=>!norm(v))) continue;
    if(normalizeHeaderName(row[0])===normalizeHeaderName('說明')) continue;
    const obj={};
    obj.uid=norm(row[1]);
    COLUMNS.filter(c=>c!=='項次').forEach((c,idx)=>{obj[c]=normalizeText(row[idx+2]);});
    ['來文/發文日期','收文日期','處理期限','回覆日期','展延日期'].forEach(k=>{obj[k]=parseExcelDateValue(obj[k]); if(obj[k]&&!/^\d{4}-\d{2}-\d{2}$/.test(obj[k])) errors.push('第 '+(i+1)+' 列「'+k+'」格式錯誤，請改為 YYYY-MM-DD。');});
    ['收/發文','文件類別','文號','主旨','來文/發文日期'].forEach(k=>{if(!norm(obj[k])) errors.push('第 '+(i+1)+' 列「'+k+'」不得為空。');});
    imported.push(obj);
  }
  if(errors.length) return {ok:false,errors:errors.slice(0,30)};
  return {ok:true,rows:imported};
}

  importedRows.forEach(item=>{

    const base=uid?byUid.get(uid):null;
    if(!uid) uid=uuid();
    const now=Date.now();
    const row=ensureRow({...base,...item,uid:uid,pk:uid,updatedAt:now,rev:Number(base&&base.rev||0)+1||now,deleted:false,tableId:TABLE_ID,dbName:DB_NAME,resourceKey:RESOURCE_KEY});

function handleExcelImport(file){

  ensureXLSXLoaded().then(function(){
    const reader=new FileReader();
    reader.onload=async function(evt){
      try{
        await authoritySync('excel-import-before');
        const wb=XLSX.read(evt.target.result,{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows2d=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
        const parsed=buildImportRowsFromSheet(rows2d);
        if(!parsed.ok){showExcelImportError(parsed.errors||['格式錯誤']);return;}
        mergeImportedRows(parsed.rows||[]);
        saveLocal(false);
        renderAll();
        await authoritySync('excel-import');
        toast('Excel 上傳完成');
      }catch(err){console.warn(err);showExcelImportError(['檔案無法解析，請確認是由本頁下載的 Excel 檔。']);}finally{if($('#excelFileInput')) $('#excelFileInput').value='';}
    };
    reader.readAsArrayBuffer(file);
  }).catch(()=>{alert('Excel 套件載入失敗，請確認網路連線後再試。'); if($('#excelFileInput')) $('#excelFileInput').value='';});
}
